<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real wargame — Tactical Board Prototype v0.2</title>
  </head>
  <body>
    <div id="app"></div>
    <aside id="hud" aria-label="Tactical board HUD">
      <div class="hud-header">
        <h1 data-i18n="title">Tactical Board Prototype v0.2</h1>
        <button id="language-toggle" type="button" aria-label="Switch language">RU</button>
      </div>
      <p data-i18n="primaryInstruction">Left click a counter to select it. Right click the map to issue a move order.</p>
      <p data-i18n="cameraInstruction">Mouse wheel zooms. Middle mouse or Space + left drag pans.</p>
      <p data-i18n="newFeatures">Large map, crisp HTML labels, map objects, held items and view cones are enabled.</p>
      <div class="hud-controls" aria-label="Map display controls">
        <button id="grid-toggle" class="hud-toggle" type="button" aria-pressed="true">Grid: on</button>
        <button id="vision-toggle" class="hud-toggle" type="button" aria-pressed="true">View cones: on</button>
      </div>
      <pre id="debug-panel">Loading tactical board...</pre>
    </aside>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
