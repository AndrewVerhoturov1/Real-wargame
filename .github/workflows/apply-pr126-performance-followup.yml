name: Apply PR 126 Performance Follow-up

on:
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - 'scripts/apply_pr126_performance_followup.mjs'
      - '.github/workflows/apply-pr126-performance-followup.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/danger-route-cost-parity-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Prepare source-only follow-up patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply_pr126_performance_followup.mjs')
          source = path.read_text(encoding='utf-8')
          source = source.replace(r'\`${VISUAL_OBJECT_PREFIX}wall\`', r'\`\${VISUAL_OBJECT_PREFIX}wall\`')
          source = source.replace('patchBrowserWorkflow();\n', '')
          source = source.replace("fs.rmSync('scripts/apply_pr126_performance_followup.mjs');\n", '')
          source = source.replace("fs.rmSync('.github/workflows/apply-pr126-performance-followup.yml');\n", '')
          path.write_text(source, encoding='utf-8')
          PY
      - name: Apply follow-up changes
        shell: bash
        run: |
          set -o pipefail
          node scripts/apply_pr126_performance_followup.mjs 2>&1 | tee apply-pr126-followup.log
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr126-followup-patch-log
          path: apply-pr126-followup.log
          if-no-files-found: error
      - name: Commit core follow-up changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/core/navigation/RouteCostField.ts \
            src/core/knowledge/SoldierAwarenessGrid.ts \
            src/core/debug/PerformanceMonitor.ts \
            src/testing/CombatTacticalIntegrationVisualQaHarness.ts \
            docs/subprojects/ai-single-unit-editor/TACTICAL_ROUTE_COST_V1.md
          git commit -m "Apply PR 126 performance follow-up"
          git push origin HEAD:${{ github.head_ref }}
