name: Temporary Editor Smoke Diagnostic

on:
  push:
    branches:
      - planning/complete-stateful-runtime-events-2026-07-12
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: planning/complete-stateful-runtime-events-2026-07-12
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - name: Correct Reload cancellation assertion
        run: |
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises';
          const path = 'scripts/ai_node_editor_smoke.mjs';
          const before = await readFile(path, 'utf8');
          const search = `for (const needle of ['begin_reload', 'complete_reload', 'cancel_reload']) {
            expectContains(gameBridge, needle, \`Игровой мост Reload должен обрабатывать: \${needle}\`);
          }`;
          const replacement = `for (const needle of ['begin_reload', 'complete_reload']) {
            expectContains(gameBridge, needle, \`Игровой мост Reload должен обрабатывать: \${needle}\`);
          }
          expectContains(gameBridge, 'ai_graph_reload_cancelled', 'Игровой мост Reload должен явно фиксировать отмену перезарядки.');`;
          if (!before.includes(search)) throw new Error('Reload cancellation assertion fragment not found');
          await writeFile(path, before.replace(search, replacement));
          NODE
      - run: npm run editor:smoke
      - run: npm run reload:smoke
      - run: npm run build
      - name: Commit verified editor smoke correction
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const branch = 'planning/complete-stateful-runtime-events-2026-07-12';
            const path = 'scripts/ai_node_editor_smoke.mjs';
            const current = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              ref: branch,
            });
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              branch,
              message: 'test(ai): assert Reload cancellation through bridge event',
              sha: current.data.sha,
              content: fs.readFileSync(path).toString('base64'),
            });
