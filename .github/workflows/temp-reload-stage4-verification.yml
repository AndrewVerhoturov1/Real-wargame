name: Temporary Reload Stage 4 Verification

on:
  push:
    branches:
      - planning/complete-stateful-runtime-events-2026-07-12
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: planning/complete-stateful-runtime-events-2026-07-12
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: node scripts/apply_reload_stage4_ui_validation_patch.mjs
      - run: npm run reload:smoke
      - run: npm run editor:smoke
      - run: npm run validate:ai-graph
      - run: npm run lab:smoke
      - run: npm run composite:smoke
      - run: npm run runtime:smoke
      - run: npm run build
      - name: Commit verified Reload stage 4 sources
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const branch = 'planning/complete-stateful-runtime-events-2026-07-12';
            const files = [
              'src/ai-node-editor/main.ts',
              'src/ai-node-editor/stateful-node-ui.ts',
              'src/core/ai/AiGraphValidation.ts',
              'scripts/ai_node_editor_smoke.mjs',
              '.github/workflows/preview-core-checks.yml',
            ];
            for (const path of files) {
              const current = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: branch,
              });
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                branch,
                message: `feat(ai): complete Reload stage 4 in ${path}`,
                sha: current.data.sha,
                content: fs.readFileSync(path).toString('base64'),
              });
            }
