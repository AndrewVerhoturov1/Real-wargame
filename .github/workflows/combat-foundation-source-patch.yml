name: Combat Foundation Source Patch

on:
  push:
    branches:
      - tmp/combat-foundation-v1-20260713
    paths:
      - 'scripts/apply_combat_foundation_patch.mjs'
      - 'scripts/apply_combat_persistence_patch.mjs'
      - '.github/workflows/combat-foundation-source-patch.yml'

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tmp/combat-foundation-v1-20260713
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/apply_combat_foundation_patch.mjs
      - run: node scripts/apply_combat_persistence_patch.mjs
      - name: Commit generated source integration
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'Patch already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            src/core/ai/AiGameBridge.ts \
            src/core/simulation/SimulationState.ts \
            src/core/units/UnitModel.ts \
            src/ui/TacticalWorkspace.ts \
            src/ui/SceneExport.ts \
            scripts/ai_runtime_snapshot_smoke.ts
          git commit -m 'feat: integrate combat editor diagnostics and persistence'
          git push origin HEAD:tmp/combat-foundation-v1-20260713
