name: Agent Source Snapshot

on:
  push:
    branches:
      - agent/physical-movement-runtime-v1
    paths:
      - '.github/workflows/agent-source-snapshot.yml'

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4

      - name: Package repository source
        shell: bash
        run: tar --exclude=.git --exclude=node_modules -czf /tmp/real-wargame-source.tgz .

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: real-wargame-source-${{ github.sha }}
          path: /tmp/real-wargame-source.tgz
          if-no-files-found: error
          retention-days: 1
