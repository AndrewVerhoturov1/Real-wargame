name: Apply Physical Movement Payload

on:
  push:
    branches:
      - agent/physical-movement-runtime-v1
    paths:
      - '.github/workflows/agent-source-snapshot.yml'

permissions:
  contents: write

jobs:
  apply-payload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          ref: agent/physical-movement-runtime-v1
          fetch-depth: 0

      - name: Verify staged payload chunks
        shell: bash
        run: |
          set -euo pipefail
          verify_chunk() {
            local file="$1"
            local expected="$2"
            local actual
            actual="$(tr -d '[:space:]' < "$file" | sha256sum | cut -d' ' -f1)"
            echo "$file $actual"
            test "$actual" = "$expected"
          }
          verify_chunk .agent-payload/pm-chunk-00 0a1c6de472e8c71fb5e7aff120eddf9800490a9c1365c980af974e26df3e86ec
          verify_chunk .agent-payload/pm-chunk-01 768e0093c3630b1bae1b671b01e22a9f5046e38e892f7464a6a8db0f7fd616af
          verify_chunk .agent-payload/pm-chunk-02 434ea8286d0c75e27a5725a02ad8d5ab8b0b9382825d51fbdb39131c3f48c92b
          verify_chunk .agent-payload/pm-chunk-03 ca4c724fa9710c43a0495111b45bdf3b93358af1f59f9d43968dfacb79076b2a
          verify_chunk .agent-payload/pm-chunk-04 63faa2a0ad4c174dc63412a8fb006d4d602ad3865c68dd778f40f91d29604bc4
          verify_chunk .agent-payload/pm-chunk-05 9fa4c5bb76271345e38a4f973b07229b4a7bb82c0ab84d91d7c96c7aa3ae57fb
          verify_chunk .agent-payload/pm-chunk-06 1aa9a18d29d923a6ccc2a68db6296096c7e2c4605378fb7053b9a221825e66d7
          verify_chunk .agent-payload/pm-chunk-07 f76fc3eef7b81a3940b5198ae816ee498f8f84b63c6feeb753d4f563a50fa38a
          verify_chunk .agent-payload/pm-chunk-08 eaa48fd0ac1649ebc453817e6d8e55b61b3a126b811dca9e6e1c7511f92d3752
          verify_chunk .agent-payload/pm-chunk-09 8c855f031e3f7f82f7e1f29ac04dfe2f343c17daaf05f43bf304d0753a0c7087
          verify_chunk .agent-payload/pm-chunk-10 0cf631a470a31947fed78b18a0d2c0b192d4429bdc1471f4c68970c6f3b5dfd2

      - name: Decode and verify payload archive
        shell: bash
        run: |
          set -euo pipefail
          cat .agent-payload/pm-chunk-* | tr -d '[:space:]' | base64 --decode > /tmp/physical-movement-payload.tgz
          echo 'bf0bed399a8c26158b76777f260bb8ce27a6ed278a8da86afcb4dd74bc36986f  /tmp/physical-movement-payload.tgz' | sha256sum --check
          tar -tzf /tmp/physical-movement-payload.tgz

      - name: Apply implementation and clean staging files
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/physical-movement-payload.tgz -C .
          rm -rf .agent-payload
          git status --short

      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --stat
          git commit -m 'Implement physical movement runtime v1'
          git push origin HEAD:agent/physical-movement-runtime-v1
