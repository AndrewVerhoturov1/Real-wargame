name: Apply Graph v2 Final Patch

on:
  push:
    branches:
      - feat/ai-graph-v2-finalize-2026-07-13
    paths:
      - '.github/workflows/apply-graph-v2-finalize.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/ai-graph-v2-finalize-2026-07-13
          fetch-depth: 0
      - name: Reconstruct and apply final patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/graph-v2-final-patch/part* | base64 -d | gzip -d > /tmp/graph-v2-final.patch
          echo "82120162245834228d2ffcffcf176e15ceb4e135d849e53a85e7059304fb97b9  /tmp/graph-v2-final.patch" | sha256sum -c -
          git apply --check /tmp/graph-v2-final.patch
          git apply /tmp/graph-v2-final.patch
          rm -rf .github/graph-v2-final-patch
          rm -f .github/workflows/apply-graph-v2-finalize.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat(ai): finalize Graph v2 typed contracts and subgraphs"
          git push origin HEAD:feat/ai-graph-v2-finalize-2026-07-13
