name: Command Plan Route Core

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  command-plan-route:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run command-plan-route:smoke
      - run: npm run routed-move:smoke
      - run: npm run runtime:smoke
      - run: npm run build
