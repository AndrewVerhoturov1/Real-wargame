name: TEMP AI debug dock click fix

on:
  push:
    branches:
      - fix/ai-plan-move-editor-panels-temp-2026-07-14
    paths:
      - .github/workflows/ai-debug-dock-click-fix-temp.yml

permissions:
  contents: write
  statuses: write

jobs:
  fix-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'ai-debug-dock-click-fix',
              description: 'Fixing diagnostics dock click handling',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - uses: actions/checkout@v4
        with:
          ref: fix/ai-plan-move-editor-panels-temp-2026-07-14
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm install --no-save @playwright/test

      - name: Exclude diagnostics controls from canvas panning
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/ai-node-editor/main.ts')
          text = path.read_text(encoding='utf-8')
          old = "function startPanIfEmpty(event: PointerEvent): void { if (event.button !== 0 && event.button !== 1) return; const target = event.target as HTMLElement; if (target.closest('.graph-node') || target.closest('button') || target.closest('.graph-toolbar')) return; event.preventDefault();"
          new = "function startPanIfEmpty(event: PointerEvent): void { if (event.button !== 0 && event.button !== 1) return; const target = event.target as HTMLElement; if (target.closest('.graph-node') || target.closest('button') || target.closest('.graph-toolbar') || target.closest('.ai-debug-panel-dock') || target.closest('summary, input, select, textarea, a')) return; event.preventDefault();"
          if old not in text:
            raise SystemExit('startPanIfEmpty source fragment not found.')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Verify editor and visual interaction
        shell: bash
        run: |
          set -o pipefail
          {
            npm run editor:smoke
            npm run node-contract-ui:smoke
            npm run build
            npx playwright test tests/ai-state-plan-visual.spec.ts --project=chromium --reporter=line
          } 2>&1 | tee ai-debug-dock-click-fix.log

      - name: Upload verification log and screenshots
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ai-debug-dock-click-fix
          path: |
            ai-debug-dock-click-fix.log
            artifacts/screenshots/ai-state-plan-v1/
          if-no-files-found: warn
          retention-days: 7

      - name: Remove temporary workflow and commit
        run: |
          rm -f .github/workflows/ai-debug-dock-click-fix-temp.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: allow AI diagnostics panels to open"
          git push origin HEAD:fix/ai-plan-move-editor-panels-temp-2026-07-14

      - name: Publish final status
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const success = process.env.JOB_STATUS === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'ai-debug-dock-click-fix',
              description: `Diagnostics dock click fix: ${process.env.JOB_STATUS}`,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
