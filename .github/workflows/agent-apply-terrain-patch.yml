name: Agent Apply Terrain Patch

on:
  push:
    branches:
      - agent/terrain-profiles-performance-followup-v1
    paths:
      - '.agent/**'
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - '.agent/**'
      - '.github/workflows/agent-apply-terrain-patch.yml'

permissions:
  contents: write

concurrency:
  group: agent-apply-terrain-patch
  cancel-in-progress: false

jobs:
  apply-verify-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/terrain-profiles-performance-followup-v1
          fetch-depth: 0

      - name: Detect unapplied payload
        id: detect
        shell: bash
        run: |
          if [[ -f .agent/terrain-patch.part05 ]]; then
            echo 'apply=true' >> "$GITHUB_OUTPUT"
          else
            echo 'apply=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Reconstruct and apply verified patch
        if: steps.detect.outputs.apply == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cat .agent/terrain-patch.part* | base64 --decode > /tmp/terrain-full.patch.gz
          echo '587f246a77707fd87228c2bed4d0b9c44c5c58d3e605d070be43b17cc04ebb58  /tmp/terrain-full.patch.gz' | sha256sum --check
          gzip --decompress --stdout /tmp/terrain-full.patch.gz > /tmp/terrain-full.patch
          echo '841c40ae9ef5855be1a6d105c156d4643c98d0fe898352a7c7d39b36f2a7c7bf  /tmp/terrain-full.patch' | sha256sum --check
          git apply --check /tmp/terrain-full.patch
          git apply /tmp/terrain-full.patch
          rm -rf .agent
          git diff --check

      - name: Make raster smoke Node 20 compatible
        if: steps.detect.outputs.apply == 'true'
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/vegetation_chunk_raster_smoke.mjs')
          source = path.read_text(encoding='utf-8')
          old = "  await import(`${pathToFileURL(entryFile).href}?run=${Date.now()}`);"
          new = "  if (!('navigator' in globalThis)) Object.defineProperty(globalThis, 'navigator', { value: { userAgent: '' }, configurable: true });\n  await import(`${pathToFileURL(entryFile).href}?run=${Date.now()}`);"
          if old not in source:
              raise SystemExit('expected raster smoke import not found')
          path.write_text(source.replace(old, new), encoding='utf-8')
          PY
          git diff --check

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.apply == 'true'
        with:
          node-version: 20
          cache: npm

      - name: Install exact dependencies
        if: steps.detect.outputs.apply == 'true'
        run: npm ci

      - name: Environment materials smoke
        if: steps.detect.outputs.apply == 'true'
        run: npm run environment-materials:smoke

      - name: Environment material migration smoke
        if: steps.detect.outputs.apply == 'true'
        run: npm run environment-material-migration:smoke

      - name: Environment profile revisions smoke
        if: steps.detect.outputs.apply == 'true'
        run: npm run environment-profile-revisions:smoke

      - name: Vegetation chunk raster smoke
        if: steps.detect.outputs.apply == 'true'
        shell: bash
        run: |
          set -o pipefail
          npm run vegetation-chunk-raster:smoke 2>&1 | tee /tmp/vegetation-chunk-raster.log

      - name: Upload vegetation smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vegetation-chunk-raster-diagnostics
          path: /tmp/vegetation-chunk-raster.log
          if-no-files-found: ignore
          retention-days: 1

      - name: Environment performance smoke
        if: steps.detect.outputs.apply == 'true'
        run: npm run environment-performance:smoke

      - name: Required simulation and performance matrix
        if: steps.detect.outputs.apply == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm run shared-visibility-vegetation:smoke
          npm run danger-route-cost-parity:smoke
          npm run danger-layer-performance:smoke
          npm run danger-layer-movement-performance:smoke
          npm run perception:smoke
          npm run perception-performance:smoke
          npm run view-memory-heatmap:smoke
          npm run view-memory-heatmap-performance:smoke
          npm run visibility-probe:smoke
          npm run navigation-profiles:smoke
          npm run pathfinding:smoke
          npm run routed-move:smoke
          npm run directional-terrain:smoke
          npm run reverse-slope-comparative:smoke
          npm run combat-tactical-integration:smoke
          npm run ai-scheduler:smoke
          npm run workspace:smoke

      - name: Documentation and production build
        if: steps.detect.outputs.apply == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm run docs:check
          npm run visual-qa-policy:smoke
          npm run build
          git diff --check

      - name: Publish verified implementation
        if: steps.detect.outputs.apply == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: add terrain material profiles and chunked vegetation raster'
          git push origin HEAD:agent/terrain-profiles-performance-followup-v1
