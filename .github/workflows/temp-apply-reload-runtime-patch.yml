name: Temporary Composite Runtime Patch

on:
  push:
    branches:
      - planning/complete-stateful-runtime-events-2026-07-12
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: planning/complete-stateful-runtime-events-2026-07-12

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci
      - run: node scripts/apply_composite_type_fix.mjs
      - run: npm run build
      - run: npm run lifecycle:smoke
      - run: npm run runtime:smoke
      - run: npm run runtime-session:smoke
      - run: npm run move-bridge:smoke

      - name: Commit verified patched sources through GitHub API
        uses: actions/github-script@v7
        env:
          TARGET_BRANCH: planning/complete-stateful-runtime-events-2026-07-12
        with:
          script: |
            const fs = require('node:fs');
            const paths = [
              'src/core/ai/runtime/AiCompositeGraphRuntime.ts',
              'src/core/ai/runtime/AiRuntimeSession.ts',
            ];
            for (const path of paths) {
              const current = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: process.env.TARGET_BRANCH,
              });
              if (Array.isArray(current.data) || !current.data.sha) {
                core.setFailed(`Cannot resolve current blob for ${path}`);
                return;
              }
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                branch: process.env.TARGET_BRANCH,
                sha: current.data.sha,
                message: `fix(ai): apply verified composite type correction to ${path.split('/').pop()}`,
                content: Buffer.from(fs.readFileSync(path, 'utf8')).toString('base64'),
              });
            }
