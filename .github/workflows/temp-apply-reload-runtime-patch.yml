name: Temporary Reload Runtime Patch

on:
  push:
    branches:
      - planning/complete-stateful-runtime-events-2026-07-12
  workflow_dispatch:

permissions:
  contents: read

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: planning/complete-stateful-runtime-events-2026-07-12

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci
      - run: node scripts/apply_composite_type_fix.mjs
      - run: node scripts/apply_reload_runtime_patch.mjs
      - run: npm run build
      - run: npm run lifecycle:smoke
      - run: npm run runtime:smoke
      - run: npm run runtime-session:smoke
      - run: npm run move-bridge:smoke

      - name: Upload verified patched sources
        uses: actions/upload-artifact@v4
        with:
          name: verified-runtime-patched-sources
          path: |
            src/core/ai/AiGraphRuntime.ts
            src/core/ai/AiGameBridge.ts
            src/core/ai/runtime/AiCompositeGraphRuntime.ts
            src/core/ai/runtime/AiRuntimeSession.ts
          retention-days: 3
