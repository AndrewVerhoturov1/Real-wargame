name: Temporary Reload Runtime Patch

on:
  push:
    branches:
      - planning/complete-stateful-runtime-events-2026-07-12
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: planning/complete-stateful-runtime-events-2026-07-12
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci
      - run: node scripts/apply_composite_type_fix.mjs
      - run: node scripts/apply_reload_runtime_patch.mjs

      - name: TypeScript build diagnostics
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee reload-build.log

      - name: Prepare compiler error artifact
        if: steps.build.outcome != 'success'
        shell: bash
        run: |
          grep -n -A 4 -B 2 'error TS' reload-build.log > reload-build-errors.txt || tail -n 160 reload-build.log > reload-build-errors.txt
          cat reload-build-errors.txt

      - name: Upload compiler errors
        if: steps.build.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: reload-build-errors
          path: reload-build-errors.txt
          retention-days: 3

      - name: Fail on compiler errors
        if: steps.build.outcome != 'success'
        run: exit 1

      - run: npm run lifecycle:smoke
        if: steps.build.outcome == 'success'
      - run: npm run runtime:smoke
        if: steps.build.outcome == 'success'
      - run: npm run runtime-session:smoke
        if: steps.build.outcome == 'success'
      - run: npm run move-bridge:smoke
        if: steps.build.outcome == 'success'

      - name: Commit patch when needed
        if: steps.build.outcome == 'success'
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Patch already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/core/ai/AiGraphRuntime.ts src/core/ai/runtime/AiCompositeGraphRuntime.ts src/core/ai/runtime/AiRuntimeSession.ts src/core/ai/AiGameBridge.ts
          git commit -m "feat(ai): integrate composite and reload runtime"
          git push origin HEAD:planning/complete-stateful-runtime-events-2026-07-12
