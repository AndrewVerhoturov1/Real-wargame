name: Temporary Composite Runtime Verification

on:
  pull_request:
    branches:
      - real-wargame-preview
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run composite:smoke
      - run: npm run runtime:smoke
      - run: npm run runtime-session:smoke
      - run: npm run lifecycle:smoke
      - run: npm run move-bridge:smoke
      - run: npm run route-status:smoke
      - run: npm run build
