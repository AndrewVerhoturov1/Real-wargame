name: Patch Hidden Movement Vision Fixture

on:
  push:
    branches:
      - agent/danger-layer-moving-units-performance

permissions:
  contents: write

jobs:
  patch-harness:
    if: github.event.head_commit.message == 'Patch hidden movement vision fixture'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/danger-layer-moving-units-performance
      - name: Disable visual reacquisition and remove this workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/testing/DangerLayerMovementPerformanceHarness.ts')
          text = path.read_text(encoding='utf-8')
          old = """    observer.viewRangeCells = 1;\n    syncSoldierThreatMemory(state, observer, 0.1);"""
          new = """    // Perception broad phase uses the physical vision contract rather than the\n    // legacy renderer-facing viewRangeCells value. Disable real visual\n    // reacquisition after the initial contact so objective movement cannot\n    // update the selected soldier's subjective memory.\n    observer.viewRangeCells = 1;\n    observer.attentionSettings.vision.maximumVisualRangeMeters = 1;\n    syncSoldierThreatMemory(state, observer, 0.1);"""
          if old not in text:
              raise SystemExit('Expected hidden-hostile vision block not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          Path('.github/workflows/patch-hidden-movement-vision.yml').unlink()
          PY
      - name: Commit hidden perception fixture
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/testing/DangerLayerMovementPerformanceHarness.ts .github/workflows/patch-hidden-movement-vision.yml
          git commit -m 'Make hidden movement perception truly hidden'
          git push origin HEAD:agent/danger-layer-moving-units-performance
