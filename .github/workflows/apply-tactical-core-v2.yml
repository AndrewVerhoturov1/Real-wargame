name: Verify Tactical Position Product V2

on:
  push:
    branches:
      - feature/20260719-tactical-position-system
    paths:
      - '.github/workflows/apply-tactical-core-v2.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-tactical-position-product-v2
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch HEAD
        uses: actions/checkout@v4
        with:
          ref: feature/20260719-tactical-position-system
          fetch-depth: 1
          show-progress: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Verify tactical product and AI editor
        run: |
          set +e
          {
            npx tsc
            npm run tactical-position:smoke
            npm run tactical-query:smoke
            npm run workspace:smoke
            npm run editor:smoke
            npx vite build --base="/Real-wargame/"
            test -f dist/index.html
            test -f dist/ai-node-editor.html
          } > tactical-product-v2.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "Tactical product verification failed. Last 320 lines:"
            tail -n 320 tactical-product-v2.log
            exit "$status"
          fi
          tail -n 160 tactical-product-v2.log