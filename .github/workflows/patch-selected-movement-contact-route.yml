name: Patch Selected Movement Contact Route

on:
  push:
    branches:
      - agent/danger-layer-moving-units-performance

permissions:
  contents: write

jobs:
  patch-harness:
    if: github.event.head_commit.message == 'Keep selected movement contact geometry stable'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/danger-layer-moving-units-performance
      - name: Patch route and remove this workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/testing/DangerLayerMovementPerformanceHarness.ts')
          text = path.read_text(encoding='utf-8')
          old = """    routeUnit(state, observer, {\n      x: observer.position.x - 22,\n      y: observer.position.y + 8,\n    });"""
          new = """    // Move toward the stationary visible hostile so observer facing does not\n    // turn the contact invisible. This isolates own-position movement from\n    // legitimate visibility/knowledge invalidation.\n    routeUnit(state, observer, {\n      x: observer.position.x + 22,\n      y: observer.position.y,\n    });"""
          if old not in text:
              raise SystemExit('Expected selected-only route block not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          Path('.github/workflows/patch-selected-movement-contact-route.yml').unlink()
          PY
      - name: Commit contact-stable movement scenario
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/testing/DangerLayerMovementPerformanceHarness.ts .github/workflows/patch-selected-movement-contact-route.yml
          git commit -m 'Keep selected movement threat visibility stable'
          git push origin HEAD:agent/danger-layer-moving-units-performance
