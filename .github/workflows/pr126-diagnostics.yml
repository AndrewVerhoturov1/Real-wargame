name: PR 126 Targeted Regression Fix

on:
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - '.github/workflows/pr126-diagnostics.yml'

permissions:
  contents: write

jobs:
  fix-and-verify:
    if: github.head_ref == 'agent/danger-route-cost-parity-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Apply focused regression updates
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          nav = Path('scripts/navigation_profiles_smoke.ts')
          source = nav.read_text(encoding='utf-8')
          before = """  getRouteCostFields(map, profile, { ...context, knowledgeRevision: 2 }, cache);
          diagnostics = getRouteCostFieldDiagnostics(cache);
          assert.equal(diagnostics.staticCostBuildCount, 1);
          assert.equal(diagnostics.dynamicCostBuildCount, 2);
          """
          after = """  const unchangedKnowledge = getRouteCostFields(map, profile, { ...context, knowledgeRevision: 2 }, cache);
          assert.equal(
            unchangedKnowledge,
            first,
            'knowledge revision must not invalidate route fields when the subjective threat set is empty',
          );
          diagnostics = getRouteCostFieldDiagnostics(cache);
          assert.equal(diagnostics.staticCostBuildCount, 1);
          assert.equal(diagnostics.dynamicCostBuildCount, 1);
          """
          if before not in source:
              raise SystemExit('navigation profile cache assertion anchor missing')
          nav.write_text(source.replace(before, after), encoding='utf-8')

          workspace = Path('scripts/tactical_workspace_smoke_pixijs8_baseline.mjs')
          source = workspace.read_text(encoding='utf-8')
          before = """expectIncludes('src/core/knowledge/SoldierDangerField.ts', [
            'getSoldierDangerField', 'getSoldierDangerFieldDiagnostics',
            'getThreatRelativeCoverField', 'getDirectionalTacticalField',
            'readDirectionalProtectionForBearing', 'readDirectionalExposureForBearing',
            'fireThreatClassForAggregation', "'rifle_fire'", "'machine_gun_fire'",
            'GEOMETRY_CACHE_LIMIT', 'FIELD_CACHE_LIMIT',
          ]);
          """
          after = """expectIncludes('src/core/knowledge/SoldierDangerField.ts', [
            'getSoldierDangerField', 'getSoldierDangerFieldDiagnostics',
            'getThreatRelativeCoverField', 'getDirectionalTerrainSectorBasis', 'readDirectionalBasisValue',
            'fireThreatClassForAggregation', "'rifle_fire'", "'machine_gun_fire'",
            'THREAT_GEOMETRY_CACHE_LIMIT', 'FIELD_CACHE_LIMIT',
            'cachedThreatGeometryCount', 'retainedTypedArrayBytes',
          ]);
          """
          if before not in source:
              raise SystemExit('workspace SoldierDangerField contract anchor missing')
          workspace.write_text(source.replace(before, after), encoding='utf-8')
          PY
      - run: npm ci
      - name: Verify targeted regressions
        shell: bash
        run: |
          set -o pipefail
          npm run navigation-profiles:smoke
          npm run workspace:smoke
          npm run danger-route-cost-parity:smoke
          npm run build
          npm run docs:check
      - name: Commit focused fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/navigation_profiles_smoke.ts scripts/tactical_workspace_smoke_pixijs8_baseline.mjs
          git commit -m "Align route cache and workspace regression contracts"
          git push origin HEAD:${{ github.head_ref }}
