name: PR 126 Targeted Regression Fix

on:
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - '.github/workflows/pr126-diagnostics.yml'

permissions:
  contents: write

jobs:
  fix-and-verify:
    if: github.head_ref == 'agent/danger-route-cost-parity-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Apply focused regression updates
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          nav = Path('scripts/navigation_profiles_smoke.ts')
          source = nav.read_text(encoding='utf-8')
          old = '  assert.equal(diagnostics.dynamicCostBuildCount, 2);\n'
          new = "  assert.equal(diagnostics.dynamicCostBuildCount, 1, 'empty threat knowledge revisions must not rebuild dynamic route cost');\n"
          if source.count(old) != 1:
              raise SystemExit(f'expected one navigation cache assertion, found {source.count(old)}')
          nav.write_text(source.replace(old, new), encoding='utf-8')

          workspace = Path('scripts/tactical_workspace_smoke_pixijs8_baseline.mjs')
          source = workspace.read_text(encoding='utf-8')
          replacements = {
              "'getThreatRelativeCoverField', 'getDirectionalTacticalField',": "'getThreatRelativeCoverField', 'getDirectionalTerrainSectorBasis',",
              "'readDirectionalProtectionForBearing', 'readDirectionalExposureForBearing',": "'readDirectionalBasisValue',",
              "'GEOMETRY_CACHE_LIMIT', 'FIELD_CACHE_LIMIT',": "'THREAT_GEOMETRY_CACHE_LIMIT', 'FIELD_CACHE_LIMIT', 'cachedThreatGeometryCount', 'retainedTypedArrayBytes',",
          }
          for before, after in replacements.items():
              if source.count(before) != 1:
                  raise SystemExit(f'expected one workspace contract anchor for {before}, found {source.count(before)}')
              source = source.replace(before, after)
          workspace.write_text(source, encoding='utf-8')
          PY
      - run: npm ci
      - name: Verify targeted regressions
        shell: bash
        run: |
          set -o pipefail
          npm run navigation-profiles:smoke
          npm run workspace:smoke
          npm run danger-route-cost-parity:smoke
          npm run build
          npm run docs:check
      - name: Commit focused fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/navigation_profiles_smoke.ts scripts/tactical_workspace_smoke_pixijs8_baseline.mjs
          git commit -m "Align route cache and workspace regression contracts"
          git push origin HEAD:${{ github.head_ref }}
