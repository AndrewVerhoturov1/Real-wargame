name: Approved Environment Materials Visual QA

# User approval was recorded in PR #130 on 2026-07-17.
# The suite remains skipped in the repository and is enabled only inside this approved run.
on:
  workflow_dispatch:
  push:
    branches:
      - agent/terrain-profiles-performance-followup-v1
    paths:
      - '.github/workflows/agent-environment-materials-visual-qa.yml'
      - 'tests/environment-materials-visual.spec.ts'

permissions:
  contents: write

concurrency:
  group: environment-materials-visual-qa-approved
  cancel-in-progress: true

env:
  CANDIDATE_SHA: ${{ github.sha }}
  REPORT_PATH: docs/visual-qa/ENVIRONMENT_MATERIALS_LATEST.md

jobs:
  visual-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout exact candidate branch
        uses: actions/checkout@v4
        with:
          ref: agent/terrain-profiles-performance-followup-v1
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright test runner
        run: npm install --no-save @playwright/test

      - name: Enable the user-approved visual suite in the runner only
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/environment-materials-visual.spec.ts')
          source = path.read_text()
          enabled = source.replace("test.skip('shows continuous sparse/dense forest across zoom and danger-overlay states'", "test('shows continuous sparse/dense forest across zoom and danger-overlay states'")
          enabled = enabled.replace("test.skip('live profile edit refreshes the open map without a page reload'", "test('live profile edit refreshes the open map without a page reload'")
          if enabled == source or enabled.count("test('shows continuous sparse/dense forest") != 1 or enabled.count("test('live profile edit") != 1:
              raise SystemExit('approved environment-material visual tests were not enabled exactly once')
          path.write_text(enabled)
          PY

      - name: Production build
        run: npm run build

      - name: Run approved environment-material visual QA
        id: visual
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npx playwright test tests/environment-materials-visual.spec.ts --project=chromium --reporter=line 2>&1 | tee environment-materials-visual-playwright.log

      - name: Record exact tested SHA
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts/visual-qa/environment-materials-v1
          printf '%s\n' "$CANDIDATE_SHA" > artifacts/visual-qa/environment-materials-v1/COMMIT_SHA.txt

      - name: Publish visual QA run metadata
        if: always()
        shell: bash
        env:
          VISUAL_OUTCOME: ${{ steps.visual.outcome }}
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$REPORT_PATH")"
          screenshot_count=$(find artifacts/visual-qa/environment-materials-v1 -maxdepth 1 -name '*.png' -type f | wc -l | tr -d ' ')
          {
            echo '# Environment Materials Visual QA — latest approved run'
            echo
            echo "- tested_sha: \`$CANDIDATE_SHA\`"
            echo "- workflow_run_id: \`$GITHUB_RUN_ID\`"
            echo "- workflow_attempt: \`$GITHUB_RUN_ATTEMPT\`"
            echo "- outcome: \`$VISUAL_OUTCOME\`"
            echo "- screenshot_count: \`$screenshot_count\`"
            echo
            echo '## Screenshot SHA-256'
            echo
            if [ "$screenshot_count" -gt 0 ]; then
              find artifacts/visual-qa/environment-materials-v1 -maxdepth 1 -name '*.png' -type f -print0 \
                | sort -z \
                | xargs -0 sha256sum \
                | sed 's#  artifacts/visual-qa/environment-materials-v1/#  #'
            else
              echo 'No PNG screenshots were produced.'
            fi
          } > "$REPORT_PATH"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add "$REPORT_PATH"
          if ! git diff --cached --quiet; then
            git commit -m "Record approved environment visual QA run $GITHUB_RUN_ID"
            git push origin HEAD:agent/terrain-profiles-performance-followup-v1
          fi

      - name: Upload visual screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: environment-materials-visual-screenshots-${{ env.CANDIDATE_SHA }}
          path: |
            artifacts/visual-qa/environment-materials-v1/*.png
            artifacts/visual-qa/environment-materials-v1/COMMIT_SHA.txt
          if-no-files-found: error
          retention-days: 7

      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: environment-materials-visual-evidence-${{ env.CANDIDATE_SHA }}
          path: |
            environment-materials-visual-playwright.log
            test-results/**
            artifacts/visual-qa/environment-materials-v1/COMMIT_SHA.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Require approved visual QA success
        if: always()
        shell: bash
        env:
          VISUAL_OUTCOME: ${{ steps.visual.outcome }}
        run: |
          test "$VISUAL_OUTCOME" = success
