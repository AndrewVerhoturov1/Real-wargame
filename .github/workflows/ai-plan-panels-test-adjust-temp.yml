name: TEMP adjust AI panel visual test

on:
  push:
    branches:
      - fix/ai-plan-move-editor-panels-temp-2026-07-14
    paths:
      - .github/workflows/ai-plan-panels-test-adjust-temp.yml

permissions:
  contents: write

jobs:
  adjust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/ai-plan-move-editor-panels-temp-2026-07-14
          fetch-depth: 0
      - name: Adjust exact browser precondition
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/ai-state-plan-visual.spec.ts')
          text = path.read_text(encoding='utf-8')
          old = "  await page.goto('/ai-node-editor.html');\n\n  const dock = page.locator('.ai-debug-panel-dock');"
          new = "  await page.goto('/ai-node-editor.html');\n  const versionBadge = page.locator('.graph-version-badge');\n  if (await versionBadge.getAttribute('class').then((value) => value?.includes('v1') ?? false)) {\n    await page.locator('#migrate-graph').click();\n    await expect(versionBadge).toContainText('Graph v2');\n  }\n\n  const dock = page.locator('.ai-debug-panel-dock');"
          if new not in text:
              if old not in text:
                  raise SystemExit('Expected node-editor test precondition not found.')
              text = text.replace(old, new, 1)
              path.write_text(text, encoding='utf-8')
          PY
      - name: Commit test correction
        run: |
          if git diff --quiet -- tests/ai-state-plan-visual.spec.ts; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/ai-state-plan-visual.spec.ts
          git commit -m "test: verify AI panels in Graph v2 workspace"
          git push origin HEAD:fix/ai-plan-move-editor-panels-temp-2026-07-14
