name: Capture Low Cover Ray Once

on:
  push:
    branches:
      - feature/20260721-tactical-position-basis
    paths:
      - .github/workflows/capture-low-cover-ray-once.yml

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/20260721-tactical-position-basis
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Create and run focused ray probe
        run: |
          cat > scripts/.tmp-low-cover-ray.ts <<'TS'
          import { createInitialState } from '../src/core/simulation/SimulationState';
          import { traceVisibilityRayPath } from '../src/core/visibility/VisibilityRayKernel';
          import { getVisibilityStaticGrid } from '../src/core/visibility/VisibilityStaticGrid';
          import { soldierPostureHeightMeters } from '../src/core/visibility/VisibilityPosture';
          import type { TacticalMapData } from '../src/core/map/MapModel';
          import type { UnitData } from '../src/core/units/UnitModel';

          const mapData: TacticalMapData = {
            width: 24, height: 12, cellSize: 16, metersPerCell: 2,
            defaultTerrain: 'field', defaultHeight: 0,
            objects: [{ id: 'low-cover', kind: 'cover', x: 10, y: 5, widthCells: 1, heightCells: 1, losHeightMeters: 1.2 }],
          };
          const unitData: UnitData = {
            id: 'observer', label: 'Observer', labelRu: 'Наблюдатель', type: 'scout_team',
            side: 'player', x: 2, y: 5, facingDegrees: 0, viewRangeCells: 30, behaviorProfile: 'regular',
          };
          const state = createInitialState(mapData, [unitData]);
          const unit = state.units[0]!;
          const grid = getVisibilityStaticGrid(state.map);
          const target = { x: 18.5, y: 5.5 };
          const trace = traceVisibilityRayPath(state.map, {
            origin: unit.position,
            target,
            originHeightAboveGroundMeters: soldierPostureHeightMeters(unit.behaviorRuntime.posture),
            targetHeightAboveGroundMeters: 0.35,
            channel: 'visual',
          });
          console.log(JSON.stringify({
            posture: unit.behaviorRuntime.posture,
            position: unit.position,
            object: state.map.objects[0],
            flags: [8,9,10,11,12].map((x) => ({ x, flag: grid.blockingFlags[5 * grid.width + x], top: grid.objectTopHeightMeters[5 * grid.width + x] })),
            result: trace.result,
            samples: trace.samples.filter((sample) => sample.x >= 8 && sample.x <= 13),
          }, null, 2));
          TS
          node --input-type=module <<'NODE'
          import { build } from 'vite';
          await build({ root: process.cwd(), logLevel: 'warn', build: { ssr: 'scripts/.tmp-low-cover-ray.ts', outDir: '.tmp-low-cover-ray', emptyOutDir: true, minify: false, sourcemap: false, rollupOptions: { output: { entryFileNames: 'probe.mjs', format: 'es' } } } });
          NODE
          mkdir -p docs/workflow
          node .tmp-low-cover-ray/probe.mjs > docs/workflow/LOW_COVER_RAY.json
      - name: Commit diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f docs/workflow/LOW_COVER_RAY.json
          git commit -m "ci: capture low cover ray [skip ci]"
          git push origin HEAD:feature/20260721-tactical-position-basis
