name: Deploy tactical traversal to GitHub Pages

on:
  push:
    branches:
      - feature/20260720-tactical-route-traversal
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages-tactical-traversal
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch commit
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run repository build and checks
        id: repository-build
        shell: bash
        run: |
          set +e
          npm run build 2>&1 | tee build.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: github-pages-build-log
          path: build.log
          if-no-files-found: error

      - name: Stop after failed repository build
        if: steps.repository-build.outputs.exit_code != '0'
        run: exit 1

      - name: Rebuild for the GitHub Pages repository path
        run: npx vite build --base /Real-wargame/

      - name: Fix the direct AI editor button for the repository path
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path('dist')
          for path in root.rglob('*'):
              if not path.is_file() or path.suffix not in {'.html', '.js', '.css'}:
                  continue
              text = path.read_text(encoding='utf-8')
              updated = text.replace('/ai-node-editor.html', '/Real-wargame/ai-node-editor.html')
              if updated != text:
                  path.write_text(updated, encoding='utf-8')
          PY
          touch dist/.nojekyll

      - name: Verify required deployment pages
        run: npm run deployment-pages:smoke

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages-tactical-traversal
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
