name: Patch Simulation State Facade Smoke Once

# One-time semantic contract repair for the compatibility facade.
on:
  push:
    branches:
      - feature/20260721-tactical-position-basis
    paths:
      - .github/workflows/patch-simulation-state-facade-smoke-once.yml

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/20260721-tactical-position-basis
          fetch-depth: 0

      - name: Update editor smoke for SimulationState facade
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/ai_node_editor_smoke.mjs')
          source = path.read_text(encoding='utf-8')
          old = """const simulationState = readText('src/core/simulation/SimulationState.ts');
          expectContains(simulationState, 'export interface SimulationState', 'SimulationState должен сохраниться полным исходным контрактом.');
          expectContains(simulationState, 'getSelectedUnits', 'SimulationState не должен быть случайно усечён при правках паузы.');
          expectContains(simulationState, 'beginEditorPointerAction', 'SimulationState должен сохранять editor pointer action API.');
          expectContains(simulationState, 'spawnEditorUnit', 'SimulationState должен сохранять editor spawn unit logic.');
          expectNotContains(simulationState, 'paused: boolean', 'Пауза не должна менять базовый SimulationState contract на этом этапе.');""".replace('          ', '')
          new = """const simulationStateFacade = readText('src/core/simulation/SimulationState.ts');
          const simulationStateLegacy = readText('src/core/simulation/SimulationStateLegacy.ts');
          const simulationStateSources = `${simulationStateFacade}\n${simulationStateLegacy}`;
          expectContains(simulationStateFacade, "export * from './SimulationStateLegacy';", 'SimulationState facade должен переэкспортировать полный исходный контракт.');
          expectContains(simulationStateSources, 'export interface SimulationState', 'SimulationState должен сохраниться полным исходным контрактом.');
          expectContains(simulationStateSources, 'getSelectedUnits', 'SimulationState не должен быть случайно усечён при правках паузы.');
          expectContains(simulationStateSources, 'beginEditorPointerAction', 'SimulationState должен сохранять editor pointer action API.');
          expectContains(simulationStateSources, 'spawnEditorUnit', 'SimulationState должен сохранять editor spawn unit logic.');
          expectNotContains(simulationStateSources, 'paused: boolean', 'Пауза не должна менять базовый SimulationState contract на этом этапе.');""".replace('          ', '')
          if source.count(old) != 1:
              raise SystemExit(f'Expected one legacy SimulationState smoke block, found {source.count(old)}')
          path.write_text(source.replace(old, new), encoding='utf-8')
          PY

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify editor and workspace contracts
        run: |
          npm run editor:smoke
          npm run workspace:smoke
          npm run typecheck

      - name: Commit verified smoke fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/ai_node_editor_smoke.mjs
          git commit -m "test: validate SimulationState compatibility facade [skip ci]"
          git push origin HEAD:feature/20260721-tactical-position-basis
