name: Patch AI Game Bridge Facade Smoke Once

on:
  push:
    branches:
      - feature/20260721-tactical-position-basis
    paths:
      - .github/workflows/patch-ai-game-bridge-facade-smoke-once.yml

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/20260721-tactical-position-basis
          fetch-depth: 0

      - name: Update editor smoke for AI bridge facade
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/ai_node_editor_smoke.mjs')
          source = path.read_text(encoding='utf-8')
          old = """const gameBridge = readText('src/core/ai/AiGameBridge.ts');
          expectContains(gameBridge, 'runAiGraph', 'Мост должен вызывать нормальный GraphRunner.');
          expectContains(gameBridge, 'createTacticalHost', 'Мост должен давать runner-у tactical callbacks.');
          expectContains(gameBridge, 'applyGraphEffects', 'Мост должен применять effects runner-а к UnitModel.');
          expectContains(gameBridge, 'buildBlackboardForUnit', 'Мост должен собирать blackboard из состояния игры.');
          expectContains(gameBridge, 'real-wargame.ai-node-editor.graph.v6', 'Мост должен брать граф из localStorage v6.');
          expectContains(gameBridge, 'real-wargame.ai-node-editor.debug.v1', 'Мост должен писать runtime debug trace для редактора.');
          expectContains(gameBridge, 'publishRuntimeDebugTrace', 'Мост должен публиковать последний след решения GraphRunner.');
          expectContains(gameBridge, 'cloneSimulationStateForDiagnostic', 'Диагностический мост должен работать на глубокой копии состояния.');
          expectContains(gameBridge, 'applyEffects: false', 'Selected-unit мост должен оставаться read-only диагностикой.');
          expectNotContains(gameBridge, 'setInterval(', 'Gameplay AI не должен иметь отдельный browser timer внутри bridge.');
          expectNotContains(gameBridge, 'case \'ParameterScore\'', 'Score-ноды не должны быть заглушками внутри bridge.');
          expectNotContains(gameBridge, 'is accepted by the game bridge but not used', 'Bridge больше не должен говорить, что score-ноды только допустимы.');""".replace('          ', '')
          new = """const gameBridgeFacade = readText('src/core/ai/AiGameBridge.ts');
          const gameBridgeLegacy = readText('src/core/ai/AiGameBridgeLegacy.ts');
          const gameBridgeSources = `${gameBridgeFacade}\n${gameBridgeLegacy}`;
          expectContains(gameBridgeFacade, "export * from './AiGameBridgeLegacy';", 'AI Game Bridge facade должен переэкспортировать полную реализацию.');
          expectContains(gameBridgeSources, 'runAiGraph', 'Мост должен вызывать нормальный GraphRunner.');
          expectContains(gameBridgeSources, 'createTacticalHost', 'Мост должен давать runner-у tactical callbacks.');
          expectContains(gameBridgeSources, 'applyGraphEffects', 'Мост должен применять effects runner-а к UnitModel.');
          expectContains(gameBridgeSources, 'buildBlackboardForUnit', 'Мост должен собирать blackboard из состояния игры.');
          expectContains(gameBridgeSources, 'real-wargame.ai-node-editor.graph.v6', 'Мост должен брать граф из localStorage v6.');
          expectContains(gameBridgeSources, 'real-wargame.ai-node-editor.debug.v1', 'Мост должен писать runtime debug trace для редактора.');
          expectContains(gameBridgeSources, 'publishRuntimeDebugTrace', 'Мост должен публиковать последний след решения GraphRunner.');
          expectContains(gameBridgeSources, 'cloneSimulationStateForDiagnostic', 'Диагностический мост должен работать на глубокой копии состояния.');
          expectContains(gameBridgeSources, 'applyEffects: false', 'Selected-unit мост должен оставаться read-only диагностикой.');
          expectNotContains(gameBridgeSources, 'setInterval(', 'Gameplay AI не должен иметь отдельный browser timer внутри bridge.');
          expectNotContains(gameBridgeSources, 'case \'ParameterScore\'', 'Score-ноды не должны быть заглушками внутри bridge.');
          expectNotContains(gameBridgeSources, 'is accepted by the game bridge but not used', 'Bridge больше не должен говорить, что score-ноды только допустимы.');""".replace('          ', '')
          if source.count(old) != 1:
              raise SystemExit(f'Expected one legacy AI bridge smoke block, found {source.count(old)}')
          path.write_text(source.replace(old, new), encoding='utf-8')
          PY

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify editor and workspace contracts
        run: |
          npm run editor:smoke
          npm run workspace:smoke
          npm run typecheck

      - name: Commit verified smoke fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/ai_node_editor_smoke.mjs
          git commit -m "test: validate AI Game Bridge compatibility facade [skip ci]"
          git push origin HEAD:feature/20260721-tactical-position-basis
