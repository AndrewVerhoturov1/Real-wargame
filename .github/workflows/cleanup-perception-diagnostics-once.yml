name: Cleanup Perception Diagnostics Once

on:
  push:
    branches:
      - feature/20260721-tactical-position-basis
    paths:
      - .github/workflows/cleanup-perception-diagnostics-once.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/20260721-tactical-position-basis
          fetch-depth: 0
      - name: Remove one-time diagnostics and workflows
        run: |
          rm -f \
            .github/workflows/capture-current-combat-failure-once.yml \
            .github/workflows/capture-low-cover-ray-once.yml \
            .github/workflows/capture-perception-bundle-lines-once.yml \
            .github/workflows/capture-perception-patch-run-once.yml \
            .github/workflows/fix-perception-geometry-once.yml \
            .github/workflows/patch-perception-map-revision-once.yml \
            .github/workflows/cleanup-perception-diagnostics-once.yml \
            docs/workflow/CURRENT_COMBAT_FAILED_LOG.txt \
            docs/workflow/LOW_COVER_RAY.json \
            docs/workflow/PERCEPTION_BUNDLE_LINES.txt \
            docs/workflow/PERCEPTION_PATCH_FAILED_LOG.txt \
            docs/workflow/PERCEPTION_PATCH_RUN.json
      - name: Commit clean branch state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: remove temporary perception diagnostics [skip ci]"
          git push origin HEAD:feature/20260721-tactical-position-basis
