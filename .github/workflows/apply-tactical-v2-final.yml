name: Apply Tactical Position V2 Final

on:
  push:
    branches:
      - feature/20260719-tactical-position-system
    paths:
      - '.github/workflows/apply-tactical-v2-final.yml'
      - 'scripts/apply_tactical_v2_final.py'

permissions:
  contents: write

concurrency:
  group: apply-tactical-v2-final
  cancel-in-progress: true

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact feature HEAD
        uses: actions/checkout@v4
        with:
          ref: feature/20260719-tactical-position-system
          fetch-depth: 1
          show-progress: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Apply final tactical product patch
        run: python scripts/apply_tactical_v2_final.py

      - name: TypeScript
        run: npx tsc

      - name: Tactical position search integration
        run: node scripts/tactical_position_search_smoke.mjs

      - name: Tactical position tuning
        run: node scripts/tactical_position_tuning_smoke.mjs

      - name: Tactical position request service
        run: node scripts/tactical_position_request_service_smoke.mjs

      - name: Tactical position objective
        run: node scripts/tactical_position_objective_smoke.mjs

      - name: Tactical query
        run: npm run tactical-query:smoke

      - name: Workspace
        run: npm run workspace:smoke

      - name: AI editor
        run: npm run editor:smoke

      - name: Build both GitHub Pages applications
        run: npx vite build --base="/Real-wargame/"

      - name: Verify both deployment pages
        run: npm run deployment-pages:smoke

      - name: Verify built files
        run: |
          test -s dist/index.html
          test -s dist/ai-node-editor.html

      - name: Commit verified product changes
        run: |
          rm -f scripts/apply_tactical_v2_final.py
          rm -f .github/workflows/apply-tactical-v2-final.yml
          rm -f finalize-v2.log objective-red.log
          rm -rf docs/debug
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: complete tactical positions and AI editor integration"
          git push origin HEAD:feature/20260719-tactical-position-system