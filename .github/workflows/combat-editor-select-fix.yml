name: Combat Editor Select Fix

on:
  push:
    branches:
      - tmp/combat-foundation-v1-20260713
    paths:
      - 'scripts/apply_combat_editor_select_fix.mjs'
      - '.github/workflows/combat-editor-select-fix.yml'

permissions:
  contents: write
  statuses: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'combat-editor-select-fix',
              description: 'Applying editor select synchronization fix',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - name: Apply source patch
        run: node scripts/apply_combat_editor_select_fix.mjs
      - name: Verify production build
        run: npm run build
      - name: Commit source fix
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- src/ui/GameEditorWorkbench.ts; then
            echo 'Source already fixed.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/ui/GameEditorWorkbench.ts
          git commit -m 'fix: synchronize editor select values before rerender'
          git pull --rebase origin tmp/combat-foundation-v1-20260713
          git push origin HEAD:tmp/combat-foundation-v1-20260713
      - name: Publish completed status
        if: ${{ always() }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'combat-editor-select-fix',
              description: 'Editor select synchronization fix applied',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
