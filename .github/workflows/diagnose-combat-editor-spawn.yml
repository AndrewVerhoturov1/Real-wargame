name: Diagnose Combat Editor Spawn

on:
  push:
    branches:
      - tmp/combat-foundation-v1-20260713
    paths:
      - '.github/workflows/diagnose-combat-editor-spawn.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Locate unit spawn implementation
        run: |
          echo '--- spawnEditorUnit ---'
          grep -R -n -B 20 -A 45 "function spawnEditorUnit" src || true
          echo '--- editor.unitSide writes ---'
          grep -R -n -B 3 -A 5 "editor\.unitSide" src || true
          echo '--- GameEditorDrafts usage ---'
          grep -R -n "getGameEditorDrafts" src/core src/ui || true
