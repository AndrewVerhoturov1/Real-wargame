name: Diagnose Combat Editor Spawn

run-name: Locate active fighter spawn · ${{ github.sha }}

on:
  push:
    branches:
      - tmp/combat-foundation-v1-20260713
    paths:
      - '.github/workflows/diagnose-combat-editor-spawn.yml'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'diagnose-combat-editor-spawn',
              description: 'Locating active fighter spawn path',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
      - uses: actions/checkout@v4
      - name: Locate active spawn implementation
        shell: bash
        run: |
          {
            echo '--- exact creation message ---'
            grep -R -n -B 35 -A 60 "Создан боец" src || true
            echo '--- profile creation message fragment ---'
            grep -R -n -B 35 -A 60 "с профилем" src || true
            echo '--- unit normalization and pushes ---'
            grep -R -n -B 20 -A 50 "state\.units\.push" src || true
            echo '--- spawnEditorUnit ---'
            grep -R -n -B 20 -A 55 "function spawnEditorUnit" src || true
            echo '--- editor.unitSide reads and writes ---'
            grep -R -n -B 5 -A 8 "editor\.unitSide" src || true
            echo '--- GameEditorDrafts usage ---'
            grep -R -n -B 5 -A 12 "getGameEditorDrafts" src || true
          } | tee combat-editor-spawn-diagnostic.log
      - name: Upload diagnostic log
        uses: actions/upload-artifact@v4
        with:
          name: combat-editor-spawn-diagnostic
          path: combat-editor-spawn-diagnostic.log
          if-no-files-found: error
          retention-days: 7
      - name: Publish success status
        if: ${{ success() }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'diagnose-combat-editor-spawn',
              description: 'Active fighter spawn path located',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
