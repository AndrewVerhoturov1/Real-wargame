name: Publish verified PR127 ownership and editor fixes

on:
  push:
    branches:
      - agent/per-unit-ai-scheduler-v1
    paths:
      - .github/workflows/agent-pr127-fix-harness.yml

permissions:
  contents: write

jobs:
  publish-focused-fixes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/per-unit-ai-scheduler-v1
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply verified focused fixes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          harness = Path('src/testing/DangerLayerMovementPerformanceHarness.ts')
          text = harness.read_text(encoding='utf-8')
          creation_anchor = "      navigationProfileId: 'normal',\n    }]);"
          creation_replacement = "      navigationProfileId: 'normal',\n      aiControl: 'manual',\n    }]);"
          if "      aiControl: 'manual',\n" not in text:
              if creation_anchor not in text:
                  raise SystemExit('fixture creation anchor missing')
              text = text.replace(creation_anchor, creation_replacement, 1)
          ownership_anchor = "    state.units.push(unit);\n  }\n}\n\nfunction prepareScenario"
          ownership_replacement = "    state.units.push(unit);\n  }\n\n  for (const unit of state.units) unit.aiControl = 'manual';\n}\n\nfunction prepareScenario"
          if "for (const unit of state.units) unit.aiControl = 'manual';" not in text:
              if ownership_anchor not in text:
                  raise SystemExit('fixture ownership anchor missing')
              text = text.replace(ownership_anchor, ownership_replacement, 1)
          harness.write_text(text, encoding='utf-8')

          editor_smoke = Path('scripts/ai_node_editor_smoke.mjs')
          text = editor_smoke.read_text(encoding='utf-8')
          old = "expectContains(gameBridge, 'isPaused(state)', 'Мост не должен пересчитывать AI во время паузы.');"
          new = "\n".join([
              "expectContains(gameBridge, 'cloneSimulationStateForDiagnostic', 'Диагностический мост должен работать на глубокой копии состояния.');",
              "expectContains(gameBridge, 'applyEffects: false', 'Selected-unit мост должен оставаться read-only диагностикой.');",
              "expectNotContains(gameBridge, 'setInterval(', 'Gameplay AI не должен иметь отдельный browser timer внутри bridge.');",
          ])
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('legacy pause assertion anchor missing')
          editor_smoke.write_text(text, encoding='utf-8')
          PY
          git diff --check
      - run: npm ci
      - name: Verify scheduler ownership contract
        shell: bash
        run: npm run ai-scheduler:smoke
      - name: Verify editor contract
        shell: bash
        run: npm run editor:smoke
      - name: Publish focused fixes
        shell: bash
        run: |
          set -euo pipefail
          git add src/testing/DangerLayerMovementPerformanceHarness.ts scripts/ai_node_editor_smoke.mjs
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'fix: isolate scripted AI ownership contracts'
          git push origin HEAD:agent/per-unit-ai-scheduler-v1
