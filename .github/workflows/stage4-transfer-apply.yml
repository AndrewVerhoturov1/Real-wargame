name: Stage 4 Authorized Fix Apply

on:
  push:
    branches:
      - feature/20260723-shooting-stage-04-projectile-runtime-benchmark

permissions:
  contents: write

jobs:
  apply-stage4-fixes:
    if: contains(github.event.head_commit.message, 'activate Stage 4 benchmark fixes')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify exact base ancestry
        shell: bash
        run: |
          set -euo pipefail
          base='3544444490f9026954d99a84e167988d0e518156'
          test "$(git merge-base HEAD "$base")" = "$base"
          test -f .github/stage4-fix-patch/part-00

      - name: Decode and apply verified fix payload
        shell: bash
        run: |
          set -euo pipefail
          cat .github/stage4-fix-patch/part-* > /tmp/stage4-fix.b64
          base64 -d /tmp/stage4-fix.b64 | xz -d > /tmp/stage4-fix.payload
          git config user.name 'OpenAI Web Chat'
          git config user.email 'openai-web-chat@users.noreply.github.com'
          if grep -qE '^From [0-9a-f]{40} ' /tmp/stage4-fix.payload; then
            git am --3way /tmp/stage4-fix.payload
          else
            git apply --index --3way /tmp/stage4-fix.payload
            git commit -m 'fix: finalize Stage 4 benchmark measurement'
          fi

      - name: Remove temporary transfer harness
        shell: bash
        run: |
          set -euo pipefail
          for path in \
            .github/stage4-fix-patch \
            .github/stage4-transfer-final \
            .github/stage4-transfer-20260724 \
            .github/stage4-patch \
            .github/workflows/stage4-transfer-apply.yml
          do
            if test -e "$path"; then
              git rm -r "$path"
            fi
          done
          if ! git diff --cached --quiet; then
            git commit -m 'chore: remove temporary Stage 4 transfer harness'
          fi
          git diff --check 3544444490f9026954d99a84e167988d0e518156...HEAD
          test "$(git merge-base HEAD 3544444490f9026954d99a84e167988d0e518156)" = '3544444490f9026954d99a84e167988d0e518156'
          test -z "$(git status --short)"
          git push origin HEAD:refs/heads/feature/20260723-shooting-stage-04-projectile-runtime-benchmark
