name: Preview Policy

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]

jobs:
  check-preview-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Check preview policy
        env:
          PR_BODY: ${{ github.event.pull_request.body || '' }}
        shell: bash
        run: |
          set -e

          # This workflow guards PRs targeting main.
          # Note: The preferred external delivery is direct push to real-wargame-preview, not PRs.
          # PRs targeting main from task branches are a preview-policy violation without GO.

          BASE_BRANCH="${{ github.base_ref }}"
          HEAD_BRANCH="${{ github.head_ref }}"

          echo "=== Preview Policy Check ==="
          echo "Base branch: $BASE_BRANCH"
          echo "Head branch: $HEAD_BRANCH"
          echo ""

          DEFAULT_TARGET="real-wargame-preview"
          echo "Default target branch: $DEFAULT_TARGET"
          echo "Default external delivery: direct push to $DEFAULT_TARGET (PR is fallback)"
          echo ""

          # Check: if base is main, flag it unless MAIN_GO is recorded
          if [ "$BASE_BRANCH" = "main" ]; then
            # Check head branch pattern: codex/*, preview/*, r-init/*
            if echo "$HEAD_BRANCH" | grep -qE '^(codex/|preview/|r-init/)'; then
              # Look for MAIN_GO marker in PR body
              if printf '%s\n' "$PR_BODY" | grep -Eiq 'MAIN_GO_APPROVED_BY_USER:[[:space:]]*yes'; then
                echo "PASS: PR targets main with explicit MAIN_GO approval."
                echo "preview_policy=pass" >> $GITHUB_ENV
                exit 0
              else
                echo "FAIL: PR targets main from branch '$HEAD_BRANCH'"
                echo "      without MAIN_GO_APPROVED_BY_USER: yes marker."
                echo ""
                echo "Default target is '$DEFAULT_TARGET'."
                echo "Please retarget this PR to '$DEFAULT_TARGET' or"
                echo "add 'MAIN_GO_APPROVED_BY_USER: yes' to the PR body"
                echo "if the user has explicitly approved a main merge."
                echo "preview_policy=fail" >> $GITHUB_ENV
                exit 1
              fi
            else
              echo "PASS: Head branch '$HEAD_BRANCH' does not match codex/*, preview/*, or r-init/* patterns."
              echo "preview_policy=pass" >> $GITHUB_ENV
            fi
          else
            echo "PASS: Base branch is '$BASE_BRANCH' (expected default is '$DEFAULT_TARGET')."
            echo "preview_policy=pass" >> $GITHUB_ENV
          fi

      - name: Print policy result
        shell: bash
        run: |
          echo "Preview policy result: ${{ env.preview_policy }}"
          echo "Default target for this repository is: real-wargame-preview"
          echo "Default external delivery is: direct push to preview (PR is fallback)"

  visual-qa-screenshots:
    name: Visual QA screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: check-preview-policy
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install Playwright test runner for this workflow
        run: npm install --no-save @playwright/test

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Check production build without blocking screenshots
        continue-on-error: true
        run: npm run build

      - name: Capture screenshots
        run: npx playwright test tests/preview-screenshots.spec.ts --project=chromium --reporter=line

      - name: Upload screenshots
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: real-wargame-visual-qa-screenshots
          path: artifacts/screenshots/
          if-no-files-found: warn
          retention-days: 14
