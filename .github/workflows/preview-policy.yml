name: Preview Policy

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]

permissions:
  contents: write

jobs:
  apply-movement-compatibility-fix:
    if: github.head_ref == 'agent/physical-movement-runtime-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact candidate branch
        uses: actions/checkout@v4
        with:
          ref: agent/physical-movement-runtime-v1
          fetch-depth: 0

      - name: Apply exact compatibility patch
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          profiles = Path('src/core/movement/MovementProfiles.ts')
          text = profiles.read_text()
          text, count = re.subn(r'(?m)^    startSeconds: 0\.12,$', '    startSeconds: 0,', text, count=1)
          if count != 1:
              raise SystemExit(f'normal start delay replacement count: {count}')
          profiles.write_text(text)

          runtime = Path('src/core/movement/MovementRuntime.ts')
          text = runtime.read_text()
          text, first = re.subn(
              r'(?m)^  applyMovementPosture\(unit, profile, gait\);\n  postureMultiplier =',
              '  const movementOwnsPosture = canTranslate || runtime.isMoving;\n  if (movementOwnsPosture) applyMovementPosture(unit, profile, gait);\n  postureMultiplier =',
              text,
              count=1,
          )
          text, second = re.subn(
              r'(?m)^    applyMovementPosture\(unit, profile, gait\);\n  \} else \{',
              '    if (movementOwnsPosture) applyMovementPosture(unit, profile, gait);\n  } else {',
              text,
              count=1,
          )
          if first != 1 or second != 1:
              raise SystemExit(f'movement posture replacements: first={first}, second={second}')
          runtime.write_text(text)
          PY

      - name: Verify compatibility fix
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run ai-scheduler:smoke
          npm run physical-movement:smoke
          npm run combat-foundation:smoke
          npm run combat-tactical-integration:smoke

      - name: Commit code-only fix
        shell: bash
        run: |
          set -euo pipefail
          git restore --source=HEAD -- .github/workflows/preview-policy.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/core/movement/MovementProfiles.ts src/core/movement/MovementRuntime.ts
          git diff --cached --stat
          git commit -m 'Preserve idle posture and legacy movement start'
          git push origin HEAD:agent/physical-movement-runtime-v1
