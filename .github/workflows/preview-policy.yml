name: Add Danger Movement Timeout Diagnostics

on:
  pull_request:
    branches:
      - real-wargame-preview
    types: [synchronize]

permissions:
  contents: write

jobs:
  add-timeout-diagnostics:
    if: github.event.pull_request.head.ref == 'agent/physical-movement-runtime-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact candidate branch
        uses: actions/checkout@v4
        with:
          ref: agent/physical-movement-runtime-v1
          fetch-depth: 0

      - name: Add exact timeout evidence
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/danger-layer-movement-performance.spec.ts')
          text = path.read_text(encoding='utf-8')
          old = """  await resumeSimulation(page);\n  await page.waitForFunction((initial) => {\n    const current = window.__realWargameDangerMovementPerformance?.getSnapshot();\n    if (!current || !initial.subjectiveThreatPosition || !current.subjectiveThreatPosition) return false;\n    const friendlyDistance = Math.hypot(\n      current.observerPosition.x - initial.observerPosition.x,\n      current.observerPosition.y - initial.observerPosition.y,\n    );\n    const hostileDistance = Math.hypot(\n      current.hostilePosition.x - initial.hostilePosition.x,\n      current.hostilePosition.y - initial.hostilePosition.y,\n    );\n    const subjectiveDistance = Math.hypot(\n      current.subjectiveThreatPosition.x - initial.subjectiveThreatPosition.x,\n      current.subjectiveThreatPosition.y - initial.subjectiveThreatPosition.y,\n    );\n    return friendlyDistance >= 4 && hostileDistance >= 4 && subjectiveDistance >= 2;\n  }, before, { timeout: 25_000 });\n"""
          new = """  await resumeSimulation(page);\n  try {\n    await page.waitForFunction((initial) => {\n      const current = window.__realWargameDangerMovementPerformance?.getSnapshot();\n      if (!current || !initial.subjectiveThreatPosition || !current.subjectiveThreatPosition) return false;\n      const friendlyDistance = Math.hypot(\n        current.observerPosition.x - initial.observerPosition.x,\n        current.observerPosition.y - initial.observerPosition.y,\n      );\n      const hostileDistance = Math.hypot(\n        current.hostilePosition.x - initial.hostilePosition.x,\n        current.hostilePosition.y - initial.hostilePosition.y,\n      );\n      const subjectiveDistance = Math.hypot(\n        current.subjectiveThreatPosition.x - initial.subjectiveThreatPosition.x,\n        current.subjectiveThreatPosition.y - initial.subjectiveThreatPosition.y,\n      );\n      return friendlyDistance >= 4 && hostileDistance >= 4 && subjectiveDistance >= 2;\n    }, before, { timeout: 25_000 });\n  } catch (error) {\n    const current = await snapshot(page);\n    const friendlyDistance = Math.hypot(\n      current.observerPosition.x - before.observerPosition.x,\n      current.observerPosition.y - before.observerPosition.y,\n    );\n    const hostileDistance = Math.hypot(\n      current.hostilePosition.x - before.hostilePosition.x,\n      current.hostilePosition.y - before.hostilePosition.y,\n    );\n    const subjectiveDistance = before.subjectiveThreatPosition && current.subjectiveThreatPosition\n      ? Math.hypot(\n        current.subjectiveThreatPosition.x - before.subjectiveThreatPosition.x,\n        current.subjectiveThreatPosition.y - before.subjectiveThreatPosition.y,\n      )\n      : null;\n    throw new Error(`Six-unit movement thresholds were not reached: ${JSON.stringify({\n      friendlyDistance,\n      hostileDistance,\n      subjectiveDistance,\n      initial: before,\n      current,\n      cause: error instanceof Error ? error.message : String(error),\n    })}`);\n  }\n"""
          if old in text:
              path.write_text(text.replace(old, new), encoding='utf-8')
          elif new in text:
              pass
          else:
              raise RuntimeError('Six-unit timeout diagnostic anchor not found')
          PY
          git diff --check

      - name: Verify test compilation
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Commit diagnostic improvement
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/danger-layer-movement-performance.spec.ts
          git diff --cached --check
          if git diff --cached --quiet; then
            echo 'Timeout diagnostics already present.'
            exit 0
          fi
          git commit -m 'Report danger movement threshold timeout evidence'
          git push origin HEAD:agent/physical-movement-runtime-v1
