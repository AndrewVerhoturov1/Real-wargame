name: Preview Policy

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]

permissions:
  contents: write

jobs:
  apply-movement-compatibility-fix:
    if: github.head_ref == 'agent/physical-movement-runtime-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact candidate branch
        uses: actions/checkout@v4
        with:
          ref: agent/physical-movement-runtime-v1
          fetch-depth: 0

      - name: Apply exact compatibility patch
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          profiles = Path('src/core/movement/MovementProfiles.ts')
          text = profiles.read_text()
          old = '    startSeconds: 0.12,'
          if text.count(old) != 1:
              raise SystemExit(f'expected one normal start delay, found {text.count(old)}')
          profiles.write_text(text.replace(old, '    startSeconds: 0,', 1))

          runtime = Path('src/core/movement/MovementRuntime.ts')
          text = runtime.read_text()
          first = '''  runtime.forcedFallbackReason = fallbackReason;
          runtime.actualGait = gait;
          applyMovementPosture(unit, profile, gait);
          postureMultiplier = postureSpeedMultiplier(unit.behaviorRuntime.posture);
          '''
          first_fixed = '''  runtime.forcedFallbackReason = fallbackReason;
          runtime.actualGait = gait;
          const movementOwnsPosture = canTranslate || runtime.isMoving;
          if (movementOwnsPosture) applyMovementPosture(unit, profile, gait);
          postureMultiplier = postureSpeedMultiplier(unit.behaviorRuntime.posture);
          '''
          second = '''    runtime.forcedFallbackReason = fallbackReason;
          runtime.actualGait = gait;
          applyMovementPosture(unit, profile, gait);
          } else {
          '''
          second_fixed = '''    runtime.forcedFallbackReason = fallbackReason;
          runtime.actualGait = gait;
          if (movementOwnsPosture) applyMovementPosture(unit, profile, gait);
          } else {
          '''
          if text.count(first) != 1 or text.count(second) != 1:
              raise SystemExit('movement posture patch anchors are not unique')
          runtime.write_text(text.replace(first, first_fixed, 1).replace(second, second_fixed, 1))
          PY

      - name: Verify compatibility fix
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run ai-scheduler:smoke
          npm run physical-movement:smoke
          npm run combat-foundation:smoke
          npm run combat-tactical-integration:smoke

      - name: Commit code-only fix
        shell: bash
        run: |
          set -euo pipefail
          git restore --source=HEAD -- .github/workflows/preview-policy.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/core/movement/MovementProfiles.ts src/core/movement/MovementRuntime.ts
          git diff --cached --stat
          git commit -m 'Preserve idle posture and legacy movement start'
          git push origin HEAD:agent/physical-movement-runtime-v1
