name: Stage 4 Development Dependencies

on:
  push:
    branches:
      - feature/20260723-shooting-stage-04-projectile-runtime-benchmark

permissions:
  contents: read

jobs:
  dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install exact dependencies
        run: npm ci

      - name: Pack dependencies
        shell: bash
        run: tar -czf stage4-node-modules.tgz node_modules

      - name: Upload dependencies
        uses: actions/upload-artifact@v4
        with:
          name: stage4-node-modules
          path: stage4-node-modules.tgz
          if-no-files-found: error
          retention-days: 1
