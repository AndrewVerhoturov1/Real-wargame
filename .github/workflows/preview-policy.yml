name: Stage 4 Source Snapshot

on:
  push:
    branches:
      - feature/20260723-shooting-stage-04-projectile-runtime-benchmark

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Record source identity
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse HEAD | tee stage4-source-head.txt
          git merge-base HEAD 3544444490f9026954d99a84e167988d0e518156 | tee stage4-source-merge-base.txt
          git status --short | tee stage4-source-status.txt

      - name: Pack source tree
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git --exclude=stage4-source.tgz -czf stage4-source.tgz .

      - name: Upload source tree
        uses: actions/upload-artifact@v4
        with:
          name: stage4-source-tree
          path: |
            stage4-source.tgz
            stage4-source-head.txt
            stage4-source-merge-base.txt
            stage4-source-status.txt
          if-no-files-found: error
          retention-days: 1
