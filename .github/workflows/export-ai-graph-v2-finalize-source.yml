name: Export AI Graph v2 finalize source

on:
  pull_request:
    branches:
      - real-wargame-preview
    types: [synchronize]

jobs:
  export-source:
    if: github.event.pull_request.head.ref == 'feat/ai-graph-v2-finalize-2026-07-13'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/ai-graph-v2-finalize-2026-07-13
          fetch-depth: 0
      - name: Create complete branch archive
        run: zip -r graph-v2-branch-source.zip . -x '.git/*' 'node_modules/*' 'dist/*'
      - uses: actions/upload-artifact@v4
        with:
          name: graph-v2-branch-source-${{ github.event.pull_request.head.sha }}
          path: graph-v2-branch-source.zip
          retention-days: 1
