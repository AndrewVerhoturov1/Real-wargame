name: Export AI Graph v2 finalize source

on:
  pull_request:
    branches:
      - real-wargame-preview
    types: [synchronize]

permissions:
  contents: write
  pull-requests: read

jobs:
  diagnose-final-patch:
    if: github.event.pull_request.head.ref == 'feat/ai-graph-v2-finalize-2026-07-13'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/ai-graph-v2-finalize-2026-07-13
          fetch-depth: 0
      - name: Decode each replacement fragment separately
        shell: bash
        run: |
          set +e
          for suffix in a b c; do
            source_file=".github/graph-v2-final-patch/part06${suffix}"
            cp "${source_file}" "/tmp/part06${suffix}.hex"
            wc -c "${source_file}" >> /tmp/fragment-sizes.txt
            sha256sum "${source_file}" >> /tmp/fragment-sha.txt
            xxd -r -p "${source_file}" > "/tmp/part06${suffix}.decoded"
            echo "part06${suffix}_status=$?" >> /tmp/fragment-status.txt
            wc -c "/tmp/part06${suffix}.decoded" >> /tmp/fragment-sizes.txt
            sha256sum "/tmp/part06${suffix}.decoded" >> /tmp/fragment-sha.txt
          done
          exit 0
      - name: Upload fragment diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: graph-v2-fragment-diagnostics-${{ github.event.pull_request.head.sha }}
          path: |
            /tmp/part06a.hex
            /tmp/part06b.hex
            /tmp/part06c.hex
            /tmp/part06a.decoded
            /tmp/part06b.decoded
            /tmp/part06c.decoded
            /tmp/fragment-status.txt
            /tmp/fragment-sizes.txt
            /tmp/fragment-sha.txt
          if-no-files-found: warn
          retention-days: 1
