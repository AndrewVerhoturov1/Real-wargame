name: Stage 2 Smoke Diagnostic

on:
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: read

jobs:
  capture-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Capture Stage 2 smoke output
        id: smoke
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run physical-action-coordinator:smoke > stage2-smoke.log 2>&1

      - name: Upload Stage 2 smoke output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage2-smoke-${{ github.event.pull_request.head.sha }}
          path: stage2-smoke.log
          if-no-files-found: error
          retention-days: 1

      - name: Preserve failure status
        if: steps.smoke.outcome == 'failure'
        run: exit 1
