name: Combat Editor Side Patch

on:
  push:
    branches:
      - tmp/combat-foundation-v1-20260713
    paths:
      - 'scripts/apply_combat_editor_side_patch.mjs'
      - '.github/workflows/combat-editor-side-patch.yml'

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tmp/combat-foundation-v1-20260713
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/apply_combat_editor_side_patch.mjs
      - name: Commit editor side integration
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'Patch already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/core/editor/GameEditorDrafts.ts src/ui/GameEditorWorkbench.ts src/ui/TacticalWorkspace.ts
          git commit -m 'fix: make fighter side part of editor draft'
          git push origin HEAD:tmp/combat-foundation-v1-20260713
