name: Temporary AI state-plan docs patch

on:
  push:
    branches:
      - feat/ai-state-plan-v1-temp-2026-07-14

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[state-plan-docs-patched]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node scripts/apply_ai_state_plan_docs_patch.mjs
      - name: Commit documentation patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/subprojects/ai-single-unit-editor
          if git diff --cached --quiet; then
            echo "No documentation changes to commit."
            exit 0
          fi
          git commit -m "docs(ai): record hierarchical states and plans v1 [state-plan-docs-patched]"
          git push origin HEAD:feat/ai-state-plan-v1-temp-2026-07-14
