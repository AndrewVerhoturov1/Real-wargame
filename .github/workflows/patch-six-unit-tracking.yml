name: Patch Six Unit Tracking

on:
  push:
    branches:
      - agent/danger-layer-moving-units-performance

permissions:
  contents: write

jobs:
  patch-fixture:
    if: github.event.head_commit.message == 'Trigger six unit tracking patch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/danger-layer-moving-units-performance
      - name: Enable deterministic subjective tracking
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/testing/DangerLayerMovementPerformanceHarness.ts')
          text = path.read_text(encoding='utf-8')
          old = """  } else if (scenario === 'both') {
    routeAllUnits(state, observer, hostile);
"""
          new = """  } else if (scenario === 'both') {
    // The mixed movement contract needs a real subjective threat update, so use
    // deterministic visual tracking while all six units follow production routes.
    configureWallCrossingTracking(observer);
    routeAllUnits(state, observer, hostile);
"""
          if old not in text:
              raise SystemExit('Expected six-unit scenario block not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          Path('.github/workflows/patch-six-unit-tracking.yml').unlink()
          PY
      - name: Commit mixed tracking fixture
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/testing/DangerLayerMovementPerformanceHarness.ts .github/workflows/patch-six-unit-tracking.yml
          git commit -m 'Track subjective threat in six-unit movement scenario'
          git push origin HEAD:agent/danger-layer-moving-units-performance
