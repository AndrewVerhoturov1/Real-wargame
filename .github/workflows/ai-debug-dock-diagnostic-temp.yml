name: TEMP AI debug dock diagnostic

on:
  push:
    branches:
      - fix/ai-plan-move-editor-panels-temp-2026-07-14
    paths:
      - .github/workflows/ai-debug-dock-diagnostic-temp.yml
      - tests/ai-debug-dock-diagnostic.spec.ts

permissions:
  contents: read
  statuses: write

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Publish pending diagnostic status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'ai-debug-dock-diagnostic',
              description: 'AI debug dock geometry probe is running',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm install --no-save @playwright/test
      - run: npm run build
      - name: Capture geometry
        id: capture
        shell: bash
        run: |
          set -o pipefail
          npx playwright test tests/ai-debug-dock-diagnostic.spec.ts --project=chromium --reporter=line 2>&1 | tee ai-debug-dock-diagnostic.log
      - name: Upload diagnostic
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ai-debug-dock-diagnostic
          path: |
            ai-debug-dock-diagnostic.log
            artifacts/screenshots/ai-debug-dock-diagnostic/
          if-no-files-found: warn
          retention-days: 7
      - name: Publish diagnostic result
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          CAPTURE_OUTCOME: ${{ steps.capture.outcome }}
        with:
          script: |
            const success = process.env.CAPTURE_OUTCOME === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'ai-debug-dock-diagnostic',
              description: `AI debug dock geometry: ${process.env.CAPTURE_OUTCOME}`,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
