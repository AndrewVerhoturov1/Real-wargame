name: Agent Live Scheduler Attribution

on:
  pull_request:
    branches:
      - real-wargame-preview
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: agent-live-scheduler-attribution
  cancel-in-progress: false

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/live-windows-performance-followup-v1
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply report integration
        shell: bash
        run: python3 scripts/agent_live_scheduler_attribution_apply.py 2>&1 | tee scheduler-attribution-apply.log
      - run: npm ci
      - name: Verify scheduler attribution
        shell: bash
        run: |
          set -o pipefail
          {
            npx tsc --noEmit
            npm run build
            node scripts/performance_report_contract_smoke.mjs
            npm run ai-scheduler:smoke
            npm run workspace:smoke
            npm run danger-layer-movement-performance:smoke
          } 2>&1 | tee scheduler-attribution-verification.log
      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-scheduler-attribution-verification
          path: |
            scheduler-attribution-apply.log
            scheduler-attribution-verification.log
          if-no-files-found: warn
          retention-days: 3
      - name: Commit verified attribution
        run: |
          rm -f scripts/agent_live_scheduler_attribution_apply.py
          rm -f scheduler-attribution-apply.log scheduler-attribution-verification.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "perf: attribute scheduler stalls to units and graph state"
          git push origin HEAD:agent/live-windows-performance-followup-v1
