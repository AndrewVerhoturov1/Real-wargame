name: Stage 2 TypeScript Diagnostic

on:
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: read

jobs:
  capture-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Capture TypeScript output
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck > stage2-typecheck.log 2>&1

      - name: Upload TypeScript output and edited source
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage2-typecheck-${{ github.event.pull_request.head.sha }}
          path: |
            stage2-typecheck.log
            src/core/units/UnitModel.ts
          if-no-files-found: error
          retention-days: 1

      - name: Preserve failure status
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
