name: Diagnose Tactical Core Patcher Fix

on:
  push:
    branches:
      - feature/20260719-tactical-position-system
    paths:
      - '.github/workflows/fix-tactical-core-patcher.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/20260719-tactical-position-system
          fetch-depth: 1
          show-progress: false

      - name: Capture Python traceback
        run: |
          mkdir -p docs/debug
          set +e
          python - <<'PY' > docs/debug/tactical-patcher-fixer-traceback.log 2>&1
          from pathlib import Path
          import traceback

          try:
              path = Path('.github/patches/apply-tactical-core-v2.mjs')
              lines = path.read_text().splitlines(keepends=True)
              print('line_count', len(lines))
              matches = [i for i, line in enumerate(lines) if 'kind:${value.kind}' in line]
              print('matches', matches)
              needle = matches[0]
              print('needle_line', repr(lines[needle]))
              starts = [i for i in range(needle, -1, -1) if lines[i].strip() == 'replaceExact(']
              ends = [i for i in range(needle, len(lines)) if lines[i].strip() == ');']
              print('starts', starts[:3])
              print('ends', ends[:3])
          except Exception:
              traceback.print_exc()
              raise
          PY
          status=$?
          set -e
          echo "status=$status" >> docs/debug/tactical-patcher-fixer-traceback.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/debug/tactical-patcher-fixer-traceback.log
          git commit -m "debug: capture tactical patch fixer traceback"
          git push origin HEAD:feature/20260719-tactical-position-system
