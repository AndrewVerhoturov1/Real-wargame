name: Fix Tactical Core Patcher

on:
  push:
    branches:
      - feature/20260719-tactical-position-system
    paths:
      - '.github/workflows/fix-tactical-core-patcher.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/20260719-tactical-position-system
          fetch-depth: 1
          show-progress: false

      - name: Replace malformed nested template block
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/patches/apply-tactical-core-v2.mjs')
          lines = path.read_text().splitlines(keepends=True)
          needle = next(i for i, line in enumerate(lines) if '`kind:${value.kind}`' in line)
          start = next(i for i in range(needle, -1, -1) if lines[i].strip() == 'replaceExact(')
          end = next(i for i in range(needle, len(lines)) if lines[i].strip() == ');')
          replacement = r'''replaceExact(
            'src/core/tactical/TacticalPositionSearchService.ts',
            [
              "    `kind:${value.kind}`,",
              "    `origin:${quantize(value.origin.x)}:${quantize(value.origin.y)}`,",
              "    `posture:${value.currentPosture}`,",
              "    `order:${value.orderTarget ? `${quantize(value.orderTarget.x)}:${quantize(value.orderTarget.y)}` : 'none'}`,",
              "    `threats:${value.threatCount}:${value.tacticalKnowledgeRevision}`,",
            ].join('\n'),
            [
              "    `kind:${value.kind}`,",
              "    `objective:${value.parameters.objective}`,",
              "    `order:${value.parameters.objective === 'continue_order' && value.orderTarget ? `${quantize(value.orderTarget.x)}:${quantize(value.orderTarget.y)}` : 'ignored'}`,",
              "    `threat:${value.referenceThreatId ?? 'none'}:${value.referenceThreatPosition ? `${quantize(value.referenceThreatPosition.x)}:${quantize(value.referenceThreatPosition.y)}` : 'none'}`,",
            ].join('\n'),
          );
          '''
          path.write_text(''.join(lines[:start]) + replacement + ''.join(lines[end + 1:]))
          PY
          node --check .github/patches/apply-tactical-core-v2.mjs

      - name: Commit patcher fix
        run: |
          rm -f .github/workflows/fix-tactical-core-patcher.yml
          rm -f docs/debug/tactical-core-patcher.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: repair tactical core patch generator"
          git push origin HEAD:feature/20260719-tactical-position-system
