name: Agent Live Windows Follow-up

on:
  push:
    branches:
      - agent/live-windows-performance-followup-v1

permissions:
  contents: write

concurrency:
  group: agent-live-windows-performance-followup-v1
  cancel-in-progress: false

jobs:
  apply-safe-position-removal:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: agent/live-windows-performance-followup-v1
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply source patch
        run: python3 scripts/agent_live_windows_followup_apply.py

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

      - name: Focused smoke checks
        run: |
          npm run validate:ai-graph
          npm run workspace:smoke
          npm run ai-scheduler:smoke
          npm run awareness-field:smoke
          npm run danger-layer-performance:smoke
          npm run danger-layer-movement-performance:smoke

      - name: Commit verified result
        run: |
          rm scripts/agent_live_windows_followup_apply.py
          rm .github/workflows/agent-live-windows-followup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "perf: remove legacy safe positions from live runtime"
          git push origin HEAD:agent/live-windows-performance-followup-v1
