name: Agent Live Windows Follow-up

on:
  push:
    branches:
      - agent/live-windows-performance-followup-v1
  pull_request:
    branches:
      - real-wargame-preview
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: agent-live-windows-performance-followup-v1
  cancel-in-progress: false

jobs:
  apply-safe-position-removal:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: agent/live-windows-performance-followup-v1
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply source patch
        id: apply_patch
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/performance/live-windows-followup
          python3 scripts/agent_live_windows_followup_patchfix.py
          python3 scripts/agent_live_windows_followup_apply.py 2>&1 | tee artifacts/performance/live-windows-followup/patch-apply.log

      - name: Publish patch failure
        if: failure() && steps.apply_patch.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/performance/live-windows-followup/patch-apply.log
          git commit -m "chore: capture follow-up patch failure"
          git push origin HEAD:agent/live-windows-performance-followup-v1

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

      - name: Focused smoke checks
        run: |
          npm run validate:ai-graph
          npm run workspace:smoke
          npm run ai-scheduler:smoke
          npm run awareness-field:smoke
          npm run danger-layer-performance:smoke
          npm run danger-layer-movement-performance:smoke

      - name: Commit verified result
        run: |
          rm scripts/agent_live_windows_followup_apply.py
          rm scripts/agent_live_windows_followup_patchfix.py
          rm .github/workflows/agent-live-windows-followup.yml
          rm -f artifacts/performance/live-windows-followup/.apply-trigger
          rm -f artifacts/performance/live-windows-followup/patch-apply.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "perf: remove legacy safe positions from live runtime"
          git push origin HEAD:agent/live-windows-performance-followup-v1
