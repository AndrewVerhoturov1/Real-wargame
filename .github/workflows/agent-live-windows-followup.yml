name: Agent Live Windows Follow-up

on:
  push:
    branches:
      - agent/live-windows-performance-followup-v1
  pull_request:
    branches:
      - real-wargame-preview
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: agent-live-windows-performance-followup-v1-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  apply-safe-position-removal:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: agent/live-windows-performance-followup-v1
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply source and evidence patches
        id: apply_patch
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/performance/live-windows-followup
          {
            python3 scripts/agent_live_windows_followup_patchfix.py
            python3 scripts/agent_live_windows_followup_labfix.py
            python3 scripts/agent_live_windows_followup_apply.py
            python3 scripts/agent_live_windows_followup_interfacefix.py
            python3 scripts/agent_live_windows_followup_workspacefix.py
            python3 scripts/agent_live_windows_followup_testsfix_hotfix.py
            python3 scripts/agent_live_windows_followup_smokefix.py
            python3 scripts/agent_live_windows_followup_testsfix.py
          } 2>&1 | tee artifacts/performance/live-windows-followup/patch-apply.log

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-windows-followup-patch-log
          path: artifacts/performance/live-windows-followup/patch-apply.log
          if-no-files-found: error
          retention-days: 3

      - name: Install dependencies
        run: npm ci

      - name: Verify source
        id: verify_source
        shell: bash
        run: |
          set -o pipefail
          {
            echo '## TypeScript'
            npx tsc --noEmit
            echo '## Production build'
            npm run build
            echo '## Focused smoke checks'
            npm run validate:ai-graph
            npm run lab:smoke
            npm run workspace:smoke
            npm run ai-scheduler:smoke
            npm run awareness-field:smoke
            npm run danger-layer-performance:smoke
            npm run danger-layer-movement-performance:smoke
          } 2>&1 | tee artifacts/performance/live-windows-followup/source-verification.log

      - name: Upload source verification
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-windows-followup-source-verification
          path: artifacts/performance/live-windows-followup/source-verification.log
          if-no-files-found: error
          retention-days: 3

      - name: Commit verified result
        run: |
          rm scripts/agent_live_windows_followup_apply.py
          rm scripts/agent_live_windows_followup_patchfix.py
          rm scripts/agent_live_windows_followup_labfix.py
          rm scripts/agent_live_windows_followup_interfacefix.py
          rm scripts/agent_live_windows_followup_workspacefix.py
          rm scripts/agent_live_windows_followup_testsfix.py
          rm scripts/agent_live_windows_followup_testsfix_hotfix.py
          rm scripts/agent_live_windows_followup_smokefix.py
          rm .github/workflows/agent-live-windows-followup.yml
          rm -f artifacts/performance/live-windows-followup/.apply-trigger
          rm -f artifacts/performance/live-windows-followup/patch-apply.log
          rm -f artifacts/performance/live-windows-followup/source-verification.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "perf: remove legacy safe positions from live runtime"
          git push origin HEAD:agent/live-windows-performance-followup-v1
