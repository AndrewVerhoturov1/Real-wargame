name: Agent Disable Legacy Cover Query

on:
  pull_request:
    branches:
      - real-wargame-preview
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: agent-disable-legacy-cover-query
  cancel-in-progress: false

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/live-windows-performance-followup-v1
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply legacy cover-query retirement
        run: python3 scripts/agent_disable_legacy_cover_query_apply.py 2>&1 | tee legacy-cover-query-apply.log
      - run: npm ci
      - name: Verify source and contracts
        shell: bash
        run: |
          set -o pipefail
          {
            npx tsc --noEmit
            npm run build
            npm run tactical-query:smoke
            npm run ai-scheduler:smoke
            npm run workspace:smoke
            npm run combat-foundation:smoke
            node scripts/performance_report_contract_smoke.mjs
          } 2>&1 | tee legacy-cover-query-verification.log
      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-cover-query-retirement-verification
          path: |
            legacy-cover-query-apply.log
            legacy-cover-query-verification.log
          if-no-files-found: warn
          retention-days: 3
      - name: Commit verified source
        run: |
          rm -f scripts/agent_disable_legacy_cover_query_apply.py
          rm -f legacy-cover-query-apply.log legacy-cover-query-verification.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "perf: retire synchronous legacy cover candidate host"
          git push origin HEAD:agent/live-windows-performance-followup-v1
