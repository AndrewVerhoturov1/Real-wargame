name: Agent Docs Integrity

on:
  workflow_dispatch:
  push:
    paths:
      - AGENTS.md
      - README.md
      - package.json
      - docs/ai/**
      - docs/architecture/**
      - docs/subprojects/**
      - .agents/skills/**
      - scripts/agent_docs_*.mjs
      - scripts/generate_agent_docs.mjs
      - scripts/check_agent_docs.mjs
      - .github/pull_request_template.md
      - .github/workflows/agent-docs-integrity.yml
  pull_request:
    paths:
      - AGENTS.md
      - README.md
      - package.json
      - docs/ai/**
      - docs/architecture/**
      - docs/subprojects/**
      - .agents/skills/**
      - scripts/agent_docs_*.mjs
      - scripts/generate_agent_docs.mjs
      - scripts/check_agent_docs.mjs
      - .github/pull_request_template.md
      - .github/workflows/agent-docs-integrity.yml

permissions:
  contents: write

jobs:
  agent-docs-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout isolated branch
        uses: actions/checkout@v4
        with:
          ref: feature/web-chat-repository-v1
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run generator smoke tests
        run: npm run docs:smoke

      - name: Regenerate agent documentation
        run: npm run docs:generate

      - name: Commit generated files when stale
        shell: bash
        run: |
          set -euo pipefail
          git add \
            docs/ai/CURRENT_STATE.md \
            docs/subprojects/index.json \
            docs/subprojects/INDEX.md \
            docs/subprojects/*/STATUS.md
          if git diff --cached --quiet; then
            echo "Generated files are already current."
          else
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git commit -m "docs: refresh generated agent status"
            git push origin HEAD:feature/web-chat-repository-v1
          fi

      - name: Check repository context integrity
        run: npm run docs:check
