name: Deploy Tactical Position Branch to GitHub Pages

on:
  push:
    branches:
      - feature/20260719-tactical-position-system
    paths:
      - '.github/workflows/deploy-tactical-position-pages.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: github-pages-tactical-position
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch commit
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Configure GitHub Pages metadata
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Run required checks and build for Pages
        env:
          REAL_WARGAME_COMMIT_SHA: ${{ github.sha }}
          REAL_WARGAME_BRANCH: ${{ github.ref_name }}
          REAL_WARGAME_BUILD_ID: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          set +e
          {
            npx tsc
            npm run perception-contact-priority:smoke
            npm run tactical-position:smoke
            npm run tactical-query:smoke
            npm run ai-scheduler:smoke
            npm run workspace:smoke
            npx vite build --base="${PAGES_BASE_PATH}/"
            npm run deployment-pages:smoke
            touch dist/.nojekyll
          } > pages-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Pages build failed. Last 180 log lines:"
            tail -n 180 pages-build.log
            exit "$status"
          fi
          tail -n 80 pages-build.log

      - name: Publish built files to gh-pages branch
        env:
          SOURCE_SHA: ${{ github.sha }}
        run: |
          mkdir -p /tmp/real-wargame-pages
          cp -a dist/. /tmp/real-wargame-pages/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          git rm -rf .
          cp -a /tmp/real-wargame-pages/. .
          git add -A
          git commit -m "deploy: tactical positions ${SOURCE_SHA}"
          git push --force origin HEAD:gh-pages

      - name: Configure Pages to publish gh-pages root
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          response_file="$(mktemp)"
          status_code="$(curl --silent --show-error --location \
            --output "$response_file" \
            --write-out '%{http_code}' \
            --request PUT \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GH_REPOSITORY}/pages" \
            --data '{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}')"
          if [ "$status_code" != "204" ]; then
            echo "Unable to select gh-pages as the Pages source. HTTP ${status_code}:"
            cat "$response_file"
            exit 1
          fi
          echo "GitHub Pages source configured: gh-pages /"
