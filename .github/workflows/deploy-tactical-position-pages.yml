name: Deploy Tactical Position Branch to GitHub Pages

on:
  push:
    branches:
      - feature/20260719-tactical-position-system
    paths:
      - '.github/workflows/deploy-tactical-position-pages.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: github-pages-tactical-position
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch commit
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Configure GitHub Pages metadata
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Run required checks and build game plus AI editor
        env:
          REAL_WARGAME_COMMIT_SHA: ${{ github.sha }}
          REAL_WARGAME_BRANCH: ${{ github.ref_name }}
          REAL_WARGAME_BUILD_ID: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          set +e
          {
            npx tsc
            npm run perception-contact-priority:smoke
            npm run tactical-position:smoke
            npm run tactical-query:smoke
            npm run ai-scheduler:smoke
            npm run workspace:smoke
            npm run editor:smoke
            npx vite build --base="${PAGES_BASE_PATH}/"
            test -f dist/index.html
            test -f dist/ai-node-editor.html
            npm run deployment-pages:smoke
            touch dist/.nojekyll
          } > pages-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Pages build failed. Last 220 log lines:"
            tail -n 220 pages-build.log
            exit "$status"
          fi
          tail -n 100 pages-build.log

      - name: Publish complete build to gh-pages branch
        env:
          SOURCE_SHA: ${{ github.sha }}
        run: |
          mkdir -p /tmp/real-wargame-pages
          cp -a dist/. /tmp/real-wargame-pages/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          git rm -rf .
          cp -a /tmp/real-wargame-pages/. .
          git add -A
          git commit -m "deploy: game and AI editor ${SOURCE_SHA}"
          git push --force origin HEAD:gh-pages
