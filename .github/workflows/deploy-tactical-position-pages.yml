name: Deploy Tactical Position Branch to GitHub Pages

on:
  push:
    branches:
      - feature/20260719-tactical-position-system
    paths:
      - '.github/workflows/deploy-tactical-position-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-tactical-position
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch commit
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Run required checks and build for Pages
        env:
          REAL_WARGAME_COMMIT_SHA: ${{ github.sha }}
          REAL_WARGAME_BRANCH: ${{ github.ref_name }}
          REAL_WARGAME_BUILD_ID: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          set +e
          {
            npx tsc
            npm run perception-contact-priority:smoke
            npm run tactical-position:smoke
            npm run tactical-query:smoke
            npm run ai-scheduler:smoke
            npm run workspace:smoke
            npx vite build --base="${PAGES_BASE_PATH}/"
            npm run deployment-pages:smoke
            touch dist/.nojekyll
          } > pages-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Pages build failed. Last 180 log lines:"
            tail -n 180 pages-build.log
            exit "$status"
          fi
          tail -n 80 pages-build.log

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
