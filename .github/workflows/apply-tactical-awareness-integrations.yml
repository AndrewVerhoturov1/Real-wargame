name: Apply tactical awareness integrations

on:
  push:
    branches:
      - real-wargame-preview
    paths:
      - scripts/apply_tactical_awareness_integrations.mjs
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply integrations
        run: node scripts/apply_tactical_awareness_integrations.mjs
      - name: Remove one-time helper
        run: rm scripts/apply_tactical_awareness_integrations.mjs .github/workflows/apply-tactical-awareness-integrations.yml
      - name: Commit integrations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: integrate tactical awareness data model"
          git push origin HEAD:real-wargame-preview
