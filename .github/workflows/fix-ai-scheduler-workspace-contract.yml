name: Fix AI Scheduler Workspace Contract

on:
  push:
    branches:
      - feature/20260719-tactical-position-system
    paths:
      - '.github/workflows/fix-ai-scheduler-workspace-contract.yml'

permissions:
  contents: write

jobs:
  fix-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/20260719-tactical-position-system
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Point scheduler UI contract at canonical workspace implementation
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/ai_per_unit_scheduler_smoke.ts')
          source = path.read_text(encoding='utf-8')
          old = "  const workspaceSource = readFileSync('src/ui/TacticalWorkspace.ts', 'utf8');"
          new = "  const workspaceSource = readFileSync('src/ui/TacticalWorkspaceBase.ts', 'utf8');"
          if old not in source:
              raise SystemExit('stale scheduler workspace source contract not found')
          path.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Install dependencies
        run: npm ci --silent

      - name: Verify scheduler and TypeScript
        run: |
          set -euo pipefail
          npm run ai-scheduler:smoke
          npx tsc

      - name: Commit verified contract fix
        run: |
          rm .github/workflows/fix-ai-scheduler-workspace-contract.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: use canonical workspace in scheduler smoke"
          git push origin HEAD:feature/20260719-tactical-position-system
