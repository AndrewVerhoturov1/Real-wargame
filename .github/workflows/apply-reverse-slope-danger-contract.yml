name: Apply Reverse Slope Danger Contract

on:
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - 'scripts/reverse-slope-canonical-danger.patch'
      - '.github/workflows/apply-reverse-slope-danger-contract.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply focused contract update
        shell: bash
        run: |
          git apply --check scripts/reverse-slope-canonical-danger.patch
          git apply scripts/reverse-slope-canonical-danger.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/reverse_slope_comparative_smoke.ts
          git commit -m "Assert reverse-slope protection through canonical route danger"
          git push origin HEAD:${{ github.head_ref }}
