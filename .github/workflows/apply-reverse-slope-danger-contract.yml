name: Apply Reverse Slope Danger Contract

on:
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - 'scripts/reverse-slope-canonical-danger.patch'
      - '.github/workflows/apply-reverse-slope-danger-contract.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply focused contract update
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/reverse_slope_comparative_smoke.ts')
          text = path.read_text()
          old = "  assert.ok(routeSideCount(flat, 'east') > routeSideCount(flat, 'west'));"
          new = """  assert.ok(
              routeCell(slope, REVERSE).dangerCost < routeCell(flat, REVERSE).dangerCost - 0.1,
              'route dangerCost must inherit the canonical reverse-slope protection instead of preserving the old cone-only route bias',
            );"""
          if old in text:
              path.write_text(text.replace(old, new, 1))
          elif new not in text:
              raise SystemExit('reverse-slope assertion source not found')
          PY
          if git diff --quiet -- scripts/reverse_slope_comparative_smoke.ts; then
            echo "Reverse-slope contract already updated."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/reverse_slope_comparative_smoke.ts
          git commit -m "Assert reverse-slope protection through canonical route danger"
          git push origin HEAD:${{ github.head_ref }}
