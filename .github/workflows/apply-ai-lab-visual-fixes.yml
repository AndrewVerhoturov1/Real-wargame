name: Apply AI lab visual fixes

on:
  workflow_dispatch:
  push:
    branches:
      - real-wargame-preview
    paths:
      - scripts/apply_ai_lab_visual_fixes.mjs
      - .github/workflows/apply-ai-lab-visual-fixes.yml

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: node scripts/apply_ai_lab_visual_fixes.mjs
      - run: rm scripts/apply_ai_lab_visual_fixes.mjs .github/workflows/apply-ai-lab-visual-fixes.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: keep AI lab tools out of the main toolbar"
          git push origin HEAD:real-wargame-preview
