name: Apply Game Editor Type Fix

on:
  push:
    branches:
      - real-wargame-preview
    paths:
      - scripts/apply_game_editor_type_fix.mjs

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply exact patch
        run: |
          node scripts/apply_game_editor_type_fix.mjs
          git diff --check
          rm scripts/apply_game_editor_type_fix.mjs .github/workflows/apply-game-editor-type-fix.yml

      - name: Verify build
        run: |
          npm ci
          npm run build

      - name: Commit fixed source and cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ui/GameEditorWorkbench.ts scripts/apply_game_editor_type_fix.mjs .github/workflows/apply-game-editor-type-fix.yml
          git commit -m "fix: type game editor characteristic controls"
          git push origin HEAD:real-wargame-preview
