name: Apply World Space Movement Contract

on:
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - '.github/workflows/apply-world-space-movement-contract.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Update selected-observer movement evidence
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          test = Path('tests/danger-layer-movement-performance.spec.ts')
          text = test.read_text()
          text = text.replace(
              "test('selected unit movement changes observer-relative memory but performs local-only updates', async ({ page }) => {",
              "test('selected unit movement preserves world-space threat memory and performs local-only updates', async ({ page }) => {",
              1,
          )
          old = """  const observerRelativeMemoryChanged = angularDifference(
              after.subjectiveThreatDirectionDegrees ?? 0,
              before.subjectiveThreatDirectionDegrees ?? 0,
            ) > 0.5 || Math.abs(
              (after.subjectiveThreatRangeCells ?? 0) - (before.subjectiveThreatRangeCells ?? 0),
            ) > 0.1;
            expect(observerRelativeMemoryChanged).toBe(true);
          """
          new = """  const worldSpaceMemoryStable = angularDifference(
              after.subjectiveThreatDirectionDegrees ?? 0,
              before.subjectiveThreatDirectionDegrees ?? 0,
            ) <= 0.5 && Math.abs(
              (after.subjectiveThreatRangeCells ?? 0) - (before.subjectiveThreatRangeCells ?? 0),
            ) <= 0.1;
            expect(worldSpaceMemoryStable).toBe(true);
          """
          if old not in text:
              raise SystemExit('selected movement comparison source not found')
          text = text.replace(old, new, 1)
          text = text.replace('      observerRelativeMemoryChanged,', '      worldSpaceMemoryStable,', 1)
          test.write_text(text)

          assertion = Path('scripts/assert_danger_layer_movement_evidence.mjs')
          text = assertion.read_text()
          old = "  if (counters.observerRelativeMemoryChanged !== true) failures.push('selected-only did not exercise observer-relative memory changes');"
          new = "  if (counters.worldSpaceMemoryStable !== true) failures.push('selected-only changed world-space threat memory during observer-only movement');"
          if old not in text:
              raise SystemExit('movement evidence assertion source not found')
          assertion.write_text(text.replace(old, new, 1))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/danger-layer-movement-performance.spec.ts scripts/assert_danger_layer_movement_evidence.mjs
          git commit -m "Align movement evidence with world-space threat memory"
          git push origin HEAD:${{ github.head_ref }}
