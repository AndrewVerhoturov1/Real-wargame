name: Apply Performance v6 payload

on:
  push:
    branches:
      - agent/performance-report-v6-observability
    paths:
      - artifacts/tmp/perf-v6/**
      - .github/workflows/apply-performance-v6-payload.yml
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - artifacts/tmp/perf-v6/**
      - .github/workflows/apply-performance-v6-payload.yml

permissions:
  contents: write

env:
  PAYLOAD_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
  PAYLOAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}

concurrency:
  group: apply-performance-v6-payload-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout payload head
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PAYLOAD_HEAD_SHA }}
          fetch-depth: 0
      - name: Restore optimized source files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp-performance-v6-payload
          cat \
            artifacts/tmp/perf-v6/PerformanceCaptureV6.ts.gz.b64.part1 \
            artifacts/tmp/perf-v6/PerformanceCaptureV6.ts.gz.b64.part2a \
            artifacts/tmp/perf-v6/PerformanceCaptureV6.ts.gz.b64.part2b \
            artifacts/tmp/perf-v6/PerformanceCaptureV6.ts.gz.b64.part2c \
            | tr -d '\r\n\t ' | base64 --decode > .tmp-performance-v6-payload/capture.gz
          tr -d '\r\n\t ' < artifacts/tmp/perf-v6/PerformanceMonitor.ts.gz.b64 | base64 --decode > .tmp-performance-v6-payload/monitor.gz
          gzip --test .tmp-performance-v6-payload/capture.gz
          gzip --test .tmp-performance-v6-payload/monitor.gz
          gzip --decompress --stdout .tmp-performance-v6-payload/capture.gz > src/core/debug/PerformanceCaptureV6.ts
          gzip --decompress --stdout .tmp-performance-v6-payload/monitor.gz > src/core/debug/PerformanceMonitor.ts
          grep -q 'buildReportInternal' src/core/debug/PerformanceCaptureV6.ts
          grep -q 'requestIdleCallback' src/core/debug/PerformanceMonitor.ts
          rm -rf .tmp-performance-v6-payload
      - name: Install and verify
        run: |
          npm ci
          npm run build
          npm run performance-report-v6:smoke
          node scripts/performance_report_contract_smoke.mjs
          npm run performance-contract:smoke
      - name: Publish verified source and remove transport files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf artifacts/tmp/perf-v6
          rm -f .github/workflows/apply-performance-v6-payload.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'perf: finalize bounded report v6 capture runtime'
          git push origin HEAD:${PAYLOAD_BRANCH}
