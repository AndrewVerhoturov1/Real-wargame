name: Apply AI Test Selection Fix

on:
  push:
    branches:
      - real-wargame-preview
    paths:
      - scripts/apply_ai_test_selection_fix.mjs

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply exact source patches
        run: node scripts/apply_ai_test_selection_fix.mjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify AI test lab
        run: npm run lab:smoke

      - name: Verify production build
        run: npm run build

      - name: Commit patched integrations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/input/BoardInputController.ts src/ui/AiTestLabControls.ts src/rendering/PixiApp.ts
          git commit -m "fix: make threats and covers directly selectable"
          git push origin HEAD:real-wargame-preview
