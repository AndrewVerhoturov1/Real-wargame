name: Agent Performance Attribution Follow-up

on:
  push:
    branches:
      - agent/live-windows-performance-followup-v1

permissions:
  contents: write

concurrency:
  group: agent-performance-attribution-followup
  cancel-in-progress: false

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: agent/live-windows-performance-followup-v1
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply targeted follow-up
        run: python3 scripts/agent_performance_attribution_followup_apply.py
      - name: Install dependencies
        run: npm ci
      - name: Verify source and focused contracts
        run: |
          npx tsc --noEmit
          npm run build
          node scripts/performance_report_contract_smoke.mjs
          npm run shared-visibility-vegetation:smoke
          npm run perception-performance:smoke
          npm run danger-layer-performance:smoke
          npm run ai-scheduler:smoke
      - name: Commit verified result
        run: |
          rm scripts/agent_performance_attribution_followup_apply.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "perf: refine application attribution and dynamic geometry reuse"
          git push origin HEAD:agent/live-windows-performance-followup-v1
