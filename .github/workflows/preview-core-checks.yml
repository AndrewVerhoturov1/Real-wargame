name: Preview Core Checks

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-preview-core:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run preserved preview core matrix
        run: |
          npm run workspace:smoke
          npm run lab:smoke
          npm run game-editor:smoke
          npm run editor:smoke
          npm run engine:smoke
          npm run validate:ai-graph
          npm run runtime:smoke
          npm run runtime-session:smoke
          npm run runtime-snapshot:smoke
          npm run runtime-scene:smoke
          npm run event-queue:smoke
          npm run lifecycle:smoke
          npm run composite:smoke
          npm run reload:smoke
          npm run move-bridge:smoke
          npm run route-status:smoke
          npm run pathfinding:smoke
          npm run routed-move:smoke
          npm run map-revision:smoke
          npm run map-resolution:smoke
          npm run map-grid-lod:smoke
          npm run smooth-terrain:smoke
          npm run spatial-index:smoke
          npm run visibility-probe:smoke
          npm run awareness-field:smoke
      - run: npm run build
