name: Preview Core Checks

on:
  push:
    branches:
      - real-wargame-preview
      - feat/ai-graph-v2-contracts-subgraphs-2026-07-13
  pull_request:
    branches:
      - real-wargame-preview
  workflow_dispatch:

jobs:
  core-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        id: install
        continue-on-error: true
        run: npm ci

      - name: Tactical workspace smoke
        id: workspace
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run workspace:smoke

      - name: AI test lab smoke
        id: lab
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run lab:smoke

      - name: Unified game editor smoke
        id: game_editor
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run game-editor:smoke

      - name: AI node editor smoke
        id: editor
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run editor:smoke

      - name: Local AI engine smoke
        id: engine
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run engine:smoke

      - name: Validate bundled AI graph
        id: graph
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run validate:ai-graph

      - name: Stateful AI runtime smoke
        id: runtime
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run runtime:smoke

      - name: AI runtime session smoke
        id: runtime_session
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run runtime-session:smoke

      - name: AI runtime snapshot smoke
        id: runtime_snapshot
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run runtime-snapshot:smoke

      - name: AI runtime scene integration smoke
        id: runtime_scene
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run runtime-scene:smoke

      - name: AI event queue smoke
        id: event_queue
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run event-queue:smoke

      - name: AI action lifecycle smoke
        id: lifecycle
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run lifecycle:smoke

      - name: AI composite runtime smoke
        id: composite
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run composite:smoke

      - name: AI reload runtime smoke
        id: reload
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run reload:smoke

      - name: Stateful AI movement bridge smoke
        id: move_bridge
        if: steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run move-bridge:smoke 2>&1 | tee move-bridge.log

      - name: Upload movement bridge smoke log
        if: always() && steps.install.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: preview-core-move-bridge-log
          path: move-bridge.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Reactive route status smoke
        id: route_status
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run route-status:smoke

      - name: Grid pathfinding smoke
        id: pathfinding
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run pathfinding:smoke

      - name: Routed movement smoke
        id: routed_move
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run routed-move:smoke

      - name: Map revision smoke
        id: map_revision
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run map-revision:smoke

      - name: Map resolution migration smoke
        id: map_resolution
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run map-resolution:smoke

      - name: Map grid LOD smoke
        id: map_grid_lod
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run map-grid-lod:smoke

      - name: Smooth terrain cache smoke
        id: smooth_terrain
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run smooth-terrain:smoke

      - name: Spatial index smoke
        id: spatial_index
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run spatial-index:smoke

      - name: Visibility probe cache smoke
        id: visibility_probe
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run visibility-probe:smoke

      - name: Awareness field cache smoke
        id: awareness_field
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run awareness-field:smoke

      - name: Production build
        id: build
        if: steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Upload build log
        if: always() && steps.install.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: preview-core-build-log
          path: build.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Publish commit statuses and fail on real check errors
        if: always()
        uses: actions/github-script@v7
        env:
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          WORKSPACE_OUTCOME: ${{ steps.workspace.outcome }}
          LAB_OUTCOME: ${{ steps.lab.outcome }}
          GAME_EDITOR_OUTCOME: ${{ steps.game_editor.outcome }}
          EDITOR_OUTCOME: ${{ steps.editor.outcome }}
          ENGINE_OUTCOME: ${{ steps.engine.outcome }}
          GRAPH_OUTCOME: ${{ steps.graph.outcome }}
          RUNTIME_OUTCOME: ${{ steps.runtime.outcome }}
          RUNTIME_SESSION_OUTCOME: ${{ steps.runtime_session.outcome }}
          RUNTIME_SNAPSHOT_OUTCOME: ${{ steps.runtime_snapshot.outcome }}
          RUNTIME_SCENE_OUTCOME: ${{ steps.runtime_scene.outcome }}
          EVENT_QUEUE_OUTCOME: ${{ steps.event_queue.outcome }}
          LIFECYCLE_OUTCOME: ${{ steps.lifecycle.outcome }}
          COMPOSITE_OUTCOME: ${{ steps.composite.outcome }}
          RELOAD_OUTCOME: ${{ steps.reload.outcome }}
          MOVE_BRIDGE_OUTCOME: ${{ steps.move_bridge.outcome }}
          ROUTE_STATUS_OUTCOME: ${{ steps.route_status.outcome }}
          PATHFINDING_OUTCOME: ${{ steps.pathfinding.outcome }}
          ROUTED_MOVE_OUTCOME: ${{ steps.routed_move.outcome }}
          MAP_REVISION_OUTCOME: ${{ steps.map_revision.outcome }}
          MAP_RESOLUTION_OUTCOME: ${{ steps.map_resolution.outcome }}
          MAP_GRID_LOD_OUTCOME: ${{ steps.map_grid_lod.outcome }}
          SMOOTH_TERRAIN_OUTCOME: ${{ steps.smooth_terrain.outcome }}
          SPATIAL_INDEX_OUTCOME: ${{ steps.spatial_index.outcome }}
          VISIBILITY_PROBE_OUTCOME: ${{ steps.visibility_probe.outcome }}
          AWARENESS_FIELD_OUTCOME: ${{ steps.awareness_field.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        with:
          script: |
            const outcomes = {
              install: process.env.INSTALL_OUTCOME,
              workspace: process.env.WORKSPACE_OUTCOME,
              lab: process.env.LAB_OUTCOME,
              game_editor: process.env.GAME_EDITOR_OUTCOME,
              editor: process.env.EDITOR_OUTCOME,
              engine: process.env.ENGINE_OUTCOME,
              graph: process.env.GRAPH_OUTCOME,
              runtime: process.env.RUNTIME_OUTCOME,
              runtime_session: process.env.RUNTIME_SESSION_OUTCOME,
              runtime_snapshot: process.env.RUNTIME_SNAPSHOT_OUTCOME,
              runtime_scene: process.env.RUNTIME_SCENE_OUTCOME,
              event_queue: process.env.EVENT_QUEUE_OUTCOME,
              lifecycle: process.env.LIFECYCLE_OUTCOME,
              composite: process.env.COMPOSITE_OUTCOME,
              reload: process.env.RELOAD_OUTCOME,
              move_bridge: process.env.MOVE_BRIDGE_OUTCOME,
              route_status: process.env.ROUTE_STATUS_OUTCOME,
              pathfinding: process.env.PATHFINDING_OUTCOME,
              routed_move: process.env.ROUTED_MOVE_OUTCOME,
              map_revision: process.env.MAP_REVISION_OUTCOME,
              map_resolution: process.env.MAP_RESOLUTION_OUTCOME,
              map_grid_lod: process.env.MAP_GRID_LOD_OUTCOME,
              smooth_terrain: process.env.SMOOTH_TERRAIN_OUTCOME,
              spatial_index: process.env.SPATIAL_INDEX_OUTCOME,
              visibility_probe: process.env.VISIBILITY_PROBE_OUTCOME,
              awareness_field: process.env.AWARENESS_FIELD_OUTCOME,
              build: process.env.BUILD_OUTCOME,
            };
            const targetUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            for (const [name, value] of Object.entries(outcomes)) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: context.sha,
                state: value === 'success' ? 'success' : 'failure',
                context: `preview-core/${name}`,
                description: `${name}: ${value}`,
                target_url: targetUrl,
              });
            }
            const passed = Object.values(outcomes).every((value) => value === 'success');
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'preview-core-checks',
              description: Object.entries(outcomes).map(([key, value]) => `${key}:${value}`).join(' ').slice(0, 140),
              target_url: targetUrl,
            });
            if (!passed) core.setFailed(`One or more core checks failed: ${JSON.stringify(outcomes)}`);

  apply-graph-v2:
    if: contains(github.event.head_commit.message, 'run current-base Graph v2 transfer')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Reconstruct verified Graph v2 patch
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_COMMIT: 7421b7055d724e677695393f68a9fe20e9f94e2f
        shell: bash
        run: |
          set -euo pipefail
          : > /tmp/graph-v2.b64
          for number in $(seq -w 0 21); do
            curl --fail --silent --show-error --location \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.raw+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/.graph-v2-upload/part-${number}?ref=${SOURCE_COMMIT}" \
              >> /tmp/graph-v2.b64
          done
          base64 --decode /tmp/graph-v2.b64 > /tmp/graph-v2.patch.xz
          echo 'b1c7fb96af12b4f451e7e6181e2a8710afe8b40d99d88822fc7f3eac5bf99ae4  /tmp/graph-v2.patch.xz' | sha256sum --check
          xz --decompress --stdout /tmp/graph-v2.patch.xz > /tmp/graph-v2.patch

      - name: Materialize verified old result
        shell: bash
        run: |
          set -euo pipefail
          git worktree add --detach /tmp/graph-v2-old 25a0c50aca1b76bea11b0146ee210a76d9e4793a
          git -C /tmp/graph-v2-old apply /tmp/graph-v2.patch

      - name: Apply non-conflicting Graph v2 files
        shell: bash
        run: |
          set -euo pipefail
          git apply --index \
            --exclude=package.json \
            --exclude=docs/ai/CURRENT_STATE.md \
            --exclude=docs/subprojects/INDEX.md \
            --exclude=docs/subprojects/ai-single-unit-editor/JOURNAL.md \
            --exclude=docs/subprojects/ai-single-unit-editor/STATUS.md \
            --exclude=docs/subprojects/ai-single-unit-editor/subproject.json \
            --exclude=docs/subprojects/index.json \
            --exclude=.github/workflows/export-ai-graph-v2-source.yml \
            /tmp/graph-v2.patch

      - name: Merge package and current-state documentation
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const graphScripts = ['graph-v2:smoke','runtime-modifiers:smoke','subgraph:smoke','node-contract-ui:smoke','ai-graph:migrate','graph-v2-scenario:smoke'];
          const currentPackage = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const oldPackage = JSON.parse(fs.readFileSync('/tmp/graph-v2-old/package.json', 'utf8'));
          for (const name of graphScripts) currentPackage.scripts[name] = oldPackage.scripts[name];
          fs.writeFileSync('package.json', `${JSON.stringify(currentPackage, null, 2)}\n`);

          const subprojectPath = 'docs/subprojects/ai-single-unit-editor/subproject.json';
          const current = JSON.parse(fs.readFileSync(subprojectPath, 'utf8'));
          const old = JSON.parse(fs.readFileSync(`/tmp/graph-v2-old/${subprojectPath}`, 'utf8'));
          current.updated_at = '2026-07-13';
          current.current_focus = 'View and Memory Heatmap v1 и управление направлением бойца сохранены из актуальной preview-базы. Поверх них в изолированной ветке реализован этап 3 Graph v2: единый реестр контрактов, типизированные порты, строгая проверка, безопасная миграция v1, области памяти, четыре сохраняемых подграфа и русский интерфейс редактора. Идёт повторная полная и обязательная визуальная проверка на актуальной базе; real-wargame-preview не изменена.';
          current.next_step = 'Завершить полный набор smoke/build и обязательную browser/PNG-проверку итогового commit SHA. После отчёта ждать отдельной прямой команды пользователя на перенос в real-wargame-preview.';
          for (const key of ['main_files','test_files','manual_docs','suggested_verification','safety_rules','known_limits']) {
            current[key] ??= [];
            for (const item of old[key] ?? []) if (!current[key].includes(item)) current[key].push(item);
          }
          fs.writeFileSync(subprojectPath, `${JSON.stringify(current, null, 2)}\n`);

          const journalPath = 'docs/subprojects/ai-single-unit-editor/JOURNAL.md';
          let journal = fs.readFileSync(journalPath, 'utf8').trimEnd();
          const entries = [
            '- **2026-07-12**: Completed Soldier Perception and Attention v1: hybrid attention modes, progressive forest visibility, evidence accumulation, approximate sound contacts, subjective Blackboard integration, profile editor, cached PixiJS overlay and exact-SHA real-Chrome verification. Transferred to `real-wargame-preview` through PR #70 as `5deb899673c7b6e57b9089ecf890699f6d617a9a`. See `journal/2026-07-12-perception-attention-v1.md`.',
            '- **2026-07-13**: Refined visibility controls and final facing: dark unseen-cell mask, compact legend, corrected cache diagnostics, one-shot turn tool, manual attention modes and final-facing preservation through route replanning and SimulationTick. See `journal/2026-07-13-visibility-controls-facing.md`.',
            '- **2026-07-13**: На изолированной ветке `feat/ai-graph-v2-contracts-subgraphs-2026-07-13` реализован этап 3: единый реестр контрактов, типизированные порты, строгая Graph v2 validation, безопасная идемпотентная миграция v1, пять областей памяти, `WaitForEvent`/`Timeout`/bounded `Retry`, четыре статических подграфа и их сохраняемый вложенный runtime. Редактор получил no-JSON параметры, блокировку неверных соединений, миграцию, breadcrumb подграфов и кликабельные русские ошибки; debug показывает подграф, путь и области памяти. Добавлен сквозной `shot_nearby → take_cover → snapshot/restore → move_and_observe` smoke. Перенос в preview не выполнялся.'
          ];
          for (const entry of entries) if (!journal.includes(entry)) journal += `\n${entry}`;
          fs.writeFileSync(journalPath, `${journal}\n`);
          NODE
          rm -f .github/workflows/export-ai-graph-v2-source.yml
          rm -f .github/workflows/apply-graph-v2-current-base.yml
          git show origin/real-wargame-preview:.github/workflows/preview-core-checks.yml > .github/workflows/preview-core-checks.yml

      - name: Install and synchronize documentation
        run: |
          npm ci
          npm run docs:sync

      - name: Verify integrated Graph v2
        run: |
          npm run graph-v2:smoke
          npm run runtime-modifiers:smoke
          npm run subgraph:smoke
          npm run graph-v2-scenario:smoke
          npm run node-contract-ui:smoke
          npm run editor:smoke
          npm run runtime-session:smoke
          npm run runtime-snapshot:smoke
          npm run runtime-scene:smoke
          npm run view-memory-heatmap:smoke
          npm run view-memory-heatmap-performance:smoke
          npm run build

      - name: Commit integrated result
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'feat(ai): add Graph v2 typed contracts and subgraphs'
          git push origin HEAD:feat/ai-graph-v2-contracts-subgraphs-2026-07-13
