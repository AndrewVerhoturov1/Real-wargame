name: Preview Core Checks

on:
  push:
    branches:
      - real-wargame-preview
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

jobs:
  graph-ownership-refactor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout preview
        uses: actions/checkout@v4
        with:
          ref: real-wargame-preview
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply refactor and run code checks
        id: verify
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            npm ci
            sed -i 's/if count != 1:/if count < 1:/' scripts/refactor_graph_ownership.py
            python3 scripts/refactor_graph_ownership.py
            python3 - <<'PY'
          from pathlib import Path
          import re
          path = Path('scripts/ai_graph_ownership_smoke.ts')
          text = path.read_text(encoding='utf-8')
          match = re.search(r'\nclass MemoryStorage \{.*\n\}\n?$', text, flags=re.S)
          if not match:
              raise SystemExit('MemoryStorage test helper not found')
          block = match.group(0).strip()
          text = text[:match.start()].rstrip() + '\n'
          text = text.replace("const GRAPH_STORAGE_KEY", block + "\n\nconst GRAPH_STORAGE_KEY", 1)
          path.write_text(text, encoding='utf-8')
          PY
            npm run graph-v2:smoke
            npm run subgraph:smoke
            npm run state-machine:smoke
            npm run state-plan-scenario:smoke
            npm run move-bridge:smoke
            npm run build
          } 2>&1 | tee graph-ownership-refactor.log

      - name: Commit verified result directly to preview
        if: steps.verify.outcome == 'success'
        run: |
          git checkout HEAD^ -- .github/workflows/preview-core-checks.yml
          rm -f .github/workflows/graph-owned-state-plan-refactor-temp.yml
          rm -f scripts/refactor_graph_ownership.py
          rm -f graph-ownership-refactor.log graph-ownership-refactor-failure.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(ai): make Graph v2 sole behavior authority"
          git push origin HEAD:real-wargame-preview

      - name: Record failure diagnostics
        if: steps.verify.outcome != 'success'
        run: |
          mv -f graph-ownership-refactor.log graph-ownership-refactor-failure.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add graph-ownership-refactor-failure.log
          git commit -m "chore: update graph ownership refactor failure"
          git push origin HEAD:real-wargame-preview
          exit 1
