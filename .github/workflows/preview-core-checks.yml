name: Preview Core Checks

on:
  push:
    branches:
      - real-wargame-preview
  pull_request:
    branches:
      - real-wargame-preview
  workflow_dispatch:

jobs:
  core-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        id: install
        continue-on-error: true
        run: npm ci

      - name: Tactical workspace smoke
        id: workspace
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run workspace:smoke

      - name: AI test lab smoke
        id: lab
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run lab:smoke

      - name: Unified game editor smoke
        id: game_editor
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run game-editor:smoke

      - name: AI node editor smoke
        id: editor
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run editor:smoke

      - name: Local AI engine smoke
        id: engine
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run engine:smoke

      - name: Validate bundled AI graph
        id: graph
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run validate:ai-graph

      - name: Stateful AI runtime smoke
        id: runtime
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run runtime:smoke

      - name: Stateful AI movement bridge smoke
        id: move_bridge
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run move-bridge:smoke

      - name: Production build
        id: build
        if: steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Upload build log
        if: always() && steps.install.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: preview-core-build-log
          path: build.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Publish commit statuses
        if: always()
        uses: actions/github-script@v7
        env:
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          WORKSPACE_OUTCOME: ${{ steps.workspace.outcome }}
          LAB_OUTCOME: ${{ steps.lab.outcome }}
          GAME_EDITOR_OUTCOME: ${{ steps.game_editor.outcome }}
          EDITOR_OUTCOME: ${{ steps.editor.outcome }}
          ENGINE_OUTCOME: ${{ steps.engine.outcome }}
          GRAPH_OUTCOME: ${{ steps.graph.outcome }}
          RUNTIME_OUTCOME: ${{ steps.runtime.outcome }}
          MOVE_BRIDGE_OUTCOME: ${{ steps.move_bridge.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        with:
          script: |
            const outcomes = {
              install: process.env.INSTALL_OUTCOME,
              workspace: process.env.WORKSPACE_OUTCOME,
              lab: process.env.LAB_OUTCOME,
              game_editor: process.env.GAME_EDITOR_OUTCOME,
              editor: process.env.EDITOR_OUTCOME,
              engine: process.env.ENGINE_OUTCOME,
              graph: process.env.GRAPH_OUTCOME,
              runtime: process.env.RUNTIME_OUTCOME,
              move_bridge: process.env.MOVE_BRIDGE_OUTCOME,
              build: process.env.BUILD_OUTCOME,
            };
            const targetUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            for (const [name, value] of Object.entries(outcomes)) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: context.sha,
                state: value === 'success' ? 'success' : 'failure',
                context: `preview-core/${name}`,
                description: `${name}: ${value}`,
                target_url: targetUrl,
              });
            }
            const passed = Object.values(outcomes).every((value) => value === 'success');
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'preview-core-checks',
              description: Object.entries(outcomes).map(([key, value]) => `${key}:${value}`).join(' ').slice(0, 140),
              target_url: targetUrl,
            });

      - name: Fail workflow when a check failed
        if: >-
          always() && (
            steps.install.outcome != 'success' ||
            steps.workspace.outcome != 'success' ||
            steps.lab.outcome != 'success' ||
            steps.game_editor.outcome != 'success' ||
            steps.editor.outcome != 'success' ||
            steps.engine.outcome != 'success' ||
            steps.graph.outcome != 'success' ||
            steps.runtime.outcome != 'success' ||
            steps.move_bridge.outcome != 'success' ||
            steps.build.outcome != 'success'
          )
        run: exit 1

  sync-web-chat-context:
    if: github.event_name == 'pull_request' && github.head_ref == 'feature/web-chat-repository-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout isolated branch
        uses: actions/checkout@v4
        with:
          ref: feature/web-chat-repository-v1
          fetch-depth: 0

      - name: Restore saved web-chat context on latest preview
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_COMMIT=de00657c1cc2bb0960f4b6cfb5b07bf1c1524746
          git fetch origin "$SOURCE_COMMIT"
          git checkout "$SOURCE_COMMIT" -- \
            .agents/skills/real-wargame-ai-runtime/SKILL.md \
            .agents/skills/real-wargame-pixijs/SKILL.md \
            .github/pull_request_template.md \
            .github/workflows/agent-docs-integrity.yml \
            AGENTS.md \
            README.md \
            docs/ai/AGENT_START_HERE.md \
            docs/ai/EXTERNAL_CHAT_WORKFLOW.md \
            docs/ai/PIXIJS_SKILLS_INDEX.md \
            docs/ai/PR_REVIEW_CHECKLIST.md \
            docs/ai/SKILLS_INDEX.md \
            docs/ai/TASK_PACK_Q_TEMPLATE.md \
            docs/ai/TASK_ROUTER.md \
            docs/ai/WEB_CHAT_START.md \
            docs/ai/WORKFLOW_OVERVIEW.md \
            docs/ai/repo-context.json \
            docs/architecture/MODULE_MAP.md \
            docs/architecture/OVERVIEW.md \
            docs/subprojects/README.md \
            docs/subprojects/ai-single-unit-editor/HANDOFF.md \
            docs/subprojects/ai-single-unit-editor/SUBPROJECT.md \
            docs/subprojects/github-collaboration/SUBPROJECT.md \
            docs/subprojects/github-collaboration/subproject.json \
            docs/subprojects/real-wargame-start/SUBPROJECT.md \
            docs/subprojects/real-wargame-start/subproject.json \
            docs/subprojects/repo-migration/subproject.json \
            docs/superpowers/plans/2026-07-12-web-chat-repository-v1.md \
            docs/superpowers/specs/2026-07-12-web-chat-repository-v1-design.md \
            scripts/agent_docs_lib.mjs \
            scripts/agent_docs_markdown_links.mjs \
            scripts/agent_docs_smoke.mjs \
            scripts/agent_docs_validation.mjs \
            scripts/check_agent_docs.mjs \
            scripts/generate_agent_docs.mjs

      - name: Merge latest package and AI metadata contracts
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises';

          const packagePath = 'package.json';
          const packageJson = JSON.parse(await readFile(packagePath, 'utf8'));
          packageJson.scripts['docs:generate'] = 'node scripts/generate_agent_docs.mjs';
          packageJson.scripts['docs:check'] = 'node scripts/check_agent_docs.mjs';
          packageJson.scripts['docs:smoke'] = 'node scripts/agent_docs_smoke.mjs';
          packageJson.scripts['docs:sync'] = 'npm run docs:generate && npm run docs:check';
          await writeFile(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`);

          const metadataPath = 'docs/subprojects/ai-single-unit-editor/subproject.json';
          const metadata = JSON.parse(await readFile(metadataPath, 'utf8'));
          metadata.status = 'active';
          metadata.updated_at = '2026-07-12';
          metadata.next_step = 'Реализовать Reactive Abort + Route Status v1: реактивно отменять или перестраивать движение при новом приказе, исчезновении укрытия, блокировке маршрута или критическом изменении угрозы; затем добавить настоящий grid pathfinder.';
          metadata.canonical_launcher = 'Run-Real-Wargame-Lab.bat';
          metadata.last_verified_commit = metadata.last_verified_app_commit;
          metadata.must_read_first = [
            'docs/subprojects/ai-single-unit-editor/STATUS.md',
            'docs/ai/WEB_CHAT_START.md',
            '.agents/skills/real-wargame-ai-runtime/SKILL.md',
            ...metadata.must_read_first.filter((item) => ![
              'docs/subprojects/ai-single-unit-editor/STATUS.md',
              'docs/ai/WEB_CHAT_START.md',
              '.agents/skills/real-wargame-ai-runtime/SKILL.md'
            ].includes(item))
          ];
          await writeFile(metadataPath, `${JSON.stringify(metadata, null, 2)}\n`);
          NODE

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate and verify context
        run: |
          npm run docs:smoke
          npm run docs:generate
          npm run docs:check
          npm run build

      - name: Commit synchronized non-workflow files
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/agent-docs-integrity.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "chore: sync web-chat context onto latest preview"
          git push origin HEAD:feature/web-chat-repository-v1
