name: Preview Core Checks

on:
  push:
    branches:
      - real-wargame-preview
  workflow_dispatch:

jobs:
  core-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      statuses: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply pending AI lab visual fixes
        id: visual_fix
        if: ${{ hashFiles('scripts/apply_ai_lab_visual_fixes.mjs') != '' }}
        shell: bash
        run: |
          set -o pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply_ai_lab_visual_fixes.mjs')
          lines = path.read_text(encoding='utf-8').splitlines()
          for index, line in enumerate(lines):
              if 'const nextRenderKey = \\`' in line:
                  lines[index] = "'    const nextRenderKey = `${nextSelectionKey}|${runtime.open}|${runtime.activePanel}|${runtime.tool}|${runtime.awarenessMode}`;',"
          path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          node scripts/apply_ai_lab_visual_fixes.mjs 2>&1 | tee visual-fix.log
          rm scripts/apply_ai_lab_visual_fixes.mjs .github/workflows/apply-ai-lab-visual-fixes.yml
          git show f90f3ff08c4f26bf60c282f93b5d88490178a4b3:.github/workflows/preview-core-checks.yml > .github/workflows/preview-core-checks.yml

      - name: Upload visual fix diagnostics
        if: ${{ always() && hashFiles('visual-fix.log') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ai-lab-visual-fix-log
          path: visual-fix.log
          retention-days: 2

      - name: Publish AI lab visual fixes
        if: steps.visual_fix.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: keep AI lab tools out of the main toolbar"
          git push origin HEAD:real-wargame-preview

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        id: install
        continue-on-error: true
        run: npm ci

      - name: AI test lab smoke
        id: lab
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run lab:smoke

      - name: Unified game editor smoke
        id: game_editor
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run game-editor:smoke

      - name: AI node editor smoke
        id: editor
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run editor:smoke

      - name: Local AI engine smoke
        id: engine
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run engine:smoke

      - name: Validate bundled AI graph
        id: graph
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run validate:ai-graph

      - name: Production build
        id: build
        if: steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Upload build log
        if: always() && steps.install.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: preview-core-build-log
          path: build.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Publish commit statuses
        if: always()
        uses: actions/github-script@v7
        env:
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          LAB_OUTCOME: ${{ steps.lab.outcome }}
          GAME_EDITOR_OUTCOME: ${{ steps.game_editor.outcome }}
          EDITOR_OUTCOME: ${{ steps.editor.outcome }}
          ENGINE_OUTCOME: ${{ steps.engine.outcome }}
          GRAPH_OUTCOME: ${{ steps.graph.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        with:
          script: |
            const outcomes = {
              install: process.env.INSTALL_OUTCOME,
              lab: process.env.LAB_OUTCOME,
              game_editor: process.env.GAME_EDITOR_OUTCOME,
              editor: process.env.EDITOR_OUTCOME,
              engine: process.env.ENGINE_OUTCOME,
              graph: process.env.GRAPH_OUTCOME,
              build: process.env.BUILD_OUTCOME,
            };
            const targetUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            for (const [name, value] of Object.entries(outcomes)) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: context.sha,
                state: value === 'success' ? 'success' : 'failure',
                context: `preview-core/${name}`,
                description: `${name}: ${value}`,
                target_url: targetUrl,
              });
            }
            const passed = Object.values(outcomes).every((value) => value === 'success');
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'preview-core-checks',
              description: Object.entries(outcomes).map(([key, value]) => `${key}:${value}`).join(' ').slice(0, 140),
              target_url: targetUrl,
            });

      - name: Fail workflow when a check failed
        if: >-
          always() && (
            steps.install.outcome != 'success' ||
            steps.lab.outcome != 'success' ||
            steps.game_editor.outcome != 'success' ||
            steps.editor.outcome != 'success' ||
            steps.engine.outcome != 'success' ||
            steps.graph.outcome != 'success' ||
            steps.build.outcome != 'success'
          )
        run: exit 1
