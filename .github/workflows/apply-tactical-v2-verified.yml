name: Apply Verified Tactical Position V2

on:
  push:
    branches:
      - feature/20260719-tactical-position-system
    paths:
      - '.github/workflows/apply-tactical-v2-verified.yml'
      - 'scripts/apply_tactical_v2_verified.py'

permissions:
  contents: write

concurrency:
  group: apply-verified-tactical-v2
  cancel-in-progress: true

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/20260719-tactical-position-system
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --silent
      - name: Apply product patch
        run: python scripts/apply_tactical_v2_verified.py
      - name: TypeScript
        run: npx tsc
      - name: Tactical search integration
        run: node scripts/tactical_position_search_smoke.mjs
      - name: Tactical tuning and exact arrival posture
        run: node scripts/tactical_position_tuning_smoke.mjs
      - name: Moving request service lifecycle
        run: node scripts/tactical_position_request_service_smoke.mjs
      - name: Objective metrics and ranking
        run: node scripts/tactical_position_objective_smoke.mjs
      - name: Tactical query
        run: npm run tactical-query:smoke
      - name: Workspace and positions tab
        run: npm run workspace:smoke
      - name: AI editor and tactical profiles
        run: npm run editor:smoke
      - name: Build game and AI editor
        run: npx vite build --base="/Real-wargame/"
      - name: Verify deployment pages
        run: npm run deployment-pages:smoke
      - name: Verify both built files
        run: |
          test -s dist/index.html
          test -s dist/ai-node-editor.html
      - name: Commit verified product changes
        run: |
          rm -f scripts/apply_tactical_v2_verified.py
          rm -f .github/workflows/apply-tactical-v2-verified.yml
          rm -f .github/workflows/diagnose-tactical-request-service.yml
          rm -rf docs/debug
          rm -f finalize-v2.log objective-red.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: complete tactical positions and AI editor integration"
          git push origin HEAD:feature/20260719-tactical-position-system