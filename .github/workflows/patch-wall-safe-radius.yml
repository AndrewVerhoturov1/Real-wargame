name: Patch Wall Safe Radius Fixture

on:
  push:
    branches:
      - agent/danger-layer-moving-units-performance

permissions:
  contents: write

jobs:
  patch-fixture:
    if: github.event.head_commit.message == 'Trigger wall safe-radius patch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/danger-layer-moving-units-performance
      - name: Extend accepted segmented wall beyond local safe radius
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/testing/DangerLayerMovementPerformanceHarness.ts')
          text = path.read_text(encoding='utf-8')
          old = """  const wallX = Math.floor(observer.position.x + 3.5);
  const wallStartY = Math.floor(observer.position.y) - 3;
  state.map.objects.push(...Array.from({ length: 7 }, (_, index) => ({
    id: `${WALL_ID}-${index}`,
    kind: 'structure' as const,
    x: wallX,
    y: wallStartY + index,"""
          new = """  const wallX = Math.floor(observer.position.x + 3.5);
  const safeRadiusCells = Math.ceil(120 / Math.max(0.001, state.map.metersPerCell));
  const wallStartY = Math.max(0, Math.floor(observer.position.y) - safeRadiusCells - 2);
  const wallEndY = Math.min(state.map.height - 1, Math.floor(observer.position.y) + safeRadiusCells + 2);
  const wallLength = wallEndY - wallStartY + 1;
  state.map.objects.push(...Array.from({ length: wallLength }, (_, index) => ({
    id: `${WALL_ID}-${index}`,
    kind: 'structure' as const,
    x: wallX,
    y: wallStartY + index,"""
          if old not in text:
              raise SystemExit('Expected segmented wall block not found')
          text = text.replace(old, new, 1)
          text = text.replace(
              '// Match the accepted segmented wall-side winner geometry while keeping\n    // standing visual contact alive throughout the runtime crossing.',
              '// Extend the accepted segmented wall beyond the local safe-search radius,\n    // preventing open-field detours while retaining standing visual contact.',
              1,
          )
          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/patch-wall-safe-radius.yml').unlink()
          PY
      - name: Commit deterministic wall radius fixture
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/testing/DangerLayerMovementPerformanceHarness.ts .github/workflows/patch-wall-safe-radius.yml
          git commit -m 'Extend wall fixture beyond safe radius'
          git push origin HEAD:agent/danger-layer-moving-units-performance
