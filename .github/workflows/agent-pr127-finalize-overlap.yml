name: Finalize PR127 overlap fixes

on:
  push:
    branches:
      - agent/per-unit-ai-scheduler-v1
    paths:
      - .github/workflows/agent-pr127-finalize-overlap.yml

permissions:
  contents: write

jobs:
  finalize-overlap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/per-unit-ai-scheduler-v1
          fetch-depth: 1
      - name: Apply exact overlap fixes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          unit_model = Path('src/core/units/UnitModel.ts')
          text = unit_model.read_text(encoding='utf-8')
          source_line = "export type ThreatMemorySource = 'seen' | 'heard' | 'reported' | 'fire_pressure';\n"
          class_line = "export type FireThreatClass = 'rifle_fire' | 'machine_gun_fire';\n"
          if class_line not in text:
              if source_line not in text:
                  raise SystemExit('ThreatMemorySource anchor missing')
              text = text.replace(source_line, source_line + class_line, 1)
          field_anchor = "  lastUpdatedSeconds: number;\n  evidenceCount?: number;"
          field_replacement = "  lastUpdatedSeconds: number;\n  fireThreatClass?: FireThreatClass | null;\n  evidenceCount?: number;"
          if '  fireThreatClass?: FireThreatClass | null;\n' not in text:
              if field_anchor not in text:
                  raise SystemExit('KnownThreatMemory anchor missing')
              text = text.replace(field_anchor, field_replacement, 1)
          unit_model.write_text(text, encoding='utf-8')

          smoke = Path('scripts/tactical_workspace_smoke_pixijs8_baseline.mjs')
          text = smoke.read_text(encoding='utf-8')
          old = "'Приказать двигаться сюда', 'Один расчёт ИИ', 'Рассчитать и выполнить',"
          new = "'Приказать двигаться сюда', 'Диагностика ИИ (без изменений)', 'Рассчитать и выполнить',"
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('workspace smoke label anchor missing')
          smoke.write_text(text, encoding='utf-8')
          PY
          grep -q "export type FireThreatClass = 'rifle_fire' | 'machine_gun_fire';" src/core/units/UnitModel.ts
          grep -q 'fireThreatClass?: FireThreatClass | null;' src/core/units/UnitModel.ts
          grep -q 'Диагностика ИИ (без изменений)' scripts/tactical_workspace_smoke_pixijs8_baseline.mjs
          git diff --check
          git add src/core/units/UnitModel.ts scripts/tactical_workspace_smoke_pixijs8_baseline.mjs
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'fix: preserve PR126 unit threat contract'
          git push origin HEAD:agent/per-unit-ai-scheduler-v1
