name: Live Windows AI Browser Performance

on:
  pull_request:
    branches:
      - real-wargame-preview
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: live-windows-attribution-apply-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply-verified-followup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: agent/live-windows-performance-followup-v1
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply targeted follow-up
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/performance/live-windows-followup
          {
            python3 scripts/agent_performance_attribution_followup_patchfix.py
            python3 scripts/agent_performance_attribution_followup_apply.py
          } 2>&1 | tee artifacts/performance/live-windows-followup/attribution-patch.log
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-attribution-patch-log
          path: artifacts/performance/live-windows-followup/attribution-patch.log
          if-no-files-found: warn
          retention-days: 3
      - name: Install dependencies
        run: npm ci
      - name: Verify source and focused contracts
        run: |
          npx tsc --noEmit
          npm run build
          node scripts/performance_report_contract_smoke.mjs
          npm run shared-visibility-vegetation:smoke
          npm run perception-performance:smoke
          npm run danger-layer-performance:smoke
          npm run ai-scheduler:smoke
      - name: Commit verified result
        run: |
          rm scripts/agent_performance_attribution_followup_apply.py
          rm scripts/agent_performance_attribution_followup_patchfix.py
          rm -f artifacts/performance/live-windows-followup/.attribution-followup-trigger
          rm -f artifacts/performance/live-windows-followup/attribution-patch.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "perf: refine application attribution and dynamic geometry reuse"
          git push origin HEAD:agent/live-windows-performance-followup-v1
