name: Stage 2 Apply Local Fix

on:
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.event.pull_request.head.ref == 'feature/20260723-shooting-stage-02-physical-action-coordinator'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: feature/20260723-shooting-stage-02-physical-action-coordinator
          fetch-depth: 0

      - name: Remove redundant readonly assignment
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/core/units/UnitModel.ts')
          source = path.read_text(encoding='utf-8')
          redundant = "    posture.actionHandle = null;\n"
          if redundant in source:
              path.write_text(source.replace(redundant, '', 1), encoding='utf-8')
          PY

      - name: Commit fix when needed
        shell: bash
        run: |
          if git diff --quiet -- src/core/units/UnitModel.ts; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/core/units/UnitModel.ts
          git commit -m "fix: avoid redundant readonly handle reset"
          git push origin HEAD:feature/20260723-shooting-stage-02-physical-action-coordinator
