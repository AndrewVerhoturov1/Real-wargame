name: Stage 2 Apply Navigation Fixture Isolation

on:
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: write

jobs:
  apply-navigation-fixture-isolation:
    if: github.event.pull_request.head.ref == 'feature/20260723-shooting-stage-02-physical-action-coordinator'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Isolate navigation replan from posture transition
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/live_navigation_replan_smoke.ts')
          source = path.read_text(encoding='utf-8')
          old = "    { id: 'blue-mover', label: 'Mover', labelRu: 'Двигающийся', type: 'infantry_squad', side: 'blue', x: 2, y: 3, facingDegrees: 0, viewRangeCells: 0 },"
          new = "    { id: 'blue-mover', label: 'Mover', labelRu: 'Двигающийся', type: 'infantry_squad', side: 'blue', x: 2, y: 3, facingDegrees: 0, viewRangeCells: 0, initialState: { posture: 'crouched' } },"
          if old in source:
              source = source.replace(old, new, 1)
          elif new not in source:
              raise SystemExit('blue mover fixture marker not found')
          path.write_text(source, encoding='utf-8')
          PY

      - name: Commit isolated fixture through Contents API
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: feature/20260723-shooting-stage-02-physical-action-coordinator
        shell: bash
        run: |
          if git diff --quiet -- scripts/live_navigation_replan_smoke.ts; then
            exit 0
          fi
          path='scripts/live_navigation_replan_smoke.ts'
          content=$(base64 -w0 "$path")
          for attempt in 1 2 3; do
            sha=$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=${BRANCH}" --jq .sha)
            if gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" \
              -f message='test: isolate live replan from physical posture transition' \
              -f content="$content" \
              -f sha="$sha" \
              -f branch="$BRANCH"; then
              exit 0
            fi
            sleep 2
          done
          exit 1
