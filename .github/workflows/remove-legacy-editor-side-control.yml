name: Remove Legacy Editor Side Control

on:
  push:
    branches:
      - tmp/combat-foundation-v1-20260713
    paths:
      - 'scripts/remove_legacy_editor_side_control.mjs'
      - '.github/workflows/remove-legacy-editor-side-control.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tmp/combat-foundation-v1-20260713
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/remove_legacy_editor_side_control.mjs
      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/ui/TacticalWorkspace.ts
          git commit -m 'fix: remove duplicate fighter side control'
          git push origin HEAD:tmp/combat-foundation-v1-20260713
