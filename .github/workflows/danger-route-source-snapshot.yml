name: Danger Route Source Snapshot

on:
  push:
    branches:
      - agent/danger-route-cost-parity-v1
    paths:
      - '.github/workflows/danger-route-source-snapshot.yml'

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: danger-route-source-snapshot
          path: |
            src/core/knowledge/SoldierThreatMemory.ts
            src/core/knowledge/SoldierAwarenessGrid.ts
            src/core/knowledge/AwarenessDynamicRescore.ts
            src/core/knowledge/CanonicalWorldThreat.ts
            src/core/navigation/NavigationRuntime.ts
            src/core/navigation/RouteCostField.ts
            src/rendering/PixiAwarenessHeatmapRenderer.ts
            tests/combat-foundation-visual.spec.ts
            docs/subprojects/ai-single-unit-editor/TACTICAL_ROUTE_COST_V1.md
          if-no-files-found: error
