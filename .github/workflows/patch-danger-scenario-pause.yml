name: Patch Danger Scenario Pause

on:
  push:
    branches:
      - agent/danger-layer-moving-units-performance

permissions:
  contents: write

jobs:
  patch-fixture:
    if: github.event.head_commit.message == 'Trigger scenario pause patch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/danger-layer-moving-units-performance
      - name: Preserve paused baseline
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/testing/DangerLayerMovementPerformanceHarness.ts')
          text = path.read_text(encoding='utf-8')
          old = '''      prepareScenario(state, observer, hostile, scenario);
                setAiTestPaused(state, false);
                return snapshot(state, observer, hostile, activeScenario, false);'''.replace('                ', '      ')
          new = '''      prepareScenario(state, observer, hostile, scenario);
                // The Playwright contract owns resume timing so the baseline remains exact.
                return snapshot(state, observer, hostile, activeScenario, false);'''.replace('                ', '      ')
          if old not in text:
              raise SystemExit('Expected scenario auto-resume block not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          Path('.github/workflows/patch-danger-scenario-pause.yml').unlink()
          PY
      - name: Commit deterministic scenario pause
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/testing/DangerLayerMovementPerformanceHarness.ts .github/workflows/patch-danger-scenario-pause.yml
          git commit -m 'Keep movement baseline paused until explicit resume'
          git push origin HEAD:agent/danger-layer-moving-units-performance

