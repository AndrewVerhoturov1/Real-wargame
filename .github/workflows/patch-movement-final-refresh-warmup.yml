name: Patch Movement Final Refresh Warmup

on:
  push:
    branches:
      - agent/danger-layer-moving-units-performance

permissions:
  contents: write

jobs:
  patch-test:
    if: github.event.head_commit.message == 'Warm movement counters after final exact refresh'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/danger-layer-moving-units-performance
      - name: Patch final-exact wait and remove workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/danger-layer-movement-performance.spec.ts')
          text = path.read_text(encoding='utf-8')
          old = """      && movement.pendingQueueDepth === 0\n      && movement.lastRequestedRasterKey\n      && movement.lastAppliedRasterKey === movement.lastRequestedRasterKey,"""
          new = """      && movement.pendingQueueDepth === 0\n      && movement.finalRefreshRequests > 0\n      && movement.finalRefreshApplied >= movement.finalRefreshRequests\n      && movement.lastRequestedRasterKey\n      && movement.lastAppliedRasterKey === movement.lastRequestedRasterKey,"""
          if old not in text:
              raise SystemExit('Expected worker-settled condition not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          Path('.github/workflows/patch-movement-final-refresh-warmup.yml').unlink()
          PY
      - name: Commit final-exact warmup contract
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tests/danger-layer-movement-performance.spec.ts .github/workflows/patch-movement-final-refresh-warmup.yml
          git commit -m 'Wait for final exact movement baseline'
          git push origin HEAD:agent/danger-layer-moving-units-performance
