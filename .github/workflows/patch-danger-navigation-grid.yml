name: Patch Danger Navigation Grid Fixture

on:
  push:
    branches:
      - agent/danger-layer-moving-units-performance

permissions:
  contents: write

jobs:
  patch-fixture:
    if: github.event.head_commit.message == 'Trigger navigation-grid fixture patch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/danger-layer-moving-units-performance
      - name: Use production navigation passability
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/testing/DangerLayerMovementPerformanceHarness.ts')
          text = path.read_text(encoding='utf-8')

          old_import = "import { isMapCellPassable } from '../core/pathfinding/GridNavigation';"
          new_import = "import { buildNavigationGrid, isNavigationCellPassable } from '../core/pathfinding/GridNavigation';"
          if old_import not in text:
              raise SystemExit('Expected map-passability import not found')
          text = text.replace(old_import, new_import, 1)

          old_call = '''  const occupiedCells = new Set<string>();
          for (const unit of state.units) {
            unit.position = findNearestPassableFixturePosition(state, unit.position, occupiedCells);
          }'''.replace('          ', '')
          new_call = '''  const navigationGrid = buildNavigationGrid(state.map);
          const occupiedCells = new Set<string>();
          for (const unit of state.units) {
            unit.position = findNearestPassableFixturePosition(
              state,
              navigationGrid,
              unit.position,
              occupiedCells,
            );
          }'''.replace('          ', '')
          if old_call not in text:
              raise SystemExit('Expected passable-start call block not found')
          text = text.replace(old_call, new_call, 1)

          old_signature = '''function findNearestPassableFixturePosition(
            state: SimulationState,
            preferred: { x: number; y: number },'''.replace('            ', '  ')
          new_signature = '''function findNearestPassableFixturePosition(
            state: SimulationState,
            navigationGrid: ReturnType<typeof buildNavigationGrid>,
            preferred: { x: number; y: number },'''.replace('            ', '  ')
          if old_signature not in text:
              raise SystemExit('Expected passable-start signature not found')
          text = text.replace(old_signature, new_signature, 1)

          old_predicate = "if (occupiedCells.has(key) || !isMapCellPassable(state.map, x, y)) continue;"
          new_predicate = "if (occupiedCells.has(key) || !isNavigationCellPassable(navigationGrid, x, y)) continue;"
          if old_predicate not in text:
              raise SystemExit('Expected map-passability predicate not found')
          text = text.replace(old_predicate, new_predicate, 1)

          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/patch-danger-navigation-grid.yml').unlink()
          PY
      - name: Commit production-grid fixture fix
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/testing/DangerLayerMovementPerformanceHarness.ts .github/workflows/patch-danger-navigation-grid.yml
          git commit -m 'Use production navigation grid in movement fixture'
          git push origin HEAD:agent/danger-layer-moving-units-performance
