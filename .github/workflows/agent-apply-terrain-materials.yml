name: Apply Verified Terrain Materials Patch

on:
  pull_request:
    branches: [real-wargame-preview]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: agent-terrain-materials-apply
  cancel-in-progress: true

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.ref == 'agent/terrain-profiles-performance-followup-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Reconstruct and verify source patch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import base64, gzip, hashlib, json, os
          from pathlib import Path
          from urllib.request import Request, urlopen

          chunks = [
              ('e2affb8533bd7f4ca4e8964634cb32fac2dd1f50', 4000, '5574f0540176c02866bd6f7934f7f6e3f51bd763d1c94ab75e546e252a975a93'),
              ('a679855ec399b3c2931b8bc1f6b1f9698b5accd6', 8000, 'ee81a7234fdc34676aefd071b3d9c9e6c2e2484b32485f2165f62efe0c372b4c'),
              ('6bedac9e0981adb22346756f30afcd60d64ca2be', 8000, '4a72c7cd0f516d7312f88d959a1140be38968219be827599b5b5bfced21dadbe'),
              ('0f665704ad8e5a560d444b635cd5d57013ccacd2', 8000, 'd2a17c0b8324d76b653cc5ee0b29d110e2d595afe3ec31ec7682cffd2a12538b'),
              ('6499c599e8e6062ff196344749d3bc2e3f2ef688', 8000, '81a942f8c82d6e159d1c5e52ec5faa6ddd2130f79c2955b562f8301d7c542db8'),
              ('de7fb5137cb3a6c9e70b39b9b1f2758d150d425f', 8000, 'a2d09d0fda8bbda285c5282d7cd7c678377db0b17960d89d7c15a5b6844c7271'),
              ('dca69f80e8168814580243885c10434498ec25d6', 4000, 'dd0016a7f64db9293d838d8862c454b0f2ceac4c3858552939af412e8ae429c1'),
              ('a58dfc53903eb9efd8843f5a18c2bc1cdd7cf475', 2000, '626a8c0c951e522b3ab60fe6036c49fe02879c1b3afe23e3d49529a99db2b808'),
              ('03f18c22a0a6d4f53b6eea02eb43eb4b02c2f7e1', 2000, '6f52bd9144b30f66bee789fe00d2a4596a0faf98cb216e7de5edd251c3211494'),
              ('ecc08a73074873a1d5c9c66d6e627d009d4c819f', 8000, '73cb4a063970d1fcdd59070c1aa9e295945385ad8d30479daacaf7c1067a72ee'),
              ('3aa78edd7c6aed417cb9bdfc0390664e883cc1c0', 8000, 'd1d6cb88347899632c38c363f2b0e0ad5f34eabc6358e1ddc3a27cbfca6eabce'),
              ('01cc5203f250cf95e53233b4a21659eab9c1dfb1', 8000, '11e8c65d255fbeccd2f146d3889a6e113c807cac357b0dc63d119badc46e5614'),
              ('b645e3e4b298f497e6feeda7fd05ac7165c12c01', 3072, '67940e925f475da3e7ee8dc886da215e60e98973dac576d42e98c0610d686d19'),
          ]
          token = os.environ['GH_TOKEN']
          parts = []
          for index, (sha, expected_length, expected_digest) in enumerate(chunks):
              print(f'FETCH {index} {sha}', flush=True)
              request = Request(
                  f'https://api.github.com/repos/AndrewVerhoturov1/Real-wargame/git/blobs/{sha}',
                  headers={'Authorization': f'Bearer {token}', 'Accept': 'application/vnd.github+json'},
              )
              with urlopen(request) as response:
                  payload = json.load(response)
              text = base64.b64decode(payload['content']).decode('utf-8')
              header, separator, body = text.partition('\n')
              body = body.strip()
              digest = hashlib.sha256(body.encode()).hexdigest()
              print(f'CHECK {index} len={len(body)} sha256={digest} header={header}', flush=True)
              if not separator or not header.startswith('REAL_WARGAME_BENIGN_SOURCE_PATCH_GZIP_BASE64_CHUNK_'):
                  raise RuntimeError(f'Envelope mismatch at chunk {index}')
              if len(body) != expected_length or digest != expected_digest:
                  raise RuntimeError(f'Content mismatch at chunk {index}')
              parts.append(body)

          encoded = ''.join(parts)
          print(f'COMBINED len={len(encoded)}', flush=True)
          if len(encoded) != 79072:
              raise RuntimeError(f'Combined base64 length mismatch: {len(encoded)}')
          patch = gzip.decompress(base64.b64decode(encoded, validate=True))
          digest = hashlib.sha256(patch).hexdigest()
          if digest != '13b21e6d80caf161c0432af5a15f3e9aaab484f5ea9813f06c690adf8020bd9a':
              raise RuntimeError(f'Patch SHA-256 mismatch: {digest}')
          Path('/tmp/terrain-materials.patch').write_bytes(patch)
          print(f'PATCH len={len(patch)} sha256={digest}', flush=True)
          PY

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Apply exact patch and remove delivery workflows
        run: |
          git apply --index --whitespace=error /tmp/terrain-materials.patch
          git rm .github/workflows/agent-apply-terrain-materials.yml
          test ! -e .github/workflows/agent-source-snapshot.yml
          git diff --cached --check

      - name: Install dependencies
        run: npm ci

      - name: Verify environment material contracts
        run: |
          npm run environment-materials:smoke
          npm run environment-material-migration:smoke
          npm run environment-profile-revisions:smoke
          npm run vegetation-chunk-raster:smoke
          npm run shared-visibility-vegetation:smoke
          npm run danger-route-cost-parity:smoke
          npm run perception:smoke
          npm run navigation-profiles:smoke
          npm run pathfinding:smoke
          npm run workspace:smoke
          node scripts/pixijs8_raster_lifecycle_contract_smoke.mjs
          npm run docs:check
          npm run docs:smoke
          npm run build

      - name: Publish one clean exact-base commit
        env:
          BRANCH_NAME: agent/terrain-profiles-performance-followup-v1
          EXPECTED_REMOTE_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          git fetch --no-tags origin 4adb42650f0fb6ad61b31f9521cec4508a5a40ec
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git reset --soft 4adb42650f0fb6ad61b31f9521cec4508a5a40ec
          git commit -m 'Add environment material profiles and chunked vegetation raster'
          git push --force-with-lease="refs/heads/${BRANCH_NAME}:${EXPECTED_REMOTE_HEAD}" origin "HEAD:refs/heads/${BRANCH_NAME}"
