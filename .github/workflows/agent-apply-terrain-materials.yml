name: Apply Verified Terrain Materials Patch

on:
  pull_request:
    branches: [real-wargame-preview]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: agent-terrain-materials-apply
  cancel-in-progress: true

jobs:
  diagnose-reconstruction:
    if: github.event.pull_request.head.ref == 'agent/terrain-profiles-performance-followup-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose patch reconstruction
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import base64, gzip, hashlib, json, os, traceback
          from pathlib import Path
          from urllib.request import Request, urlopen

          chunks = [
              ('e2affb8533bd7f4ca4e8964634cb32fac2dd1f50', 4000, '5574f0540176c02866bd6f7934f7f6e3f51bd763d1c94ab75e546e252a975a93'),
              ('a679855ec399b3c2931b8bc1f6b1f9698b5accd6', 8000, 'ee81a7234fdc34676aefd071b3d9c9e6c2e2484b32485f2165f62efe0c372b4c'),
              ('6bedac9e0981adb22346756f30afcd60d64ca2be', 8000, '4a72c7cd0f516d7312f88d959a1140be38968219be827599b5b5bfced21dadbe'),
              ('0f665704ad8e5a560d444b635cd5d57013ccacd2', 8000, 'd2a17c0b8324d76b653cc5ee0b29d110e2d595afe3ec31ec7682cffd2a12538b'),
              ('6499c599e8e6062ff196344749d3bc2e3f2ef688', 8000, '81a942f8c82d6e159d1c5e52ec5faa6ddd2130f79c2955b562f8301d7c542db8'),
              ('de7fb5137cb3a6c9e70b39b9b1f2758d150d425f', 8000, 'a2d09d0fda8bbda285c5282d7cd7c678377db0b17960d89d7c15a5b6844c7271'),
              ('dca69f80e8168814580243885c10434498ec25d6', 4000, 'dd0016a7f64db9293d838d8862c454b0f2ceac4c3858552939af412e8ae429c1'),
              ('a58dfc53903eb9efd8843f5a18c2bc1cdd7cf475', 2000, '626a8c0c951e522b3ab60fe6036c49fe02879c1b3afe23e3d49529a99db2b808'),
              ('03f18c22a0a6d4f53b6eea02eb43eb4b02c2f7e1', 2000, '6f52bd9144b30f66bee789fe00d2a4596a0faf98cb216e7de5edd251c3211494'),
              ('ecc08a73074873a1d5c9c66d6e627d009d4c819f', 8000, '73cb4a063970d1fcdd59070c1aa9e295945385ad8d30479daacaf7c1067a72ee'),
              ('d93fca5f7d5d7d107314b0399e84b3080a33012f', 2000, '883003cdc4e0de586ecb29641f8189c0fff5e11483d7805ce2a9fcd9470574ac'),
              ('a0b88392e214f34628ab02a515566ae2705a224d', 2000, '2b55152679d2ec46654c2d9b9a89aafa9577b1869f122b3d90576d50295f0a08'),
              ('6ac8c74f8ae78a16a9dddc1429c63aa5a4212db5', 2000, '346dc6cf9998ac4b9d442e914bf649b0c48be3d3955cc82b174ada395d2566d9'),
              ('e08454b886b788e7f9e1c4ff93430439142470fb', 2000, '8f83a6c324aff262571758cd10b0d839093bd95dbad7d573ba9833f808afb62b'),
              ('2c0f126d51a6b8ecc0e41a9431616571820780cb', 2000, '03cca6a600b431bde16139df82951857fd0dfc0e96087b1e7502b9f016467460'),
              ('fb0108dce54b3630fb0a48a7e141907362bdde59', 2000, '6e5d1321e2475e0d525306bdc88a616188e0b1be17153991144f92bd09477970'),
              ('ba9ba886b1a342d39fe89908b0bf3347d9afcad0', 2000, '0e62ea47b987f8ef63fc3ec3c94f55b1a28d7e5e51fe3d57a9be3e9dc5adcc0e'),
              ('ea9d7dbdd025189d0e72107290f3b4ea44bd6db6', 2000, 'ebf28a7b94cfa63c9aa01cde7916f7ab4af8bdb4226c3449cd00d9321348ee42'),
              ('044522b1b90db77bbc9cdd4c55a582cb2b249443', 2000, 'cdd204cc48fac86b7593545ef3fd44bcacd313d744f754adf266438ec793c122'),
              ('3a2fd83f6ae118b20dca98b40674a2ce610474b6', 1072, '0b65a720da300e69f31b6d189ba0d7586b758c9a5d8cc3affc42ad8b474617f1'),
          ]
          report = []
          try:
              token = os.environ['GH_TOKEN']
              parts = []
              for index, (sha, expected_length, expected_digest) in enumerate(chunks):
                  report.append(f'FETCH {index} {sha}')
                  request = Request(
                      f'https://api.github.com/repos/AndrewVerhoturov1/Real-wargame/git/blobs/{sha}',
                      headers={'Authorization': f'Bearer {token}', 'Accept': 'application/vnd.github+json'},
                  )
                  with urlopen(request) as response:
                      payload = json.load(response)
                  text = base64.b64decode(payload['content']).decode('utf-8')
                  header, separator, body = text.partition('\n')
                  body = body.strip()
                  digest = hashlib.sha256(body.encode()).hexdigest()
                  report.append(f'CHECK {index} len={len(body)}/{expected_length} sha256={digest}/{expected_digest} header={header!r}')
                  if not separator or not header.startswith('REAL_WARGAME_BENIGN_SOURCE_PATCH_GZIP_BASE64_'):
                      raise RuntimeError(f'Envelope mismatch at chunk {index}')
                  if len(body) != expected_length or digest != expected_digest:
                      raise RuntimeError(f'Content mismatch at chunk {index}')
                  parts.append(body)
              encoded = ''.join(parts)
              report.append(f'COMBINED len={len(encoded)}/79072')
              patch = gzip.decompress(base64.b64decode(encoded, validate=True))
              digest = hashlib.sha256(patch).hexdigest()
              report.append(f'PATCH len={len(patch)} sha256={digest}')
              if len(encoded) != 79072 or digest != '13b21e6d80caf161c0432af5a15f3e9aaab484f5ea9813f06c690adf8020bd9a':
                  raise RuntimeError('Combined patch integrity mismatch')
              Path('/tmp/terrain-materials.patch').write_bytes(patch)
              report.append('RESULT success')
          except Exception:
              report.append('RESULT failure')
              report.append(traceback.format_exc())
          Path('/tmp/patch-reconstruction-diagnostic.txt').write_text('\n'.join(report), encoding='utf-8')
          print('\n'.join(report))
          PY

      - name: Upload reconstruction diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patch-reconstruction-diagnostic
          path: /tmp/patch-reconstruction-diagnostic.txt
          if-no-files-found: error
          retention-days: 1

      - name: Require reconstructed patch
        run: test -f /tmp/terrain-materials.patch
