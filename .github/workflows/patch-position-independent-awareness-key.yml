name: Patch Position-Independent Awareness Key

on:
  push:
    branches:
      - agent/danger-layer-moving-units-performance

permissions:
  contents: write

jobs:
  patch-renderer:
    if: github.event.head_commit.message == 'Apply position-independent awareness key boundary'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/danger-layer-moving-units-performance
      - name: Patch renderer key ownership and remove this workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/rendering/PixiAwarenessHeatmapRenderer.ts')
          text = path.read_text(encoding='utf-8')
          old_import = "import {\n  buildAwarenessKnowledgeKey,\n  type SoldierAwarenessCell,\n  type SoldierSafePosition,\n} from '../core/knowledge/SoldierAwarenessGrid';"
          new_import = "import { buildPositionIndependentAwarenessKnowledgeKey } from '../core/knowledge/AwarenessWorldKey';\nimport {\n  type SoldierAwarenessCell,\n  type SoldierSafePosition,\n} from '../core/knowledge/SoldierAwarenessGrid';"
          if old_import not in text:
              raise SystemExit('Expected SoldierAwarenessGrid import block not found')
          text = text.replace(old_import, new_import, 1)
          old_key = "    `knowledge:${buildAwarenessKnowledgeKey(unit)}`,"
          new_key = "    `knowledge:${buildPositionIndependentAwarenessKnowledgeKey(unit)}`,"
          if old_key not in text:
              raise SystemExit('Expected awareness world key call not found')
          text = text.replace(old_key, new_key, 1)
          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/patch-position-independent-awareness-key.yml').unlink()
          PY
      - name: Commit patched ownership boundary
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/rendering/PixiAwarenessHeatmapRenderer.ts .github/workflows/patch-position-independent-awareness-key.yml
          git commit -m 'Use position-independent danger world key'
          git push origin HEAD:agent/danger-layer-moving-units-performance
