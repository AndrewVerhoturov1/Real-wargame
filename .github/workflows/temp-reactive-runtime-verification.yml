name: Temporary Reactive Runtime Verification

on:
  push:
    branches:
      - planning/complete-stateful-runtime-events-2026-07-12

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: planning/complete-stateful-runtime-events-2026-07-12
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - name: Apply reactive core patch
        id: patch
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node scripts/apply_reactive_runtime_core_patch.mjs 2>&1 | tee reactive-core-patch.log
      - name: Upload reactive core patch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reactive-core-patch-log
          path: reactive-core-patch.log
          if-no-files-found: error
          retention-days: 3
      - if: steps.patch.outcome == 'success'
        run: npm run reactive-runtime:smoke
      - if: steps.patch.outcome == 'success'
        run: npm run blackboard-observer:smoke
      - if: steps.patch.outcome == 'success'
        run: npm run event-queue:smoke
      - if: steps.patch.outcome == 'success'
        run: npm run runtime-session:smoke
      - if: steps.patch.outcome == 'success'
        run: npm run composite:smoke
      - if: steps.patch.outcome == 'success'
        run: npm run runtime:smoke
      - if: steps.patch.outcome == 'success'
        run: npm run route-status:smoke
      - if: steps.patch.outcome == 'success'
        run: npm run move-bridge:smoke
      - if: steps.patch.outcome == 'success'
        run: npm run build
      - name: Commit verified reactive runtime core
        if: steps.patch.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const branch = 'planning/complete-stateful-runtime-events-2026-07-12';
            for (const path of [
              'src/core/ai/AiGraphRuntime.ts',
              'src/core/ai/events/AiEventQueue.ts',
              'src/core/ai/events/AiReactiveRuntime.ts',
              'src/core/ai/runtime/AiRuntimeSession.ts',
              'src/core/ai/AiGraphRunner.ts',
              'src/core/ai/runtime/AiCompositeGraphRuntime.ts',
              'src/core/ai/AiGameBridge.ts',
            ]) {
              const current = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: branch,
              });
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                branch,
                message: `feat(ai): integrate reactive runtime in ${path}`,
                sha: current.data.sha,
                content: fs.readFileSync(path).toString('base64'),
              });
            }
      - name: Fail when patch failed
        if: steps.patch.outcome != 'success'
        run: exit 1
