name: Temporary Reactive Runtime Verification

on:
  push:
    branches:
      - planning/complete-stateful-runtime-events-2026-07-12

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: planning/complete-stateful-runtime-events-2026-07-12
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: node scripts/apply_reactive_runtime_ui_patch.mjs
      - run: npm run reactive-runtime:smoke
      - run: npm run editor:smoke
      - run: npm run validate:ai-graph
      - run: npm run blackboard-observer:smoke
      - run: npm run event-queue:smoke
      - run: npm run runtime-session:smoke
      - run: npm run composite:smoke
      - run: npm run runtime:smoke
      - run: npm run route-status:smoke
      - run: npm run move-bridge:smoke
      - run: npm run build
      - name: Commit verified ReactiveSequence UI and diagnostics
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const branch = 'planning/complete-stateful-runtime-events-2026-07-12';
            for (const path of [
              'src/core/ai/AiNodeTypes.ts',
              'src/core/ai/AiGraphValidation.ts',
              'src/ai-node-editor/main.ts',
              'src/ai-node-editor/stateful-node-ui.ts',
              'src/core/ai/UnitPlan.ts',
              'src/core/ai/AiGameBridge.ts',
              'src/ai-node-editor/runtime-debug-overlay.ts',
              'scripts/ai_node_editor_smoke.mjs',
            ]) {
              const current = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: branch,
              });
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                branch,
                message: `feat(ai): finish ReactiveSequence UI in ${path}`,
                sha: current.data.sha,
                content: fs.readFileSync(path).toString('base64'),
              });
            }
