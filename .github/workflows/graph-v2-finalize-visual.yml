name: AI Graph v2 Visual QA

on:
  pull_request:
    branches:
      - real-wargame-preview
    types:
      - ready_for_review

permissions:
  contents: read

jobs:
  visual-qa:
    if: github.head_ref == 'transfer/ai-graph-v2-preview-ready-2026-07-13'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright test runner
        run: npm install --no-save @playwright/test

      - name: Focused editor checks
        run: |
          npm run node-contract-ui:smoke
          npm run graph-v2:smoke
          npm run build

      - name: Run approved Graph v2 visual QA
        id: visual
        shell: bash
        run: |
          set -o pipefail
          npx playwright test tests/ai-graph-v2-editor.spec.ts --project=chromium --reporter=line 2>&1 | tee graph-v2-playwright.log

      - name: Upload Graph v2 screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-graph-v2-editor-screenshots-${{ github.event.pull_request.head.sha }}
          path: artifacts/screenshots/ai-graph-v2-editor/*.png
          if-no-files-found: error
          retention-days: 7

      - name: Upload Playwright log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-graph-v2-editor-playwright-log-${{ github.event.pull_request.head.sha }}
          path: graph-v2-playwright.log
          if-no-files-found: error
          retention-days: 7
