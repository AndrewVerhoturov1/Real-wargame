name: Apply Game Editor Scene Slot Fix

on:
  push:
    branches:
      - real-wargame-preview
    paths:
      - scripts/apply_game_editor_scene_slot_fix.mjs

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply exact patch
        run: |
          node scripts/apply_game_editor_scene_slot_fix.mjs
          git diff --check
          rm scripts/apply_game_editor_scene_slot_fix.mjs .github/workflows/apply-game-editor-scene-slot-fix.yml

      - name: Verify editor and build
        run: |
          npm ci
          npm run game-editor:smoke
          npm run build

      - name: Commit source and cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ui/GameEditorWorkbench.ts scripts/apply_game_editor_scene_slot_fix.mjs .github/workflows/apply-game-editor-scene-slot-fix.yml
          git commit -m "fix: keep scene tools inside editor scene tab"
          git push origin HEAD:real-wargame-preview
