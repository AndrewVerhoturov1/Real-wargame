name: Temporary Runtime Snapshot Verification

on:
  push:
    branches:
      - planning/complete-stateful-runtime-events-2026-07-12
  pull_request:
    branches:
      - real-wargame-preview

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: planning/complete-stateful-runtime-events-2026-07-12
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run runtime-snapshot:smoke
      - run: npm run runtime:smoke
      - run: npm run reload:smoke
      - run: npm run build
