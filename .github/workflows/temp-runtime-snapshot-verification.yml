name: Temporary Runtime Snapshot Verification

on:
  push:
    branches:
      - planning/complete-stateful-runtime-events-2026-07-12
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: planning/complete-stateful-runtime-events-2026-07-12
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: node scripts/apply_runtime_snapshot_scene_contract_patch.mjs
      - run: npm run runtime-snapshot:smoke
      - run: npm run runtime:smoke
      - run: npm run reload:smoke
      - run: npm run move-bridge:smoke
      - run: npm run map-resolution:smoke
      - run: npm run game-editor:smoke
      - run: npm run build
      - name: Commit verified scene snapshot contracts
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const branch = 'planning/complete-stateful-runtime-events-2026-07-12';
            const path = 'scripts/ai_runtime_snapshot_smoke.ts';
            const current = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              ref: branch,
            });
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              branch,
              message: 'test(ai): verify scene export snapshot restore and graph mismatch cleanup',
              sha: current.data.sha,
              content: fs.readFileSync(path).toString('base64'),
            });
