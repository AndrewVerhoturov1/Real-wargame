name: Apply Performance v6 Collection Budget

on:
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - scripts/apply_performance_v6_collection_budget.py
      - .github/workflows/apply-performance-v6-collection-budget.yml

permissions:
  contents: write

concurrency:
  group: apply-performance-v6-collection-budget-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  patch-verify-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Apply bounded collection and v6 evidence patch
        run: python scripts/apply_performance_v6_collection_budget.py
      - name: Verify build and contracts
        run: |
          npm ci
          npx tsc --noEmit
          npm run build
          npm run performance-report-v6:smoke
          node scripts/performance_report_contract_smoke.mjs
          npm run performance-contract:smoke
          npm run game-editor:smoke
          npm run workspace:smoke
          grep -q "performance-report-v6" scripts/assert_danger_layer_movement_evidence.mjs
          grep -q "data-performance-export" tests/danger-layer-browser-performance.spec.ts
          grep -q "data-performance-export" tests/danger-layer-movement-performance.spec.ts
          grep -q "data-performance-export" tests/danger-layer-long-task-attribution.spec.ts
      - name: Publish verified runtime and evidence readers
        shell: bash
        run: |
          set -euo pipefail
          branch='${{ github.event.pull_request.head.ref }}'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/core/debug/PerformanceCaptureV6.ts
          git add scripts/performance_report_contract_smoke.mjs
          git add scripts/assert_danger_layer_movement_evidence.mjs
          git add tests/danger-layer-browser-performance.spec.ts
          git add tests/danger-layer-movement-performance.spec.ts
          git add tests/danger-layer-long-task-attribution.spec.ts
          git diff --cached --check
          if git diff --cached --quiet; then
            echo 'Verified files already match the requested patch.'
            exit 0
          fi
          git commit -m 'perf: bound telemetry scans and normalize v6 evidence'
          git pull --rebase origin "$branch"
          git push origin "HEAD:$branch"
