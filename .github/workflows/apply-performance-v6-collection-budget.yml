name: Apply Performance v6 Collection Budget

on:
  push:
    branches:
      - agent/performance-report-v6-observability
    paths:
      - scripts/apply_performance_v6_collection_budget.py
      - .github/workflows/apply-performance-v6-collection-budget.yml

permissions:
  contents: write

concurrency:
  group: apply-performance-v6-collection-budget
  cancel-in-progress: false

jobs:
  patch-verify-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout current branch head
        uses: actions/checkout@v4
        with:
          ref: agent/performance-report-v6-observability
          fetch-depth: 0
      - name: Apply bounded collection patch
        run: python scripts/apply_performance_v6_collection_budget.py
      - name: Verify build and contracts
        run: |
          npm ci
          npm run build
          npm run performance-report-v6:smoke
          node scripts/performance_report_contract_smoke.mjs
          npm run game-editor:smoke
          npm run workspace:smoke
      - name: Publish verified capture runtime
        shell: bash
        run: |
          set -euo pipefail
          branch='agent/performance-report-v6-observability'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/core/debug/PerformanceCaptureV6.ts
          git diff --cached --check
          git commit -m 'perf: bound deep telemetry scans under slow frames'
          git pull --rebase origin "$branch"
          git push origin "HEAD:$branch"
