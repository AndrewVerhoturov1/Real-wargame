name: Camera and grid verification

on:
  push:
    branches:
      - verify/camera-grid-20260711

permissions:
  contents: write
  statuses: write

jobs:
  verify:
    name: Verify camera and grid performance
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Remember source commit
        id: source
        shell: bash
        run: echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Publish pending verification status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'camera-grid-verification',
              description: 'Smoke, build and Chrome checks are running',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: verify/camera-grid-20260711

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install Playwright test runner
        run: npm install --no-save @playwright/test

      - name: Run required smoke checks and production build
        id: checks
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            npm run workspace:smoke
            npm run lab:smoke
            npm run game-editor:smoke
            npm run editor:smoke
            npm run engine:smoke
            npm run validate:ai-graph
            npm run build
          } 2>&1 | tee required-checks.log

      - name: Run full Chrome scenarios and capture PNG
        id: browser
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npx playwright test tests/preview-screenshots.spec.ts tests/camera-grid-performance.spec.ts --project=chromium --reporter=line 2>&1 | tee playwright-screenshots.log

      - name: Save verification results in branch
        if: ${{ always() }}
        shell: bash
        env:
          CHECKS_OUTCOME: ${{ steps.checks.outcome }}
          BROWSER_OUTCOME: ${{ steps.browser.outcome }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          mkdir -p verification-results/screenshots
          cp required-checks.log verification-results/required-checks.log 2>/dev/null || true
          cp playwright-screenshots.log verification-results/playwright-screenshots.log 2>/dev/null || true
          cp artifacts/screenshots/*.png verification-results/screenshots/ 2>/dev/null || true
          cat > verification-results/SUMMARY.txt <<EOF
          source_sha=${SOURCE_SHA}
          required_checks=${CHECKS_OUTCOME}
          browser_checks=${BROWSER_OUTCOME}
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add verification-results
          git commit -m "chore: store camera grid verification results" || true
          git push origin HEAD:verify/camera-grid-20260711

      - name: Publish final verification status
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          CHECKS_OUTCOME: ${{ steps.checks.outcome }}
          BROWSER_OUTCOME: ${{ steps.browser.outcome }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        with:
          script: |
            const success = process.env.CHECKS_OUTCOME === 'success'
              && process.env.BROWSER_OUTCOME === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.SOURCE_SHA,
              state: success ? 'success' : 'failure',
              context: 'camera-grid-verification',
              description: `smoke/build=${process.env.CHECKS_OUTCOME}; chrome=${process.env.BROWSER_OUTCOME}`,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Fail job when verification failed
        if: ${{ always() && (steps.checks.outcome != 'success' || steps.browser.outcome != 'success') }}
        run: exit 1
