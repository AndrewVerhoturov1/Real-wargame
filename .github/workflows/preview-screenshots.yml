name: Preview screenshots

run-name: Approved Graph v2 screenshots · ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches:
      - feat/ai-graph-v2-contracts-subgraphs-2026-07-13

permissions:
  contents: read
  statuses: write

jobs:
  screenshots:
    name: Capture Graph v2 screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Wait for the clean final branch head
        run: sleep 25

      - name: Checkout final feature branch head
        uses: actions/checkout@v4
        with:
          ref: feat/ai-graph-v2-contracts-subgraphs-2026-07-13

      - name: Record exact tested commit
        id: source
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_SHA="$(git rev-parse HEAD)"
          echo "sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          mkdir -p artifacts/screenshots
          printf 'tested_commit=%s\nworkflow_trigger_commit=%s\n' "$SOURCE_SHA" "$GITHUB_SHA" > artifacts/screenshots/visual-qa-metadata.txt

      - name: Publish pending screenshot status
        uses: actions/github-script@v7
        env:
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.SOURCE_SHA,
              state: 'pending',
              context: 'preview-screenshots',
              description: 'Approved Graph v2 Playwright screenshots are running',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install Playwright test runner for this workflow
        run: npm install --no-save @playwright/test

      - name: Validate Graph v2 contracts and editor
        run: |
          npm run graph-v2:smoke
          npm run node-contract-ui:smoke
          npm run editor:smoke
          npm run build

      - name: Capture Graph v2 screenshots with system Chrome
        id: capture
        shell: bash
        run: |
          set -o pipefail
          npx playwright test tests/ai-graph-v2-editor.spec.ts --project=chromium --reporter=line 2>&1 | tee playwright-screenshots.log

      - name: Upload screenshots and exact-SHA metadata
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: real-wargame-graph-v2-screenshots
          path: artifacts/screenshots/
          if-no-files-found: error
          retention-days: 14

      - name: Upload Playwright log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: real-wargame-graph-v2-playwright-log
          path: playwright-screenshots.log
          if-no-files-found: warn
          retention-days: 7

      - name: Publish screenshot status on tested commit
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
          CAPTURE_OUTCOME: ${{ steps.capture.outcome }}
        with:
          script: |
            const success = process.env.CAPTURE_OUTCOME === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.SOURCE_SHA,
              state: success ? 'success' : 'failure',
              context: 'preview-screenshots',
              description: `Approved Graph v2 Playwright: ${process.env.CAPTURE_OUTCOME}`,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
