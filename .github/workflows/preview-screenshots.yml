name: Preview screenshots

on:
  workflow_dispatch:
  push:
    branches:
      - real-wargame-preview
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: read

jobs:
  screenshots:
    name: Capture preview screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install Playwright test runner for this workflow
        run: npm install --no-save @playwright/test

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Build project
        run: npm run build

      - name: Capture screenshots
        run: npx playwright test tests/preview-screenshots.spec.ts --project=chromium --reporter=line

      - name: Upload screenshots
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: real-wargame-preview-screenshots
          path: artifacts/screenshots/
          if-no-files-found: warn
          retention-days: 14
