name: Preview screenshots

on:
  workflow_dispatch:
  push:
    branches:
      - real-wargame-preview
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: read
  statuses: write

jobs:
  screenshots:
    name: Capture preview screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Publish pending screenshot status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'preview-screenshots',
              description: 'Playwright screenshots are running',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install Playwright test runner for this workflow
        run: npm install --no-save @playwright/test

      - name: Check production build without blocking screenshots
        continue-on-error: true
        run: npm run build

      - name: Capture screenshots with system Chrome
        id: capture
        shell: bash
        run: |
          set -o pipefail
          npx playwright test tests/preview-screenshots.spec.ts --project=chromium --reporter=line 2>&1 | tee playwright-screenshots.log

      - name: Upload screenshots
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: real-wargame-preview-screenshots
          path: artifacts/screenshots/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: real-wargame-preview-playwright-log
          path: playwright-screenshots.log
          if-no-files-found: warn
          retention-days: 7

      - name: Publish screenshot status
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          CAPTURE_OUTCOME: ${{ steps.capture.outcome }}
        with:
          script: |
            const success = process.env.CAPTURE_OUTCOME === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'preview-screenshots',
              description: `Playwright screenshots: ${process.env.CAPTURE_OUTCOME}`,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
