name: Agent Docs Diagnostic

on:
  workflow_dispatch:
  push:
    branches:
      - feature/20260721-tactical-position-basis
    paths:
      - .github/workflows/agent-docs-diagnostic.yml
      - docs/**
      - AGENTS.md
      - README.md
      - scripts/agent_docs_*.mjs
      - scripts/check_agent_docs.mjs
      - scripts/performance_principles_contract_smoke.mjs
  pull_request:
    paths:
      - .github/workflows/agent-docs-diagnostic.yml
      - docs/**
      - AGENTS.md
      - README.md
      - scripts/agent_docs_*.mjs
      - scripts/check_agent_docs.mjs
      - scripts/performance_principles_contract_smoke.mjs

permissions:
  contents: read

jobs:
  docs-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Quiet exact checkout
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin "${SOURCE_SHA}"
          git checkout -q FETCH_HEAD
      - name: Print documentation integrity errors
        run: node scripts/check_agent_docs.mjs
