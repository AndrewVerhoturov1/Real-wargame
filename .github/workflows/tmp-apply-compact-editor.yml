name: Temporary Apply Compact Editor Patch

on:
  push:
    branches:
      - tmp/ui-compact-route-controls-20260712

permissions:
  contents: write

jobs:
  apply-patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout temporary branch
        uses: actions/checkout@v4
        with:
          ref: tmp/ui-compact-route-controls-20260712
          fetch-depth: 0

      - name: Apply deterministic editor patch
        run: node scripts/apply_compact_editor_patch.mjs

      - name: Commit product changes and remove patch machinery
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "feat: unify AI editor navigation"
          git push origin HEAD:tmp/ui-compact-route-controls-20260712
