name: Patch Wall Crossing Fixture

on:
  push:
    branches:
      - agent/danger-layer-moving-units-performance

permissions:
  contents: write

jobs:
  patch-fixture:
    if: github.event.head_commit.message == 'Patch wall crossing fixture'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/danger-layer-moving-units-performance
      - name: Patch wall visibility and crossing depth
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          harness = Path('src/testing/DangerLayerMovementPerformanceHarness.ts')
          text = harness.read_text(encoding='utf-8')
          old_height = '    losHeightMeters: 2.6,'
          new_height = '''    // A low bullet-resistant barrier preserves object-cover semantics while
    // allowing the standing observer to keep the moving hostile visually tracked.
    losHeightMeters: 0.8,'''
          if old_height not in text:
              raise SystemExit('Expected wall LOS height not found')
          harness.write_text(text.replace(old_height, new_height, 1), encoding='utf-8')

          test = Path('tests/danger-layer-movement-performance.spec.ts')
          text = test.read_text(encoding='utf-8')
          old_wait = '''  await page.waitForFunction(() => {
    const current = window.__realWargameDangerMovementPerformance?.getSnapshot(false);
    return Boolean(current && current.hostilePosition.x < current.observerPosition.x - 2);
  }, undefined, { timeout: 25_000 });'''
          new_wait = '''  await page.waitForFunction(() => {
    const current = window.__realWargameDangerMovementPerformance?.getSnapshot(false);
    return Boolean(
      current
      && current.hostilePosition.x <= current.observerPosition.x - 24
      && current.subjectiveThreatPosition
      && current.subjectiveThreatPosition.x <= current.observerPosition.x - 20,
    );
  }, undefined, { timeout: 25_000 });'''
          if old_wait not in text:
              raise SystemExit('Expected wall crossing wait block not found')
          text = text.replace(old_wait, new_wait, 1)

          assertion = '''  expect(after.bestSafePosition).not.toBeNull();
  expect(after.bestSafePosition).not.toEqual(before.bestSafePosition);'''
          diagnostic = '''  console.log('WALL_CROSSING_FINAL_EVIDENCE', JSON.stringify({ before, after, movement }, null, 2));
  expect(after.bestSafePosition).not.toBeNull();
  expect(after.bestSafePosition).not.toEqual(before.bestSafePosition);'''
          if assertion not in text:
              raise SystemExit('Expected wall winner assertion not found')
          test.write_text(text.replace(assertion, diagnostic, 1), encoding='utf-8')

          Path('.github/workflows/patch-wall-crossing-fixture.yml').unlink()
          PY
      - name: Commit wall crossing fixture
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/testing/DangerLayerMovementPerformanceHarness.ts tests/danger-layer-movement-performance.spec.ts .github/workflows/patch-wall-crossing-fixture.yml
          git commit -m 'Keep wall crossing visible through final side change'
          git push origin HEAD:agent/danger-layer-moving-units-performance
