name: Perception visual QA

run-name: Manual perception visual QA · ${{ github.ref_name }}

on:
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  screenshots:
    name: Capture perception screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Publish pending visual status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'perception-visual-qa',
              description: 'Approved perception Playwright verification is running',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci
      - run: npm install --no-save @playwright/test
      - run: npm run build
      - run: npm run perception:smoke
      - run: npm run perception-performance:smoke
      - run: npm run attention-ai-nodes:smoke

      - name: Run focused real-browser scenarios
        id: capture
        shell: bash
        run: |
          set -o pipefail
          npx playwright test tests/perception-attention-overlay.spec.ts --project=chromium --reporter=line 2>&1 | tee perception-playwright.log

      - name: Upload focused screenshots
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: real-wargame-perception-screenshots
          path: artifacts/screenshots/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload focused Playwright log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: real-wargame-perception-playwright-log
          path: perception-playwright.log
          if-no-files-found: warn
          retention-days: 7

      - name: Publish focused visual status
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          CAPTURE_OUTCOME: ${{ steps.capture.outcome }}
        with:
          script: |
            const success = process.env.CAPTURE_OUTCOME === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'perception-visual-qa',
              description: `Focused perception Playwright: ${process.env.CAPTURE_OUTCOME}`,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
