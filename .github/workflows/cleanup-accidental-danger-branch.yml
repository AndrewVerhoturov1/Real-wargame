name: Cleanup Accidental Danger Branch

on:
  push:
    branches:
      - agent/danger-layer-moving-units-performance

permissions:
  contents: write

jobs:
  delete-accidental-ref:
    runs-on: ubuntu-latest
    steps:
      - name: Delete accidental technical ref
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_REF: heads/agent/danger-layer-moving-units-performance-check
        shell: bash
        run: |
          set -euo pipefail
          encoded_ref="${TARGET_REF//\//%2F}"
          response_file="$(mktemp)"
          status="$(curl --silent --show-error --output "$response_file" --write-out '%{http_code}' \
            --request DELETE \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/git/refs/${encoded_ref}")"
          if [[ "$status" == "204" ]]; then
            echo "Deleted ${TARGET_REF}."
            exit 0
          fi
          if [[ "$status" == "404" ]]; then
            echo "${TARGET_REF} is already absent."
            exit 0
          fi
          cat "$response_file"
          echo "Unexpected GitHub API status: ${status}" >&2
          exit 1
