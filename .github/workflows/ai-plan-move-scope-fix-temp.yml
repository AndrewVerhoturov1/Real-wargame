name: TEMP AI plan move scope fix

on:
  push:
    branches:
      - fix/ai-plan-move-editor-panels-temp-2026-07-14
    paths:
      - .github/workflows/ai-plan-move-scope-fix-temp.yml
      - scripts/ai_plan_move_scope_smoke.ts
      - scripts/ai_plan_move_scope_smoke.mjs
      - package.json

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          ref: fix/ai-plan-move-editor-panels-temp-2026-07-14
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply exact nested-scope fix
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/core/ai/AiStatefulMoveGameBridge.ts')
          text = path.read_text(encoding='utf-8')

          replacements = [
              (
                  "  readonly ownerToken: string;\n}",
                  "  readonly ownerToken: string;\n  readonly targetAvailable: boolean;\n}",
              ),
              (
                  "  const activeMove = readActiveMoveSnapshot(getExecutionState(runtime));",
                  "  const activeMove = readActiveMoveSnapshot(getExecutionState(runtime), memory);",
              ),
              (
                  "    targetAvailable: isGridPosition(memory[activeMove.targetKey]),",
                  "    targetAvailable: activeMove.targetAvailable,",
              ),
              (
                  "function readActiveMoveSnapshot(state: AiGraphExecutionState | undefined): ActiveMoveSnapshot | null {\n  const data = state?.activeData;\n  if (data?.kind === 'subgraph') return readActiveMoveSnapshot(data.nestedExecutionState);",
                  "function readActiveMoveSnapshot(\n  state: AiGraphExecutionState | undefined,\n  blackboardScope: Readonly<Record<string, AiBlackboardValue>>,\n): ActiveMoveSnapshot | null {\n  const data = state?.activeData;\n  if (data?.kind === 'subgraph') return readActiveMoveSnapshot(data.nestedExecutionState, data.localBlackboard);",
              ),
              (
                  "    ownerToken: data.actionToken,\n  };",
                  "    ownerToken: data.actionToken,\n    targetAvailable: isGridPosition(blackboardScope[data.targetKey]),\n  };",
              ),
          ]

          changed = False
          for old, new in replacements:
              if new in text:
                  continue
              if old not in text:
                  raise SystemExit(f'Expected source fragment not found:\n{old}')
              text = text.replace(old, new, 1)
              changed = True

          if changed:
              path.write_text(text, encoding='utf-8')
          PY

      - name: Verify movement scope and state-plan runtime
        run: |
          npm run move-bridge:smoke
          npm run state-plan-scenario:smoke
          npm run build

      - name: Commit verified fix
        run: |
          if git diff --quiet -- src/core/ai/AiStatefulMoveGameBridge.ts; then
            echo "Fix already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/core/ai/AiStatefulMoveGameBridge.ts
          git commit -m "fix: preserve nested plan movement targets"
          git push origin HEAD:fix/ai-plan-move-editor-panels-temp-2026-07-14
