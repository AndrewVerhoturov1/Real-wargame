name: Fix Prone Tactical Position Arrival

on:
  push:
    branches:
      - feature/20260719-tactical-position-system
    paths:
      - '.github/workflows/fix-prone-tactical-arrival.yml'

permissions:
  contents: write

jobs:
  test-fix-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/20260719-tactical-position-system
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Add regression test for stale movement posture ownership
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path('scripts/tactical_position_tuning_smoke.ts')
          source = path.read_text(encoding='utf-8')
          source = source.replace(
              "import type { SimulationState } from '../src/core/simulation/SimulationState';\n",
              "import { createInitialState, type SimulationState } from '../src/core/simulation/SimulationState';\nimport { preparePhysicalMovementStep } from '../src/core/movement/MovementRuntime';\n",
              1,
          )
          source = source.replace(
              "verifyCommandOwnedApproachAndOccupation();\n",
              "verifyCommandOwnedApproachAndOccupation();\nverifyOccupiedPostureSurvivesStaleMovementOwnership();\n",
              1,
          )
          marker = "function verifyMarkerPublicationIsRateLimitedAndKeepsOldResult(): void {\n"
          regression = r'''function verifyOccupiedPostureSurvivesStaleMovementOwnership(): void {
            const state = createInitialState({
              width: 12,
              height: 8,
              cellSize: 8,
              metersPerCell: 2,
              defaultTerrain: 'field',
              defaultHeight: 0,
              cellRuns: [],
              cellRects: [],
              cells: [],
              objects: [],
            }, [{ id: 'occupied-prone', type: 'infantry_squad', side: 'blue', x: 2, y: 2 }], []);
            const unit = state.units[0]!;
            const command = createPlayerMoveCommand(
              unit.id,
              { x: 3.5, y: 2.5 },
              null,
              1000,
              'normal',
              null,
              null,
              'prone',
              'crouched',
            );
            unit.playerCommand = updatePlayerCommandStatus(command, 'completed', 'done', 'готово');
            assert.equal(applyCompletedTacticalPositionOccupation(unit), true);
            unit.playerCommand = markPlayerCommandArrivalPostureApplied(unit.playerCommand);
            unit.movementRuntime.requestedGait = 'sprint';
            unit.movementRuntime.actualGait = 'sprint';
            unit.movementRuntime.isMoving = true;
            unit.movementRuntime.lastMovementPosture = 'standing';

            preparePhysicalMovementStep(state, unit, 0.1, false, 1, 1);

            assert.equal(
              unit.behaviorRuntime.posture,
              'prone',
              'stale movement gait must not replace an occupied prone tactical posture',
            );
          }

          '''
          if marker not in source:
              raise SystemExit('Regression insertion point not found')
          path.write_text(source.replace(marker, regression + marker, 1), encoding='utf-8')
          PY

      - name: Confirm regression fails before fix
        shell: bash
        run: |
          set +e
          node scripts/tactical_position_tuning_smoke.mjs > before-fix.log 2>&1
          status=$?
          cat before-fix.log
          if [ "$status" -eq 0 ]; then
            echo 'Expected stale movement posture regression to fail before fix.'
            exit 1
          fi
          grep -q 'stale movement gait must not replace an occupied prone tactical posture' before-fix.log

      - name: Prevent movement gait from overriding occupied tactical posture
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path('src/core/movement/MovementRuntime.ts')
          source = path.read_text(encoding='utf-8')
          source = source.replace(
              "import type { UnitModel } from '../units/UnitModel';\n",
              "import type { UnitModel } from '../units/UnitModel';\nimport { occupiedTacticalPositionPosture } from '../tactical/TacticalPositionOccupation';\n",
              1,
          )
          old = "function applyMovementPosture(unit: UnitModel, profile: MovementProfile, gait: MovementGait): void {\n  const runtime = unit.movementRuntime;\n"
          new = "function applyMovementPosture(unit: UnitModel, profile: MovementProfile, gait: MovementGait): void {\n  const runtime = unit.movementRuntime;\n  if (occupiedTacticalPositionPosture(unit)) {\n    runtime.lastMovementPosture = null;\n    return;\n  }\n"
          if old not in source:
              raise SystemExit('Movement posture insertion point not found')
          path.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Verify regression and required product checks
        shell: bash
        run: |
          set -euo pipefail
          npx tsc
          npm run tactical-position:smoke
          npm run movement-profiles:smoke
          npm run physical-movement:smoke
          npm run ai-scheduler:smoke
          npm run workspace:smoke
          npm run editor:smoke
          npx vite build

      - name: Commit verified fix and remove temporary diagnostics
        run: |
          rm .github/workflows/diagnose-prone-arrival-posture.yml
          rm .github/workflows/fix-prone-tactical-arrival.yml
          rm -f before-fix.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: preserve prone posture at tactical position'
          git push origin HEAD:feature/20260719-tactical-position-system
