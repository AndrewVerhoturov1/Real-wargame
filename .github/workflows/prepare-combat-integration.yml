name: Prepare Combat Integration

on:
  push:
    branches:
      - tmp/prepare-combat-integration-run-20260714
    paths:
      - '.github/workflows/prepare-combat-integration.yml'
      - 'scripts/prepare_combat_integration.sh'

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout runner branch
        uses: actions/checkout@v4
        with:
          ref: tmp/prepare-combat-integration-run-20260714
          fetch-depth: 0

      - name: Run prepared integration
        shell: bash
        run: bash scripts/prepare_combat_integration.sh
