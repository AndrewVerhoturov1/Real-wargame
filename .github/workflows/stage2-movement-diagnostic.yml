name: Stage 2 Movement Diagnostic

on:
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: read

jobs:
  trace-physical-movement:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Add temporary preparation trace
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/physical_movement_runtime_smoke.ts')
          source = path.read_text(encoding='utf-8')
          start = source.index('function verifyWeaponPreparationLifecycle(): void {')
          end = source.index('\nfunction verifyWeaponPreparationRemainingSerialization()', start)
          body = source[start:end]
          markers = [
              '  const state = armedMovingState();',
              "  assert.equal(requestFireAction(state, shooter, contactId), false, 'sprint must create pending preparation');",
              '  shooter.perceptionKnowledge.contacts = [];',
              '  reconcilePendingFireIntent(state, shooter);',
              '  installIdentifiedContact(shooter, target, state.simulationTimeSeconds);',
              '  assert.equal(requestFireAction(state, shooter, contactId), false);',
              "  assert.equal(cancelPendingFireIntent(shooter, contactId), true, 'explicit intent cancellation must clear pending preparation');",
              '  const stepAfterCancel = preparePhysicalMovementStep(state, shooter, 0.1, true, 1, 1);',
              '  shooter.movementRuntime.weaponPreparationRevision += 1;',
              '  shooter.movementRuntime.weaponPreparation = {',
              "  assert.equal(cancelMovementWeaponPreparation(shooter, { ownerToken: stale.ownerToken, revision: stale.revision }), false, 'stale cleanup must not cancel newer preparation');",
              '  shooter.movementRuntime.weaponPreparation = null;',
              '  const resumedWithoutRepeat = preparePhysicalMovementStep(',
              "  shooter.order = createMoveOrder({ x: 30.5, y: 2.5 }, { source: 'player' });",
          ]
          for index, marker in enumerate(markers):
              if marker not in body:
                  raise SystemExit(f'marker not found: {marker}')
              body = body.replace(marker, f"  console.log('WP{index}');\n{marker}", 1)
          source = source[:start] + body + source[end:]
          path.write_text(source, encoding='utf-8')
          PY

      - name: Capture physical movement output
        id: movement
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          timeout --signal=TERM --kill-after=10s 90s npm run physical-movement:smoke 2>&1 | tee stage2-physical-movement-trace.log

      - name: Upload physical movement output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage2-physical-movement-trace-${{ github.event.pull_request.head.sha }}
          path: stage2-physical-movement-trace.log
          if-no-files-found: error
          retention-days: 1

      - name: Preserve movement failure
        if: steps.movement.outcome == 'failure'
        run: exit 1
