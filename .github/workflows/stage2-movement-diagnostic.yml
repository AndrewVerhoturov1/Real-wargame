name: Stage 2 Movement Diagnostic

on:
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: read

jobs:
  trace-physical-movement:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Add temporary scenario trace
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/physical_movement_runtime_smoke.ts')
          source = path.read_text(encoding='utf-8')
          calls = [
              'verifyCanonicalIdsAndDefaults',
              'verifyMigrationAndSafeFallback',
              'verifyCatalogRevisionSeparation',
              'verifyOwnerPrecedence',
              'verifyExplicitResetOnDeselection',
              'verifyWeaponPreparationLifecycle',
              'verifyWeaponPreparationRemainingSerialization',
              'verifySpeedAndStaminaPhysics',
              'verifyExhaustionFallback',
              'verifyFallbackKeepsMovementProgress',
              'verifyWeaponMovementConstraints',
              'verifySimulationTickBridgesPhysicalMovement',
              'verifyTerrainAwareMovementDistance',
              'verifyEnvironmentRegistryDrivesMovementMaterial',
              'verifyPublicApiContracts',
              'verifyRuntimeReconciliationContracts',
          ]
          for index, name in enumerate(calls):
              marker = f'{name}();'
              if marker not in source:
                  raise SystemExit(f'marker not found: {marker}')
              source = source.replace(marker, f"console.log('SCENARIO_{index}_{name}');\n{marker}", 1)
          path.write_text(source, encoding='utf-8')
          PY

      - name: Capture physical movement output
        id: movement
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          timeout --signal=TERM --kill-after=10s 90s npm run physical-movement:smoke 2>&1 | tee stage2-physical-movement-trace.log

      - name: Upload physical movement output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage2-physical-movement-trace-${{ github.event.pull_request.head.sha }}
          path: stage2-physical-movement-trace.log
          if-no-files-found: error
          retention-days: 1

      - name: Preserve movement failure
        if: steps.movement.outcome == 'failure'
        run: exit 1
