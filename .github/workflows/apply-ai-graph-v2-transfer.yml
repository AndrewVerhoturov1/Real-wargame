name: Diagnose AI Graph v2 transfer apply

on:
  pull_request:
    branches:
      - real-wargame-preview
    types: [synchronize]

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  diagnose-transfer:
    if: github.event.pull_request.head.ref == 'transfer/ai-graph-v2-preview-ready-2026-07-13'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: transfer/ai-graph-v2-preview-ready-2026-07-13
          fetch-depth: 0
      - name: Download and reconstruct exact patch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl -L --fail -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/8280752963/zip" -o /tmp/artifact.zip
          mkdir -p /tmp/artifact /tmp/source
          unzip -q /tmp/artifact.zip -d /tmp/artifact
          unzip -q /tmp/artifact/graph-v2-branch-source.zip -d /tmp/source
          PARTS=/tmp/source/.github/graph-v2-final-patch
          cat "${PARTS}/part00" "${PARTS}/part01" "${PARTS}/part02" "${PARTS}/part03" "${PARTS}/part04" "${PARTS}/part05" > /tmp/final.b64
          head -c 5000 "${PARTS}/part06a0" >> /tmp/final.b64
          cat "${PARTS}/part06b" "${PARTS}/part06c" | xxd -r -p >> /tmp/final.b64
          cat "${PARTS}/part07" >> /tmp/final.b64
          base64 -d /tmp/final.b64 > /tmp/final.patch.gz
          echo "e4edc6ac36676f2dfc0abc4c6db90790c9e28c36d756586d9679dba274a4f2c5  /tmp/final.patch.gz" | sha256sum -c -
          gzip -dc /tmp/final.patch.gz > /tmp/final.patch
          echo "82120162245834228d2ffcffcf176e15ceb4e135d849e53a85e7059304fb97b9  /tmp/final.patch" | sha256sum -c -
      - name: Materialize baseline and capture apply diagnostics
        shell: bash
        run: |
          set +e
          exec > >(tee /tmp/apply-diagnostics.txt) 2>&1
          mkdir -p .github/workflows
          printf '%s\n' 'Temporary isolated branch for restoring and finalizing Graph v2. Do not merge until explicit user transfer command.' > .github/GRAPH_V2_FINALIZE_NOTE.md
          printf '%s\n' 'Export current preview-derived source for isolated Graph v2 finalization.' > .github/graph-v2-finalize-trigger.txt
          cat > .github/workflows/export-ai-graph-v2-finalize-source.yml <<'YAML'
          name: Export AI Graph v2 finalize source

          on:
            push:
              branches:
                - feat/ai-graph-v2-finalize-2026-07-13
            pull_request:
              branches:
                - real-wargame-preview
            workflow_dispatch:

          jobs:
            export-source:
              runs-on: ubuntu-latest
              timeout-minutes: 5
              steps:
                - uses: actions/checkout@v4
                - name: Create source archive
                  run: zip -r source-snapshot.zip . -x '.git/*' 'node_modules/*' 'dist/*'
                - uses: actions/upload-artifact@v4
                  with:
                    name: ai-graph-v2-finalize-source-${{ github.sha }}
                    path: source-snapshot.zip
                    retention-days: 1
          YAML
          cp /tmp/source/.github/workflows/graph-v2-finalize-visual.yml .github/workflows/graph-v2-finalize-visual.yml
          echo '=== hashes ==='
          git hash-object .github/GRAPH_V2_FINALIZE_NOTE.md
          git hash-object .github/graph-v2-finalize-trigger.txt
          git hash-object .github/workflows/export-ai-graph-v2-finalize-source.yml
          git hash-object .github/workflows/graph-v2-finalize-visual.yml
          echo '=== status ==='
          git status --short
          echo '=== apply check ==='
          git apply --check --verbose /tmp/final.patch
          echo "apply_status=$?"
          exit 0
      - name: Upload apply diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: graph-v2-transfer-apply-diagnostics-${{ github.event.pull_request.head.sha }}
          path: /tmp/apply-diagnostics.txt
          retention-days: 1
