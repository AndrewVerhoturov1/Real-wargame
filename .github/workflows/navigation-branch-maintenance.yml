name: Navigation Branch Maintenance

on:
  pull_request:
    branches:
      - real-wargame-preview
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.ref == 'tmp/navigation-profiles-route-cost-20260712'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write
    steps:
      - name: Checkout temporary branch
        uses: actions/checkout@v4
        with:
          ref: tmp/navigation-profiles-route-cost-20260712
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply idempotent source and documentation maintenance
        shell: bash
        run: |
          node scripts/navigation_branch_maintenance.mjs
          node scripts/navigation_compile_fixes.mjs
          node scripts/navigation_docs_finalize.mjs
          npm run docs:sync

      - name: Commit maintenance changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'No maintenance changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            src/ai-node-editor/NavigationProfileEditor.ts \
            src/core/pathfinding/GridPathfinder.ts \
            src/core/orders/PlayerCommand.ts \
            src/core/units/UnitModel.ts \
            src/core/navigation/NavigationProfiles.ts \
            src/core/navigation/RouteCostField.ts \
            src/core/navigation/NavigationReplanPolicy.ts \
            src/core/ai/AiStatefulMoveGameBridge.ts \
            src/core/simulation/SimulationTick.ts \
            src/main.ts \
            src/rendering/PixiApp.ts \
            docs/ai/CURRENT_STATE.md \
            docs/subprojects/index.json \
            docs/subprojects/INDEX.md \
            docs/subprojects/ai-single-unit-editor/subproject.json \
            docs/subprojects/ai-single-unit-editor/STATUS.md \
            docs/subprojects/ai-single-unit-editor/HANDOFF.md \
            docs/subprojects/ai-single-unit-editor/JOURNAL.md
          git commit -m 'docs: synchronize navigation profile subproject state'
          git push origin HEAD:tmp/navigation-profiles-route-cost-20260712
