name: Stage 4 Tree Diagnostic

on:
  push:
    branches:
      - feature/20260723-shooting-stage-04-projectile-runtime-benchmark

permissions:
  contents: read

jobs:
  diagnose:
    if: contains(github.event.head_commit.message, 'activate Stage 4 tree diagnostic')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reconstruct intended final tree
        shell: bash
        run: |
          set -euo pipefail
          base='3544444490f9026954d99a84e167988d0e518156'
          git config user.name 'OpenAI Web Chat'
          git config user.email 'openai-web-chat@users.noreply.github.com'
          base64 -d .github/stage4-finalize/fix-commits.b64 | gzip -d > /tmp/stage4-fixes.mbox
          git am --3way /tmp/stage4-fixes.mbox
          git rm -r --ignore-unmatch \
            .github/stage4-fix-patch \
            .github/stage4-finalize \
            .github/stage4-transfer-final \
            .github/stage4-transfer-20260724 \
            .github/stage4-patch \
            .github/workflows/stage4-transfer-apply.yml \
            .github/workflows/stage4-finalize-verify.yml \
            .github/workflows/stage4-tree-diagnostic.yml
          git commit -m 'chore: reconstruct intended Stage 4 tree for diagnostics'
          git diff --name-only "$base"...HEAD | sort > stage4-actual-paths.txt
          while IFS= read -r path; do sha256sum "$path"; done < stage4-actual-paths.txt > stage4-actual-manifest.sha256
          git diff --stat "$base"...HEAD > stage4-actual-stat.txt
          git log --oneline "$base"..HEAD > stage4-actual-log.txt
          cat stage4-actual-paths.txt
          cat stage4-actual-manifest.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: stage4-tree-diagnostic
          path: |
            stage4-actual-paths.txt
            stage4-actual-manifest.sha256
            stage4-actual-stat.txt
            stage4-actual-log.txt
          if-no-files-found: error
          retention-days: 1
