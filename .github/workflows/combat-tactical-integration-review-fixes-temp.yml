name: Combat Tactical Integration Review Fixes Temp

on:
  push:
    branches:
      - feat/combat-systems-integration-stage1-temp

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply review fixes
        shell: bash
        run: |
          set -o pipefail
          python - <<'PY' 2>&1 | tee combat-review-patch.log
          from pathlib import Path

          threat_path = Path('src/core/knowledge/SoldierThreatMemory.ts')
          threat = threat_path.read_text(encoding='utf-8')
          function_start = threat.index('function mergeCombatEvidence(')
          known_start = threat.index('  if (known && evidence.sourceUnitId) {', function_start)
          known_end = threat.index('\n\n  const bucket =', known_start)
          known_replacement = '''  if (known && evidence.sourceUnitId) {
            const positionConflict = Math.hypot(
              known.x - evidence.estimatedSourcePosition.x,
              known.y - evidence.estimatedSourcePosition.y,
            );
            const compatiblePosition = positionConflict <= Math.max(known.uncertaintyCells, evidence.uncertaintyCells) * 1.5;
            const evidencePositionWeight = known.visibleNow
              ? 0
              : Math.max(0.08, Math.min(0.35, evidence.confidence / Math.max(1, known.confidence + evidence.confidence) * 0.5));
            const uncertaintyCells = known.visibleNow
              ? Math.max(0.5, Math.min(known.uncertaintyCells, evidence.uncertaintyCells))
              : compatiblePosition
                ? Math.max(0.5, Math.min(known.uncertaintyCells, evidence.uncertaintyCells) * 0.95)
                : Math.max(known.uncertaintyCells, evidence.uncertaintyCells, positionConflict * 0.6);
            existing.set(known.id, {
              ...known,
              x: known.x + (evidence.estimatedSourcePosition.x - known.x) * evidencePositionWeight,
              y: known.y + (evidence.estimatedSourcePosition.y - known.y) * evidencePositionWeight,
              strength: Math.max(known.strength, evidence.strength),
              suppression: Math.max(known.suppression, evidence.suppression),
              stressPerSecond: Math.max(known.stressPerSecond, evidence.stressPerSecond),
              directionDegrees: blendDirections(known.directionDegrees, known.confidence, evidence.directionDegrees, evidence.confidence),
              arcDegrees: Math.max(28, Math.min(known.arcDegrees, evidence.arcDegrees)),
              rangeCells: Math.max(known.rangeCells, evidence.rangeCells),
              confidence: Math.min(96, Math.max(known.confidence, evidence.confidence) + Math.min(12, evidence.evidenceCount * 3)),
              uncertaintyCells,
              source: known.visibleNow ? known.source : 'fire_pressure',
              lastUpdatedSeconds: now,
            });
            refreshed.add(known.id);
            return;
          }'''
          threat = threat[:known_start] + known_replacement + threat[known_end:]

          bucket_line = '  const bucket = Math.round(normalizeDegrees(evidence.directionDegrees) / UNKNOWN_DIRECTION_BUCKET_DEGREES) % 12;'
          bucket_start = threat.index(bucket_line, function_start)
          threat_id_start = bucket_start + len(bucket_line) + 1
          threat_id_end = threat.index('\n', threat_id_start)
          if not threat[threat_id_start:threat_id_end].startswith('  const threatId = `unknown-fire:'):
              raise SystemExit('Unexpected unknown threat id line: ' + threat[threat_id_start:threat_id_end])
          threat_id_replacement = '''  const areaBucketSize = Math.max(4, Math.round(evidence.uncertaintyCells));
          const areaBucketX = Math.round(evidence.estimatedSourcePosition.x / areaBucketSize);
          const areaBucketY = Math.round(evidence.estimatedSourcePosition.y / areaBucketSize);
          const threatId = `unknown-fire:${bucket}:${areaBucketX}:${areaBucketY}`;'''
          threat = threat[:threat_id_start] + threat_id_replacement + threat[threat_id_end:]
          threat_path.write_text(threat, encoding='utf-8')

          smoke_path = Path('scripts/combat_tactical_integration_smoke.ts')
          smoke = smoke_path.read_text(encoding='utf-8')
          hidden_start = smoke.index('function verifyHiddenMovementDoesNotLeak(): void {')
          hidden_anchor = '  assert.ok(threat.uncertaintyCells > 1);'
          insert_at = smoke.index(hidden_anchor, hidden_start) + len(hidden_anchor)
          hidden_extension = '''

          const incomingDx = blue.position.x - red.position.x;
          const incomingDy = blue.position.y - red.position.y;
          const incomingLength = Math.max(0.001, Math.hypot(incomingDx, incomingDy));
          const incomingDirection = { x: incomingDx / incomingLength, y: incomingDy / incomingLength, z: 0 };
          const impactGrid = {
            x: blue.position.x + incomingDirection.x * 4,
            y: blue.position.y + incomingDirection.y * 4,
          };
          const metresPerCell = state.map.metersPerCell;
          applyBallisticCombatEffects(state, {
            shotId: 'lost-known-shooter-fire',
            shooterId: red.id,
            origin: metres(state, red.position, 1.45),
            direction: incomingDirection,
            travelledMetres: Math.hypot(impactGrid.x - red.position.x, impactGrid.y - red.position.y) * metresPerCell,
            impactPoint: {
              xMetres: impactGrid.x * metresPerCell,
              yMetres: impactGrid.y * metresPerCell,
              zMetres: 1.45,
            },
            hitType: 'none',
            muzzleVelocityMetresPerSecond: 865,
          });
          state.simulationTimeSeconds += 0.1;
          syncSoldierThreatMemory(state, blue, 0.1);
          const fireUpdatedThreat = blue.tacticalKnowledge.threats.find((item) => item.id === `unit:${red.id}`);
          assert.ok(fireUpdatedThreat);
          assert.notDeepEqual(
            { x: fireUpdatedThreat.x, y: fireUpdatedThreat.y },
            remembered,
            'subjective incoming-fire evidence should cautiously shift a lost contact area',
          );
          assert.notDeepEqual(
            { x: fireUpdatedThreat.x, y: fireUpdatedThreat.y },
            red.position,
            'incoming-fire evidence must not copy the hidden objective shooter position',
          );
          assert.ok(
            fireUpdatedThreat.uncertaintyCells >= threat.uncertaintyCells,
            'conflicting fire evidence must not make a lost contact artificially precise',
          );'''
          smoke = smoke[:insert_at] + hidden_extension + smoke[insert_at:]
          smoke_path.write_text(smoke, encoding='utf-8')

          visual_path = Path('src/testing/CombatTacticalIntegrationVisualQaHarness.ts')
          visual = visual_path.read_text(encoding='utf-8')
          old_wall = '  const centerX = (observer.position.x + shooter.position.x) / 2;'
          if visual.count(old_wall) != 1:
              raise SystemExit(f'Wall visual-QA patch matched {visual.count(old_wall)} lines.')
          visual = visual.replace(old_wall, '  const centerX = Math.min(shooter.position.x - 1.5, observer.position.x + 2.5);')
          visual_path.write_text(visual, encoding='utf-8')
          PY
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/core/knowledge/SoldierThreatMemory.ts scripts/combat_tactical_integration_smoke.ts src/testing/CombatTacticalIntegrationVisualQaHarness.ts
          git commit -m "fix: refine subjective fire evidence integration"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Upload patch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: combat-review-patch-log
          path: combat-review-patch.log
          if-no-files-found: warn
          retention-days: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Combat tactical integration
        run: npm run combat-tactical-integration:smoke

      - name: Perception
        run: npm run perception:smoke

      - name: Combat foundation
        run: npm run combat-foundation:smoke

      - name: Awareness and threat fields
        run: npm run awareness-field:smoke

      - name: Directional terrain
        run: npm run directional-terrain:smoke

      - name: Navigation profiles
        run: npm run navigation-profiles:smoke

      - name: A star
        run: npm run pathfinding:smoke

      - name: Routed movement
        run: npm run routed-move:smoke

      - name: Route replan status
        run: npm run route-status:smoke

      - name: Scene persistence
        run: npm run runtime-scene:smoke

      - name: Existing spatial index
        run: npm run spatial-index:smoke

      - name: Documentation
        run: npm run docs:sync
