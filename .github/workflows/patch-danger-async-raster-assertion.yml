name: Patch Danger Async Raster Assertion

on:
  push:
    branches:
      - agent/danger-layer-moving-units-performance

permissions:
  contents: write

jobs:
  patch-test:
    if: github.event.head_commit.message == 'Trigger async raster assertion patch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/danger-layer-moving-units-performance
      - name: Move raster completion assertion after worker settle
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/danger-layer-movement-performance.spec.ts')
          text = path.read_text(encoding='utf-8')
          early = '  expect(movingDiagnostics.worldRasterBuilds).toBeGreaterThan(beforeMovement.worldRasterBuilds);\n'
          if text.count(early) != 1:
              raise SystemExit('Expected one early world-raster assertion')
          text = text.replace(early, '', 1)
          anchor = '''  const afterMovement = requireMovement(after);
          expect(afterMovement.lastAppliedRasterKey).toBe(afterMovement.lastRequestedRasterKey);'''.replace('          ', '  ')
          replacement = '''  const afterMovement = requireMovement(after);
          expect(afterMovement.worldRasterBuilds).toBeGreaterThan(beforeMovement.worldRasterBuilds);
          expect(afterMovement.lastAppliedRasterKey).toBe(afterMovement.lastRequestedRasterKey);'''.replace('          ', '  ')
          if anchor not in text:
              raise SystemExit('Expected settled hostile assertion anchor')
          path.write_text(text.replace(anchor, replacement, 1), encoding='utf-8')
          Path('.github/workflows/patch-danger-async-raster-assertion.yml').unlink()
          PY
      - name: Commit async worker assertion timing
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tests/danger-layer-movement-performance.spec.ts .github/workflows/patch-danger-async-raster-assertion.yml
          git commit -m 'Assert hostile raster build after worker settles'
          git push origin HEAD:agent/danger-layer-moving-units-performance


