name: Temporary Preview Docs Sync

on:
  push:
    branches:
      - tmp/ui-compact-preview-docs-sync-20260712

permissions:
  contents: write

jobs:
  sync-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout documentation branch
        uses: actions/checkout@v4
        with:
          ref: tmp/ui-compact-preview-docs-sync-20260712
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate canonical documentation
        run: npm run docs:generate

      - name: Commit generated docs and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/tmp-preview-docs-sync.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs .github/workflows/tmp-preview-docs-sync.yml
          git diff --cached --quiet && exit 0
          git commit -m "docs: synchronize compact route controls preview state"
          git push origin HEAD:tmp/ui-compact-preview-docs-sync-20260712
