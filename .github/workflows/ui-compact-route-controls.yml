name: Compact Route Controls Core

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compact-route-controls:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run editor:smoke
      - run: npm run workspace:smoke
      - run: npm run command-plan-route:smoke
      - run: npm run navigation-profile-switch:smoke
      - run: npm run navigation-overlay:smoke
      - run: npm run routed-move:smoke
      - run: npm run ui-compact-route-controls:smoke
      - run: npm run build
      - run: npm run docs:check
