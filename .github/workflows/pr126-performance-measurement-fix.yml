name: PR 126 Performance Measurement Fix

on:
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - '.github/workflows/pr126-performance-measurement-fix.yml'

permissions:
  contents: write

jobs:
  fix-and-verify:
    if: github.head_ref == 'agent/danger-route-cost-parity-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Apply exact performance measurement corrections
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          harness_path = Path('src/testing/CombatTacticalIntegrationVisualQaHarness.ts')
          harness = harness_path.read_text(encoding='utf-8')
          import_anchor = "import { buildSoldierAwarenessReport } from '../core/knowledge/SoldierAwarenessGrid';\n"
          if harness.count(import_anchor) != 1:
              raise SystemExit(f'harness import anchor count: {harness.count(import_anchor)}')
          harness = harness.replace(import_anchor, import_anchor + "import { getSoldierDangerField } from '../core/knowledge/SoldierDangerField';\n")

          dynamic_start = harness.index('    stepDangerPerformanceDynamicUpdate(step): void {')
          geometry_start = harness.index('    stepDangerPerformanceGeometryUpdate(step): void {', dynamic_start)
          dynamic = harness[dynamic_start:geometry_start]
          old_call = '      buildSoldierAwarenessReport(state, observer);\n'
          if dynamic.count(old_call) != 1:
              raise SystemExit(f'dynamic awareness call count: {dynamic.count(old_call)}')
          dynamic = dynamic.replace(old_call, '      scoreCanonicalDangerPerformanceField(state, observer);\n')

          geometry_end = harness.index('    },\n  };', geometry_start) + len('    },\n')
          geometry = harness[geometry_start:geometry_end]
          if geometry.count(old_call) != 1:
              raise SystemExit(f'geometry awareness call count: {geometry.count(old_call)}')
          geometry = geometry.replace(old_call, '      scoreCanonicalDangerPerformanceField(state, observer);\n')

          harness = harness[:dynamic_start] + dynamic + harness[geometry_start:]
          adjusted_geometry_start = harness.index('    stepDangerPerformanceGeometryUpdate(step): void {', dynamic_start)
          adjusted_geometry_end = harness.index('    },\n  };', adjusted_geometry_start) + len('    },\n')
          harness = harness[:adjusted_geometry_start] + geometry + harness[adjusted_geometry_end:]

          helper_anchor = 'function resolveFixtureUnits(state: SimulationState): [UnitModel, UnitModel] {\n'
          helper = '\n'.join([
              'function scoreCanonicalDangerPerformanceField(state: SimulationState, observer: UnitModel): void {',
              '  getSoldierDangerField(state.map, {',
              '    unitId: observer.id,',
              '    originX: observer.position.x,',
              '    originY: observer.position.y,',
              '    posture: observer.behaviorRuntime.posture,',
              '    knowledgeRevision: observer.tacticalKnowledge.revision,',
              '    threats: observer.tacticalKnowledge.threats,',
              '  });',
              '}',
              '',
              '',
          ])
          if harness.count(helper_anchor) != 1:
              raise SystemExit(f'harness helper anchor count: {harness.count(helper_anchor)}')
          harness_path.write_text(harness.replace(helper_anchor, helper + helper_anchor), encoding='utf-8')

          test_path = Path('tests/danger-layer-browser-performance.spec.ts')
          test = test_path.read_text(encoding='utf-8')
          parity_type = '  setDangerParityPhase(phase: string): { unitThreatCount?: number };\n'
          geometry_type = '  stepDangerPerformanceGeometryUpdate(step: number): void;\n'
          if test.count(parity_type) != 1 or test.count(geometry_type) != 1:
              raise SystemExit('candidate API type anchors missing')
          test = test.replace(parity_type, '  setDangerParityPhase?(phase: string): { unitThreatCount?: number };\n')
          test = test.replace(geometry_type, '  stepDangerPerformanceGeometryUpdate?(step: number): void;\n')

          setup_start = test.index('  const classifiedThreatCount = await page.evaluate(() => {')
          setup_end = test.index('  await page.waitForFunction', setup_start)
          setup = '\n'.join([
              '  const classifiedThreatCount = await page.evaluate((candidate) => {',
              '    const api = window.__realWargameCombatTacticalVisualQa as unknown as ExtendedCombatVisualApi | undefined;',
              "    if (!api) throw new Error('Combat tactical visual QA API is unavailable.');",
              "    if (!candidate) return api.setScenario('slice1-near-miss-evidence-suppression').unitThreatCount ?? 0;",
              "    api.setScenario('danger-route-cost-parity');",
              "    if (!api.setDangerParityPhase) throw new Error('Candidate danger parity API is unavailable.');",
              "    return api.setDangerParityPhase('rifle-and-machine-gun').unitThreatCount ?? 0;",
              '  }, IS_CANDIDATE);',
              '',
          ])
          test = test[:setup_start] + setup + test[setup_end:]

          rescore_marker = test.index('  const afterRescoreDanger = readSoldierDangerDiagnostics(afterRescoreReport);')
          geometry_start = test.index('  await page.evaluate(() => {', rescore_marker)
          geometry_end = test.index('  const finalReport = await downloadPerformanceReport(page);', geometry_start)
          geometry_block = '\n'.join([
              '  if (IS_CANDIDATE) {',
              '    await page.evaluate(() => {',
              '      const api = window.__realWargameCombatTacticalVisualQa as unknown as ExtendedCombatVisualApi | undefined;',
              "      if (!api?.stepDangerPerformanceGeometryUpdate) throw new Error('Candidate geometry update API is unavailable.');",
              '      api.stepDangerPerformanceGeometryUpdate(1);',
              '    });',
              '    await page.waitForTimeout(750);',
              '  }',
              '',
          ])
          test_path.write_text(test[:geometry_start] + geometry_block + test[geometry_end:], encoding='utf-8')

          compare_path = Path('scripts/compare_danger_layer_browser_performance.mjs')
          compare = compare_path.read_text(encoding='utf-8')
          old_gate = '  oneWeightedDirectionalFieldBuild: directionalTactical.fullMapScanCount <= 1,\n'
          new_gate = '  oneDirectionalSectorBasisBuild: directionalTactical.basisBuildCount <= 1,\n'
          if compare.count(old_gate) != 1:
              raise SystemExit(f'directional gate anchor count: {compare.count(old_gate)}')
          compare_path.write_text(compare.replace(old_gate, new_gate), encoding='utf-8')
          PY
      - run: npm ci
      - run: npm install --no-save @playwright/test
      - run: npx playwright install chromium
      - name: Verify candidate danger-field timing
        env:
          DANGER_PERF_LABEL: candidate-local-verification
          DANGER_PERF_OUTPUT: artifacts/performance/pr126-danger-field.json
        run: npx playwright test tests/danger-layer-browser-performance.spec.ts --config=playwright.performance.config.ts --project=chromium --reporter=line
      - name: Verify core and docs
        run: |
          npm run danger-route-cost-parity:smoke
          npm run danger-layer-performance:smoke
          npm run danger-layer-movement-performance:smoke
          npm run workspace:smoke
          npm run navigation-profiles:smoke
          npm run build
          npm run docs:check
      - name: Commit source and test corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/testing/CombatTacticalIntegrationVisualQaHarness.ts \
            tests/danger-layer-browser-performance.spec.ts \
            scripts/compare_danger_layer_browser_performance.mjs
          git commit -m "Measure canonical danger rescoring directly"
          git push origin HEAD:${{ github.head_ref }}
