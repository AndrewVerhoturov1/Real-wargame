name: Danger Layer Browser Performance

on:
  workflow_dispatch:
    inputs:
      base_sha:
        description: Exact baseline SHA to compare against
        required: true
        type: string
      head_sha:
        description: Exact candidate SHA; defaults to the selected ref
        required: false
        type: string
      performance_reason:
        description: Concrete regression this run can detect after this change
        required: true
        type: string
  pull_request:
    branches:
      - real-wargame-preview
    types: [labeled]

permissions:
  contents: read

concurrency:
  group: danger-layer-browser-performance-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  compare-base-and-head:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'ci:danger-performance'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      PERF_BASE_SHA: ${{ github.event.pull_request.base.sha || inputs.base_sha }}
      PERF_HEAD_SHA: ${{ github.event.pull_request.head.sha || inputs.head_sha || github.sha }}
      PERF_BASE_BRANCH: ${{ github.event.pull_request.base.ref || 'manual-base' }}
      PERF_HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
      PR_BODY: ${{ github.event.pull_request.body || '' }}
      DISPATCH_REASON: ${{ inputs.performance_reason || '' }}

    steps:
      - name: Require a concrete performance reason
        shell: bash
        run: |
          set -euo pipefail
          reason="$DISPATCH_REASON"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            reason="$(printf '%s\n' "$PR_BODY" | sed -n 's/^PERFORMANCE_REASON:[[:space:]]*//p' | head -n 1)"
          fi
          normalized="$(printf '%s' "$reason" | tr '[:upper:]' '[:lower:]')"
          if [ -z "$reason" ] || printf '%s' "$normalized" | grep -Eq '^(none|n/a|for reliability|just in case|на всякий случай|для над[её]жности)$'; then
            echo 'A concrete PERFORMANCE_REASON is required. Explain the regression this scenario can detect.' >&2
            exit 1
          fi
          if [ -z "$PERF_BASE_SHA" ] || [ -z "$PERF_HEAD_SHA" ]; then
            echo 'Both exact base and head SHA are required.' >&2
            exit 1
          fi
          echo "Performance reason: $reason" >> "$GITHUB_STEP_SUMMARY"
          echo "Base: $PERF_BASE_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "Head: $PERF_HEAD_SHA" >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout candidate measurement sources
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PERF_HEAD_SHA }}
          path: source

      - name: Checkout exact base SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PERF_BASE_SHA }}
          path: baseline

      - name: Checkout exact candidate SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PERF_HEAD_SHA }}
          path: candidate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: source/package-lock.json

      - name: Prepare shared exact-build measurement
        shell: bash
        run: |
          mkdir -p browser-artifacts baseline/src/core/debug
          cp source/tests/danger-layer-browser-performance.spec.ts baseline/tests/danger-layer-browser-performance.spec.ts
          cp source/playwright.performance.config.ts baseline/playwright.performance.config.ts
          cp source/vite.config.ts baseline/vite.config.ts
          cp source/src/core/debug/BuildIdentity.ts baseline/src/core/debug/BuildIdentity.ts
          cp source/src/core/debug/AwarenessMovementDiagnostics.ts baseline/src/core/debug/AwarenessMovementDiagnostics.ts

      - name: Install baseline dependencies and Chromium once
        working-directory: baseline
        run: |
          npm ci
          npm install --no-save @playwright/test
          npx playwright install chromium

      - name: Measure exact base SHA in Chromium
        working-directory: baseline
        env:
          REAL_WARGAME_BRANCH: ${{ env.PERF_BASE_BRANCH }}
          REAL_WARGAME_COMMIT_SHA: ${{ env.PERF_BASE_SHA }}
          DANGER_PERF_EXPECTED_BRANCH: ${{ env.PERF_BASE_BRANCH }}
          DANGER_PERF_EXPECTED_SHA: ${{ env.PERF_BASE_SHA }}
          DANGER_PERF_LABEL: before-base
          DANGER_PERF_OUTPUT: ../browser-artifacts/before.json
        shell: bash
        run: |
          set -o pipefail
          npx playwright test tests/danger-layer-browser-performance.spec.ts --config=playwright.performance.config.ts --project=chromium --reporter=line 2>&1 | tee ../browser-artifacts/before-playwright.log

      - name: Install candidate dependencies
        working-directory: candidate
        run: |
          npm ci
          npm install --no-save @playwright/test

      - name: Measure exact candidate SHA in Chromium
        working-directory: candidate
        env:
          REAL_WARGAME_BRANCH: ${{ env.PERF_HEAD_BRANCH }}
          REAL_WARGAME_COMMIT_SHA: ${{ env.PERF_HEAD_SHA }}
          DANGER_PERF_EXPECTED_BRANCH: ${{ env.PERF_HEAD_BRANCH }}
          DANGER_PERF_EXPECTED_SHA: ${{ env.PERF_HEAD_SHA }}
          DANGER_PERF_LABEL: after-head
          DANGER_PERF_OUTPUT: ../browser-artifacts/after.json
        shell: bash
        run: |
          set -o pipefail
          npx playwright test tests/danger-layer-browser-performance.spec.ts --config=playwright.performance.config.ts --project=chromium --reporter=line 2>&1 | tee ../browser-artifacts/after-playwright.log

      - name: Compare browser performance acceptance
        run: node source/scripts/compare_danger_layer_browser_performance.mjs browser-artifacts/before.json browser-artifacts/after.json browser-artifacts/comparison.json

      - name: Run exact-head live movement scenarios
        working-directory: candidate
        env:
          REAL_WARGAME_BRANCH: ${{ env.PERF_HEAD_BRANCH }}
          REAL_WARGAME_COMMIT_SHA: ${{ env.PERF_HEAD_SHA }}
          DANGER_PERF_EXPECTED_BRANCH: ${{ env.PERF_HEAD_BRANCH }}
          DANGER_PERF_EXPECTED_SHA: ${{ env.PERF_HEAD_SHA }}
          DANGER_MOVEMENT_PERF_OUTPUT: ../browser-artifacts/movement.json
        shell: bash
        run: |
          set -o pipefail
          npx playwright test tests/danger-layer-movement-performance.spec.ts --config=playwright.performance.config.ts --project=chromium --reporter=line 2>&1 | tee ../browser-artifacts/movement-playwright.log

      - name: Capture exact-head wall long-task attribution
        working-directory: candidate
        env:
          REAL_WARGAME_BRANCH: ${{ env.PERF_HEAD_BRANCH }}
          REAL_WARGAME_COMMIT_SHA: ${{ env.PERF_HEAD_SHA }}
          DANGER_PERF_EXPECTED_BRANCH: ${{ env.PERF_HEAD_BRANCH }}
          DANGER_PERF_EXPECTED_SHA: ${{ env.PERF_HEAD_SHA }}
          DANGER_LONG_TASK_ATTRIBUTION_OUTPUT: ../browser-artifacts/long-task-attribution.json
        shell: bash
        run: |
          set -o pipefail
          npx playwright test tests/danger-layer-long-task-attribution.spec.ts --config=playwright.performance.config.ts --project=chromium --reporter=line 2>&1 | tee ../browser-artifacts/long-task-attribution-playwright.log

      - name: Finalize and assert semantic evidence
        env:
          DANGER_PERF_EXPECTED_BRANCH: ${{ env.PERF_HEAD_BRANCH }}
          DANGER_PERF_EXPECTED_SHA: ${{ env.PERF_HEAD_SHA }}
        run: |
          node source/scripts/finalize_danger_layer_movement_attribution.mjs browser-artifacts/movement.json browser-artifacts/long-task-attribution.json
          node source/scripts/assert_danger_layer_movement_evidence.mjs browser-artifacts/movement.json

      - name: Upload browser performance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: danger-layer-browser-performance
          path: browser-artifacts/*
          if-no-files-found: error
          retention-days: 14
