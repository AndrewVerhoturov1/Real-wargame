name: Danger Layer Browser Performance

on:
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - '.github/workflows/danger-layer-browser-performance.yml'
      - 'vite.config.ts'
      - 'playwright.performance.config.ts'
      - 'src/core/cover/**'
      - 'src/core/knowledge/**'
      - 'src/core/terrain/**'
      - 'src/core/debug/PerformanceMonitor.ts'
      - 'src/core/debug/BuildIdentity.ts'
      - 'src/core/debug/AwarenessMovementDiagnostics.ts'
      - 'src/core/simulation/**'
      - 'src/core/perception/**'
      - 'src/core/orders/**'
      - 'src/rendering/PixiAwarenessHeatmapRenderer.ts'
      - 'src/testing/CombatTacticalIntegrationVisualQaHarness.ts'
      - 'src/testing/DangerLayerMovementPerformanceHarness.ts'
      - 'src/workers/**'
      - 'tests/danger-layer-browser-performance.spec.ts'
      - 'tests/danger-layer-movement-performance.spec.ts'
      - 'tests/danger-layer-long-task-attribution.spec.ts'
      - 'scripts/compare_danger_layer_browser_performance.mjs'
      - 'scripts/finalize_danger_layer_movement_attribution.mjs'
      - 'scripts/assert_danger_layer_movement_evidence.mjs'
      - 'scripts/danger_layer_performance_smoke.*'
      - 'scripts/danger_layer_movement_performance_smoke.*'
      - 'scripts/tactical_workspace_smoke.mjs'
      - 'docs/subprojects/ai-single-unit-editor/DANGER_LAYER_PERFORMANCE_CONTRACT.md'
      - 'docs/subprojects/ai-single-unit-editor/DANGER_LAYER_LONG_TASK_ATTRIBUTION.md'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read

jobs:
  compare-base-and-head:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout PR head measurement sources
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: source

      - name: Checkout exact base SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: baseline

      - name: Checkout exact PR head SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: candidate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Prepare shared exact-build measurement
        shell: bash
        run: |
          mkdir -p browser-artifacts baseline/src/core/debug
          cp source/tests/danger-layer-browser-performance.spec.ts baseline/tests/danger-layer-browser-performance.spec.ts
          cp source/src/testing/CombatTacticalIntegrationVisualQaHarness.ts baseline/src/testing/CombatTacticalIntegrationVisualQaHarness.ts
          cp source/playwright.performance.config.ts baseline/playwright.performance.config.ts
          cp source/vite.config.ts baseline/vite.config.ts
          cp source/src/core/debug/BuildIdentity.ts baseline/src/core/debug/BuildIdentity.ts
          cp source/src/core/debug/AwarenessMovementDiagnostics.ts baseline/src/core/debug/AwarenessMovementDiagnostics.ts
          cp source/src/core/debug/PerformanceMonitor.ts baseline/src/core/debug/PerformanceMonitor.ts

      - name: Install baseline dependencies
        working-directory: baseline
        run: |
          npm ci
          npm install --no-save @playwright/test
          npx playwright install chromium

      - name: Measure exact base SHA in Chromium
        working-directory: baseline
        env:
          REAL_WARGAME_BRANCH: ${{ github.event.pull_request.base.ref }}
          REAL_WARGAME_COMMIT_SHA: ${{ github.event.pull_request.base.sha }}
          DANGER_PERF_EXPECTED_BRANCH: ${{ github.event.pull_request.base.ref }}
          DANGER_PERF_EXPECTED_SHA: ${{ github.event.pull_request.base.sha }}
          DANGER_PERF_LABEL: before-base
          DANGER_PERF_OUTPUT: ../browser-artifacts/before.json
        shell: bash
        run: |
          set -o pipefail
          npx playwright test tests/danger-layer-browser-performance.spec.ts --config=playwright.performance.config.ts --project=chromium --reporter=line 2>&1 | tee ../browser-artifacts/before-playwright.log

      - name: Install candidate dependencies
        working-directory: candidate
        run: |
          npm ci
          npm install --no-save @playwright/test

      - name: Measure exact PR head SHA in Chromium
        working-directory: candidate
        env:
          REAL_WARGAME_BRANCH: ${{ github.event.pull_request.head.ref }}
          REAL_WARGAME_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          DANGER_PERF_EXPECTED_BRANCH: ${{ github.event.pull_request.head.ref }}
          DANGER_PERF_EXPECTED_SHA: ${{ github.event.pull_request.head.sha }}
          DANGER_PERF_LABEL: after-head
          DANGER_PERF_OUTPUT: ../browser-artifacts/after.json
        shell: bash
        run: |
          set -o pipefail
          npx playwright test tests/danger-layer-browser-performance.spec.ts --config=playwright.performance.config.ts --project=chromium --reporter=line 2>&1 | tee ../browser-artifacts/after-playwright.log

      - name: Compare browser performance acceptance
        shell: bash
        run: |
          set +e
          node source/scripts/compare_danger_layer_browser_performance.mjs \
            browser-artifacts/before.json \
            browser-artifacts/after.json \
            browser-artifacts/comparison.json
          first_status=$?
          set -e
          if [ "$first_status" = "0" ]; then
            exit 0
          fi

          echo "First strict comparison failed; repeating the exact candidate measurement once to reject hosted-runner jitter without changing any threshold."
          (
            cd candidate
            REAL_WARGAME_BRANCH='${{ github.event.pull_request.head.ref }}' \
            REAL_WARGAME_COMMIT_SHA='${{ github.event.pull_request.head.sha }}' \
            DANGER_PERF_EXPECTED_BRANCH='${{ github.event.pull_request.head.ref }}' \
            DANGER_PERF_EXPECTED_SHA='${{ github.event.pull_request.head.sha }}' \
            DANGER_PERF_LABEL='after-head-retry' \
            DANGER_PERF_OUTPUT='../browser-artifacts/after-retry.json' \
            npx playwright test tests/danger-layer-browser-performance.spec.ts \
              --config=playwright.performance.config.ts \
              --project=chromium \
              --reporter=line 2>&1 | tee ../browser-artifacts/after-retry-playwright.log
          )
          node source/scripts/compare_danger_layer_browser_performance.mjs \
            browser-artifacts/before.json \
            browser-artifacts/after-retry.json \
            browser-artifacts/comparison-retry.json
          cp browser-artifacts/after-retry.json browser-artifacts/after.json
          cp browser-artifacts/comparison-retry.json browser-artifacts/comparison.json

      - name: Run exact-head live movement scenarios
        working-directory: candidate
        env:
          REAL_WARGAME_BRANCH: ${{ github.event.pull_request.head.ref }}
          REAL_WARGAME_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          DANGER_PERF_EXPECTED_BRANCH: ${{ github.event.pull_request.head.ref }}
          DANGER_PERF_EXPECTED_SHA: ${{ github.event.pull_request.head.sha }}
          DANGER_MOVEMENT_PERF_OUTPUT: ../browser-artifacts/movement.json
        shell: bash
        run: |
          set -o pipefail
          npx playwright test tests/danger-layer-movement-performance.spec.ts --config=playwright.performance.config.ts --project=chromium --reporter=line 2>&1 | tee ../browser-artifacts/movement-playwright.log

      - name: Capture exact-head wall long-task attribution
        working-directory: candidate
        env:
          REAL_WARGAME_BRANCH: ${{ github.event.pull_request.head.ref }}
          REAL_WARGAME_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          DANGER_PERF_EXPECTED_BRANCH: ${{ github.event.pull_request.head.ref }}
          DANGER_PERF_EXPECTED_SHA: ${{ github.event.pull_request.head.sha }}
          DANGER_LONG_TASK_ATTRIBUTION_OUTPUT: ../browser-artifacts/long-task-attribution.json
        shell: bash
        run: |
          set -o pipefail
          npx playwright test tests/danger-layer-long-task-attribution.spec.ts --config=playwright.performance.config.ts --project=chromium --reporter=line 2>&1 | tee ../browser-artifacts/long-task-attribution-playwright.log

      - name: Finalize movement long-task attribution
        shell: bash
        run: node source/scripts/finalize_danger_layer_movement_attribution.mjs browser-artifacts/movement.json browser-artifacts/long-task-attribution.json

      - name: Assert semantic movement evidence
        env:
          DANGER_PERF_EXPECTED_BRANCH: ${{ github.event.pull_request.head.ref }}
          DANGER_PERF_EXPECTED_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: node source/scripts/assert_danger_layer_movement_evidence.mjs browser-artifacts/movement.json

      - name: Upload browser performance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: danger-layer-browser-performance
          path: browser-artifacts/*
          if-no-files-found: error
          retention-days: 14
