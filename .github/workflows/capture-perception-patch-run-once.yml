name: Capture Perception Patch Run Once

on:
  push:
    branches:
      - feature/20260721-tactical-position-basis
    paths:
      - .github/workflows/capture-perception-patch-run-once.yml

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/20260721-tactical-position-basis
      - name: Capture patch run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p docs/workflow
          run_id="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow patch-perception-map-revision-once.yml --limit 1 --json databaseId --jq '.[0].databaseId')"
          gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --json databaseId,status,conclusion,url,jobs > docs/workflow/PERCEPTION_PATCH_RUN.json
          gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --log-failed > docs/workflow/PERCEPTION_PATCH_FAILED_LOG.txt || true
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/workflow/PERCEPTION_PATCH_RUN.json docs/workflow/PERCEPTION_PATCH_FAILED_LOG.txt
          git commit -m "ci: capture perception patch result [skip ci]"
          git push origin HEAD:feature/20260721-tactical-position-basis
