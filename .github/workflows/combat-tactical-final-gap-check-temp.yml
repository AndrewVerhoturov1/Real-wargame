name: Combat Tactical Final Gap Check Temp

on:
  push:
    branches:
      - feat/combat-systems-integration-stage1-temp

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Navigation profile switch
        run: npm run navigation-profile-switch:smoke

      - name: Map revision
        run: npm run map-revision:smoke

      - name: Scene persistence
        run: npm run runtime-scene:smoke

      - name: Production build
        run: npm run build
