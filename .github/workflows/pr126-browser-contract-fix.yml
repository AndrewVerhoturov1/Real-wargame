name: PR 126 Browser Contract Fix

on:
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - '.github/workflows/pr126-browser-contract-fix.yml'

permissions:
  contents: write

jobs:
  fix-and-verify:
    if: github.head_ref == 'agent/danger-route-cost-parity-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Make performance mutations exercise the canonical core field
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/testing/CombatTacticalIntegrationVisualQaHarness.ts')
          source = path.read_text(encoding='utf-8')

          dynamic_start = source.index('    stepDangerPerformanceDynamicUpdate(step): void {')
          geometry_start = source.index('    stepDangerPerformanceGeometryUpdate(step): void {', dynamic_start)
          dynamic = source[dynamic_start:geometry_start]
          dynamic_anchor = '      observer.tacticalKnowledge.revision += 1;\n'
          if dynamic.count(dynamic_anchor) != 1:
              raise SystemExit(f'dynamic revision anchor count: {dynamic.count(dynamic_anchor)}')
          dynamic = dynamic.replace(
              dynamic_anchor,
              dynamic_anchor + '      buildSoldierAwarenessReport(state, observer);\n',
          )

          geometry_end = source.index('    },\n  };', geometry_start) + len('    },\n')
          geometry = source[geometry_start:geometry_end]
          geometry_anchor = '      observer.tacticalKnowledge.revision += 1;\n'
          if geometry.count(geometry_anchor) != 1:
              raise SystemExit(f'geometry revision anchor count: {geometry.count(geometry_anchor)}')
          geometry = geometry.replace(
              geometry_anchor,
              geometry_anchor + '      buildSoldierAwarenessReport(state, observer);\n',
          )

          source = source[:dynamic_start] + dynamic + source[geometry_start:]
          adjusted_geometry_start = source.index('    stepDangerPerformanceGeometryUpdate(step): void {', dynamic_start)
          adjusted_geometry_end = source.index('    },\n  };', adjusted_geometry_start) + len('    },\n')
          source = source[:adjusted_geometry_start] + geometry + source[adjusted_geometry_end:]
          path.write_text(source, encoding='utf-8')
          PY
      - run: npm ci
      - run: npm install --no-save @playwright/test
      - run: npx playwright install chromium
      - name: Verify focused browser performance contract
        env:
          DANGER_PERF_LABEL: candidate-local-verification
          DANGER_PERF_OUTPUT: artifacts/performance/pr126-browser-contract.json
        run: npx playwright test tests/danger-layer-browser-performance.spec.ts --config=playwright.performance.config.ts --project=chromium --reporter=line
      - name: Verify core regressions
        run: |
          npm run danger-route-cost-parity:smoke
          npm run danger-layer-performance:smoke
          npm run build
      - name: Commit browser contract fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/testing/CombatTacticalIntegrationVisualQaHarness.ts
          git commit -m "Exercise canonical danger field in performance harness"
          git push origin HEAD:${{ github.head_ref }}
