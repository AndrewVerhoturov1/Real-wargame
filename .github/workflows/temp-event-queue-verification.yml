name: Temporary Event Queue Verification

on:
  push:
    branches:
      - planning/complete-stateful-runtime-events-2026-07-12

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: planning/complete-stateful-runtime-events-2026-07-12
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: node scripts/apply_event_queue_session_patch.mjs
      - run: npm run event-queue:smoke
      - run: npm run runtime-session:smoke
      - run: npm run runtime-snapshot:smoke
      - run: npm run runtime-scene:smoke
      - run: npm run build
      - name: Commit verified queue session integration
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const branch = 'planning/complete-stateful-runtime-events-2026-07-12';
            for (const path of [
              'src/core/ai/runtime/AiRuntimeSession.ts',
              'scripts/ai_runtime_session_smoke.ts',
            ]) {
              const current = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: branch,
              });
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                branch,
                message: `feat(ai): integrate event queue in ${path}`,
                sha: current.data.sha,
                content: fs.readFileSync(path).toString('base64'),
              });
            }
