name: Apply Preview Type Fixes Once

on:
  push:
    branches:
      - real-wargame-preview
    paths:
      - scripts/apply_preview_type_fixes.mjs
      - .github/workflows/apply-preview-type-fixes.yml

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply exact replacements
        run: node scripts/apply_preview_type_fixes.mjs

      - name: Verify patch
        run: git diff --check

      - name: Remove one-time helper
        run: rm scripts/apply_preview_type_fixes.mjs .github/workflows/apply-preview-type-fixes.yml

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ai-node-editor/main.ts src/ui/GameHudControls.ts scripts/apply_preview_type_fixes.mjs .github/workflows/apply-preview-type-fixes.yml
          git commit -m "fix: resolve remaining strict TypeScript errors"
          git push origin HEAD:real-wargame-preview
