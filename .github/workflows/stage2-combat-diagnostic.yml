name: Stage 2 Combat Diagnostic

on:
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: read

jobs:
  capture-combat:
    if: github.event.pull_request.head.ref == 'feature/20260723-shooting-stage-02-physical-action-coordinator'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Capture focused combat output
        id: combat
        continue-on-error: true
        shell: bash
        run: npm run combat-foundation:smoke > stage2-combat.log 2>&1

      - name: Upload focused combat output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage2-combat-${{ github.event.pull_request.head.sha }}
          path: stage2-combat.log
          if-no-files-found: error
          retention-days: 1

      - name: Preserve failure status
        if: steps.combat.outcome == 'failure'
        run: exit 1
