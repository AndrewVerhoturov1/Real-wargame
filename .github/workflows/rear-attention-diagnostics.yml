name: Rear Attention Diagnostics

on:
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - 'src/core/perception/**'
      - 'src/core/visibility/**'
      - 'src/rendering/PixiVisibilityHeatmapRenderer.ts'
      - 'src/ai-node-editor/AttentionProfileEditorPanel.ts'
      - 'scripts/attention_profiles_smoke.ts'
      - 'scripts/rear_attention_perception_smoke.*'
      - 'scripts/rear_attention_visual_qa.mjs'
      - 'package.json'
      - '.github/workflows/rear-attention-diagnostics.yml'

permissions:
  contents: read

concurrency:
  group: rear-attention-diagnostics-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: mkdir -p diagnostics visual-qa
      - name: TypeScript
        if: always()
        shell: bash
        run: set -o pipefail; npx tsc --noEmit 2>&1 | tee diagnostics/typescript.log
      - name: Event queue
        if: always()
        shell: bash
        run: set -o pipefail; npm run event-queue:smoke 2>&1 | tee diagnostics/event-queue.log
      - name: Runtime session
        if: always()
        shell: bash
        run: set -o pipefail; npm run runtime-session:smoke 2>&1 | tee diagnostics/runtime-session.log
      - name: Runtime snapshot
        if: always()
        shell: bash
        run: set -o pipefail; npm run runtime-snapshot:smoke 2>&1 | tee diagnostics/runtime-snapshot.log
      - name: AI scheduler
        if: always()
        shell: bash
        run: set -o pipefail; npm run ai-scheduler:smoke 2>&1 | tee diagnostics/ai-scheduler.log
      - name: Attention profiles
        if: always()
        shell: bash
        run: set -o pipefail; npm run attention-profiles:smoke 2>&1 | tee diagnostics/attention-profiles.log
      - name: Perception including rear acceptance
        if: always()
        shell: bash
        run: set -o pipefail; npm run perception:smoke 2>&1 | tee diagnostics/perception.log
      - name: View memory
        if: always()
        shell: bash
        run: set -o pipefail; npm run view-memory-heatmap:smoke 2>&1 | tee diagnostics/view-memory.log
      - name: Visibility and vegetation contracts
        if: always()
        shell: bash
        run: |
          set -o pipefail
          {
            npm run visibility-probe:smoke
            npm run point-los-differential:smoke
            npm run shared-visibility-vegetation:smoke
          } 2>&1 | tee diagnostics/visibility-contracts.log
      - name: Attention editor contracts
        if: always()
        shell: bash
        run: set -o pipefail; npm run editor:smoke 2>&1 | tee diagnostics/editor.log
      - name: Targeted performance contracts
        if: always()
        shell: bash
        run: |
          set -o pipefail
          {
            npm run perception-performance:smoke
            npm run view-memory-heatmap-performance:smoke
            npm run performance-contract:smoke
          } 2>&1 | tee diagnostics/performance.log
      - name: Build
        if: always()
        shell: bash
        run: set -o pipefail; npm run build 2>&1 | tee diagnostics/build.log
      - name: Install Chromium for visual QA
        if: always()
        shell: bash
        run: |
          set -o pipefail
          npm install --no-save --package-lock=false playwright@1.54.1 2>&1 | tee diagnostics/playwright-install.log
          npx playwright install chromium 2>&1 | tee -a diagnostics/playwright-install.log
      - name: Capture rear attention visual QA
        if: always()
        shell: bash
        run: |
          set -o pipefail
          npm run dev -- --host 127.0.0.1 --port 4173 > diagnostics/vite.log 2>&1 &
          VITE_PID=$!
          trap 'kill $VITE_PID || true' EXIT
          for attempt in {1..40}; do
            if curl --fail --silent http://127.0.0.1:4173/ >/dev/null; then break; fi
            sleep 1
          done
          REAR_ATTENTION_VISUAL_OUTPUT=visual-qa node scripts/rear_attention_visual_qa.mjs 2>&1 | tee diagnostics/visual-qa.log
      - name: Upload diagnostics and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rear-attention-diagnostics-${{ github.event.pull_request.head.sha }}
          path: |
            diagnostics
            visual-qa
          if-no-files-found: error
