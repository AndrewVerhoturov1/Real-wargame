name: Rear Attention Diagnostics

on:
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - 'src/core/perception/**'
      - 'src/core/visibility/**'
      - 'src/rendering/PixiVisibilityHeatmapRenderer.ts'
      - 'src/ai-node-editor/AttentionProfileEditorPanel.ts'
      - 'scripts/attention_profiles_smoke.ts'
      - 'scripts/rear_attention_perception_smoke.*'
      - 'package.json'
      - '.github/workflows/rear-attention-diagnostics.yml'

permissions:
  contents: read

concurrency:
  group: rear-attention-diagnostics-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: mkdir -p diagnostics
      - name: TypeScript
        if: always()
        shell: bash
        run: set -o pipefail; npx tsc --noEmit 2>&1 | tee diagnostics/typescript.log
      - name: Event queue
        if: always()
        shell: bash
        run: set -o pipefail; npm run event-queue:smoke 2>&1 | tee diagnostics/event-queue.log
      - name: Runtime session
        if: always()
        shell: bash
        run: set -o pipefail; npm run runtime-session:smoke 2>&1 | tee diagnostics/runtime-session.log
      - name: Runtime snapshot
        if: always()
        shell: bash
        run: set -o pipefail; npm run runtime-snapshot:smoke 2>&1 | tee diagnostics/runtime-snapshot.log
      - name: AI scheduler
        if: always()
        shell: bash
        run: set -o pipefail; npm run ai-scheduler:smoke 2>&1 | tee diagnostics/ai-scheduler.log
      - name: Attention profiles
        if: always()
        shell: bash
        run: set -o pipefail; npm run attention-profiles:smoke 2>&1 | tee diagnostics/attention-profiles.log
      - name: Perception including rear acceptance
        if: always()
        shell: bash
        run: set -o pipefail; npm run perception:smoke 2>&1 | tee diagnostics/perception.log
      - name: View memory
        if: always()
        shell: bash
        run: set -o pipefail; npm run view-memory-heatmap:smoke 2>&1 | tee diagnostics/view-memory.log
      - name: Build
        if: always()
        shell: bash
        run: set -o pipefail; npm run build 2>&1 | tee diagnostics/build.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rear-attention-diagnostics-${{ github.event.pull_request.head.sha }}
          path: diagnostics
          if-no-files-found: error
