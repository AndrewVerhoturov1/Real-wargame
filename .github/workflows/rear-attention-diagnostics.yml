name: Rear Attention Diagnostics

on:
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - 'src/core/perception/**'
      - 'src/core/visibility/**'
      - 'src/rendering/PixiVisibilityHeatmapRenderer.ts'
      - 'src/ai-node-editor/AttentionProfileEditorPanel.ts'
      - 'scripts/attention_profiles_smoke.ts'
      - '.github/workflows/rear-attention-diagnostics.yml'

permissions:
  contents: read

concurrency:
  group: rear-attention-diagnostics-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: TypeScript
        run: npx tsc --noEmit
        continue-on-error: true
      - name: Event queue
        run: npm run event-queue:smoke
        continue-on-error: true
      - name: Runtime session
        run: npm run runtime-session:smoke
        continue-on-error: true
      - name: Runtime snapshot
        run: npm run runtime-snapshot:smoke
        continue-on-error: true
      - name: AI scheduler
        run: npm run ai-scheduler:smoke
        continue-on-error: true
      - name: Attention profiles
        run: npm run attention-profiles:smoke
        continue-on-error: true
      - name: Perception
        run: npm run perception:smoke
        continue-on-error: true
      - name: View memory
        run: npm run view-memory-heatmap:smoke
        continue-on-error: true
      - name: Build
        run: npm run build
        continue-on-error: true
