name: Apply measured cursor and quality fix

on:
  push:
    branches:
      - fix/perf-cursor-quality-20260711

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: ${{ !contains(github.event.head_commit.message, '[perf-fix-applied]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/perf-cursor-quality-20260711

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Apply focused fixes
        shell: bash
        run: |
          cat > src/core/knowledge/SimulationCoverSelection.ts <<'EOF_TS'
          import { distance, type GridPosition } from '../geometry';
          import { getSelectedUnit, type SimulationState } from '../simulation/SimulationState';
          import {
            getSimulationLayerState,
            setHoveredSimulationCover,
            setSelectedSimulationCover,
          } from '../ui/RuntimeUiState';
          import { buildUnitKnowledgeReport, type KnowledgeCover } from './UnitKnowledge';

          const DEFAULT_HIT_RADIUS_CELLS = 0.72;

          interface CoverCacheEntry {
            key: string;
            covers: KnowledgeCover[];
          }

          interface CoverCacheDiagnostics {
            buildCount: number;
            hitCount: number;
            coverCount: number;
            key: string;
          }

          type CoverCacheDebugWindow = Window & {
            __realWargameCoverCacheDebug?: CoverCacheDiagnostics;
          };

          const coverCache = new WeakMap<SimulationState, CoverCacheEntry>();
          let buildCount = 0;
          let hitCount = 0;

          export function getSimulationCovers(state: SimulationState): KnowledgeCover[] {
            const unit = getSelectedUnit(state);
            if (!unit) {
              publishDiagnostics('', 0);
              return [];
            }

            const key = buildCoverCacheKey(state, unit.id, unit.position.x, unit.position.y, unit.tacticalKnowledge.revision);
            const cached = coverCache.get(state);
            if (cached?.key === key) {
              hitCount += 1;
              publishDiagnostics(key, cached.covers.length);
              return cached.covers;
            }

            const report = buildUnitKnowledgeReport(state, unit);
            const unique = new Map<string, KnowledgeCover>();
            for (const cover of [...report.nearbyCovers, ...report.planCovers]) unique.set(cover.id, cover);
            const covers = [...unique.values()];

            coverCache.set(state, { key, covers });
            buildCount += 1;
            publishDiagnostics(key, covers.length);
            return covers;
          }

          export function invalidateSimulationCoverCache(state: SimulationState): void {
            coverCache.delete(state);
          }

          export function findSimulationCoverAtPosition(
            state: SimulationState,
            position: GridPosition,
            radiusCells = DEFAULT_HIT_RADIUS_CELLS,
          ): KnowledgeCover | null {
            let best: KnowledgeCover | null = null;
            let bestDistance = radiusCells;
            for (const cover of getSimulationCovers(state)) {
              const candidateDistance = distance(position, { x: cover.x, y: cover.y });
              if (candidateDistance <= bestDistance) {
                best = cover;
                bestDistance = candidateDistance;
              }
            }
            return best;
          }

          export function selectSimulationCoverAtPosition(
            state: SimulationState,
            position: GridPosition,
          ): KnowledgeCover | null {
            const cover = findSimulationCoverAtPosition(state, position);
            setSelectedSimulationCover(state, cover?.id ?? null);
            return cover;
          }

          export function hoverSimulationCoverAtPosition(
            state: SimulationState,
            position: GridPosition | null,
          ): KnowledgeCover | null {
            const cover = position ? findSimulationCoverAtPosition(state, position) : null;
            setHoveredSimulationCover(state, cover?.id ?? null);
            return cover;
          }

          export function getSelectedSimulationCover(state: SimulationState): KnowledgeCover | null {
            const selectedCoverId = getSimulationLayerState(state).selectedCoverId;
            if (!selectedCoverId) return null;
            return getSimulationCovers(state).find((cover) => cover.id === selectedCoverId) ?? null;
          }

          function buildCoverCacheKey(
            state: SimulationState,
            unitId: string,
            unitX: number,
            unitY: number,
            knowledgeRevision: number,
          ): string {
            const quarterX = Math.floor(unitX * 4) / 4;
            const quarterY = Math.floor(unitY * 4) / 4;
            const objectKey = state.map.objects
              .map((object) => [
                object.id,
                object.kind,
                object.x.toFixed(2),
                object.y.toFixed(2),
                object.widthCells.toFixed(2),
                object.heightCells.toFixed(2),
              ].join(':'))
              .join('|');

            return [
              `map:${state.map.width}x${state.map.height}:${state.map.cellSize}`,
              `editorRevision:${state.editor.lastMessage}`,
              `objects:${objectKey}`,
              `unit:${unitId}`,
              `position:${quarterX.toFixed(2)}:${quarterY.toFixed(2)}`,
              `knowledge:${knowledgeRevision}`,
            ].join(';');
          }

          function publishDiagnostics(key: string, coverCount: number): void {
            (window as CoverCacheDebugWindow).__realWargameCoverCacheDebug = {
              buildCount,
              hitCount,
              coverCount,
              key,
            };
          }
          EOF_TS

          cat > src/rendering/PixiUnitRenderer.ts <<'EOF_TS'
          import { Container, Graphics } from 'pixi.js';
          import { gridToWorld, type TacticalMap } from '../core/map/MapModel';
          import type { UnitModel } from '../core/units/UnitModel';

          const UNIT_RADIUS_CELL_FRACTION = 0.16;
          const MIN_UNIT_RADIUS_PX = 3.5;

          interface UnitRenderDiagnostics {
            displayObjectCount: number;
            rebuildCount: number;
          }

          type UnitRenderDebugWindow = Window & {
            __realWargameUnitRenderDebug?: UnitRenderDiagnostics;
          };

          export class PixiUnitRenderer {
            readonly container = new Container();
            private readonly graphics = new Graphics();
            private lastKey = '';
            private rebuildCount = 0;

            constructor() {
              this.container.addChild(this.graphics);
            }

            render(map: TacticalMap, units: UnitModel[], selectedUnitIds: string[]): void {
              const key = buildRenderKey(map, units, selectedUnitIds);
              if (key === this.lastKey) return;

              this.lastKey = key;
              this.graphics.clear();
              const selectedIds = new Set(selectedUnitIds);

              for (const unit of units) {
                const position = gridToWorld(map, unit.position);
                const isSelected = selectedIds.has(unit.id);
                const unitRadius = getUnitRadius(map);

                drawStressHalo(this.graphics, position.x, position.y, unit, unitRadius);
                drawUnitBody(this.graphics, position.x, position.y, unit, unitRadius);
                drawFrontMarker(this.graphics, position.x, position.y, unit.facingRadians, unit.heldItem, unitRadius);
                drawPostureMarker(this.graphics, position.x, position.y, unit, unitRadius);

                if (isSelected) {
                  const selectionRadius = unitRadius + 5;
                  this.graphics.lineStyle(2, 0xfff2a8, 0.96);
                  this.graphics.drawRoundedRect(
                    position.x - selectionRadius,
                    position.y - selectionRadius,
                    selectionRadius * 2,
                    selectionRadius * 2,
                    4,
                  );
                }
              }

              this.rebuildCount += 1;
              (window as UnitRenderDebugWindow).__realWargameUnitRenderDebug = {
                displayObjectCount: this.container.children.length,
                rebuildCount: this.rebuildCount,
              };
            }
          }

          function buildRenderKey(map: TacticalMap, units: UnitModel[], selectedUnitIds: string[]): string {
            return [
              `cell:${map.cellSize}`,
              `selected:${selectedUnitIds.join(',')}`,
              units.map((unit) => [
                unit.id,
                unit.position.x.toFixed(3),
                unit.position.y.toFixed(3),
                unit.facingRadians.toFixed(3),
                unit.heldItem,
                unit.behaviorRuntime.posture,
                unit.behaviorRuntime.state,
                Math.round(unit.behaviorRuntime.stress),
              ].join(':')).join('|'),
            ].join(';');
          }

          function drawUnitBody(graphics: Graphics, x: number, y: number, unit: UnitModel, unitRadius: number): void {
            const fill = getUnitFill(unit);
            graphics.lineStyle(1.5, 0x111111, 0.9);
            if (unit.behaviorRuntime.posture === 'prone') {
              graphics.beginFill(fill, 1);
              graphics.drawRoundedRect(x - unitRadius * 1.5, y - unitRadius * 0.45, unitRadius * 3, unitRadius * 0.9, 4);
              graphics.endFill();
              return;
            }
            const radius = unit.behaviorRuntime.posture === 'crouched' ? unitRadius * 0.75 : unitRadius;
            graphics.beginFill(fill, 1);
            graphics.drawCircle(x, y, radius);
            graphics.endFill();
          }

          function drawPostureMarker(graphics: Graphics, x: number, y: number, unit: UnitModel, unitRadius: number): void {
            if (unit.behaviorRuntime.posture === 'standing') return;
            graphics.lineStyle(1.5, 0xf6edcf, 0.9);
            if (unit.behaviorRuntime.posture === 'crouched') {
              graphics.moveTo(x - unitRadius * 0.8, y + unitRadius * 1.25);
              graphics.lineTo(x + unitRadius * 0.8, y + unitRadius * 1.25);
              return;
            }
            graphics.moveTo(x - unitRadius, y + unitRadius * 1.15);
            graphics.lineTo(x + unitRadius, y + unitRadius * 1.15);
            graphics.moveTo(x - unitRadius * 0.8, y + unitRadius * 1.55);
            graphics.lineTo(x + unitRadius * 0.8, y + unitRadius * 1.55);
          }

          function drawStressHalo(graphics: Graphics, x: number, y: number, unit: UnitModel, unitRadius: number): void {
            if (unit.behaviorRuntime.stress <= 0) return;
            const alpha = Math.min(0.7, Math.max(0.12, unit.behaviorRuntime.stress / 160));
            graphics.lineStyle(1.5, 0xb6633c, alpha);
            graphics.drawCircle(x, y, unitRadius + 5);
          }

          function getUnitFill(unit: UnitModel): number {
            if (unit.behaviorRuntime.state === 'stressed') return 0x743635;
            if (unit.behaviorRuntime.state === 'taking_cover') return 0x8a6b39;
            if (unit.type === 'support_team') return 0x394a6d;
            if (unit.type === 'scout_team') return 0x4c6742;
            return 0x485f35;
          }

          function drawFrontMarker(
            graphics: Graphics,
            x: number,
            y: number,
            facingRadians: number,
            itemKind: UnitModel['heldItem'],
            unitRadius: number,
          ): void {
            const forwardX = Math.cos(facingRadians);
            const forwardY = Math.sin(facingRadians);
            const sideX = Math.cos(facingRadians + Math.PI / 2);
            const sideY = Math.sin(facingRadians + Math.PI / 2);
            const startX = x + forwardX * (unitRadius * 0.6);
            const startY = y + forwardY * (unitRadius * 0.6);
            const length = itemKind === 'support_item' ? unitRadius * 2.2 : itemKind === 'short_item' ? unitRadius * 1.4 : unitRadius * 1.8;
            const endX = startX + forwardX * length;
            const endY = startY + forwardY * length;

            graphics.lineStyle(itemKind === 'support_item' ? 3 : 2, 0x1a1710, 1);
            graphics.moveTo(startX, startY);
            graphics.lineTo(endX, endY);
            graphics.lineStyle(1.5, 0xd2c09a, 0.95);
            graphics.moveTo(startX - sideX * unitRadius * 0.5, startY - sideY * unitRadius * 0.5);
            graphics.lineTo(startX + sideX * unitRadius * 0.5, startY + sideY * unitRadius * 0.5);
          }

          function getUnitRadius(map: TacticalMap): number {
            return Math.max(MIN_UNIT_RADIUS_PX, map.cellSize * UNIT_RADIUS_CELL_FRACTION);
          }
          EOF_TS

          cat > src/rendering/PixiOrderRenderer.ts <<'EOF_TS'
          import { Container, Graphics } from 'pixi.js';
          import { gridToWorld, type TacticalMap } from '../core/map/MapModel';
          import type { UnitModel } from '../core/units/UnitModel';

          export class PixiOrderRenderer {
            readonly container = new Container();
            private readonly graphics = new Graphics();
            private lastKey = '';

            constructor() {
              this.container.addChild(this.graphics);
            }

            render(map: TacticalMap, units: UnitModel[], selectedUnitIds: string[]): void {
              const key = buildRenderKey(map, units, selectedUnitIds);
              if (key === this.lastKey) return;

              this.lastKey = key;
              this.graphics.clear();
              const selectedIds = new Set(selectedUnitIds);

              for (const unit of units) {
                if (!unit.order) continue;
                const from = gridToWorld(map, unit.position);
                const to = gridToWorld(map, unit.order.target);
                const isSelected = selectedIds.has(unit.id);

                this.graphics.lineStyle(isSelected ? 4 : 2, isSelected ? 0xfff2a8 : 0xf1d77a, isSelected ? 0.95 : 0.55);
                this.graphics.moveTo(from.x, from.y);
                this.graphics.lineTo(to.x, to.y);
                this.graphics.lineStyle(2, 0xfff2a8, 0.9);
                this.graphics.drawCircle(to.x, to.y, 8);
                this.graphics.moveTo(to.x - 12, to.y);
                this.graphics.lineTo(to.x + 12, to.y);
                this.graphics.moveTo(to.x, to.y - 12);
                this.graphics.lineTo(to.x, to.y + 12);
              }
            }
          }

          function buildRenderKey(map: TacticalMap, units: UnitModel[], selectedUnitIds: string[]): string {
            return [
              `cell:${map.cellSize}`,
              `selected:${selectedUnitIds.join(',')}`,
              units.map((unit) => unit.order
                ? `${unit.id}:${unit.position.x.toFixed(3)}:${unit.position.y.toFixed(3)}:${unit.order.target.x.toFixed(3)}:${unit.order.target.y.toFixed(3)}`
                : `${unit.id}:none`).join('|'),
            ].join(';');
          }
          EOF_TS

          cat > src/core/debug/PerformanceMonitor.ts <<'EOF_TS'
          import type { SimulationState } from '../simulation/SimulationState';
          import { getSimulationLayerState } from '../ui/RuntimeUiState';

          export interface PerformanceFramePhases {
            simulationMs: number;
            sceneUpdateMs: number;
            updateMs: number;
            grid: boolean;
          }

          export interface PerformanceFrameSample {
            tMs: number;
            frameMs: number | null;
            simulationMs: number;
            sceneUpdateMs: number;
            updateMs: number;
            zoom: number;
            grid: boolean;
            editorEnabled: boolean;
            layerMode: string;
            mouseCell: string | null;
            hoveredCoverId: string | null;
            wheelEventCount: number;
            wheelApplyCount: number;
            objectCount: number;
            unitCount: number;
            zoneCount: number;
            selectedObject: boolean;
            selectedZone: boolean;
          }

          export interface PerformanceReport {
            version: string;
            exportedAt: string;
            runtimeSeconds: number;
            browser: Record<string, unknown>;
            viewport: Record<string, unknown>;
            renderer: Record<string, unknown>;
            scene: Record<string, unknown>;
            editor: Record<string, unknown>;
            summary: Record<string, unknown>;
            longTasks: Array<{ startMs: number; durationMs: number }>;
            samples: PerformanceFrameSample[];
          }

          interface CameraDiagnostics {
            wheelEventCount: number;
            wheelApplyCount: number;
          }

          type CameraDebugWindow = Window & {
            __realWargameCameraDebug?: CameraDiagnostics;
          };

          const MAX_SAMPLES = 3600;
          const MAX_LONG_TASKS = 200;

          export class PerformanceMonitor {
            private readonly startedAt = performance.now();
            private readonly samples: Array<PerformanceFrameSample | undefined> = new Array(MAX_SAMPLES);
            private readonly longTasks: Array<{ startMs: number; durationMs: number }> = [];
            private writeIndex = 0;
            private storedCount = 0;
            private lastSampleAt: number | null = null;
            private longTaskObserver: PerformanceObserver | null = null;

            constructor() {
              if (typeof PerformanceObserver === 'undefined' || !PerformanceObserver.supportedEntryTypes?.includes('longtask')) return;
              this.longTaskObserver = new PerformanceObserver((list) => {
                for (const entry of list.getEntries()) {
                  this.longTasks.push({
                    startMs: roundOne(entry.startTime - this.startedAt),
                    durationMs: roundTwo(entry.duration),
                  });
                }
                if (this.longTasks.length > MAX_LONG_TASKS) {
                  this.longTasks.splice(0, this.longTasks.length - MAX_LONG_TASKS);
                }
              });
              this.longTaskObserver.observe({ entryTypes: ['longtask'] });
            }

            destroy(): void {
              this.longTaskObserver?.disconnect();
              this.longTaskObserver = null;
            }

            recordFrame(state: SimulationState, zoom: number, phases: PerformanceFramePhases): void {
              const now = performance.now();
              const frameMs = this.lastSampleAt === null ? null : now - this.lastSampleAt;
              this.lastSampleAt = now;
              const layer = getSimulationLayerState(state);
              const camera = (window as CameraDebugWindow).__realWargameCameraDebug;
              const mouse = state.mouseGridPosition;

              this.samples[this.writeIndex] = {
                tMs: roundOne(now - this.startedAt),
                frameMs: frameMs === null ? null : roundTwo(frameMs),
                simulationMs: roundTwo(phases.simulationMs),
                sceneUpdateMs: roundTwo(phases.sceneUpdateMs),
                updateMs: roundTwo(phases.updateMs),
                zoom: roundThree(zoom),
                grid: phases.grid,
                editorEnabled: state.editor.enabled,
                layerMode: layer.mode,
                mouseCell: mouse ? `${Math.floor(mouse.x)}:${Math.floor(mouse.y)}` : null,
                hoveredCoverId: layer.hoveredCoverId,
                wheelEventCount: camera?.wheelEventCount ?? 0,
                wheelApplyCount: camera?.wheelApplyCount ?? 0,
                objectCount: state.map.objects.length,
                unitCount: state.units.length,
                zoneCount: state.pressureZones.length,
                selectedObject: state.editor.selectedObjectId !== null,
                selectedZone: state.editor.selectedZoneId !== null,
              };

              this.writeIndex = (this.writeIndex + 1) % MAX_SAMPLES;
              this.storedCount = Math.min(MAX_SAMPLES, this.storedCount + 1);
            }

            buildReport(state: SimulationState, zoom: number, renderer: Record<string, unknown>): PerformanceReport {
              const samples = this.getSamples();
              const frameValues = numeric(samples.map((sample) => sample.frameMs));
              const simulationValues = samples.map((sample) => sample.simulationMs);
              const sceneUpdateValues = samples.map((sample) => sample.sceneUpdateMs);
              const updateValues = samples.map((sample) => sample.updateMs);
              const durationMs = samples.length > 1 ? samples[samples.length - 1].tMs - samples[0].tMs : 0;
              const effectiveFps = durationMs > 0 ? (samples.length - 1) * 1000 / durationMs : null;
              const p95FrameMs = percentile(frameValues, 0.95);

              return {
                version: 'performance-report-v2',
                exportedAt: new Date().toISOString(),
                runtimeSeconds: roundOne((performance.now() - this.startedAt) / 1000),
                browser: getBrowserInfo(),
                viewport: getViewportInfo(),
                renderer,
                scene: {
                  mapWidthCells: state.map.width,
                  mapHeightCells: state.map.height,
                  cellSizePx: state.map.cellSize,
                  metersPerCell: state.map.metersPerCell,
                  terrainCells: state.map.cells.length,
                  objectCount: state.map.objects.length,
                  unitCount: state.units.length,
                  pressureZoneCount: state.pressureZones.length,
                  currentZoom: roundThree(zoom),
                },
                editor: {
                  enabled: state.editor.enabled,
                  tool: state.editor.tool,
                  objectsLayer: state.editor.layers.objects,
                  unitsLayer: state.editor.layers.units,
                  pressureZonesLayer: state.editor.layers.pressureZones,
                  selectedObjectId: state.editor.selectedObjectId,
                  selectedZoneId: state.editor.selectedZoneId,
                  selectedUnitId: state.selectedUnitId,
                },
                summary: {
                  sampleCount: samples.length,
                  sampledDurationSeconds: roundTwo(durationMs / 1000),
                  effectiveFps: effectiveFps === null ? null : roundTwo(effectiveFps),
                  fpsAtP95FrameTime: p95FrameMs && p95FrameMs > 0 ? roundTwo(1000 / p95FrameMs) : null,
                  frameMs: buildStats(frameValues),
                  simulationMs: buildStats(simulationValues),
                  sceneUpdateMs: buildStats(sceneUpdateValues),
                  updateMs: buildStats(updateValues),
                  jankFrames: {
                    over20ms: countOver(frameValues, 20),
                    over33ms: countOver(frameValues, 33),
                    over50ms: countOver(frameValues, 50),
                    over100ms: countOver(frameValues, 100),
                  },
                  longTaskCount: this.longTasks.length,
                  longTaskMs: buildStats(this.longTasks.map((task) => task.durationMs)),
                  worstFrames: [...samples]
                    .filter((sample) => sample.frameMs !== null)
                    .sort((left, right) => (right.frameMs ?? 0) - (left.frameMs ?? 0))
                    .slice(0, 30),
                  worstUpdates: [...samples]
                    .sort((left, right) => right.updateMs - left.updateMs)
                    .slice(0, 30),
                },
                longTasks: [...this.longTasks],
                samples,
              };
            }

            private getSamples(): PerformanceFrameSample[] {
              if (this.storedCount < MAX_SAMPLES) {
                return this.samples.slice(0, this.storedCount).filter(isFrameSample);
              }
              return [
                ...this.samples.slice(this.writeIndex),
                ...this.samples.slice(0, this.writeIndex),
              ].filter(isFrameSample);
            }
          }

          function isFrameSample(value: PerformanceFrameSample | undefined): value is PerformanceFrameSample {
            return value !== undefined;
          }

          function numeric(values: Array<number | null>): number[] {
            return values.filter((value): value is number => typeof value === 'number');
          }

          function getBrowserInfo(): Record<string, unknown> {
            const extendedNavigator = navigator as Navigator & { deviceMemory?: number };
            return {
              userAgent: navigator.userAgent,
              language: navigator.language,
              hardwareConcurrency: navigator.hardwareConcurrency,
              deviceMemoryGb: extendedNavigator.deviceMemory ?? null,
              platform: navigator.platform,
            };
          }

          function getViewportInfo(): Record<string, unknown> {
            return {
              innerWidth: window.innerWidth,
              innerHeight: window.innerHeight,
              devicePixelRatio: window.devicePixelRatio,
              screenWidth: window.screen.width,
              screenHeight: window.screen.height,
            };
          }

          function countOver(values: number[], threshold: number): number {
            return values.filter((value) => value > threshold).length;
          }

          function percentile(values: number[], fraction: number): number | null {
            if (values.length === 0) return null;
            const sorted = [...values].sort((left, right) => left - right);
            const index = Math.min(sorted.length - 1, Math.max(0, Math.ceil(sorted.length * fraction) - 1));
            return sorted[index];
          }

          function buildStats(values: number[]): Record<string, number | null> {
            if (values.length === 0) return { min: null, avg: null, p95: null, max: null };
            const sorted = [...values].sort((left, right) => left - right);
            const total = values.reduce((sum, value) => sum + value, 0);
            return {
              min: roundTwo(sorted[0]),
              avg: roundTwo(total / values.length),
              p95: roundTwo(percentile(sorted, 0.95) ?? 0),
              max: roundTwo(sorted[sorted.length - 1]),
            };
          }

          function roundOne(value: number): number { return Math.round(value * 10) / 10; }
          function roundTwo(value: number): number { return Math.round(value * 100) / 100; }
          function roundThree(value: number): number { return Math.round(value * 1000) / 1000; }
          EOF_TS

          node <<'EOF_NODE'
          const fs = require('fs');

          function replaceExact(path, before, after) {
            const text = fs.readFileSync(path, 'utf8');
            if (!text.includes(before)) throw new Error(`Expected block not found in ${path}`);
            fs.writeFileSync(path, text.replace(before, after));
          }

          function replaceBetween(path, start, end, replacement) {
            const text = fs.readFileSync(path, 'utf8');
            const startIndex = text.indexOf(start);
            const endIndex = text.indexOf(end, startIndex);
            if (startIndex < 0 || endIndex < 0) throw new Error(`Markers not found in ${path}`);
            fs.writeFileSync(path, text.slice(0, startIndex) + replacement + text.slice(endIndex));
          }

          const pixiPath = 'src/rendering/PixiApp.ts';
          replaceExact(
            pixiPath,
            `    this.app.ticker.add(() => {\n      if (!this.getPaused()) {\n        tickSimulation(this.state, this.app.ticker.elapsedMS / 1000);\n      }\n      this.renderFrame();\n    });`,
            `    this.app.ticker.add(() => {\n      const frameStartedAt = performance.now();\n      const simulationStartedAt = frameStartedAt;\n      if (!this.getPaused()) {\n        tickSimulation(this.state, this.app.ticker.elapsedMS / 1000);\n      }\n      const simulationMs = performance.now() - simulationStartedAt;\n      const sceneStartedAt = performance.now();\n      this.renderFrame();\n      const sceneUpdateMs = performance.now() - sceneStartedAt;\n      this.performanceMonitor.recordFrame(this.state, this.camera.zoom, {\n        simulationMs,\n        sceneUpdateMs,\n        updateMs: performance.now() - frameStartedAt,\n        grid: this.showGrid,\n      });\n    });`,
          );
          replaceExact(
            pixiPath,
            `    this.overlayRenderer.destroy();\n    this.htmlOverlayRenderer.destroy();`,
            `    this.overlayRenderer.destroy();\n    this.performanceMonitor.destroy();\n    this.htmlOverlayRenderer.destroy();`,
          );
          replaceExact(
            pixiPath,
            `    this.updateDebugPanelIfNeeded(false);\n    this.performanceMonitor.recordFrame(this.state, this.camera.zoom, performance.now() - renderStartedAt);`,
            `    this.updateDebugPanelIfNeeded(false);\n    void renderStartedAt;`,
          );
          replaceExact(
            pixiPath,
