name: Temporary AI state-plan diagnostics

on:
  push:
    branches:
      - feat/ai-state-plan-v1-temp-2026-07-14

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ !contains(github.event.head_commit.message, '[state-plan-diagnostics]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Capture failures
        shell: bash
        run: |
          mkdir -p artifacts/state-plan-diagnostics
          set +e
          npm run runtime-snapshot:smoke > artifacts/state-plan-diagnostics/runtime-snapshot.log 2>&1
          echo $? > artifacts/state-plan-diagnostics/runtime-snapshot.exit
          npm run build > artifacts/state-plan-diagnostics/build.log 2>&1
          echo $? > artifacts/state-plan-diagnostics/build.exit
          set -e
      - name: Commit diagnostic logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/state-plan-diagnostics
          git commit -m "chore(ci): capture state-plan diagnostics [state-plan-diagnostics]"
          git push origin HEAD:feat/ai-state-plan-v1-temp-2026-07-14
