name: Stage 2 Movement Fine Trace

on:
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: read

jobs:
  trace-preparation:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Add lifecycle trace
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/physical_movement_runtime_smoke.ts')
          source = path.read_text(encoding='utf-8')
          start = source.index('function verifyWeaponPreparationLifecycle(): void {')
          end = source.index('\nfunction verifyWeaponPreparationRemainingSerialization()', start)
          body = source[start:end]
          markers = [
            '  const state = armedMovingState();',
            "  assert.equal(requestFireAction(state, shooter, contactId), false, 'sprint must create pending preparation');",
            '  shooter.perceptionKnowledge.contacts = [];',
            '  reconcilePendingFireIntent(state, shooter);',
            '  installIdentifiedContact(shooter, target, state.simulationTimeSeconds);',
            "  assert.equal(cancelPendingFireIntent(shooter, contactId), true, 'explicit intent cancellation must clear pending preparation');",
            '  const stepAfterCancel = preparePhysicalMovementStep(state, shooter, 0.1, true, 1, 1);',
            '  const stale = getMovementWeaponPreparation(shooter);',
            'const newerRequest = requestMovementWeaponPreparation(state, shooter, {',
            'assert.equal(newerRequest.allowed, false);',
            'const newer = getMovementWeaponPreparation(shooter);',
            'assert.equal(cancelMovementWeaponPreparation(shooter, {',
            '  installIdentifiedContact(shooter, target, state.simulationTimeSeconds);',
            '  const unattended = getMovementWeaponPreparation(shooter);',
            '  const resumedWithoutRepeat = preparePhysicalMovementStep(',
            "  shooter.order = createMoveOrder({ x: 30.5, y: 2.5 }, { source: 'player' });",
            '  reconcilePendingFireIntent(state, shooter);',
          ]
          for index, marker in enumerate(markers):
            if marker not in body:
              raise SystemExit(f'marker not found: {marker}')
            body = body.replace(marker, f"  console.log('WP{index}');\n{marker}", 1)
          source = source[:start] + body + source[end:]
          path.write_text(source, encoding='utf-8')
          PY

      - name: Capture movement smoke
        id: movement
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          timeout --signal=TERM --kill-after=10s 120s npm run physical-movement:smoke 2>&1 | tee stage2-movement-fine-trace.log

      - name: Upload trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage2-movement-fine-trace-${{ github.event.pull_request.head.sha }}
          path: stage2-movement-fine-trace.log
          if-no-files-found: error
          retention-days: 1

      - name: Preserve failure
        if: steps.movement.outcome == 'failure'
        run: exit 1
