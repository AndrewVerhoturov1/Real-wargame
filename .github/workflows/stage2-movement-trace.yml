name: Stage 2 Movement Trace

on:
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: read

jobs:
  trace-movement:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Add scenario trace
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          path = Path('scripts/physical_movement_runtime_smoke.ts')
          source = path.read_text(encoding='utf-8')
          prefix, marker, suffix = source.partition('for (const state of createdStates)')
          if not marker:
              raise SystemExit('cleanup marker not found')
          pattern = re.compile(r'^(verify[A-Za-z0-9_]+)\(\);$', re.MULTILINE)
          traced = pattern.sub(lambda m: f"console.log('START {m.group(1)}');\n{m.group(1)}();\nconsole.log('DONE {m.group(1)}');", prefix)
          path.write_text(traced + marker + suffix, encoding='utf-8')
          PY

      - name: Capture movement smoke
        id: movement
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          timeout --signal=TERM --kill-after=10s 120s npm run physical-movement:smoke 2>&1 | tee stage2-movement-trace.log

      - name: Upload trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage2-movement-trace-${{ github.event.pull_request.head.sha }}
          path: stage2-movement-trace.log
          if-no-files-found: error
          retention-days: 1

      - name: Preserve failure
        if: steps.movement.outcome == 'failure'
        run: exit 1
