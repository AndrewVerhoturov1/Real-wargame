name: Slice 1 Docs Sync PR Temporary v2

on:
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: write

jobs:
  sync-docs:
    if: github.head_ref == 'codex/docs-slice1-sync'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: codex/docs-slice1-sync
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply documentation updates
        shell: bash
        run: |
          python - <<'EXTRACTOR'
          from pathlib import Path
          workflow = Path('.github/workflows/slice1-docs-sync-temp.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY\n", start)
          lines = workflow[start:end].splitlines()
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in lines)
          exec(compile(script, 'slice1-docs-sync-embedded.py', 'exec'), {'__name__': '__main__'})
          EXTRACTOR
          rm -f \
            .github/workflows/slice1-docs-sync-pr-temp.yml \
            .github/workflows/slice1-docs-sync-pr-temp-v2.yml \
            .slice1-docs-trigger

      - name: Generate documentation
        run: npm run docs:generate

      - name: Check generated documentation
        run: npm run docs:check

      - name: Run documentation smoke
        run: npm run docs:smoke

      - name: Check documentation diff
        run: git diff --check

      - name: Check Slice 1 facts
        shell: bash
        run: |
          grep -Fq '3f01f4ba9b96daa1b8951bdd08f4005a482fee8c' docs/subprojects/ai-single-unit-editor/STATUS.md
          grep -Fq '17 проверок' docs/subprojects/ai-single-unit-editor/COMBAT_TACTICAL_INTEGRATION_STAGE1.md
          grep -Fq 'девять сцен' docs/subprojects/ai-single-unit-editor/COMBAT_TACTICAL_INTEGRATION_STAGE1.md
          grep -Fq 'выполнено в Slice 1' plans/COMBAT_TACTICAL_INTEGRATION_REMAINING_WORK.md
          ! grep -Fq 'unknown-fire:<direction-bucket>' docs/subprojects/ai-single-unit-editor/COMBAT_TACTICAL_INTEGRATION_STAGE1.md

      - name: Commit synchronized documentation
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git status --short
          git commit -m 'docs: sync Stage 1 Slice 1 status'
          git push origin HEAD:codex/docs-slice1-sync
