name: Stage 4 Exact Final Verification D14

on:
  push:
    branches:
      - ci/verify-shooting-stage-04-d14b84f9

permissions:
  contents: read

jobs:
  verify-stage4:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout verification branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve exact feature commit
        shell: bash
        run: |
          set -euo pipefail
          expected='d14b84f93a52528d9b2ec92859b3b8586283390a'
          target="$(git rev-parse HEAD^)"
          git fetch origin \
            +refs/heads/feature/20260723-shooting-stage-04-projectile-runtime-benchmark:refs/remotes/origin/feature/20260723-shooting-stage-04-projectile-runtime-benchmark \
            +refs/heads/real-wargame-preview:refs/remotes/origin/real-wargame-preview
          feature="$(git rev-parse origin/feature/20260723-shooting-stage-04-projectile-runtime-benchmark)"
          test "$target" = "$expected"
          test "$feature" = "$expected"
          git checkout --detach "$target"
          test "$(git merge-base HEAD 3544444490f9026954d99a84e167988d0e518156)" = '3544444490f9026954d99a84e167988d0e518156'
          mkdir -p /tmp/stage4-evidence
          printf '%s\n' "$target" > /tmp/stage4-evidence/final-sha.txt
          git rev-parse origin/real-wargame-preview > /tmp/stage4-evidence/preview-head-at-verification.txt
          git log --reverse --format='%H %s' 3544444490f9026954d99a84e167988d0e518156..HEAD > /tmp/stage4-evidence/commits.txt
          git diff --stat 3544444490f9026954d99a84e167988d0e518156...HEAD > /tmp/stage4-evidence/diff-stat.txt

      - name: Verify exact changed paths
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/stage4-expected-paths.txt <<'EOF'
          docs/performance/PROJECTILE_RUNTIME_STAGE4_CAPS.md
          package.json
          scripts/infantry_combat_commit_smoke.ts
          scripts/infantry_combat_projectile_benchmark.mjs
          scripts/infantry_combat_projectile_benchmark.ts
          scripts/infantry_combat_projectile_reference_harness.ts
          scripts/infantry_combat_projectile_runtime_smoke.mjs
          scripts/infantry_combat_projectile_runtime_smoke.ts
          scripts/map_object_spatial_index_smoke.ts
          src/core/combat/BallisticTrace.ts
          src/core/combat/CombatUnitSpatialIndex.ts
          src/core/infantry-combat/runtime/InfantryCombatDiagnostics.ts
          src/core/infantry-combat/runtime/InfantryCombatRuntimeTypes.ts
          src/core/infantry-combat/runtime/InfantryCombatSimulation.ts
          src/core/infantry-combat/runtime/InfantryCombatUnitRuntime.ts
          src/core/infantry-combat/runtime/ProjectileRuntime.ts
          src/core/infantry-combat/runtime/ProjectileRuntimeTypes.ts
          src/core/infantry-combat/runtime/ProjectileStepper.ts
          src/core/infantry-combat/runtime/ReferenceProjectileRuntime.ts
          src/core/infantry-combat/runtime/ReferenceProjectileStepper.ts
          src/core/infantry-combat/runtime/ShotCommitService.ts
          src/core/infantry-combat/runtime/index.ts
          src/core/simulation/SimulationStateLegacy.ts
          src/core/spatial/MapObjectSpatialIndex.ts
          src/ui/SceneExport.ts
          EOF
          sed -i 's/^          //' /tmp/stage4-expected-paths.txt
          git diff --name-only 3544444490f9026954d99a84e167988d0e518156...HEAD | sort > /tmp/stage4-actual-paths.txt
          diff -u /tmp/stage4-expected-paths.txt /tmp/stage4-actual-paths.txt
          cp /tmp/stage4-actual-paths.txt /tmp/stage4-evidence/changed-paths.txt
          git diff --check 3544444490f9026954d99a84e167988d0e518156...HEAD

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install exact dependencies
        run: npm ci

      - name: Run required verification matrix
        shell: bash
        run: |
          set +e
          log=/tmp/stage4-evidence/stage4-matrix-node24.log
          : > "$log"
          failures=0
          passed=0
          run_check() {
            name="$1"
            shift
            printf '\n===== %s =====\n' "$name" | tee -a "$log"
            "$@" 2>&1 | tee -a "$log"
            code=${PIPESTATUS[0]}
            printf 'EXIT:%s\n' "$code" | tee -a "$log"
            if [ "$code" -eq 0 ]; then passed=$((passed + 1)); else failures=$((failures + 1)); fi
          }
          run_check combat-catalogs npm run combat-catalogs:smoke
          run_check combat-catalog-storage npm run combat-catalog-storage:smoke
          run_check combat-catalog-editor npm run combat-catalog-editor:smoke
          run_check physical-action-coordinator npm run physical-action-coordinator:smoke
          run_check posture-transition npm run posture-transition:smoke
          run_check physical-movement npm run physical-movement:smoke
          run_check infantry-combat-single-shot npm run infantry-combat-single-shot:smoke
          run_check infantry-combat-projectile npm run infantry-combat-projectile:smoke
          run_check combat-foundation npm run combat-foundation:smoke
          run_check combat-tactical-integration npm run combat-tactical-integration:smoke
          run_check tactical-action-ports npm run tactical-action-ports:smoke
          run_check spatial-index npm run spatial-index:smoke
          run_check typecheck npm run typecheck
          run_check build npm run build
          run_check projectile-wrapper-check node --check scripts/infantry_combat_projectile_runtime_smoke.mjs
          run_check benchmark-wrapper-check node --check scripts/infantry_combat_projectile_benchmark.mjs

          printf '\n===== performance-contract-base-and-final =====\n' | tee -a "$log"
          rm -rf /tmp/stage4-base
          git worktree add --detach /tmp/stage4-base 3544444490f9026954d99a84e167988d0e518156 >/dev/null
          (cd /tmp/stage4-base && node scripts/performance_principles_contract_smoke.mjs) > /tmp/stage4-base-performance.log 2>&1
          base_code=$?
          npm run performance-contract:smoke > /tmp/stage4-final-performance.log 2>&1
          final_code=$?
          cat /tmp/stage4-base-performance.log | tee -a "$log"
          cat /tmp/stage4-final-performance.log | tee -a "$log"
          expected="scripts/check_agent_docs.mjs must include mandatory performance contract fragment: import './performance_principles_contract_smoke.mjs';"
          if [ "$base_code" -eq 1 ] && [ "$final_code" -eq 1 ] \
             && grep -Fq "$expected" /tmp/stage4-base-performance.log \
             && grep -Fq "$expected" /tmp/stage4-final-performance.log; then
            printf 'KNOWN_BASELINE_CONFIRMED:yes\n' | tee -a "$log"
            passed=$((passed + 1))
          else
            printf 'KNOWN_BASELINE_CONFIRMED:no base=%s final=%s\n' "$base_code" "$final_code" | tee -a "$log"
            failures=$((failures + 1))
          fi
          cp /tmp/stage4-base-performance.log /tmp/stage4-evidence/performance-base.log
          cp /tmp/stage4-final-performance.log /tmp/stage4-evidence/performance-final.log
          git worktree remove --force /tmp/stage4-base >/dev/null

          printf '\n===== nondeterminism-scan =====\n' | tee -a "$log"
          git grep -n -E 'Date\.now|performance\.now|new Date|Math\.random|randomUUID' HEAD -- \
            src/core/infantry-combat/runtime \
            src/core/combat/CombatUnitSpatialIndex.ts \
            src/core/spatial/MapObjectSpatialIndex.ts \
            src/core/combat/BallisticTrace.ts \
            scripts/infantry_combat_projectile_runtime_smoke.ts \
            > /tmp/stage4-nondeterminism.log 2>&1
          grep_code=$?
          cat /tmp/stage4-nondeterminism.log | tee -a "$log"
          printf 'EXIT:%s\n' "$grep_code" | tee -a "$log"
          if [ "$grep_code" -eq 1 ]; then passed=$((passed + 1)); else failures=$((failures + 1)); fi
          cp /tmp/stage4-nondeterminism.log /tmp/stage4-evidence/nondeterminism.log

          printf '\n===== tracked-status-before-benchmark =====\n' | tee -a "$log"
          status="$(git status --short)"
          printf '%s\n' "$status" | tee -a "$log"
          if [ -z "$status" ]; then passed=$((passed + 1)); else failures=$((failures + 1)); fi

          cat > /tmp/stage4-evidence/matrix-summary.json <<EOF
          {
            "nodeVersion": "$(node --version)",
            "finalSha": "$(git rev-parse HEAD)",
            "baseSha": "3544444490f9026954d99a84e167988d0e518156",
            "passed": $passed,
            "failed": $failures,
            "performanceContract": {"baseExit": $base_code, "finalExit": $final_code},
            "nondeterminismExit": $grep_code
          }
          EOF
          printf '\nMATRIX_PASSED:%s\nMATRIX_FAILURES:%s\n' "$passed" "$failures" | tee -a "$log"
          exit "$failures"

      - name: Run full projectile benchmark
        shell: bash
        run: |
          set -euo pipefail
          node --expose-gc scripts/infantry_combat_projectile_benchmark.mjs 2>&1 | tee /tmp/stage4-evidence/projectile-benchmark.log
          awk '/BEGIN_PROJECTILE_BENCHMARK_JSON/{capture=1;next}/END_PROJECTILE_BENCHMARK_JSON/{capture=0}capture' \
            /tmp/stage4-evidence/projectile-benchmark.log > /tmp/stage4-evidence/projectile-benchmark.json
          node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('/tmp/stage4-evidence/projectile-benchmark.json','utf8')); if(!r.pass) process.exit(1);"
          test -z "$(git status --short)"
          cp docs/performance/PROJECTILE_RUNTIME_STAGE4_CAPS.md /tmp/stage4-evidence/projectile-runtime-caps.md

      - name: Upload exact final evidence
        uses: actions/upload-artifact@v4
        with:
          name: stage4-exact-final-d14b84f9
          path: /tmp/stage4-evidence
          if-no-files-found: error
          retention-days: 7
