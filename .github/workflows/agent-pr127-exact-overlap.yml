name: Apply verified PR127 overlap archive

on:
  push:
    branches:
      - agent/per-unit-ai-scheduler-v1
    paths:
      - .github/workflows/agent-pr127-exact-overlap.yml

permissions:
  contents: write

jobs:
  apply-verified-overlap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/per-unit-ai-scheduler-v1
          fetch-depth: 0

      - name: Reconstruct and verify exact overlap files
        shell: bash
        run: |
          set -euo pipefail
          cat .github/pr127-overlap-payload/part-* > /tmp/pr127-overlap.tgz.b64
          base64 -d /tmp/pr127-overlap.tgz.b64 > /tmp/pr127-overlap.tgz
          echo '3988447b188fc937953c20dcae5ca4eacff15b1f254801da8156b0b81e6642a6  /tmp/pr127-overlap.tgz' | sha256sum --check
          tar -xzf /tmp/pr127-overlap.tgz
          rm -rf .github/pr127-overlap-payload
          rm -f .github/workflows/agent-pr127-exact-overlap.yml
          rm -f .github/workflows/agent-pr127-overlap-finalize.yml
          git diff --check

      - name: Verify merged scheduler and danger contracts
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run ai-scheduler:smoke
          npm run route-status:smoke
          npm run navigation-profiles:smoke
          npm run routed-move:smoke
          npm run combat-tactical-integration:smoke
          npm run danger-layer-movement-performance:smoke
          npm run build
          npm run docs:sync
          npm run docs:check
          npm run docs:smoke
          git diff --check

      - name: Publish exact verified overlap
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'fix: reconcile scheduler follow-up with danger contracts'
          git push origin HEAD:agent/per-unit-ai-scheduler-v1
