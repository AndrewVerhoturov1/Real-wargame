name: Temporary AI state-plan final validation

on:
  push:
    branches:
      - feat/ai-state-plan-v1-temp-2026-07-14

permissions:
  contents: write

jobs:
  validate:
    if: ${{ !contains(github.event.head_commit.message, '[state-plan-final-validation]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run focused and regression checks
        shell: bash
        run: |
          mkdir -p artifacts/state-plan-validation
          summary=artifacts/state-plan-validation/summary.log
          : > "$summary"
          failed=0
          run_check() {
            name="$1"
            shift
            log="artifacts/state-plan-validation/${name}.log"
            echo "=== ${name} ===" | tee -a "$summary"
            if "$@" > "$log" 2>&1; then
              echo "PASS ${name}" | tee -a "$summary"
            else
              code=$?
              echo "FAIL ${name} exit=${code}" | tee -a "$summary"
              tail -n 80 "$log" >> "$summary"
              failed=1
            fi
          }
          run_check state-machine npm run state-machine:smoke
          run_check plan-runtime npm run plan-runtime:smoke
          run_check state-plan-scenario npm run state-plan-scenario:smoke
          run_check graph-v2 npm run graph-v2:smoke
          run_check runtime npm run runtime:smoke
          run_check runtime-session npm run runtime-session:smoke
          run_check runtime-snapshot npm run runtime-snapshot:smoke
          run_check runtime-scene npm run runtime-scene:smoke
          run_check subgraph npm run subgraph:smoke
          run_check move-bridge npm run move-bridge:smoke
          run_check route-status npm run route-status:smoke
          run_check workspace npm run workspace:smoke
          run_check editor npm run editor:smoke
          run_check runtime-debug-v2 npm run runtime-debug-v2:smoke
          run_check docs npm run docs:check
          run_check build npm run build
          echo "FINAL_STATUS=$([ "$failed" -eq 0 ] && echo PASS || echo FAIL)" | tee -a "$summary"
          echo "$failed" > artifacts/state-plan-validation/exit-code.txt
      - name: Commit validation evidence
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/state-plan-validation
          git commit -m "test(ai): record state-plan final validation [state-plan-final-validation]"
          git push origin HEAD:feat/ai-state-plan-v1-temp-2026-07-14
      - name: Fail when checks failed
        run: |
          test "$(cat artifacts/state-plan-validation/exit-code.txt)" = "0"
