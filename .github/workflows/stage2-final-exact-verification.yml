name: Stage 2 Final Exact Verification

on:
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: read

jobs:
  verify-stage-2-exact-head:
    if: github.event.pull_request.head.ref == 'feature/20260723-shooting-stage-02-physical-action-coordinator'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run complete Stage 2 matrix
        shell: bash
        run: |
          npx tsc --noEmit
          npm run physical-action-coordinator:smoke
          npm run posture-transition:smoke
          npm run physical-movement:smoke
          npm run combat-foundation:smoke
          npm run combat-tactical-integration:smoke
          npm run tactical-action-ports:smoke
          npm run build
