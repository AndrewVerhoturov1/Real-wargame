name: Capture Current Combat Failure Once

on:
  push:
    branches:
      - feature/20260721-tactical-position-basis
    paths:
      - .github/workflows/capture-current-combat-failure-once.yml

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/20260721-tactical-position-basis
      - name: Capture failed log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p docs/workflow
          gh run view 29879197049 --repo "$GITHUB_REPOSITORY" --log-failed > docs/workflow/CURRENT_COMBAT_FAILED_LOG.txt
      - name: Commit diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/workflow/CURRENT_COMBAT_FAILED_LOG.txt
          git commit -m "ci: capture current combat failure [skip ci]"
          git push origin HEAD:feature/20260721-tactical-position-basis
