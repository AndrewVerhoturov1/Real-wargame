name: Apply attention AI patch

on:
  push:
    branches:
      - feat/perception-attention-v1-temp
    paths:
      - scripts/attention-ai-patch.trigger

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/perception-attention-v1-temp
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: node scripts/apply_attention_ai_patch.mjs
      - run: npm run attention-ai-nodes:smoke
      - run: npm run build
      - run: npm run runtime:smoke
      - run: npm run dictionary:smoke
      - name: Commit generated integration
        run: |
          git config user.name "OpenAI implementation agent"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src
          git diff --cached --quiet && exit 1
          git commit -m "feat(ai): add attention mode and search nodes [skip ci]"
          git push origin HEAD:feat/perception-attention-v1-temp
