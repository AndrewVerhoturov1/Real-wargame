name: Stage 2 Final Verification

on:
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: read

jobs:
  verify-stage-2:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Capture posture transition regression
        id: posture
        continue-on-error: true
        shell: bash
        run: npm run posture-transition:smoke > stage2-posture.log 2>&1

      - name: Upload posture transition output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage2-posture-${{ github.event.pull_request.head.sha }}
          path: stage2-posture.log
          if-no-files-found: error
          retention-days: 1

      - name: Preserve posture failure
        if: steps.posture.outcome == 'failure'
        run: exit 1
