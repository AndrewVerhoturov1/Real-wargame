name: Stage 2 Complete Verification

on:
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: read

jobs:
  verify-complete-stage-2:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run and capture complete Stage 2 matrix
        id: matrix
        continue-on-error: true
        shell: bash
        run: |
          set +e
          status=0
          run_check() {
            echo "===== $1 =====" | tee -a stage2-complete-verification.log
            shift
            "$@" 2>&1 | tee -a stage2-complete-verification.log
            code=${PIPESTATUS[0]}
            echo "EXIT_CODE=$code" | tee -a stage2-complete-verification.log
            if [ "$code" -ne 0 ]; then status=1; fi
          }
          run_check TypeScript npx tsc --noEmit
          run_check PhysicalActionCoordinator npm run physical-action-coordinator:smoke
          run_check PostureTransition npm run posture-transition:smoke
          run_check PhysicalMovement npm run physical-movement:smoke
          run_check CombatFoundation npm run combat-foundation:smoke
          run_check CombatTacticalIntegration npm run combat-tactical-integration:smoke
          run_check TacticalActionPorts npm run tactical-action-ports:smoke
          run_check ProductionBuild npm run build
          exit "$status"

      - name: Upload complete Stage 2 verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage2-complete-verification-${{ github.event.pull_request.head.sha }}
          path: stage2-complete-verification.log
          if-no-files-found: error
          retention-days: 1

      - name: Preserve verification failure
        if: steps.matrix.outcome == 'failure'
        run: exit 1
