name: Stage 2 Complete Verification

on:
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: read

jobs:
  verify-complete-stage-2:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: TypeScript
        id: typescript
        continue-on-error: true
        timeout-minutes: 5
        run: npx tsc --noEmit

      - name: Physical action coordinator
        id: coordinator
        continue-on-error: true
        timeout-minutes: 5
        run: npm run physical-action-coordinator:smoke

      - name: Posture transition
        id: posture
        continue-on-error: true
        timeout-minutes: 5
        run: npm run posture-transition:smoke

      - name: Physical movement
        id: movement
        continue-on-error: true
        timeout-minutes: 5
        run: npm run physical-movement:smoke

      - name: Combat foundation
        id: combat_foundation
        continue-on-error: true
        timeout-minutes: 5
        run: npm run combat-foundation:smoke

      - name: Combat tactical integration
        id: combat_tactical
        continue-on-error: true
        timeout-minutes: 5
        run: npm run combat-tactical-integration:smoke

      - name: Tactical action ports
        id: tactical_ports
        continue-on-error: true
        timeout-minutes: 5
        run: npm run tactical-action-ports:smoke

      - name: Production build
        id: production_build
        continue-on-error: true
        timeout-minutes: 10
        run: npm run build

      - name: Preserve verification failure
        if: >-
          steps.typescript.outcome == 'failure' ||
          steps.coordinator.outcome == 'failure' ||
          steps.posture.outcome == 'failure' ||
          steps.movement.outcome == 'failure' ||
          steps.combat_foundation.outcome == 'failure' ||
          steps.combat_tactical.outcome == 'failure' ||
          steps.tactical_ports.outcome == 'failure' ||
          steps.production_build.outcome == 'failure'
        run: exit 1
