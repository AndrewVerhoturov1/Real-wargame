name: Finalize Tactical Position Product V2

on:
  push:
    branches:
      - feature/20260719-tactical-position-system
    paths:
      - '.github/workflows/finalize-tactical-position-v2.yml'
      - 'scripts/finalize_tactical_position_v2.py'

permissions:
  contents: write

concurrency:
  group: finalize-tactical-position-product-v2
  cancel-in-progress: true

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact feature HEAD
        uses: actions/checkout@v4
        with:
          ref: feature/20260719-tactical-position-system
          fetch-depth: 1
          show-progress: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Add regression test
        run: python scripts/finalize_tactical_position_v2.py tests

      - name: Confirm regression is red
        run: |
          set +e
          node scripts/tactical_position_objective_smoke.mjs > objective-red.log 2>&1
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Expected objective-weight regression to fail before implementation."
            exit 1
          fi
          tail -n 80 objective-red.log

      - name: Apply product fixes
        run: python scripts/finalize_tactical_position_v2.py product

      - name: Verify complete product
        run: |
          set +e
          {
            npx tsc
            npm run tactical-position:smoke
            npm run tactical-query:smoke
            npm run workspace:smoke
            npm run editor:smoke
            npm run deployment-pages:smoke
            npx vite build --base="/Real-wargame/"
            test -f dist/index.html
            test -f dist/ai-node-editor.html
          } > finalize-v2.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "Final product verification failed. Last 360 lines:"
            tail -n 360 finalize-v2.log
            exit "$status"
          fi
          tail -n 180 finalize-v2.log

      - name: Commit product and remove one-shot tooling
        run: |
          rm -f .github/patches/apply-tactical-core-v2.mjs
          rm -f .github/workflows/apply-tactical-core-v2.yml
          rm -f .github/workflows/fix-tactical-core-patcher.yml
          rm -f .github/workflows/finalize-tactical-position-v2.yml
          rm -f scripts/finalize_tactical_position_v2.py
          rm -f docs/debug/tactical-core-patcher.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: complete tactical position objectives and editor integration"
          git push origin HEAD:feature/20260719-tactical-position-system