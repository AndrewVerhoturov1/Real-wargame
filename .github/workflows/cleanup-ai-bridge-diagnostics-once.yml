name: Cleanup AI Bridge Diagnostics Once

on:
  push:
    branches:
      - feature/20260721-tactical-position-basis
    paths:
      - .github/workflows/cleanup-ai-bridge-diagnostics-once.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/20260721-tactical-position-basis
          fetch-depth: 0
      - name: Remove one-time diagnostics and workflows
        run: |
          rm -f \
            .github/workflows/capture-ai-bridge-patch-run-once.yml \
            .github/workflows/capture-final-ui-failure-once.yml \
            .github/workflows/patch-ai-game-bridge-facade-smoke-once.yml \
            .github/workflows/patch-ai-game-bridge-facade-smoke-v2-once.yml \
            .github/workflows/patch-ai-game-bridge-facade-smoke-v3-once.yml \
            .github/workflows/cleanup-ai-bridge-diagnostics-once.yml \
            docs/workflow/AI_BRIDGE_PATCH_FAILED_LOG.txt \
            docs/workflow/AI_BRIDGE_PATCH_RUN.json \
            docs/workflow/FINAL_UI_FAILED_LOG.txt
      - name: Commit clean branch state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: remove temporary AI bridge diagnostics"
          git push origin HEAD:feature/20260721-tactical-position-basis
