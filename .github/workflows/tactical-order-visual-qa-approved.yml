name: Tactical Order Visual QA

on:
  workflow_dispatch:
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - 'src/core/orders/TacticalOrderIntent.ts'
      - 'src/core/orders/PlayerCommand.ts'
      - 'src/core/orders/RoutedMoveOrders.ts'
      - 'src/input/TacticalOrderRadialGesture.ts'
      - 'src/input/TacticalOrderRadialInput.ts'
      - 'src/input/TacticalOrderRadialMenu.ts'
      - 'src/ui/TacticalOrderStatusCard.ts'
      - 'src/testing/TacticalOrderVisualQaHarness.ts'
      - 'src/tactical-order-radial-menu.css'
      - 'tests/tactical-order-radial-menu.spec.ts'
      - '.github/workflows/tactical-order-visual-qa-approved.yml'

concurrency:
  group: tactical-order-visual-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  visual-qa:
    if: "${{ github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.body || '', 'VISUAL_QA_APPROVED_BY_USER: yes') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CANDIDATE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout exact approved candidate SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CANDIDATE_SHA }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install Playwright test runner
        run: npm install --no-save @playwright/test

      - name: Build exact visual candidate
        run: npm run build

      - name: Capture approved tactical order screenshots
        id: capture
        shell: bash
        run: |
          set -o pipefail
          npx playwright test tests/tactical-order-radial-menu.spec.ts --project=chromium --reporter=line 2>&1 | tee tactical-order-visual-qa.log

      - name: Record exact artifact SHA
        if: always()
        run: |
          mkdir -p artifacts/screenshots/tactical-order-radial-menu-v1
          printf '%s\n' "${CANDIDATE_SHA}" > artifacts/screenshots/tactical-order-radial-menu-v1/COMMIT_SHA.txt

      - name: Upload tactical order PNG files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tactical-order-radial-menu-v1-${{ env.CANDIDATE_SHA }}
          path: artifacts/screenshots/tactical-order-radial-menu-v1/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload visual QA log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tactical-order-radial-menu-v1-log-${{ env.CANDIDATE_SHA }}
          path: tactical-order-visual-qa.log
          if-no-files-found: warn
          retention-days: 7
