name: Apply AI lab render integration

on:
  push:
    branches:
      - real-wargame-preview
    paths:
      - scripts/apply_ai_lab_render_integration.mjs
      - .github/workflows/apply-ai-lab-render-integration.yml

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: node scripts/apply_ai_lab_render_integration.mjs
      - run: rm scripts/apply_ai_lab_render_integration.mjs .github/workflows/apply-ai-lab-render-integration.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: integrate AI lab map renderers"
          git push origin HEAD:real-wargame-preview
