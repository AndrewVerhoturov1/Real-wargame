name: Strict Panel Flicker Check
on:
  push:
    branches: [feature/20260719-tactical-position-system]
    paths: ['.github/workflows/strict-panel-flicker-check.yml']
permissions:
  contents: write
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/20260719-tactical-position-system
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Repair baseline contract and clean logs
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('scripts/tactical_workspace_smoke_incremental_directional.mjs')
          s=p.read_text(encoding='utf-8')
          old='''  const tacticalWorkspaceRelocations = [\n    "type SimulationTab = 'info' | 'danger' | 'positions' | 'stealth' | 'memory'",\n'''
          new='''  const tacticalWorkspaceRelocations = [\n    "type SimulationTab = 'info' | 'danger' | 'stealth' | 'memory'",\n'''
          if old not in s: raise SystemExit('baseline token not found')
          p.write_text(s.replace(old,new,1),encoding='utf-8')
          Path('before-fix.log').unlink(missing_ok=True)
          Path('verification.log').unlink(missing_ok=True)
          PY
      - run: npm ci --silent
      - name: Strict verification
        shell: bash
        run: |
          set -euo pipefail
          npx tsc
          npm run tactical-position:smoke
          npm run workspace:smoke
          npx vite build
      - name: Commit verified cleanup
        run: |
          rm .github/workflows/strict-panel-flicker-check.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'test: restore strict workspace migration verification'
          git push origin HEAD:feature/20260719-tactical-position-system
