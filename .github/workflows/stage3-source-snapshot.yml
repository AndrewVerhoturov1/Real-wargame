name: Stage 3 Apply And Verify

on:
  push:
    branches:
      - feature/20260723-shooting-stage-03-single-rifle-shot
    paths:
      - '.github/workflows/stage3-source-snapshot.yml'
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - '.github/workflows/stage3-source-snapshot.yml'

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.ref == 'refs/heads/feature/20260723-shooting-stage-03-single-rifle-shot' || github.head_ref == 'feature/20260723-shooting-stage-03-single-rifle-shot'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout exact transfer head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Verify exact Stage 3 ancestry
        shell: bash
        run: |
          test "$(git merge-base HEAD fa4c75a9cdec8fc2a2a7eaabad8cda1ce3258978)" = "fa4c75a9cdec8fc2a2a7eaabad8cda1ce3258978"

      - name: Restore verified commit series
        shell: bash
        run: |
          cat \
            .github/stage3-patch/part-00 \
            .github/stage3-patch/part-01 \
            .github/stage3-patch/part-02 \
            .github/stage3-patch/part-03 \
            .github/stage3-patch/part-04 \
            .github/stage3-patch/part-05 \
            .github/stage3-patch/part-06 \
            .github/stage3-patch/part-07 \
            .github/stage3-patch/part-08-0 \
            .github/stage3-patch/part-08-1 \
            .github/stage3-patch/part-09 \
            | base64 --decode \
            | gzip --decompress \
            > /tmp/stage3-series.mbox
          test "$(wc -c < /tmp/stage3-series.mbox)" -eq 250238
          echo '73262d9e1199a7260e18a53c5c451139bf2bc6d8ddf72e627c59f14d6106395c  /tmp/stage3-series.mbox' | sha256sum --check
          git config user.name 'Stage 3 Automation'
          git config user.email 'stage3-automation@users.noreply.github.com'
          git am /tmp/stage3-series.mbox

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install exact dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run Stage 3 and regression matrix
        shell: bash
        run: |
          npm run combat-catalogs:smoke
          npm run combat-catalog-storage:smoke
          npm run combat-catalog-editor:smoke
          npm run physical-action-coordinator:smoke
          npm run posture-transition:smoke
          npm run physical-movement:smoke
          npm run infantry-combat-single-shot:smoke
          npm run combat-foundation:smoke
          npm run combat-tactical-integration:smoke
          npm run tactical-action-ports:smoke
          npm run typecheck
          npm run build
          node --check scripts/infantry_combat_single_shot_smoke.mjs
          git diff --check fa4c75a9cdec8fc2a2a7eaabad8cda1ce3258978...HEAD
          test -z "$(git status --short)"

      - name: Confirm known performance-contract baseline only
        shell: bash
        run: |
          set +e
          npm run performance-contract:smoke > /tmp/performance-candidate.log 2>&1
          candidate_status=$?
          set -e
          cat /tmp/performance-candidate.log

          if [ "$candidate_status" -ne 0 ]; then
            git diff --exit-code fa4c75a9cdec8fc2a2a7eaabad8cda1ce3258978...HEAD -- scripts/check_agent_docs.mjs
            git worktree add --detach /tmp/stage3-base fa4c75a9cdec8fc2a2a7eaabad8cda1ce3258978
            ln -s "$GITHUB_WORKSPACE/node_modules" /tmp/stage3-base/node_modules

            set +e
            (cd /tmp/stage3-base && npm run performance-contract:smoke) > /tmp/performance-base.log 2>&1
            base_status=$?
            set -e
            cat /tmp/performance-base.log

            test "$base_status" -ne 0
            test "$candidate_status" -eq "$base_status"
            sed -E "s#${GITHUB_WORKSPACE}#/repo#g; s#/tmp/stage3-base#/repo#g" /tmp/performance-candidate.log > /tmp/performance-candidate.normalized.log
            sed -E "s#${GITHUB_WORKSPACE}#/repo#g; s#/tmp/stage3-base#/repo#g" /tmp/performance-base.log > /tmp/performance-base.normalized.log
            diff -u /tmp/performance-base.normalized.log /tmp/performance-candidate.normalized.log
            git worktree remove --force /tmp/stage3-base
          fi

      - name: Reject nondeterministic Stage 3 runtime APIs
        shell: bash
        run: |
          set +e
          git grep -n -E 'Date\.now|performance\.now|Math\.random|randomUUID' HEAD -- \
            src/core/infantry-combat/runtime \
            scripts/infantry_combat_single_shot_smoke.ts \
            scripts/infantry_combat_single_shot_smoke.mjs
          status=$?
          set -e
          test "$status" -eq 1

      - name: Remove transfer harness and publish verified history
        shell: bash
        run: |
          git rm -r .github/stage3-patch
          git rm .github/workflows/stage3-source-snapshot.yml
          git commit -m 'chore: remove temporary Stage 3 transfer workflow'
          git diff --check fa4c75a9cdec8fc2a2a7eaabad8cda1ce3258978...HEAD
          git push origin HEAD:refs/heads/feature/20260723-shooting-stage-03-single-rifle-shot
