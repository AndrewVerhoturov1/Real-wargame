name: Diagnose Tactical Request Service

on:
  push:
    branches:
      - feature/20260719-tactical-position-system
    paths:
      - '.github/workflows/diagnose-tactical-request-service.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/20260719-tactical-position-system
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --silent
      - name: Capture request service smoke
        run: |
          set +e
          node scripts/tactical_position_request_service_smoke.mjs > request-service-diagnostic.log 2>&1
          status=$?
          set -e
          mkdir -p docs/debug
          cp request-service-diagnostic.log docs/debug/request-service-diagnostic.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/debug/request-service-diagnostic.log
          git commit -m "debug: capture request service lifecycle"
          git push origin HEAD:feature/20260719-tactical-position-system
          exit "$status"