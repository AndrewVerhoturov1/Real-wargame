    }
    case 'FlagCheck':
""",
              'add graph state and plan condition logic',
          )
          text = replace_once(
              text,
              """    case 'SetPosture':
      context.effects.push({
""",
              """    case 'SetAiState': {
      const stateId = normalizeAiStateId(parameters.stateId);
      context.effects.push({
        type: 'set_ai_state',
        stateId,
        sourceNodeId: node.id,
