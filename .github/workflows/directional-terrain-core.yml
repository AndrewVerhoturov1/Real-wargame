name: Directional Terrain Core

on:
  pull_request:
    branches:
      - real-wargame-preview
  workflow_dispatch:

jobs:
  directional-terrain:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Directional terrain smoke
        shell: bash
        run: |
          set -o pipefail
          npm run directional-terrain:smoke 2>&1 | tee directional-terrain.log

      - name: Reverse slope comparative acceptance
        shell: bash
        run: |
          set -o pipefail
          npm run reverse-slope-comparative:smoke 2>&1 | tee reverse-slope-comparative.log

      - name: Combat tactical integration regression
        shell: bash
        run: |
          set -o pipefail
          npm run combat-tactical-integration:smoke 2>&1 | tee combat-tactical-integration.log

      - name: Navigation profile regression
        shell: bash
        run: |
          set -o pipefail
          npm run navigation-profiles:smoke 2>&1 | tee navigation-profiles.log

      - name: Grid pathfinding regression
        shell: bash
        run: |
          set -o pipefail
          npm run pathfinding:smoke 2>&1 | tee pathfinding.log

      - name: Navigation overlay regression
        shell: bash
        run: |
          set -o pipefail
          npm run navigation-overlay:smoke 2>&1 | tee navigation-overlay.log

      - name: Map revision regression
        shell: bash
        run: |
          set -o pipefail
          npm run map-revision:smoke 2>&1 | tee map-revision.log

      - name: Production build
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Documentation check
        shell: bash
        run: |
          set -o pipefail
          npm run docs:check 2>&1 | tee docs-check.log

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: directional-terrain-core-logs
          path: |
            directional-terrain.log
            reverse-slope-comparative.log
            combat-tactical-integration.log
            navigation-profiles.log
            pathfinding.log
            navigation-overlay.log
            map-revision.log
            build.log
            docs-check.log
          if-no-files-found: ignore
          retention-days: 5
