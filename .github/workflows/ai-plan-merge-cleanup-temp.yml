name: TEMP AI plan merge cleanup

on:
  push:
    branches:
      - fix/ai-plan-move-editor-panels-temp-2026-07-14
    paths:
      - .github/workflows/ai-plan-merge-cleanup-temp.yml

permissions:
  contents: write
  statuses: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Publish pending cleanup status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'ai-plan-merge-cleanup',
              description: 'Removing temporary QA artifacts before preview merge',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - uses: actions/checkout@v4
        with:
          ref: fix/ai-plan-move-editor-panels-temp-2026-07-14
          fetch-depth: 0

      - name: Remove temporary files
        shell: bash
        run: |
          rm -f \
            .github/workflows/ai-plan-merge-cleanup-temp.yml \
            .github/workflows/ai-plan-panels-visual-qa-temp.yml \
            ai-debug-dock-pan-fix.log \
            graph-v2-only-retry.log \
            test-results/.last-run.json \
            docs/superpowers/plans/2026-07-14-ai-plan-move-editor-panels-fix.md
          rm -rf artifacts/screenshots/ai-state-plan-v1

      - name: Commit clean merge candidate
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove temporary AI plan QA artifacts"
          git push origin HEAD:fix/ai-plan-move-editor-panels-temp-2026-07-14

      - name: Publish cleanup result
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: process.env.JOB_STATUS === 'success' ? 'success' : 'failure',
              context: 'ai-plan-merge-cleanup',
              description: `Merge cleanup: ${process.env.JOB_STATUS}`,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
