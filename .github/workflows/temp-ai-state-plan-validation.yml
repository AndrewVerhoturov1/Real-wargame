name: Temporary AI state-plan validation

on:
  pull_request:
    branches:
      - validation/ai-state-plan-v1-base-2026-07-14

permissions:
  contents: read

jobs:
  state-plan-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run state-machine:smoke
      - run: npm run plan-runtime:smoke
      - run: npm run state-plan-scenario:smoke
      - run: npm run graph-v2:smoke
      - run: npm run runtime:smoke
      - run: npm run runtime-session:smoke
      - name: Runtime snapshot smoke
        run: |
          set +e
          npm run runtime-snapshot:smoke > runtime-snapshot.log 2>&1
          status=$?
          cat runtime-snapshot.log
          exit $status
      - run: npm run subgraph:smoke
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: state-plan-core-logs
          path: runtime-snapshot.log
          if-no-files-found: warn

  state-plan-build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run workspace:smoke
      - run: npm run editor:smoke
      - run: npm run runtime-debug-v2:smoke
      - name: Production build
        run: |
          set +e
          npm run build > build.log 2>&1
          status=$?
          cat build.log
          exit $status
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: state-plan-build-log
          path: build.log
          if-no-files-found: error
