name: Stage 1 Integration Publisher

on:
  pull_request:
    branches:
      - real-wargame-preview
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-integration:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.ref == 'agent/stage1-nonvisual-integration'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: agent/stage1-nonvisual-integration
          fetch-depth: 1
          persist-credentials: true

      - name: Publish verified non-workflow integration files
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f .integration/stage1.patch.xz.b64.00 ]]; then
            echo 'Integration payload already published.'
            exit 0
          fi
          cat .integration/stage1.patch.xz.b64.* | base64 --decode > "$RUNNER_TEMP/stage1.patch.xz"
          echo '15697b8319f9c16f5520554a3aa3632758f55ccb8e993bbb03525c4e519cb668  '"$RUNNER_TEMP/stage1.patch.xz" | sha256sum --check --status
          xz --decompress --stdout "$RUNNER_TEMP/stage1.patch.xz" > "$RUNNER_TEMP/stage1.patch"
          echo '1321d4de80ef40aa01c38c39c546c27f5719624f9f01653f40f28b26ab6f4a32  '"$RUNNER_TEMP/stage1.patch" | sha256sum --check --status
          git apply --check --exclude='.github/workflows/**' "$RUNNER_TEMP/stage1.patch"
          git apply --index --exclude='.github/workflows/**' "$RUNNER_TEMP/stage1.patch"
          git rm -r .integration
          git config user.name 'Real-Wargame Integration Bot'
          git config user.email 'actions@users.noreply.github.com'
          git commit -m 'feat: integrate Stage 1 non-visual tactical proofs'
          git push origin HEAD:agent/stage1-nonvisual-integration
