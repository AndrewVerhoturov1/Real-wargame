name: Stage 1 Integration Bootstrap

on:
  pull_request:
    branches:
      - real-wargame-preview
  workflow_dispatch:

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Package source checkout
        shell: bash
        run: tar --exclude='.git' -czf "$RUNNER_TEMP/stage1-integration-source.tgz" .
      - name: Upload source checkout
        uses: actions/upload-artifact@v4
        with:
          name: stage1-integration-source
          path: ${{ runner.temp }}/stage1-integration-source.tgz
          if-no-files-found: error
