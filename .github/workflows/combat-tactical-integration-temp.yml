name: Combat Tactical Integration Temp

on:
  push:
    branches:
      - feat/combat-systems-integration-stage1-temp
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply strict type fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          threat_path = Path('src/core/knowledge/SoldierThreatMemory.ts')
          threat = threat_path.read_text(encoding='utf-8')
          old_call = '    mergeCombatEvidence(state, unit, existing, refreshed, evidence, now);'
          new_call = '    mergeCombatEvidence(existing, refreshed, evidence, now);'
          old_signature = '''function mergeCombatEvidence(
            state: SimulationState,
            observer: UnitModel,
            existing: Map<string, KnownThreatMemory>,'''
          new_signature = '''function mergeCombatEvidence(
            existing: Map<string, KnownThreatMemory>,'''
          if threat.count(old_call) != 1 or threat.count(old_signature) != 1:
              raise SystemExit('SoldierThreatMemory patch contract did not match exactly once.')
          threat = threat.replace(old_call, new_call).replace(old_signature, new_signature)
          threat_path.write_text(threat, encoding='utf-8')

          visual_path = Path('src/testing/CombatTacticalIntegrationVisualQaHarness.ts')
          visual = visual_path.read_text(encoding='utf-8')
          old_baseline = '  baselineHeights: readonly number[],'
          new_baseline = "  baselineHeights: readonly SimulationState['map']['cells'][number]['height'][],"
          old_height = '      state.map.cells[y * state.map.width + x].height = Math.round(progress * 3);'
          new_height = "      state.map.cells[y * state.map.width + x].height = Math.round(progress * 3) as SimulationState['map']['cells'][number]['height'];"
          if visual.count(old_baseline) != 1 or visual.count(old_height) != 1:
              raise SystemExit('Visual QA type patch contract did not match exactly once.')
          visual = visual.replace(old_baseline, new_baseline).replace(old_height, new_height)
          visual_path.write_text(visual, encoding='utf-8')
          PY
          git diff --check
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/core/knowledge/SoldierThreatMemory.ts src/testing/CombatTacticalIntegrationVisualQaHarness.ts
            git commit -m "fix: satisfy strict combat integration types"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Production build
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee production-build.log

      - name: Upload production build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-build-log
          path: production-build.log
          if-no-files-found: warn
          retention-days: 2

      - name: Combat tactical integration
        shell: bash
        run: |
          set -o pipefail
          npm run combat-tactical-integration:smoke 2>&1 | tee combat-tactical-integration.log

      - name: Upload dedicated smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: combat-tactical-integration-log
          path: combat-tactical-integration.log
          if-no-files-found: warn
          retention-days: 2

      - name: Perception
        run: npm run perception:smoke

      - name: Combat foundation
        run: npm run combat-foundation:smoke

      - name: Awareness and threat fields
        run: npm run awareness-field:smoke

      - name: Directional terrain
        run: npm run directional-terrain:smoke

      - name: Navigation profiles
        run: npm run navigation-profiles:smoke

      - name: A star
        run: npm run pathfinding:smoke

      - name: Routed movement
        run: npm run routed-move:smoke

      - name: Route replan status
        run: npm run route-status:smoke

      - name: Scene persistence
        run: npm run runtime-scene:smoke

      - name: Map revision
        run: npm run map-revision:smoke

      - name: Existing spatial index
        run: npm run spatial-index:smoke

      - name: Documentation
        run: npm run docs:sync
