name: Patch Selected Key Diagnostics

on:
  push:
    branches:
      - agent/danger-layer-moving-units-performance

permissions:
  contents: write

jobs:
  patch-test:
    if: github.event.head_commit.message == 'Expose selected movement world key delta'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/danger-layer-moving-units-performance
      - name: Add key diagnostics and remove workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/danger-layer-movement-performance.spec.ts')
          text = path.read_text(encoding='utf-8')
          old = """  const after = await snapshot(page, false);\n  const afterMovement = requireMovement(after);\n\n  expect(afterMovement.worldRasterBuilds).toBe(beforeMovement.worldRasterBuilds);"""
          new = """  const after = await snapshot(page, false);\n  const afterMovement = requireMovement(after);\n  console.log('SELECTED_MOVEMENT_WORLD_KEY_DELTA', JSON.stringify({\n    beforeKey: beforeMovement.lastRequestedRasterKey,\n    afterKey: afterMovement.lastRequestedRasterKey,\n    beforeMovement,\n    afterMovement,\n    beforeSnapshot: before,\n    afterSnapshot: after,\n  }, null, 2));\n\n  expect(afterMovement.worldRasterBuilds).toBe(beforeMovement.worldRasterBuilds);"""
          if old not in text:
              raise SystemExit('Expected selected movement assertion block not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          Path('.github/workflows/patch-selected-key-diagnostics.yml').unlink()
          PY
      - name: Commit selected movement key diagnostics
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tests/danger-layer-movement-performance.spec.ts .github/workflows/patch-selected-key-diagnostics.yml
          git commit -m 'Log selected movement world key delta'
          git push origin HEAD:agent/danger-layer-moving-units-performance
