name: Stage 2 Movement Detail

on:
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: read

jobs:
  trace-movement-lifecycle:
    if: github.event.pull_request.head.ref == 'feature/20260723-shooting-stage-02-physical-action-coordinator'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Add internal request trace
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          test_path = Path('scripts/physical_movement_runtime_smoke.ts')
          source = test_path.read_text(encoding='utf-8')
          source = source.replace(
              "  assert.equal(getMovementWeaponPreparation(shooter), null, 'preparation must clear deterministically without a repeated fire request');",
              "  console.log('T15 countdown completed');\n  assert.equal(getMovementWeaponPreparation(shooter), null, 'preparation must clear deterministically without a repeated fire request');",
              1,
          )
          source = source.replace(
              "  installIdentifiedContact(shooter, target, state.simulationTimeSeconds);\n  assert.equal(requestFireAction(state, shooter, contactId), false);\n  shooter.order = createMoveOrder({ x: 30.5, y: 2.5 }, { source: 'player' });",
              "  console.log('T16 before final contact install');\n  installIdentifiedContact(shooter, target, state.simulationTimeSeconds);\n  console.log('T17 before final fire request');\n  assert.equal(requestFireAction(state, shooter, contactId), false);\n  console.log('T18 after final fire request');\n  shooter.order = createMoveOrder({ x: 30.5, y: 2.5 }, { source: 'player' });",
              1,
          )
          test_path.write_text(source, encoding='utf-8')

          fire_path = Path('src/core/combat/FireAction.ts')
          source = fire_path.read_text(encoding='utf-8')
          source = source.replace(
              "export function requestFireAction(state: SimulationState, unit: UnitModel, contactId: string): boolean {",
              "export function requestFireAction(state: SimulationState, unit: UnitModel, contactId: string): boolean {\n  console.log('F00 requestFireAction', contactId, unit.movementRuntime.isMoving, unit.movementRuntime.weaponPreparation?.contactId ?? null);",
              1,
          )
          source = source.replace(
              "  const decision = evaluateFireRequest(state, unit, contactId);",
              "  console.log('F01 before evaluate');\n  const decision = evaluateFireRequest(state, unit, contactId);\n  console.log('F02 after evaluate', decision.allowed);",
              1,
          )
          source = source.replace(
              "  const movementPermission = requestMovementWeaponPreparation(state, unit, { contactId, ownerToken });",
              "  console.log('F03 before movement preparation');\n  const movementPermission = requestMovementWeaponPreparation(state, unit, { contactId, ownerToken });\n  console.log('F04 after movement preparation', movementPermission.allowed);",
              1,
          )
          source = source.replace(
              "  const physicalAction = requestPhysicalActionChannels(unit, {",
              "  console.log('F05 before weapon lease');\n  const physicalAction = requestPhysicalActionChannels(unit, {",
              1,
          )
          source = source.replace(
              "  if (!physicalAction.accepted || !physicalAction.handle) {",
              "  console.log('F06 after weapon lease', physicalAction.accepted, physicalAction.status);\n  if (!physicalAction.accepted || !physicalAction.handle) {",
              1,
          )
          fire_path.write_text(source, encoding='utf-8')

          movement_path = Path('src/core/movement/MovementRuntime.ts')
          source = movement_path.read_text(encoding='utf-8')
          source = source.replace(
              "export function requestMovementWeaponPreparation(\n  state: SimulationState,\n  unit: UnitModel,\n  request: legacy.MovementWeaponPreparationRequest,\n): { allowed: boolean; reasonRu: string; handle: legacy.MovementWeaponPreparationHandle | null } {",
              "export function requestMovementWeaponPreparation(\n  state: SimulationState,\n  unit: UnitModel,\n  request: legacy.MovementWeaponPreparationRequest,\n): { allowed: boolean; reasonRu: string; handle: legacy.MovementWeaponPreparationHandle | null } {\n  console.log('M00 request prep', request.contactId, unit.movementRuntime.isMoving, unit.movementRuntime.weaponPreparation?.contactId ?? null);",
              1,
          )
          source = source.replace(
              "  if (!runtime.isMoving || profile.settings.weapon.allowFireWhileMoving) {",
              "  console.log('M01 before moving check', runtime.isMoving, profile.settings.weapon.allowFireWhileMoving);\n  if (!runtime.isMoving || profile.settings.weapon.allowFireWhileMoving) {",
              1,
          )
          source = source.replace(
              "  const acquisition = requestPhysicalActionChannels(unit, {",
              "  console.log('M02 before coordinator request');\n  const acquisition = requestPhysicalActionChannels(unit, {",
              1,
          )
          source = source.replace(
              "  if (!acquisition.accepted || !acquisition.handle) {",
              "  console.log('M03 after coordinator request', acquisition.accepted, acquisition.status);\n  if (!acquisition.accepted || !acquisition.handle) {",
              1,
          )
          movement_path.write_text(source, encoding='utf-8')
          PY

      - name: Capture physical movement lifecycle
        id: movement
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          timeout --signal=TERM --kill-after=10s 90s npm run physical-movement:smoke 2>&1 | tee stage2-movement-detail.log

      - name: Upload lifecycle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage2-movement-detail-${{ github.event.pull_request.head.sha }}
          path: stage2-movement-detail.log
          if-no-files-found: error
          retention-days: 1

      - name: Preserve failure
        if: steps.movement.outcome == 'failure'
        run: exit 1
