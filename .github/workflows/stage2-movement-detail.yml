name: Stage 2 Tactical Sequence Diagnostic

on:
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: read

jobs:
  reproduce-tactical-sequence:
    if: github.event.pull_request.head.ref == 'feature/20260723-shooting-stage-02-physical-action-coordinator'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run exact sequence and capture output
        id: sequence
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            echo '===== coordinator ====='
            npm run physical-action-coordinator:smoke
            echo '===== posture ====='
            npm run posture-transition:smoke
            echo '===== movement ====='
            npm run physical-movement:smoke
            echo '===== combat foundation ====='
            npm run combat-foundation:smoke
            echo '===== combat tactical ====='
            npm run combat-tactical-integration:smoke
          } 2>&1 | tee stage2-tactical-sequence.log

      - name: Upload sequence output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage2-tactical-sequence-${{ github.event.pull_request.head.sha }}
          path: stage2-tactical-sequence.log
          if-no-files-found: error
          retention-days: 1

      - name: Preserve failure
        if: steps.sequence.outcome == 'failure'
        run: exit 1
