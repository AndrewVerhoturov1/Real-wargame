name: Stage 2 Tactical Integration Diagnostic

on:
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: read

jobs:
  diagnose-tactical-integration:
    if: github.event.pull_request.head.ref == 'feature/20260723-shooting-stage-02-physical-action-coordinator'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Capture tactical integration output
        id: tactical
        continue-on-error: true
        shell: bash
        run: npm run combat-tactical-integration:smoke > stage2-tactical-integration.log 2>&1

      - name: Upload tactical integration output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage2-tactical-integration-${{ github.event.pull_request.head.sha }}
          path: stage2-tactical-integration.log
          if-no-files-found: error
          retention-days: 1

      - name: Preserve failure
        if: steps.tactical.outcome == 'failure'
        run: exit 1
