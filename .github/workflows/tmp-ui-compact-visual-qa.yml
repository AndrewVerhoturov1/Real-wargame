name: Temporary Compact UI Visual QA

on:
  pull_request:
    branches:
      - real-wargame-preview

permissions:
  contents: read
  statuses: write

jobs:
  visual-qa:
    if: github.event.pull_request.head.ref == 'tmp/ui-compact-route-controls-20260712'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Publish pending visual status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'pending',
              context: 'tmp-compact-ui-visual-qa',
              description: 'Approved compact UI browser verification is running',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Checkout exact pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Record exact checked-out SHA
        shell: bash
        run: |
          git rev-parse HEAD | tee visual-qa-head-sha.txt
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install Playwright test runner
        run: npm install --no-save @playwright/test

      - name: Verify focused non-visual contract
        run: npm run ui-compact-route-controls:smoke

      - name: Build production application
        run: npm run build

      - name: Capture approved screenshots with system Chrome
        id: capture
        shell: bash
        run: |
          set -o pipefail
          npx playwright test tests/ui-compact-route-controls.spec.ts --project=chromium --reporter=line 2>&1 | tee playwright-ui-compact.log

      - name: Upload compact UI screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tmp-compact-ui-screenshots-${{ github.event.pull_request.head.sha }}
          path: artifacts/screenshots/ui-compact-route-controls/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright log and SHA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tmp-compact-ui-playwright-${{ github.event.pull_request.head.sha }}
          path: |
            playwright-ui-compact.log
            visual-qa-head-sha.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Publish visual status
        if: always()
        uses: actions/github-script@v7
        env:
          CAPTURE_OUTCOME: ${{ steps.capture.outcome }}
        with:
          script: |
            const success = process.env.CAPTURE_OUTCOME === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: success ? 'success' : 'failure',
              context: 'tmp-compact-ui-visual-qa',
              description: `Approved compact UI Playwright: ${process.env.CAPTURE_OUTCOME}`,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
