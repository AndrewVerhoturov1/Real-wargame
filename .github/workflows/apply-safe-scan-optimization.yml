name: Apply Safe Scan Optimization

on:
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - '.agents/tmp/optimize-safe-scan.patch'
      - '.github/workflows/apply-safe-scan-optimization.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply exact optimization and remove bootstrap files
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          set -euo pipefail
          git apply --check .agents/tmp/optimize-safe-scan.patch
          git apply .agents/tmp/optimize-safe-scan.patch
          git rm .agents/tmp/optimize-safe-scan.patch .github/workflows/apply-safe-scan-optimization.yml
          git add src/rendering/PixiAwarenessHeatmapRenderer.ts
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'perf: make local safe-position scan allocation-free'
          git push origin "HEAD:${HEAD_REF}"
