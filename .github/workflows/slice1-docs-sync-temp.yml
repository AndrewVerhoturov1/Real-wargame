name: Slice 1 Docs Sync Temporary

on:
  push:
    branches:
      - codex/docs-slice1-sync

permissions:
  contents: write

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/docs-slice1-sync
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update Slice 1 documentation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          PREVIEW_SHA = "3f01f4ba9b96daa1b8951bdd08f4005a482fee8c"
          VALIDATION_RUN = "29365567387"

          def read(path: str) -> str:
              return Path(path).read_text(encoding="utf-8")

          def write(path: str, text: str) -> None:
              Path(path).write_text(text, encoding="utf-8")

          def replace_once(path: str, old: str, new: str) -> None:
              text = read(path)
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{path}: expected one occurrence, found {count}: {old[:100]!r}")
              write(path, text.replace(old, new, 1))

          def replace_section(path: str, start_marker: str, end_marker: str, new_section: str) -> None:
              text = read(path)
              start = text.find(start_marker)
              if start < 0:
                  raise RuntimeError(f"{path}: start marker not found: {start_marker!r}")
              end = text.find(end_marker, start + len(start_marker))
              if end < 0:
                  raise RuntimeError(f"{path}: end marker not found: {end_marker!r}")
              write(path, text[:start] + new_section.rstrip() + "\n\n" + text[end:])

          def complete_section(path: str, heading: str, next_marker: str, status_line: str) -> None:
              text = read(path)
              start = text.find(heading)
              if start < 0:
                  raise RuntimeError(f"{path}: heading not found: {heading!r}")
              end = text.find(next_marker, start + len(heading))
              if end < 0:
                  raise RuntimeError(f"{path}: next marker not found: {next_marker!r}")
              section = text[start:end]
              section = section.replace("- [ ]", "- [x]")
              insertion = heading + "\n\n"
              if status_line not in section:
                  section = section.replace(insertion, insertion + status_line + "\n\n", 1)
              write(path, text[:start] + section + text[end:])

          # Canonical source for generated STATUS.md.
          subproject_path = "docs/subprojects/ai-single-unit-editor/subproject.json"
          data = json.loads(read(subproject_path))
          data["updated_at"] = "2026-07-15"
          data["current_focus"] = (
              "Slice 1 кампании Stage 1–2 завершён и перенесён в real-wargame-preview через PR #106: "
              "потенциальная опасность отделена от evidence-derived suppression, а память неизвестного огня "
              "получила устойчивое объединение, разделение разных направлений и reconciliation с unit:<id>. "
              "Stage 1 остаётся открытым до live route replan, усиленных safe-position/reverse-slope доказательств, "
              "постоянного CI и отдельной визуальной приёмки."
          )
          data["next_step"] = (
              "Продолжить Stage 1 со следующего вертикального среза: доказать живое перестроение активного маршрута "
              "через обычный SimulationTick с сохранением ownerToken, цели, профиля и final facing; затем усилить "
              "safe-position и reverse-slope проверки, закрепить combat-tactical-integration:smoke в постоянном CI "
              "и только после отдельного разрешения запустить подготовленные девять visual QA сцен."
          )
          data["last_verified_commit"] = PREVIEW_SHA
          runs = data["last_verified_runs"]
          runs["current_preview_base"] = PREVIEW_SHA
          stage = runs["combat_tactical_integration_stage1"]
          stage["status"] = "present_in_preview_slice1_complete_followup_open"
          stage["slice1_preview_transfer"] = "PR #106"
          stage["slice1_preview_commit"] = PREVIEW_SHA
          stage["slice1_validation_run"] = f"{VALIDATION_RUN}: success"
          stage["slice1_completed"] = [
              "separate potential danger from evidence-derived suppression",
              "persist and independently decay combat-evidence suppression and stress",
              "merge compatible unknown fire across ticks by direction, time and overlapping uncertainty",
              "keep strongly different directions separate even for the same non-empty sourceUnitId",
              "reconcile compatible unknown fire with a later unit contact without hidden-position leakage",
              "preserve evidence fields through scene persistence and legacy normalization"
          ]
          confirmed = list(stage.get("confirmed", []))
          for item in [
              "combat-tactical-integration:smoke (17 checks)",
              "same-source opposite-direction regression smoke",
              "combat-foundation:smoke",
              "perception:smoke",
              "state-machine:smoke",
              "graph-v2:smoke",
              "runtime:smoke",
              "validate:ai-graph",
              "build"
          ]:
              if item not in confirmed:
                  confirmed.append(item)
          stage["confirmed"] = confirmed
          completed_prefixes = (
              "separate potential danger",
              "prove cross-tick unknown-fire"
          )
          stage["remaining_followup"] = [
              item for item in stage.get("remaining_followup", [])
              if not item.startswith(completed_prefixes)
          ]
          stage["visual_qa_scenarios_prepared"] = [
              "visual-contact",
              "near-miss",
              "wall-cover",
              "reverse-slope",
              "slice1-contact-danger-zero-suppression",
              "slice1-near-miss-evidence-suppression",
              "slice1-wall-evidence-attenuation",
              "slice1-repeated-unknown-fire-merged",
              "slice1-detected-shooter-alias"
          ]
          stage["visual_qa_prepared"] = True
          stage["visual_qa_run"] = False
          write(subproject_path, json.dumps(data, ensure_ascii=False, indent=2) + "\n")

          # Stage 1 canonical document.
          stage_doc = "docs/subprojects/ai-single-unit-editor/COMBAT_TACTICAL_INTEGRATION_STAGE1.md"
          replace_once(
              stage_doc,
              "Код этапа перенесён в `real-wargame-preview` через PR #102, merge-коммит `c885a46d1549632494bddac52ee2583b176a016c`.",
              "Исходный код этапа перенесён в `real-wargame-preview` через PR #102 (`c885a46d1549632494bddac52ee2583b176a016c`). Slice 1 памяти угроз перенесён через PR #106; проверенный preview SHA — `3f01f4ba9b96daa1b8951bdd08f4005a482fee8c`."
          )
          replace_once(
              stage_doc,
              "По состоянию на 2026-07-14 этап **не закрыт**. Gate 0 подтвердил наличие интеграции в preview, но план завершения всё ещё содержит логические, сквозные, CI- и визуальные критерии, которые нельзя считать выполненными по существующему smoke.",
              "По состоянию на 2026-07-15 этап **не закрыт**. Slice 1 закрыл разделение danger/suppression и строгую память неизвестного огня, но остаются live route replan, усиленные safe-position/reverse-slope доказательства, постоянный CI и выполненная visual QA."
          )
          replace_once(
              stage_doc,
              "Проверенный code baseline: `d8d9c4e910a2c4246bb56893dd5a3dd081125fa0` ветки `real-wargame-preview`. Документальный commit Gate 0 не изменяет runtime-код этого baseline.",
              "Проверенный preview baseline после Slice 1: `3f01f4ba9b96daa1b8951bdd08f4005a482fee8c`. Gate 0 baseline `d8d9c4e910a2c4246bb56893dd5a3dd081125fa0` остаётся исторической точкой аудита до Slice 1."
          )
          replace_once(
              stage_doc,
              "| 1 | Опасность контакта смешана с фактическим подавлением | обычный `unit:<id>` создаёт опасность без подавления; подавление появляется и отдельно затухает только от огневых свидетельств или сценарной pressure zone |",
              "| 1 | ✅ Выполнено в Slice 1: danger отделён от suppression | обычный `unit:<id>` сохраняет потенциальную опасность при `suppression = 0`; evidence-derived suppression/stress и pressure zones живут и затухают отдельно |"
          )
          replace_once(
              stage_doc,
              "| 2 | Недостаточно доказано объединение неизвестного огня между тактами | согласованные выстрелы дают одну `unknown-fire:*`, разные направления остаются разными, после обнаружения дубликат объединяется с `unit:<id>` без утечки скрытой позиции |",
              "| 2 | ✅ Выполнено в Slice 1: неизвестный огонь имеет устойчивую память | согласованные события объединяются по направлению, времени и области неопределённости; разные направления остаются отдельными; совместимая память reconciles с `unit:<id>` без утечки скрытой позиции |"
          )
          replace_once(
              stage_doc,
              "| 7 | Подготовленная визуальная проверка не запускалась | после отдельного разрешения проверены реальное приложение, точный SHA и свежие PNG четырёх сцен |",
              "| 7 | Подготовленная визуальная проверка не запускалась | после отдельного разрешения проверены реальное приложение, точный SHA и свежие PNG девяти сцен |"
          )
          anchor = "Подробный источник критериев: [план завершения Stage 1](../../../plans/2026-07-14-combat-tactical-integration-stage1-followup.md)."
          slice1_section = """

## Slice 1: danger отдельно от evidence-derived suppression

Slice 1 находится в `real-wargame-preview` через PR #106 на SHA `3f01f4ba9b96daa1b8951bdd08f4005a482fee8c`.

Выполнено:

- обычный визуальный, звуковой или reported контакт сохраняет `strength`, confidence, сектор, дальность и потенциальную danger, но не создаёт suppression сам по себе;
- suppression и `stressPerSecond` появляются от свежих `CombatThreatEvidence` либо существующих `pressureZones`;
- evidence-состояние известной угрозы переживает обычное обновление контакта и независимо затухает;
- повторный неизвестный огонь объединяется по времени, близости направления и пересечению областей неопределённости с устойчивым threat id и bounded strength/suppression;
- сильно различающиеся направления не склеиваются, включая два события до одного sync с одинаковым непустым `sourceUnitId`;
- после обнаружения стрелка совместимая `unknown-fire:*` память переносится в `unit:<id>` без копирования скрытой объективной позиции;
- `evidenceCount` и `lastEvidenceSeconds` сохраняются через scene persistence, а legacy-сцены нормализуются безопасно.

Техническая проверка без браузера выполнена в GitHub Actions run `29365567387`: прошли `combat-tactical-integration:smoke`, отдельный source-direction regression, `combat-foundation:smoke`, `perception:smoke`, `state-machine:smoke`, `graph-v2:smoke`, `runtime:smoke`, `validate:ai-graph` и production build.

Browser, Playwright и PNG для Slice 1 не запускались; visual QA остаётся manual-only.
""".rstrip()
          replace_once(stage_doc, anchor, anchor + slice1_section)
          replace_once(
              stage_doc,
              "Если личный контакт со стрелком уже существует, свидетельство усиливает эту угрозу. Если контакта нет, создаётся `unknown-fire:<direction-bucket>`. Повторные события одного направления объединяются. После появления подходящего контакта неизвестный дубликат удаляется.",
              "Если личный контакт со стрелком уже существует, свидетельство усиливает эту угрозу. Если контакта нет, создаётся устойчивый `unknown-fire:*`. Совместимые события объединяются по направлению, времени и пересечению областей неопределённости; несовместимые направления остаются отдельными даже при одинаковом `sourceUnitId`. После появления подходящего контакта evidence reconciles с `unit:<id>`, а неизвестный дубликат удаляется без чтения скрытой текущей позиции."
          )

          auto_section = """## Автоматическая проверка этапа

`npm run combat-tactical-integration:smoke` выполняет 17 проверок:

1. Реальный контакт становится угрозой с danger, но без contact-derived suppression.
2. Скрытое движение не раскрывает позицию.
3. Близкий пролёт создаёт suppression и примерное направление.
4. Далёкий пролёт почти не влияет.
5. Укрытие уменьшает suppression.
6. Реальная угроза меняет безопасные позиции.
7. Реальная угроза меняет стоимость маршрута и допускает replan policy.
8. Память и evidence-состояние затухают и удаляются.
9. Звук, огонь и визуальный контакт не создают дубликаты известного стрелка.
10. Persistence восстанавливает субъективную угрозу без подмешивания скрытой позиции.
11. Evidence suppression переживает refresh контакта и монотонно затухает.
12. Согласованный неизвестный огонь объединяется между тактами с устойчивым id.
13. События по разные стороны старой bucket-границы корректно объединяются.
14. Сильно различающиеся направления остаются отдельными угрозами.
15. Обнаруженный стрелок получает evidence alias без неизвестного дубликата и утечки скрытых данных.
16. Новые evidence-поля проходят round-trip и legacy normalization.
17. Сценарные pressure zones остаются независимым источником suppression.

Отдельный `combat_threat_evidence_source_direction_regression_smoke.ts`, подключённый к тому же npm smoke, фиксирует P2: два события до одного sync, одинаковый непустой `sourceUnitId`, направления `10°` и `190°` должны создать две разные `unknown-fire:*` угрозы.

Независимая техническая проверка run `29365567387` прошла полностью. Постоянный workflow доставки preview пока не запускает этот smoke как обязательный шаг, поэтому CI-gap Stage 1 остаётся открытым.
"""
          replace_section(stage_doc, "## Автоматическая проверка этапа\n", "## Подготовленная визуальная проверка\n", auto_section)

          visual_section = """## Подготовленная визуальная проверка

Режим запуска:

```text
/?visualQa=combat-tactical-integration
```

API проверки:

```text
window.__realWargameCombatTacticalVisualQa
```

Подготовлены девять сцен:

- `visual-contact`;
- `near-miss`;
- `wall-cover`;
- `reverse-slope`;
- `slice1-contact-danger-zero-suppression`;
- `slice1-near-miss-evidence-suppression`;
- `slice1-wall-evidence-attenuation`;
- `slice1-repeated-unknown-fire-merged`;
- `slice1-detected-shooter-alias`.

Playwright-файл: `tests/combat-tactical-integration.spec.ts`.

Для пяти Slice 1 сцен подготовлены PNG:

- `combat-stage1-slice1-01-contact-danger-zero-suppression.png`;
- `combat-stage1-slice1-02-near-miss-evidence-suppression.png`;
- `combat-stage1-slice1-03-wall-evidence-attenuation.png`;
- `combat-stage1-slice1-04-repeated-unknown-fire-merged.png`;
- `combat-stage1-slice1-05-detected-shooter-alias.png`.

Фактический browser/Playwright запуск выполняется только после отдельного согласия пользователя. На SHA `3f01f4b` он не выполнялся, PNG не создавались и визуальная приёмка не считается пройденной.
"""
          replace_section(stage_doc, "## Подготовленная визуальная проверка\n", "## Ограничения этапа 1\n", visual_section)

          # Follow-up plan: complete only Slice 1 priorities and retain later gates as open.
          followup = "plans/2026-07-14-combat-tactical-integration-stage1-followup.md"
          replace_once(
              followup,
              "Этап пока нельзя считать полностью закрытым из-за одной критической логической ошибки, недостаточно строгих сквозных проверок и отсутствия выполненной визуальной проверки.",
              "Этап пока нельзя считать полностью закрытым. Slice 1 устранил критическую логическую ошибку danger/suppression и закрыл строгую память неизвестного огня; остаются live route replan, safe-position/reverse-slope доказательства, постоянный CI и выполненная visual QA."
          )
          complete_section(
              followup,
              "## Приоритет 1. Разделить опасность и подавление",
              "---\n\n## Приоритет 2.",
              "Статус Slice 1: **выполнено** в PR #106 (`3f01f4b`); техническая проверка run `29365567387` зелёная."
          )
          complete_section(
              followup,
              "## Приоритет 2. Проверить объединение нескольких выстрелов неизвестного стрелка",
              "---\n\n## Приоритет 3.",
              "Статус Slice 1: **выполнено** в PR #106 (`3f01f4b`), включая отдельный regression одинакового `sourceUnitId` с направлениями `10°` и `190°`."
          )
          replace_once(
              followup,
              "- `visual-contact`;\n- `near-miss`;\n- `wall-cover`;\n- `reverse-slope`.",
              "- `visual-contact`;\n- `near-miss`;\n- `wall-cover`;\n- `reverse-slope`;\n- `slice1-contact-danger-zero-suppression`;\n- `slice1-near-miss-evidence-suppression`;\n- `slice1-wall-evidence-attenuation`;\n- `slice1-repeated-unknown-fire-merged`;\n- `slice1-detected-shooter-alias`."
          )
          docs_priority = """## Приоритет 8. Обновить документацию после переноса

Статус после Slice 1: **выполнено для текущего среза**, но финальное закрытие Stage 1 остаётся впереди.

- [x] Зафиксировать перенос исходного этапа через PR #102.
- [x] Зафиксировать Slice 1 через PR #106 и preview SHA `3f01f4b`.
- [x] Обновить описание danger/suppression, evidence decay, unknown-fire merge и P2 regression.
- [x] Обновить список smoke-проверок и девяти подготовленных visual QA сцен.
- [x] Синхронизировать generated `STATUS.md` через `subproject.json`.
- [ ] Заменить общий статус Stage 1 на «завершено» только после route, terrain, permanent CI и visual QA критериев.
- [ ] После финального закрытия отдельно подтвердить ограничения, относящиеся к Stage 2.
"""
          replace_section(followup, "## Приоритет 8. Обновить документацию после переноса\n", "## Рекомендуемый порядок реализации\n", docs_priority)
          replace_once(
              followup,
              "1. Исправить смешение опасности и подавления.\n2. Добавить тест нескольких неизвестных выстрелов.\n3. Добавить настоящий сквозной тест перестроения активного маршрута.\n4. Усилить тест безопасных позиций.\n5. Добавить сравнительный тест обратного склона.\n6. Подключить smoke этапа 1 к CI.\n7. Обновить документацию.\n8. После разрешения пользователя провести визуальную проверку.",
              "1. [x] Исправить смешение опасности и подавления.\n2. [x] Добавить строгие тесты объединения и разделения неизвестного огня.\n3. [ ] Добавить настоящий сквозной тест перестроения активного маршрута.\n4. [ ] Усилить тест безопасных позиций.\n5. [ ] Добавить сравнительный тест обратного склона.\n6. [ ] Подключить smoke этапа 1 к постоянному CI.\n7. [x] Синхронизировать документацию после Slice 1.\n8. [ ] После разрешения пользователя провести визуальную проверку."
          )
          for old in [
              "- [ ] Обнаруженный враг создаёт потенциальную опасность, но не сильное подавление без огня.",
              "- [ ] Настоящие выстрелы, пролёты и попадания создают фактическое подавление и стресс.",
