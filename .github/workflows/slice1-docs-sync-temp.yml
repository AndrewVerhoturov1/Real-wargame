              "- [ ] Реальная угроза меняет существующее поле опасности.",
              "- [ ] Документация соответствует состоянию preview."
          ]:
              replace_once(followup, old, old.replace("- [ ]", "- [x]", 1))

          # Long-range roadmap: record Slice 1 without closing later work.
          roadmap = "plans/COMBAT_TACTICAL_INTEGRATION_REMAINING_WORK.md"
          replace_once(
              roadmap,
              "- существует базовый `combat-tactical-integration:smoke`;\n- подготовлен visual QA harness для четырёх сцен, но он ещё не запускался.",
              "- существует расширенный `combat-tactical-integration:smoke` с 17 основными проверками и отдельным same-source/opposite-direction regression;\n- Slice 1 перенесён через PR #106 на preview SHA `3f01f4b`: danger отделён от suppression, evidence независимо затухает, unknown-fire объединяется и reconciles с `unit:<id>` без hidden-state leakage;\n- независимая техническая проверка run `29365567387` прошла для tactical integration, combat foundation, perception, state machine, Graph v2, runtime, bundled graph и production build;\n- подготовлен visual QA harness для девяти сцен, включая пять Slice 1 сцен, но browser/Playwright/PNG ещё не запускались."
          )
          replace_once(
              roadmap,
              "- [ ] Разделить потенциальную опасность контакта и фактическое подавление от огневых свидетельств.",
              "- [x] Разделить потенциальную опасность контакта и фактическое подавление от огневых свидетельств — выполнено в Slice 1 / PR #106."
          )
          replace_once(
              roadmap,
              "- [ ] Доказать cross-tick объединение неизвестного огня, разделение разных направлений и последующее объединение с обнаруженным `unit:<id>` без утечки скрытой позиции.",
              "- [x] Доказать cross-tick объединение неизвестного огня, разделение разных направлений и последующее объединение с обнаруженным `unit:<id>` без утечки скрытой позиции — выполнено в Slice 1, включая P2 regression."
          )
          replace_once(
              roadmap,
              "- [ ] После отдельного разрешения запустить реальное приложение, сверить SHA и открыть свежие PNG сцен `visual-contact`, `near-miss`, `wall-cover`, `reverse-slope`.",
              "- [ ] После отдельного разрешения запустить реальное приложение, сверить точный SHA и открыть свежие PNG всех девяти подготовленных сцен, включая пять Slice 1 сценариев."
          )

          # Remove stale pre-transfer metadata from the Graph v2 contract document.
          graph_doc = "docs/subprojects/ai-single-unit-editor/GRAPH_V2_TYPED_CONTRACTS_AND_SUBGRAPHS.md"
          replace_once(
              graph_doc,
              "Дата: 2026-07-13  \nВетка переноса: `transfer/ai-graph-v2-preview-2026-07-13`  \nСтатус: чистое transfer-дерево подготовлено поверх `real-wargame-preview` `db80f36edaf018c6a45dfeb7cc0f7caaed00bdb5`; перед слиянием требуется точная CI/Chrome-проверка ветки.",
              "Дата: 2026-07-13  \nАктуализировано: 2026-07-15  \nСтатус: Graph v2 является канонической частью `real-wargame-preview`. Контракт node-authored поведения подтверждён Gate 0 и соблюдён в Slice 1 на preview SHA `3f01f4b`; полный боевой цикл через ноды всё ещё относится к следующим срезам."
          )

          # The temporary workflow must not be present in the final PR tree.
          Path(".github/workflows/slice1-docs-sync-temp.yml").unlink()
          PY

      - name: Generate and verify agent documentation
        shell: bash
        run: |
          npm run docs:sync
          npm run docs:smoke
          git diff --check
          grep -Fq '3f01f4ba9b96daa1b8951bdd08f4005a482fee8c' docs/subprojects/ai-single-unit-editor/STATUS.md
          grep -Fq '17 проверок' docs/subprojects/ai-single-unit-editor/COMBAT_TACTICAL_INTEGRATION_STAGE1.md
          grep -Fq 'девять сцен' docs/subprojects/ai-single-unit-editor/COMBAT_TACTICAL_INTEGRATION_STAGE1.md
          grep -Fq 'выполнено в Slice 1' plans/COMBAT_TACTICAL_INTEGRATION_REMAINING_WORK.md
          ! grep -Fq 'unknown-fire:<direction-bucket>' docs/subprojects/ai-single-unit-editor/COMBAT_TACTICAL_INTEGRATION_STAGE1.md

      - name: Commit synchronized documentation
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git status --short
          git commit -m 'docs: sync Stage 1 Slice 1 status'
          git push origin HEAD:codex/docs-slice1-sync
