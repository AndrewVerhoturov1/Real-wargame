name: Perception temp CI

on:
  push:
    branches:
      - feat/perception-attention-v1-temp
  pull_request:
    branches:
      - validation/perception-attention-v1-base
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run perception:smoke
      - run: npm run build
      - run: npm run runtime:smoke
      - run: npm run workspace:smoke
      - run: npm run game-editor:smoke
      - run: npm run visibility-probe:smoke
      - name: Publish connector-visible status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const passed = '${{ job.status }}' === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'perception-temp-ci',
              description: passed ? 'Perception build and smoke checks passed' : 'Perception build or smoke check failed',
            });
