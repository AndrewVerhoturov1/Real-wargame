name: Temporary Finalize Compact UI Docs

on:
  push:
    branches:
      - tmp/ui-compact-route-controls-20260712

permissions:
  contents: write

jobs:
  finalize-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout temporary branch
        uses: actions/checkout@v4
        with:
          ref: tmp/ui-compact-route-controls-20260712
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Append journal and remove temporary sync machinery
        run: node scripts/finalize_compact_ui_docs.mjs
      - name: Generate canonical documentation
        run: npm run docs:generate
      - name: Check canonical documentation
        run: npm run docs:check
      - name: Commit synchronized documentation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "docs: synchronize compact route controls status"
          git push origin HEAD:tmp/ui-compact-route-controls-20260712
