name: Temporary AI state-plan harness fix

on:
  push:
    branches:
      - feat/ai-state-plan-v1-temp-2026-07-14

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[state-plan-harness-fixed]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node scripts/apply_ai_state_plan_harness_fix.mjs
      - name: Commit harness fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/testing/AiStatePlanVisualQaHarness.ts
          if git diff --cached --quiet; then
            echo "No harness changes to commit."
            exit 0
          fi
          git commit -m "fix(test): harden state-plan visual harness [state-plan-harness-fixed]"
          git push origin HEAD:feat/ai-state-plan-v1-temp-2026-07-14
