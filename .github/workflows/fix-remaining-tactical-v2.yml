name: Fix Remaining Tactical Position V2

on:
  push:
    branches:
      - feature/20260719-tactical-position-system
    paths:
      - '.github/workflows/fix-remaining-tactical-v2.yml'
      - 'scripts/fix_remaining_tactical_v2.py'
      - 'scripts/repair_remaining_tactical_patch.py'
      - 'scripts/fix_workspace_tactical_graph_contract.py'

permissions:
  contents: write

concurrency:
  group: fix-remaining-tactical-v2
  cancel-in-progress: true

jobs:
  fix-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact feature HEAD
        uses: actions/checkout@v4
        with:
          ref: feature/20260719-tactical-position-system
          fetch-depth: 1
          show-progress: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Apply remaining product and contract fixes
        run: |
          python scripts/repair_remaining_tactical_patch.py
          python scripts/fix_remaining_tactical_v2.py
          python scripts/fix_workspace_tactical_graph_contract.py

      - name: TypeScript
        run: npx tsc

      - name: Tactical position search smoke
        run: |
          set +e
          node scripts/tactical_position_search_smoke.mjs > tactical-position-integration-failure.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            mkdir -p docs/debug
            cp tactical-position-integration-failure.log docs/debug/tactical-position-integration-failure.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/debug/tactical-position-integration-failure.log
            git commit -m "debug: capture tactical integration failure"
            git push origin HEAD:feature/20260719-tactical-position-system
            exit "$status"
          fi

      - name: Tactical position interaction smoke
        run: node scripts/tactical_position_interaction_smoke.mjs

      - name: Tactical position tuning smoke
        run: node scripts/tactical_position_tuning_smoke.mjs

      - name: Tactical position request service smoke
        run: node scripts/tactical_position_request_service_smoke.mjs

      - name: Tactical position graph runtime smoke
        run: node scripts/tactical_position_graph_runtime_smoke.mjs

      - name: Tactical position objective smoke
        run: node scripts/tactical_position_objective_smoke.mjs

      - name: Tactical query smoke
        run: npm run tactical-query:smoke

      - name: Workspace smoke
        run: npm run workspace:smoke

      - name: AI editor smoke
        run: npm run editor:smoke

      - name: Production build for GitHub Pages
        run: npx vite build --base="/Real-wargame/"

      - name: Deployment pages smoke
        run: npm run deployment-pages:smoke

      - name: Verify both built pages
        run: |
          test -s dist/index.html
          test -s dist/ai-node-editor.html

      - name: Commit verified fixes and remove temporary tooling
        run: |
          rm -f scripts/fix_remaining_tactical_v2.py scripts/repair_remaining_tactical_patch.py scripts/fix_workspace_tactical_graph_contract.py
          rm -f .github/workflows/fix-remaining-tactical-v2.yml
          rm -f finalize-v2.log objective-red.log
          rm -f docs/debug/tactical-position-search-failure.log docs/debug/tactical-position-integration-failure.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: complete tactical positions and AI editor integration"
          git push origin HEAD:feature/20260719-tactical-position-system