name: Temporary Blackboard Observer Verification

on:
  push:
    branches:
      - planning/complete-stateful-runtime-events-2026-07-12

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: planning/complete-stateful-runtime-events-2026-07-12
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: node scripts/apply_blackboard_observer_integration_patch.mjs
      - run: node scripts/apply_blackboard_observer_bridge_smoke_patch.mjs
      - name: Blackboard observer smoke
        id: observer
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run blackboard-observer:smoke 2>&1 | tee blackboard-observer.log
      - name: Upload observer smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blackboard-observer-integration-log
          path: blackboard-observer.log
          if-no-files-found: error
          retention-days: 3
      - run: npm run event-queue:smoke
      - run: npm run runtime-session:smoke
      - run: npm run runtime-snapshot:smoke
      - run: npm run runtime-scene:smoke
      - run: npm run simulation-events:smoke
      - run: npm run runtime:smoke
      - run: npm run build
      - name: Commit verified Blackboard observer integration
        if: steps.observer.conclusion == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const branch = 'planning/complete-stateful-runtime-events-2026-07-12';
            for (const path of [
              'src/core/ai/runtime/AiRuntimeSession.ts',
              'src/core/ai/AiGameBridge.ts',
              'scripts/ai_runtime_session_smoke.ts',
              'scripts/ai_blackboard_observer_smoke.ts',
            ]) {
              const current = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: branch,
              });
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                branch,
                message: `feat(ai): integrate Blackboard observers in ${path}`,
                sha: current.data.sha,
                content: fs.readFileSync(path).toString('base64'),
              });
            }
      - name: Fail when observer smoke failed
        if: steps.observer.conclusion != 'success'
        run: exit 1
