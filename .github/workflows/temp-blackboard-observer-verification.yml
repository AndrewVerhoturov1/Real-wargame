name: Temporary Blackboard Observer Verification

on:
  push:
    branches:
      - planning/complete-stateful-runtime-events-2026-07-12

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: planning/complete-stateful-runtime-events-2026-07-12
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - name: Blackboard observer smoke
        id: observer
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run blackboard-observer:smoke 2>&1 | tee blackboard-observer.log
      - name: Upload observer smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blackboard-observer-clean-log
          path: blackboard-observer.log
          if-no-files-found: error
          retention-days: 3
      - run: npm run event-queue:smoke
      - run: npm run runtime-session:smoke
      - run: npm run runtime-snapshot:smoke
      - run: npm run runtime-scene:smoke
      - run: npm run simulation-events:smoke
      - run: npm run runtime:smoke
      - run: npm run build
      - name: Fail when observer smoke failed
        if: steps.observer.outcome != 'success'
        run: exit 1
