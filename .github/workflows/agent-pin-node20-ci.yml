name: Agent Pin Node 20 CI

on:
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - '.github/workflows/agent-pin-node20-ci.yml'
  push:
    branches:
      - agent/terrain-profiles-performance-followup-v1
    paths:
      - '.github/workflows/agent-pin-node20-ci.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/terrain-profiles-performance-followup-v1
          fetch-depth: 0
      - name: Pin workflows to the proven Node version
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          paths = [
              Path('.github/workflows/preview-core-checks.yml'),
              Path('.github/workflows/navigation-profiles-core.yml'),
              Path('.github/workflows/directional-terrain-core.yml'),
              Path('.github/workflows/danger-layer-browser-performance.yml'),
          ]
          for path in paths:
              source = path.read_text()
              count = source.count('node-version: lts/*')
              if count != 1:
                  raise SystemExit(f'{path}: expected one lts/* setup, found {count}')
              path.write_text(source.replace('node-version: lts/*', 'node-version: 20'))
          PY
          grep -R "node-version: 20" \
            .github/workflows/preview-core-checks.yml \
            .github/workflows/navigation-profiles-core.yml \
            .github/workflows/directional-terrain-core.yml \
            .github/workflows/danger-layer-browser-performance.yml
      - name: Commit stable setup and remove helper
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/agent-pin-node20-ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Pin affected CI workflows to Node 20"
          git push origin HEAD:agent/terrain-profiles-performance-followup-v1
