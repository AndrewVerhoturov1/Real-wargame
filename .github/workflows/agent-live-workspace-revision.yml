name: Agent Live Workspace Revision

on:
  pull_request:
    branches:
      - real-wargame-preview
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: agent-live-workspace-revision
  cancel-in-progress: false

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/live-windows-performance-followup-v1
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply signature-driven workspace refresh
        shell: bash
        run: |
          python3 scripts/agent_live_workspace_revision_hotfix.py
          python3 scripts/agent_live_workspace_revision_apply.py 2>&1 | tee workspace-revision-apply.log
      - run: npm ci
      - name: Verify workspace refresh
        shell: bash
        run: |
          set -o pipefail
          {
            npx tsc --noEmit
            npm run build
            npm run workspace:smoke
            npm run ui-compact-route-controls:smoke
            npm run ai-scheduler:smoke
            node scripts/performance_report_contract_smoke.mjs
          } 2>&1 | tee workspace-revision-verification.log
      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-workspace-revision-verification
          path: |
            workspace-revision-apply.log
            workspace-revision-verification.log
          if-no-files-found: warn
          retention-days: 3
      - name: Commit verified workspace refresh
        run: |
          rm -f scripts/agent_live_workspace_revision_apply.py
          rm -f scripts/agent_live_workspace_revision_hotfix.py
          rm -f workspace-revision-apply.log workspace-revision-verification.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "perf: make TacticalWorkspace refresh signature-driven"
          git push origin HEAD:agent/live-windows-performance-followup-v1
