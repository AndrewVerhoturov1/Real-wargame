name: Apply PR127 normalized movement diagnostics

on:
  push:
    branches:
      - agent/per-unit-ai-scheduler-v1
    paths:
      - .github/workflows/combat-foundation-core.yml

permissions:
  contents: write

jobs:
  apply-normalized-movement-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/per-unit-ai-scheduler-v1
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Patch renderer diagnostics boundary
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('src/rendering/PixiAwarenessHeatmapRenderer.ts')
          text = path.read_text(encoding='utf-8')
          import_anchor = "import {\n  publishAwarenessMovementDiagnostics,\n  resetAwarenessMovementDiagnostics,"
          import_replacement = "import {\n  getAwarenessMovementDiagnostics,\n  publishAwarenessMovementDiagnostics,\n  resetAwarenessMovementDiagnostics,"
          if '  getAwarenessMovementDiagnostics,\n' not in text:
              if import_anchor not in text:
                  raise SystemExit('movement diagnostics import anchor missing')
              text = text.replace(import_anchor, import_replacement, 1)
          old = '      movement: { ...this.movement },'
          new = '      movement: getAwarenessMovementDiagnostics(),'
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('movement snapshot anchor missing')
          path.write_text(text, encoding='utf-8')
          PY
          git diff --check
          grep -q 'getAwarenessMovementDiagnostics' src/rendering/PixiAwarenessHeatmapRenderer.ts
      - run: npm ci
      - name: Verify build
        run: npm run build
      - name: Verify movement performance smoke
        run: npm run danger-layer-movement-performance:smoke
      - name: Publish renderer diagnostics fix
        shell: bash
        run: |
          set -euo pipefail
          git add src/rendering/PixiAwarenessHeatmapRenderer.ts
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'fix: publish normalized movement diagnostics'
          git push origin HEAD:agent/per-unit-ai-scheduler-v1
