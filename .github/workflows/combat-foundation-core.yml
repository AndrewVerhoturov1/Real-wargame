name: Combat Foundation Core

on:
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - 'vite.config.ts'
      - 'src/core/behavior/**'
      - 'src/core/combat/**'
      - 'src/core/cover/**'
      - 'src/core/debug/**'
      - 'src/core/knowledge/**'
      - 'src/core/map/**'
      - 'src/core/navigation/**'
      - 'src/core/orders/**'
      - 'src/core/pathfinding/**'
      - 'src/core/perception/**'
      - 'src/core/pressure/**'
      - 'src/core/simulation/**'
      - 'src/core/terrain/**'
      - 'src/core/units/**'
      - 'src/core/visibility/**'
      - 'src/core/geometry.ts'
      - 'src/core/simulation/SimulationTick.ts'
      - 'src/core/simulation/SimulationState.ts'
      - 'src/core/behavior/BehaviorModel.ts'
      - 'src/core/units/UnitModel.ts'
      - 'src/core/ai/AiGameBridge.ts'
      - 'src/core/ai/AiSimulationScheduler.ts'
      - 'src/core/ai/AiStatefulMoveGameBridge.ts'
      - 'src/core/ai/AiRouteStatus.ts'
      - 'src/core/ai/UnitPlan.ts'
      - 'src/core/ai/events/SimulationAiEvents.ts'
      - 'src/core/ai/runtime/**'
      - 'src/core/ai/state/**'
      - 'src/core/editor/GameEditorDrafts.ts'
      - 'src/core/testing/AiTestLabRuntime.ts'
      - 'src/data/ai/soldier_default_survival_graph.json'
      - 'src/rendering/PixiAwarenessHeatmapRenderer.ts'
      - 'src/rendering/PixiMapRenderer.ts'
      - 'src/rendering/VegetationChunkRaster.ts'
      - 'src/ai-node-editor/EnvironmentProfileEditorPanel.ts'
      - 'src/ai-node-editor/NavigationProfileEditor.ts'
      - 'src/ai-node-editor/navigation-profile-editor.css'
      - 'src/rendering/PixiUnitRenderer.ts'
      - 'src/rendering/PixiCombatEffectsRenderer.ts'
      - 'src/rendering/CombatEffectsInstaller.ts'
      - 'src/testing/DangerLayerMovementPerformanceHarness.ts'
      - 'src/workers/**'
      - 'src/ui/CombatControls.ts'
      - 'src/ui/CombatAudio.ts'
      - 'src/ui/SceneExport.ts'
      - 'src/main.ts'
      - 'scripts/combat_foundation_smoke.*'
      - 'scripts/combat_tactical_integration_smoke.*'
      - 'scripts/danger_route_cost_parity_smoke.*'
      - 'scripts/danger_route_cost_cache_smoke.*'
      - 'scripts/danger_layer_performance_smoke.*'
      - 'scripts/danger_layer_movement_performance_smoke.*'
      - 'scripts/shared_visibility_vegetation_smoke.*'
      - 'scripts/shared_vegetation_source_contract_smoke.*'
      - 'scripts/environment_materials_smoke.*'
      - 'scripts/environment_material_migration_smoke.*'
      - 'scripts/environment_profile_revisions_smoke.*'
      - 'scripts/vegetation_chunk_raster_smoke.*'
      - 'scripts/view_memory_heatmap_smoke.*'
      - 'scripts/view_memory_heatmap_performance_smoke.*'
      - 'scripts/visibility_probe_cache_smoke.*'
      - 'scripts/perception_performance_smoke.*'
      - 'scripts/live_navigation_replan_smoke.ts'
      - 'scripts/combat_safe_position_winner_smoke.ts'
      - 'scripts/reverse_slope_comparative_fixture.ts'
      - 'scripts/reverse_slope_comparative_smoke.ts'
      - 'scripts/reverse_slope_comparative_smoke.mjs'
      - 'scripts/directional_terrain_smoke.mjs'
      - 'scripts/combat_threat_evidence_source_direction_regression_smoke.ts'
      - 'scripts/perception_system_smoke.ts'
      - 'scripts/tactical_workspace_smoke.mjs'
      - 'scripts/tactical_workspace_smoke_pixijs8_baseline.mjs'
      - 'scripts/ai_test_lab_smoke.mjs'
      - 'scripts/ai_per_unit_scheduler_smoke.mjs'
      - 'scripts/ai_per_unit_scheduler_smoke.ts'
      - 'tests/combat-foundation-visual.spec.ts'
      - 'tests/danger-layer-movement-performance.spec.ts'
      - 'tests/danger-route-cost-parity-visual.spec.ts'
      - 'tests/shared-visibility-vegetation-visual.spec.ts'
      - 'tests/environment-materials-visual.spec.ts'
      - 'docs/subprojects/ai-single-unit-editor/ENVIRONMENT_MATERIAL_PROFILES_V1.md'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/combat-foundation-core.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  combat-foundation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Shared visibility and vegetation smoke
        shell: bash
        run: set -o pipefail; npm run shared-visibility-vegetation:smoke 2>&1 | tee shared-visibility-vegetation.log
      - name: Environment material profile contracts
        shell: bash
        run: |
          set -o pipefail
          npm run environment-materials:smoke 2>&1 | tee environment-materials.log
          npm run environment-material-migration:smoke 2>&1 | tee environment-material-migration.log
          npm run environment-profile-revisions:smoke 2>&1 | tee environment-profile-revisions.log
          npm run vegetation-chunk-raster:smoke 2>&1 | tee vegetation-chunk-raster.log
      - name: Danger route cost parity smoke
        shell: bash
        run: set -o pipefail; npm run danger-route-cost-parity:smoke 2>&1 | tee danger-route-cost-parity.log
      - name: Capture combat foundation smoke
        shell: bash
        run: |
          set +e
          npm run combat-foundation:smoke > combat-foundation.log 2>&1
          echo $? > combat-foundation.exit
          tail -n 120 combat-foundation.log
          exit 0
      - name: Upload combat foundation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: combat-foundation-log
          path: |
            combat-foundation.log
            combat-foundation.exit
          if-no-files-found: error
      - name: Require combat foundation smoke success
        shell: bash
        run: test "$(cat combat-foundation.exit)" = "0"
      - name: Existing perception smoke
        shell: bash
        run: set -o pipefail; npm run perception:smoke 2>&1 | tee perception-smoke.log
      - name: Perception performance smoke
        shell: bash
        run: set -o pipefail; npm run perception-performance:smoke 2>&1 | tee perception-performance.log
      - name: Current-view and memory heatmap smoke
        shell: bash
        run: set -o pipefail; npm run view-memory-heatmap:smoke 2>&1 | tee view-memory-heatmap.log
      - name: Current-view and memory performance smoke
        shell: bash
        run: set -o pipefail; npm run view-memory-heatmap-performance:smoke 2>&1 | tee view-memory-heatmap-performance.log
      - name: Visibility probe cache smoke
        shell: bash
        run: set -o pipefail; npm run visibility-probe:smoke 2>&1 | tee visibility-probe.log
      - name: Existing runtime smoke
        shell: bash
        run: set -o pipefail; npm run runtime:smoke 2>&1 | tail -n 120
      - name: Per-unit AI scheduler smoke
        shell: bash
        run: set -o pipefail; npm run ai-scheduler:smoke 2>&1 | tee ai-scheduler-smoke.log
      - name: Existing reload smoke
        shell: bash
        run: set -o pipefail; npm run reload:smoke 2>&1 | tail -n 120
      - name: Workspace presentation smoke
        shell: bash
        run: set -o pipefail; npm run workspace:smoke 2>&1 | tee workspace-smoke.log
      - name: Awareness field cache smoke
        shell: bash
        run: set -o pipefail; npm run awareness-field:smoke 2>&1 | tee awareness-field.log
      - name: Directional terrain smoke
        shell: bash
        run: set -o pipefail; npm run directional-terrain:smoke 2>&1 | tail -n 160
      - name: Reverse slope comparative smoke
        shell: bash
        run: set -o pipefail; npm run reverse-slope-comparative:smoke 2>&1 | tail -n 120
      - name: Navigation overlay smoke
        shell: bash
        run: set -o pipefail; npm run navigation-overlay:smoke 2>&1 | tail -n 160
      - name: Pathfinding smoke
        shell: bash
        run: set -o pipefail; npm run pathfinding:smoke 2>&1 | tail -n 120
      - name: Navigation profiles smoke
        shell: bash
        run: set -o pipefail; npm run navigation-profiles:smoke 2>&1 | tail -n 120
      - name: Routed move smoke
        shell: bash
        run: set -o pipefail; npm run routed-move:smoke 2>&1 | tail -n 120
      - name: Route status smoke
        shell: bash
        run: set -o pipefail; npm run route-status:smoke 2>&1 | tail -n 120
      - name: Movement bridge smoke
        shell: bash
        run: set -o pipefail; npm run move-bridge:smoke 2>&1 | tail -n 160
      - name: Danger layer performance contract
        shell: bash
        run: set -o pipefail; npm run danger-layer-performance:smoke 2>&1 | tee danger-layer-performance.log
      - name: Moving danger layer performance contract
        shell: bash
        run: set -o pipefail; npm run danger-layer-movement-performance:smoke 2>&1 | tee danger-layer-movement-performance.log
      - name: Production build
        shell: bash
        run: set -o pipefail; npm run build 2>&1 | tee production-build.log
      - name: Combat tactical integration smoke
        shell: bash
        run: set -o pipefail; npm run combat-tactical-integration:smoke 2>&1 | tee combat-tactical-integration.log
      - name: Documentation consistency
        shell: bash
        run: set -o pipefail; npm run docs:check 2>&1 | tee docs-check.log
      - name: AI test lab smoke
        shell: bash
        run: set -o pipefail; npm run lab:smoke 2>&1 | tee ai-test-lab.log
      - name: Upload combat tactical integration logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: combat-tactical-integration-log
          path: |
            shared-visibility-vegetation.log
            environment-materials.log
            environment-material-migration.log
            environment-profile-revisions.log
            vegetation-chunk-raster.log
            perception-smoke.log
            perception-performance.log
            view-memory-heatmap.log
            view-memory-heatmap-performance.log
            visibility-probe.log
            workspace-smoke.log
            awareness-field.log
            danger-route-cost-parity.log
            combat-tactical-integration.log
            danger-layer-performance.log
            danger-layer-movement-performance.log
            production-build.log
            docs-check.log
            ai-test-lab.log
            ai-scheduler-smoke.log
          if-no-files-found: warn

  approved-environment-materials-visual-qa:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/terrain-profiles-performance-followup-v1' && contains(github.event.pull_request.body, 'VISUAL_QA_APPROVED_BY_USER: yes')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright test runner
        run: npm install --no-save @playwright/test

      - name: Enable approved environment-material suite in runner only
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/environment-materials-visual.spec.ts')
          source = path.read_text()
          enabled = source.replace("test.skip('shows continuous sparse/dense forest across zoom and danger-overlay states'", "test('shows continuous sparse/dense forest across zoom and danger-overlay states'")
          enabled = enabled.replace("test.skip('live profile edit refreshes the open map without a page reload'", "test('live profile edit refreshes the open map without a page reload'")
          if enabled == source or enabled.count("test('shows continuous sparse/dense forest") != 1 or enabled.count("test('live profile edit") != 1:
              raise SystemExit('approved environment-material tests were not enabled exactly once')
          path.write_text(enabled)
          PY

      - name: Production build
        run: npm run build

      - name: Run approved environment-material visual QA
        shell: bash
        run: |
          set -o pipefail
          npx playwright test tests/environment-materials-visual.spec.ts --project=chromium --reporter=line 2>&1 | tee environment-materials-visual-playwright.log

      - name: Record exact tested SHA
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts/visual-qa/environment-materials-v1
          printf '%s\n' '${{ github.event.pull_request.head.sha }}' > artifacts/visual-qa/environment-materials-v1/COMMIT_SHA.txt

      - name: Upload approved environment-material screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: environment-materials-visual-screenshots-${{ github.event.pull_request.head.sha }}
          path: |
            artifacts/visual-qa/environment-materials-v1/*.png
            artifacts/visual-qa/environment-materials-v1/COMMIT_SHA.txt
          if-no-files-found: error
          retention-days: 7

      - name: Upload approved environment-material evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: environment-materials-visual-evidence-${{ github.event.pull_request.head.sha }}
          path: |
            environment-materials-visual-playwright.log
            test-results/**
            artifacts/visual-qa/environment-materials-v1/COMMIT_SHA.txt
          if-no-files-found: warn
          retention-days: 7
