name: Combat Foundation Core

on:
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - 'vite.config.ts'
      - 'src/core/behavior/**'
      - 'src/core/combat/**'
      - 'src/core/cover/**'
      - 'src/core/debug/**'
      - 'src/core/knowledge/**'
      - 'src/core/map/**'
      - 'src/core/navigation/**'
      - 'src/core/orders/**'
      - 'src/core/pathfinding/**'
      - 'src/core/perception/**'
      - 'src/core/pressure/**'
      - 'src/core/simulation/**'
      - 'src/core/terrain/**'
      - 'src/core/units/**'
      - 'src/core/visibility/**'
      - 'src/core/geometry.ts'
      - 'src/core/simulation/SimulationTick.ts'
      - 'src/core/simulation/SimulationState.ts'
      - 'src/core/behavior/BehaviorModel.ts'
      - 'src/core/units/UnitModel.ts'
      - 'src/core/ai/AiGameBridge.ts'
      - 'src/core/ai/AiSimulationScheduler.ts'
      - 'src/core/ai/AiStatefulMoveGameBridge.ts'
      - 'src/core/ai/AiRouteStatus.ts'
      - 'src/core/ai/UnitPlan.ts'
      - 'src/core/ai/events/SimulationAiEvents.ts'
      - 'src/core/ai/runtime/**'
      - 'src/core/ai/state/**'
      - 'src/core/editor/GameEditorDrafts.ts'
      - 'src/core/testing/AiTestLabRuntime.ts'
      - 'src/data/ai/soldier_default_survival_graph.json'
      - 'src/rendering/PixiAwarenessHeatmapRenderer.ts'
      - 'src/rendering/PixiUnitRenderer.ts'
      - 'src/rendering/PixiCombatEffectsRenderer.ts'
      - 'src/rendering/CombatEffectsInstaller.ts'
      - 'src/testing/DangerLayerMovementPerformanceHarness.ts'
      - 'src/workers/**'
      - 'src/ui/CombatControls.ts'
      - 'src/ui/CombatAudio.ts'
      - 'src/ui/SceneExport.ts'
      - 'src/main.ts'
      - 'scripts/combat_foundation_smoke.*'
      - 'scripts/combat_tactical_integration_smoke.*'
      - 'scripts/danger_route_cost_parity_smoke.*'
      - 'scripts/danger_route_cost_cache_smoke.*'
      - 'scripts/danger_layer_performance_smoke.*'
      - 'scripts/danger_layer_movement_performance_smoke.*'
      - 'scripts/live_navigation_replan_smoke.ts'
      - 'scripts/combat_safe_position_winner_smoke.ts'
      - 'scripts/reverse_slope_comparative_fixture.ts'
      - 'scripts/reverse_slope_comparative_smoke.ts'
      - 'scripts/reverse_slope_comparative_smoke.mjs'
      - 'scripts/directional_terrain_smoke.mjs'
      - 'scripts/combat_threat_evidence_source_direction_regression_smoke.ts'
      - 'scripts/perception_system_smoke.ts'
      - 'scripts/tactical_workspace_smoke.mjs'
      - 'scripts/tactical_workspace_smoke_pixijs8_baseline.mjs'
      - 'scripts/ai_test_lab_smoke.mjs'
      - 'scripts/ai_per_unit_scheduler_smoke.mjs'
      - 'scripts/ai_per_unit_scheduler_smoke.ts'
      - 'tests/combat-foundation-visual.spec.ts'
      - 'tests/danger-layer-movement-performance.spec.ts'
      - 'tests/danger-route-cost-parity-visual.spec.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/combat-foundation-core.yml'
  workflow_dispatch:

permissions:
  contents: write # PR127_SELF_HEAL_PERMISSION

jobs:
  combat-foundation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # PR127_SELF_HEAL_START
      - name: Apply PR127 scheduler overlap once
        if: github.head_ref == 'agent/per-unit-ai-scheduler-v1' && github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin agent/per-unit-ai-scheduler-v1 --depth=1
          git checkout -B agent/per-unit-ai-scheduler-v1 origin/agent/per-unit-ai-scheduler-v1
          python - <<'PYCODE'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str, label: str) -> None:
              text = path.read_text()
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'{label}: expected exactly one match, found {count}')
              path.write_text(text.replace(old, new, 1))

          tactical = Path('scripts/tactical_workspace_smoke_pixijs8_baseline.mjs')
          replace_once(tactical, "'Приказать двигаться сюда', 'Один расчёт ИИ', 'Рассчитать и выполнить',", "'Приказать двигаться сюда', 'Диагностика ИИ (без изменений)', 'Рассчитать и выполнить',", 'workspace label')

          unit_model = Path('src/core/units/UnitModel.ts')
          replace_once(unit_model, "export type ThreatMemorySource = 'seen' | 'heard' | 'reported' | 'fire_pressure';", "export type ThreatMemorySource = 'seen' | 'heard' | 'reported' | 'fire_pressure';\nexport type FireThreatClass = 'rifle_fire' | 'machine_gun_fire';", 'fire class type')
          replace_once(unit_model, '  lastUpdatedSeconds: number;\n  evidenceCount?: number;', '  lastUpdatedSeconds: number;\n  fireThreatClass?: FireThreatClass | null;\n  evidenceCount?: number;', 'fire class field')

          memory = Path('src/core/knowledge/SoldierThreatMemory.ts')
          replacements = [
              ("import type { KnownThreatMemory, UnitModel, UnitTacticalKnowledge } from '../units/UnitModel';", "import type { FireThreatClass, KnownThreatMemory, UnitModel, UnitTacticalKnowledge } from '../units/UnitModel';", 'import'),
              ('buildRealUnitThreat(state, unit, contact, threatId, existing.get(threatId), now)', 'buildRealUnitThreat(state, unit, sourceUnit, contact, threatId, existing.get(threatId), now)', 'call'),
              ('  observer: UnitModel,\n  contact:', '  observer: UnitModel,\n  sourceUnit: UnitModel,\n  contact:', 'signature'),
              ('    lastUpdatedSeconds: now,\n    evidenceCount: previousEvidence?.evidenceCount ?? 0,', "    lastUpdatedSeconds: now,\n    fireThreatClass: visibleNow\n      ? classifyUnitFireThreat(sourceUnit)\n      : previous?.fireThreatClass ?? 'rifle_fire',\n    evidenceCount: previousEvidence?.evidenceCount ?? 0,", 'real class'),
              ('      lastUpdatedSeconds: now,\n      evidenceCount: evidence.evidenceCount,', '      lastUpdatedSeconds: now,\n      fireThreatClass: null,\n      evidenceCount: evidence.evidenceCount,', 'unknown class'),
              ('    lastUpdatedSeconds: now,\n    evidenceCount: 0,', '    lastUpdatedSeconds: now,\n    fireThreatClass: null,\n    evidenceCount: 0,', 'known class'),
              ('    lastUpdatedSeconds,\n    evidenceCount,', '    lastUpdatedSeconds,\n    fireThreatClass: normalizeFireThreatClass(value.fireThreatClass, id),\n    evidenceCount,', 'normalize class'),
              ('    visibleNow: memory.visibleNow,\n    evidenceCount: memory.evidenceCount ?? 0,', '    visibleNow: memory.visibleNow,\n    fireThreatClass: memory.fireThreatClass ?? null,\n    evidenceCount: memory.evidenceCount ?? 0,', 'revision class'),
              ("\nfunction sourceForContact(contact: PerceptionContactMemory): KnownThreatMemory['source'] {", "\nfunction classifyUnitFireThreat(unit: UnitModel): FireThreatClass {\n  return unit.type === 'support_team' || unit.heldItem === 'support_item'\n    ? 'machine_gun_fire'\n    : 'rifle_fire';\n}\n\nfunction normalizeFireThreatClass(value: unknown, id: string): FireThreatClass | null {\n  if (!id.startsWith('unit:')) return null;\n  return value === 'machine_gun_fire' ? 'machine_gun_fire' : 'rifle_fire';\n}\n\nfunction sourceForContact(contact: PerceptionContactMemory): KnownThreatMemory['source'] {", 'helpers'),
          ]
          for old, new, label in replacements:
              replace_once(memory, old, new, label)

          workflow = Path('.github/workflows/combat-foundation-core.yml')
          text = workflow.read_text()
          start = text.index('      # PR127_SELF_HEAL_START\n')
          end_marker = '      # PR127_SELF_HEAL_END\n'
          end = text.index(end_marker, start) + len(end_marker)
          text = text[:start] + text[end:]
          text = text.replace('permissions:\n  contents: write # PR127_SELF_HEAL_PERMISSION\n', 'permissions:\n  contents: read\n', 1)
          workflow.write_text(text)
          PYCODE
          rm -f .github/workflows/agent-pr127-overlap-finalize.yml
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'fix: reconcile scheduler follow-up with danger contracts'
          git push origin HEAD:agent/per-unit-ai-scheduler-v1
      # PR127_SELF_HEAL_END
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Danger route cost parity smoke
        shell: bash
        run: set -o pipefail; npm run danger-route-cost-parity:smoke 2>&1 | tee danger-route-cost-parity.log
      - name: Capture combat foundation smoke
        shell: bash
        run: |
          set +e
          npm run combat-foundation:smoke > combat-foundation.log 2>&1
          echo $? > combat-foundation.exit
          tail -n 120 combat-foundation.log
          exit 0
      - name: Upload combat foundation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: combat-foundation-log
          path: |
            combat-foundation.log
            combat-foundation.exit
          if-no-files-found: error
      - name: Require combat foundation smoke success
        shell: bash
        run: test "$(cat combat-foundation.exit)" = "0"
      - name: Existing perception smoke
        shell: bash
        run: set -o pipefail; npm run perception:smoke 2>&1 | tail -n 120
      - name: Existing runtime smoke
        shell: bash
        run: set -o pipefail; npm run runtime:smoke 2>&1 | tail -n 120
      - name: Per-unit AI scheduler smoke
        shell: bash
        run: set -o pipefail; npm run ai-scheduler:smoke 2>&1 | tee ai-scheduler-smoke.log
      - name: Existing reload smoke
        shell: bash
        run: set -o pipefail; npm run reload:smoke 2>&1 | tail -n 120
      - name: Workspace presentation smoke
        shell: bash
        run: set -o pipefail; npm run workspace:smoke 2>&1 | tee workspace-smoke.log
      - name: Awareness field cache smoke
        shell: bash
        run: set -o pipefail; npm run awareness-field:smoke 2>&1 | tee awareness-field.log
      - name: Directional terrain smoke
        shell: bash
        run: set -o pipefail; npm run directional-terrain:smoke 2>&1 | tail -n 160
      - name: Reverse slope comparative smoke
        shell: bash
        run: set -o pipefail; npm run reverse-slope-comparative:smoke 2>&1 | tail -n 120
      - name: Navigation overlay smoke
        shell: bash
        run: set -o pipefail; npm run navigation-overlay:smoke 2>&1 | tail -n 160
      - name: Pathfinding smoke
        shell: bash
        run: set -o pipefail; npm run pathfinding:smoke 2>&1 | tail -n 120
      - name: Navigation profiles smoke
        shell: bash
        run: set -o pipefail; npm run navigation-profiles:smoke 2>&1 | tail -n 120
      - name: Routed move smoke
        shell: bash
        run: set -o pipefail; npm run routed-move:smoke 2>&1 | tail -n 120
      - name: Route status smoke
        shell: bash
        run: set -o pipefail; npm run route-status:smoke 2>&1 | tail -n 120
      - name: Movement bridge smoke
        shell: bash
        run: set -o pipefail; npm run move-bridge:smoke 2>&1 | tail -n 160
      - name: Danger layer performance contract
        shell: bash
        run: set -o pipefail; npm run danger-layer-performance:smoke 2>&1 | tee danger-layer-performance.log
      - name: Moving danger layer performance contract
        shell: bash
        run: set -o pipefail; npm run danger-layer-movement-performance:smoke 2>&1 | tee danger-layer-movement-performance.log
      - name: Production build
        shell: bash
        run: set -o pipefail; npm run build 2>&1 | tee production-build.log
      - name: Combat tactical integration smoke
        shell: bash
        run: set -o pipefail; npm run combat-tactical-integration:smoke 2>&1 | tee combat-tactical-integration.log
      - name: Documentation consistency
        shell: bash
        run: set -o pipefail; npm run docs:check 2>&1 | tee docs-check.log
      - name: AI test lab smoke
        shell: bash
        run: set -o pipefail; npm run lab:smoke 2>&1 | tee ai-test-lab.log
      - name: Upload combat tactical integration logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: combat-tactical-integration-log
          path: |
            workspace-smoke.log
            awareness-field.log
            danger-route-cost-parity.log
            combat-tactical-integration.log
            danger-layer-performance.log
            danger-layer-movement-performance.log
            production-build.log
            docs-check.log
            ai-test-lab.log
            ai-scheduler-smoke.log
          if-no-files-found: warn
