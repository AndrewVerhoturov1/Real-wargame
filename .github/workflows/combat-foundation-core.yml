name: Combat Foundation Core

on:
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - 'src/core/combat/**'
      - 'src/core/perception/**'
      - 'src/core/simulation/**'
      - 'src/core/units/**'
      - 'src/core/ai/AiGameBridge.ts'
      - 'src/rendering/PixiUnitRenderer.ts'
      - 'scripts/combat_foundation_smoke.*'
      - 'package.json'
      - '.github/workflows/combat-foundation-core.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  combat-foundation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Combat foundation smoke
        shell: bash
        run: set -o pipefail; npm run combat-foundation:smoke 2>&1 | tail -n 120
      - name: Existing perception smoke
        shell: bash
        run: set -o pipefail; npm run perception:smoke 2>&1 | tail -n 120
      - name: Existing runtime smoke
        shell: bash
        run: set -o pipefail; npm run runtime:smoke 2>&1 | tail -n 120
      - name: Existing reload smoke
        shell: bash
        run: set -o pipefail; npm run reload:smoke 2>&1 | tail -n 120
      - name: Production build
        shell: bash
        run: set -o pipefail; npm run build 2>&1 | tail -n 160
