name: Apply Performance v6 Test Compatibility

on:
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - scripts/apply_performance_v6_test_compat.py
      - .github/workflows/apply-performance-v6-test-compat.yml

permissions:
  contents: write

concurrency:
  group: apply-performance-v6-test-compat-publish-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  patch-verify-and-publish-code:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Apply exact compatibility patch
        run: python scripts/apply_performance_v6_test_compat.py
      - name: Install and verify focused contracts
        run: |
          npm ci
          npm run workspace:smoke
          npm run build
          npm run performance-report-v6:smoke
          node scripts/performance_report_contract_smoke.mjs
          npm run performance-contract:smoke
      - name: Publish verified non-workflow sources
        shell: bash
        run: |
          set -euo pipefail
          git checkout -- .github/workflows/danger-layer-browser-performance.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/core/debug/PerformanceMonitor.ts
          git add tests/danger-layer-movement-performance.spec.ts
          git add tests/danger-layer-long-task-attribution.spec.ts
          git diff --cached --check
          git commit -m 'test(perf): bridge legacy browser checks to report v6'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
