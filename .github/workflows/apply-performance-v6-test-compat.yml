name: Apply Performance v6 Test Compatibility

on:
  push:
    branches:
      - agent/performance-report-v6-observability
    paths:
      - scripts/apply_performance_v6_test_compat.py
      - .github/workflows/apply-performance-v6-test-compat.yml
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - scripts/apply_performance_v6_test_compat.py
      - .github/workflows/apply-performance-v6-test-compat.yml

permissions:
  contents: read

env:
  PATCH_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

concurrency:
  group: apply-performance-v6-test-compat-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  patch-verify-and-package:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PATCH_HEAD_SHA }}
          fetch-depth: 0
      - name: Apply exact compatibility patch
        run: python scripts/apply_performance_v6_test_compat.py
      - name: Install and verify focused contracts
        run: |
          npm ci
          npm run workspace:smoke
          npm run build
          npm run performance-report-v6:smoke
          node scripts/performance_report_contract_smoke.mjs
          npm run performance-contract:smoke
      - name: Upload verified patched sources
        uses: actions/upload-artifact@v4
        with:
          name: performance-v6-verified-compat-${{ env.PATCH_HEAD_SHA }}
          path: |
            src/core/debug/PerformanceMonitor.ts
            .github/workflows/danger-layer-browser-performance.yml
            tests/danger-layer-browser-performance.spec.ts
            tests/danger-layer-movement-performance.spec.ts
            tests/danger-layer-long-task-attribution.spec.ts
            tests/performance-report-compat.ts
          if-no-files-found: error
          retention-days: 3
