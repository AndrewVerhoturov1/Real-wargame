name: Apply Performance v6 Test Compatibility

on:
  push:
    branches:
      - agent/performance-report-v6-observability
    paths:
      - scripts/apply_performance_v6_test_compat.py
      - .github/workflows/apply-performance-v6-test-compat.yml
  pull_request:
    branches:
      - real-wargame-preview
    paths:
      - scripts/apply_performance_v6_test_compat.py
      - .github/workflows/apply-performance-v6-test-compat.yml

permissions:
  contents: write

env:
  PATCH_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
  PATCH_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}

concurrency:
  group: apply-performance-v6-test-compat-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  patch-verify-and-clean:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PATCH_HEAD_SHA }}
          fetch-depth: 0
      - name: Apply exact compatibility patch
        run: python scripts/apply_performance_v6_test_compat.py
      - name: Install and verify focused contracts
        run: |
          npm ci
          npm run workspace:smoke
          npm run build
          npm run performance-report-v6:smoke
          node scripts/performance_report_contract_smoke.mjs
          npm run performance-contract:smoke
      - name: Publish clean verified patch
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/apply_performance_v6_test_compat.py
          rm -f .github/workflows/apply-performance-v6-test-compat.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'test(perf): bridge legacy browser checks to report v6'
          git push origin HEAD:${PATCH_BRANCH}
