name: Navigation Profiles Core

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  navigation-profiles:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run navigation-profiles:smoke
      - run: npm run navigation-profile-switch:smoke
      - run: npm run navigation-overlay:smoke
      - run: npm run pathfinding:smoke
      - run: npm run routed-move:smoke
      - run: npm run runtime:smoke
      - run: npm run route-status:smoke
      - run: npm run move-bridge:smoke
      - run: npm run command-plan-route:smoke
      - run: npm run map-revision:smoke
      - run: npm run build
      - run: npm run docs:check
