name: Navigation Profiles Core

on:
  pull_request:
    branches:
      - real-wargame-preview
  workflow_dispatch:

jobs:
  navigation-profiles:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Navigation profiles smoke
        shell: bash
        run: |
          set -o pipefail
          npm run navigation-profiles:smoke 2>&1 | tee navigation-profiles.log

      - name: Grid pathfinding regression
        shell: bash
        run: |
          set -o pipefail
          npm run pathfinding:smoke 2>&1 | tee grid-pathfinding.log

      - name: Routed movement regression
        shell: bash
        run: |
          set -o pipefail
          npm run routed-move:smoke 2>&1 | tee routed-move.log

      - name: Stateful movement bridge regression
        shell: bash
        run: |
          set -o pipefail
          npm run move-bridge:smoke 2>&1 | tee move-bridge.log

      - name: Command plan route regression
        shell: bash
        run: |
          set -o pipefail
          npm run command-plan-route:smoke 2>&1 | tee command-plan-route.log

      - name: Production build
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Documentation check
        shell: bash
        run: |
          set -o pipefail
          npm run docs:check 2>&1 | tee docs-check.log

      - name: Upload focused logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: navigation-profiles-core-logs
          path: |
            navigation-profiles.log
            grid-pathfinding.log
            routed-move.log
            move-bridge.log
            command-plan-route.log
            build.log
            docs-check.log
          if-no-files-found: ignore
          retention-days: 5

      - name: Pack source snapshot
        if: always()
        shell: bash
        run: tar -czf navigation-profiles-source.tar.gz --exclude=.git --exclude=node_modules --exclude='*.log' --exclude='.tmp-*' .

      - name: Upload source snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: navigation-profiles-source
          path: navigation-profiles-source.tar.gz
          retention-days: 2
