name: Diagnose Prone Tactical Position Arrival

on:
  push:
    branches:
      - feature/20260719-tactical-position-system
    paths:
      - '.github/workflows/diagnose-prone-arrival-posture.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/20260719-tactical-position-system
          fetch-depth: 1

      - name: Trace occupied posture consumers
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '=== occupied posture symbols ==='
            grep -RInE "occupiedTacticalPositionPosture|isTacticalPositionOccupationActive|arrivalPostureApplied|tactical_position_arrival" src scripts || true
            echo '=== posture writers ==='
            grep -RInE "behaviorRuntime\.posture[[:space:]]*=|previousPosture[[:space:]]*=|postureChangedBecause" src/core src/ui scripts || true
            echo '=== SetPosture runtime ==='
            grep -RIn "SetPosture" src/core src/ui scripts || true
          } > prone-posture-trace.txt

      - name: Upload posture ownership trace
        uses: actions/upload-artifact@v4
        with:
          name: prone-posture-trace
          path: prone-posture-trace.txt
          retention-days: 1
