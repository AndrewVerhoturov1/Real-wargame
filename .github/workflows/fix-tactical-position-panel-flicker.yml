name: Fix Tactical Position Panel Flicker

on:
  push:
    branches:
      - feature/20260719-tactical-position-system
    paths:
      - '.github/workflows/fix-tactical-position-panel-flicker.yml'

permissions:
  contents: write

jobs:
  test-fix-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/20260719-tactical-position-system
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Add regression contract
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path('scripts/tactical_position_tuning_smoke.ts')
          source = path.read_text(encoding='utf-8')
          old = '  assert.ok(workspaceBase.includes("tab === \'positions\'"));\n'
          new = old + '  assert.ok(workspaceBase.includes("if (tab === \'info\' || tab === \'positions\') return `${tab}|${unit.id}`;"), "positions panel structure must remain stable while the unit moves");\n'
          if old not in source:
              raise SystemExit('Tactical position workspace assertion insertion point not found')
          path.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Confirm regression test fails before fix
        run: |
          set +e
          npx tsx scripts/tactical_position_tuning_smoke.ts > before-fix.log 2>&1
          status=$?
          cat before-fix.log
          if [ "$status" -eq 0 ]; then
            echo 'Expected the new panel-stability regression contract to fail before the fix.'
            exit 1
          fi
          grep -q 'positions panel structure must remain stable while the unit moves' before-fix.log

      - name: Stabilize Positions panel DOM during movement
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path('src/ui/TacticalWorkspaceBase.ts')
          source = path.read_text(encoding='utf-8')
          old = "  if (tab === 'info') return `${tab}|${unit.id}`;\n"
          new = "  // Info updates its live values in place, and Positions owns its own\n  // service subscriptions. Neither panel should be structurally rebuilt while\n  // the selected unit crosses map cells.\n  if (tab === 'info' || tab === 'positions') return `${tab}|${unit.id}`;\n"
          if old not in source:
              raise SystemExit('sidebarKey info fast path not found')
          path.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Verify focused checks and production build
        run: |
          set +e
          {
            echo '=== TypeScript ==='
            npx tsc
            echo '=== Tactical position smoke ==='
            npm run tactical-position:smoke
            echo '=== Workspace smoke ==='
            npm run workspace:smoke
            echo '=== Production build ==='
            npx vite build
          } > verification.log 2>&1
          status=$?
          cat verification.log
          exit "$status"

      - name: Commit verified fix and remove temporary workflow
        run: |
          rm .github/workflows/fix-tactical-position-panel-flicker.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: keep positions panel stable while units move"
          git push origin HEAD:feature/20260719-tactical-position-system
