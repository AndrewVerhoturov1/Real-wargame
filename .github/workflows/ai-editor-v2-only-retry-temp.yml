name: TEMP AI editor Graph v2-only retry

on:
  push:
    branches:
      - fix/ai-plan-move-editor-panels-temp-2026-07-14
    paths:
      - .github/workflows/ai-editor-v2-only-retry-temp.yml

permissions:
  contents: write
  statuses: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'ai-editor-v2-only-retry',
              description: 'Applying Graph v2-only editor change',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - uses: actions/checkout@v4
        with:
          ref: fix/ai-plan-move-editor-panels-temp-2026-07-14
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Apply Graph v2-only source changes
        run: python scripts/apply_ai_editor_v2_only_temp.py

      - name: Convert bundled starter graph to Graph v2
        shell: bash
        run: |
          cat > .tmp-migrate-editor-graph.ts <<'TS'
          import { writeFileSync } from 'node:fs';
          import graphData from './src/data/ai/soldier_default_survival_graph.json';
          import { migrateAiGraphToV2 } from './src/core/ai/contracts/AiGraphMigration';
          const result = migrateAiGraphToV2(graphData as unknown);
          if (!result.ok) throw new Error(result.issues.map((issue) => issue.messageRu).join('\n'));
          writeFileSync('src/data/ai/soldier_default_survival_graph.json', `${JSON.stringify(result.graph, null, 2)}\n`, 'utf8');
          TS
          node --input-type=module <<'JS'
          import { build } from 'vite';
          await build({
            logLevel: 'warn',
            build: {
              ssr: '.tmp-migrate-editor-graph.ts',
              outDir: '.tmp-migrate-editor-graph',
              emptyOutDir: true,
              minify: false,
              rollupOptions: { output: { entryFileNames: 'migrate.mjs', format: 'es' } },
            },
          });
          JS
          node .tmp-migrate-editor-graph/migrate.mjs
          rm -rf .tmp-migrate-editor-graph .tmp-migrate-editor-graph.ts

      - name: Verify Graph v2-only editor and regressions
        shell: bash
        run: |
          set -o pipefail
          {
            npm run editor:smoke
            npm run graph-v2:smoke
            npm run node-contract-ui:smoke
            npm run move-bridge:smoke
            npm run state-plan-scenario:smoke
            npm run build
          } 2>&1 | tee graph-v2-only-retry.log

      - name: Upload verification log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ai-editor-v2-only-retry-log
          path: graph-v2-only-retry.log
          if-no-files-found: warn
          retention-days: 7

      - name: Remove temporary executor files
        run: |
          rm -f \
            scripts/apply_ai_editor_v2_only_temp.py \
            .github/workflows/ai-editor-v2-only-executor-temp.yml \
            .github/workflows/ai-editor-v2-only-retry-temp.yml

      - name: Commit verified Graph v2-only editor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: make AI editor Graph v2 only"
          git push origin HEAD:fix/ai-plan-move-editor-panels-temp-2026-07-14

      - name: Publish final status
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const success = process.env.JOB_STATUS === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'ai-editor-v2-only-retry',
              description: `Graph v2-only retry: ${process.env.JOB_STATUS}`,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
