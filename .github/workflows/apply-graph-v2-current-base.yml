name: Apply Graph v2 on current base

on:
  push:
    branches:
      - feat/ai-graph-v2-contracts-subgraphs-2026-07-13

permissions:
  contents: write

jobs:
  apply:
    if: contains(github.event.head_commit.message, 'apply Graph v2 onto current base')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Reconstruct verified Graph v2 patch
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_COMMIT: 7421b7055d724e677695393f68a9fe20e9f94e2f
        shell: bash
        run: |
          set -euo pipefail
          : > /tmp/graph-v2.b64
          for number in $(seq -w 0 21); do
            curl --fail --silent --show-error --location \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.raw+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/.graph-v2-upload/part-${number}?ref=${SOURCE_COMMIT}" \
              >> /tmp/graph-v2.b64
          done
          base64 --decode /tmp/graph-v2.b64 > /tmp/graph-v2.patch.xz
          echo 'b1c7fb96af12b4f451e7e6181e2a8710afe8b40d99d88822fc7f3eac5bf99ae4  /tmp/graph-v2.patch.xz' | sha256sum --check
          xz --decompress --stdout /tmp/graph-v2.patch.xz > /tmp/graph-v2.patch

      - name: Materialize old verified result
        shell: bash
        run: |
          set -euo pipefail
          git worktree add --detach /tmp/graph-v2-old 25a0c50aca1b76bea11b0146ee210a76d9e4793a
          git -C /tmp/graph-v2-old apply /tmp/graph-v2.patch

      - name: Apply non-conflicting Graph v2 files
        shell: bash
        run: |
          set -euo pipefail
          git apply --index \
            --exclude=package.json \
            --exclude=docs/ai/CURRENT_STATE.md \
            --exclude=docs/subprojects/INDEX.md \
            --exclude=docs/subprojects/ai-single-unit-editor/JOURNAL.md \
            --exclude=docs/subprojects/ai-single-unit-editor/STATUS.md \
            --exclude=docs/subprojects/ai-single-unit-editor/subproject.json \
            --exclude=docs/subprojects/index.json \
            --exclude=.github/workflows/export-ai-graph-v2-source.yml \
            /tmp/graph-v2.patch

      - name: Merge package and current-state documentation
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const graphScripts = [
            'graph-v2:smoke',
            'runtime-modifiers:smoke',
            'subgraph:smoke',
            'node-contract-ui:smoke',
            'ai-graph:migrate',
            'graph-v2-scenario:smoke',
          ];
          const currentPackage = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const oldPackage = JSON.parse(fs.readFileSync('/tmp/graph-v2-old/package.json', 'utf8'));
          for (const name of graphScripts) currentPackage.scripts[name] = oldPackage.scripts[name];
          fs.writeFileSync('package.json', `${JSON.stringify(currentPackage, null, 2)}\n`);

          const subprojectPath = 'docs/subprojects/ai-single-unit-editor/subproject.json';
          const current = JSON.parse(fs.readFileSync(subprojectPath, 'utf8'));
          const old = JSON.parse(fs.readFileSync(`/tmp/graph-v2-old/${subprojectPath}`, 'utf8'));
          current.updated_at = '2026-07-13';
          current.current_focus = 'View and Memory Heatmap v1 и управление направлением бойца сохранены из актуальной preview-базы. Поверх них в изолированной ветке реализован этап 3 Graph v2: единый реестр контрактов, типизированные порты, строгая проверка, безопасная миграция v1, области памяти, четыре сохраняемых подграфа и русский интерфейс редактора. Идёт повторная полная и обязательная визуальная проверка на актуальной базе; real-wargame-preview не изменена.';
          current.next_step = 'Завершить полный набор smoke/build и обязательную browser/PNG-проверку итогового commit SHA. После отчёта ждать отдельной прямой команды пользователя на перенос в real-wargame-preview.';
          for (const key of ['main_files', 'test_files', 'manual_docs', 'suggested_verification', 'safety_rules', 'known_limits']) {
            current[key] ??= [];
            for (const item of old[key] ?? []) if (!current[key].includes(item)) current[key].push(item);
          }
          fs.writeFileSync(subprojectPath, `${JSON.stringify(current, null, 2)}\n`);

          const journalPath = 'docs/subprojects/ai-single-unit-editor/JOURNAL.md';
          let journal = fs.readFileSync(journalPath, 'utf8').trimEnd();
          const entries = [
            '- **2026-07-12**: Completed Soldier Perception and Attention v1: hybrid attention modes, progressive forest visibility, evidence accumulation, approximate sound contacts, subjective Blackboard integration, profile editor, cached PixiJS overlay and exact-SHA real-Chrome verification. Transferred to `real-wargame-preview` through PR #70 as `5deb899673c7b6e57b9089ecf890699f6d617a9a`. See `journal/2026-07-12-perception-attention-v1.md`.',
            '- **2026-07-13**: Refined visibility controls and final facing: dark unseen-cell mask, compact legend, corrected cache diagnostics, one-shot turn tool, manual attention modes and final-facing preservation through route replanning and SimulationTick. See `journal/2026-07-13-visibility-controls-facing.md`.',
            '- **2026-07-13**: На изолированной ветке `feat/ai-graph-v2-contracts-subgraphs-2026-07-13` реализован этап 3: единый реестр контрактов, типизированные порты, строгая Graph v2 validation, безопасная идемпотентная миграция v1, пять областей памяти, `WaitForEvent`/`Timeout`/bounded `Retry`, четыре статических подграфа и их сохраняемый вложенный runtime. Редактор получил no-JSON параметры, блокировку неверных соединений, миграцию, breadcrumb подграфов и кликабельные русские ошибки; debug показывает подграф, путь и области памяти. Добавлен сквозной `shot_nearby → take_cover → snapshot/restore → move_and_observe` smoke. Перенос в preview не выполнялся.',
          ];
          for (const entry of entries) if (!journal.includes(entry)) journal += `\n${entry}`;
          fs.writeFileSync(journalPath, `${journal}\n`);
          NODE
          rm -f .github/workflows/export-ai-graph-v2-source.yml
          rm -f .github/workflows/apply-graph-v2-current-base.yml

      - name: Install and synchronize documentation
        run: |
          npm ci
          npm run docs:sync

      - name: Verify integrated Graph v2
        run: |
          npm run graph-v2:smoke
          npm run runtime-modifiers:smoke
          npm run subgraph:smoke
          npm run graph-v2-scenario:smoke
          npm run node-contract-ui:smoke
          npm run editor:smoke
          npm run runtime-session:smoke
          npm run runtime-snapshot:smoke
          npm run runtime-scene:smoke
          npm run view-memory-heatmap:smoke
          npm run view-memory-heatmap-performance:smoke
          npm run build

      - name: Commit integrated result
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'feat(ai): add Graph v2 typed contracts and subgraphs'
          git push origin HEAD:feat/ai-graph-v2-contracts-subgraphs-2026-07-13
